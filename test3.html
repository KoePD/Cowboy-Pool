<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowboy Pool</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(#012d1c, #001a10);
  color: white;
}

/* CONTAINER */
.container {
  padding: 16px;
  max-width: 420px;
  margin: auto;
}

/* STATUS */
.status {
  text-align: center;
  background: #0f3;
  color: black;
  padding: 6px;
  border-radius: 20px;
  margin-bottom: 16px;
  font-weight: bold;
}

/* PLAYER */
.player {
  border: 2px solid #ffd700;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
}

.player.inactive {
  opacity: 0.5;
  border-color: #555;
}

.turn {
  float: right;
  background: #ffd700;
  color: black;
  padding: 4px 8px;
  border-radius: 10px;
}

/* RULE */
.rule {
  background: #112;
  border: 2px solid #ffd700;
  padding: 16px;
  text-align: center;
  font-size: 20px;
  border-radius: 12px;
  margin: 16px 0;
}

/* BUTTON GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.button {
  background: #023;
  border: 2px solid #0f0;
  padding: 20px;
  text-align: center;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
}

.button:hover {
  background: #045;
}

/* POCKET ROW */
.row {
  display: flex;
  justify-content: space-between;
  gap: 10px;
}

.ball {
  flex: 1;
  padding: 16px;
  text-align: center;
  border-radius: 12px;
  font-weight: bold;
}

.ball.yellow { background: gold; color: black; }
.ball.red { background: crimson; }
.ball.purple { background: purple; }

/* FOUL */
.foul {
  background: darkred;
  text-align: center;
  padding: 16px;
  border-radius: 12px;
  margin: 16px 0;
  font-weight: bold;
}

/* FOOTER */
.footer {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.small-btn {
  flex: 1;
  margin: 5px;
  padding: 12px;
  border-radius: 10px;
  background: #222;
  text-align: center;
  cursor: pointer;
}

/* POPUP */
.popup {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #012;
  border-top: 3px solid #ffd700;
  padding: 20px;
  display: none;
}

.popup.active {
  display: block;
}

.popup .row div {
  cursor: pointer;
}
</style>

</head>
<body>

<div class="container">

  <div class="status">BORDET ER ÅPENT</div>

  <div class="player">
    <b>KP</b> <span class="turn">DIN TUR</span><br>
    Score: 47 | Serie: 6
  </div>

  <div class="player inactive">
    <b>Jenny</b><br>
    Score: 32 | Serie: 2
  </div>

  <div class="rule">MÅ: CAROM</div>

  <!-- CAROM -->
  <div class="grid">
    <div class="button" onclick="openPopup('+1 carom')">+1 (2 baller)</div>
    <div class="button" onclick="openPopup('+2 carom')">+2 (3 baller)</div>
  </div>

  <!-- POCKET -->
  <div class="row">
    <div class="ball yellow" onclick="score('+1')">+1</div>
    <div class="ball red" onclick="score('+3')">+3</div>
    <div class="ball purple" onclick="score('+5')">+5</div>
  </div>

  <!-- FOUL -->
  <div class="foul" onclick="score('FOUL')">FOUL</div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="small-btn">↩ Angre</div>
    <div class="small-btn">Avslutt tur</div>
  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <h3>La til noe?</h3>

  <div class="row">
    <div class="ball yellow" onclick="addExtra('+1')">+1</div>
    <div class="ball red" onclick="addExtra('+3')">+3</div>
    <div class="ball purple" onclick="addExtra('+5')">+5</div>
  </div>

  <div class="button" onclick="closePopup()">FERDIG</div>
</div>

<script>
function openPopup(action) {
  console.log("Base:", action);
  document.getElementById("popup").classList.add("active");
}

function closePopup() {
  document.getElementById("popup").classList.remove("active");
}

function addExtra(val) {
  console.log("Extra:", val);
}

function score(val) {
  console.log("Score:", val);
}
</script>

</body>
</html>
