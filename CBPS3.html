<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Rye&family=Cinzel:wght@900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    
    <style>
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Rye', serif;
            display: flex; justify-content: center; align-items: flex-start;
            padding-top: 20px;
            height: 1080px; width: 1920px;
        }

        /* --- HOVEDRAMME MED DITT BILDE --- */
        .wanted-board {
            width: 535px; 
            height: 750px; 
            background: url('https://koepd.github.io/Cowboy-Pool/ScoreboardFrame.png') no-repeat center center;
            background-size: contain;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .board-header {
            width: 100%;
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 10px;
        }
        .wanted-title { font-size: 55px; color: #1a120b; margin: 0; }
        
        .players-container { 
            position: relative; 
            width: 100%; 
            height: 480px; 
            margin-top: 15px;
            padding: 0 40px; /* Holder innholdet innenfor bilderammen */
            box-sizing: border-box;
        }

        .player-row {
            display: none; 
            width: 455px;
            height: 155px; 
            align-items: center;
            padding: 0 10px;
            box-sizing: border-box;
            position: absolute;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            opacity: 0.7;
        }

        .player-row.active-turn {
            opacity: 1;
            background: rgba(241, 196, 15, 0.08);
            border-radius: 15px;
            animation: active-pulse 2s infinite ease-in-out;
        }

        @keyframes active-pulse {
            0% { box-shadow: 0 0 15px rgba(241, 196, 15, 0.1); }
            50% { box-shadow: 0 0 30px rgba(241, 196, 15, 0.3); }
            100% { box-shadow: 0 0 15px rgba(241, 196, 15, 0.1); }
        }

        /* --- TØNNE TIL VENSTRE --- */
        .revolver-zone { width: 120px; height: 120px; position: relative; flex-shrink: 0; }
        .revolver-cylinder {
            width: 110px; height: 110px;
            background: url('https://koepd.github.io/Cowboy-Pool/image_b55599.png') no-repeat center center;
            background-size: contain;
        }

        /* --- HYLSER (Finjustert posisjon) --- */
        .chamber { 
            width: 22px; height: 22px; 
            position: absolute; z-index: 3;
            background: url('https://koepd.github.io/Cowboy-Pool/Hylse.png') no-repeat center center;
            background-size: contain;
            display: none;
        }
        /* Posisjoner korrigert for de nederste hylsene */
        .c1 { top: 11px; left: 44px; }
        .c2 { bottom: 27px; left: 21px; } /* Flyttet litt inn og opp */
        .c3 { bottom: 27px; right: 21px; } /* Flyttet litt inn og opp */
        
        .chamber.active { display: block; animation: load-in 0.3s ease-out; }
        @keyframes load-in { 0% { transform: scale(2.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* --- INFO TIL HØYRE --- */
        .info-zone { flex: 1; padding-left: 20px; display: flex; flex-direction: column; }
        .player-name { font-size: 28px; color: #fdfaf0; text-transform: uppercase; margin: 0; letter-spacing: 1px; }
        .score-val { font-size: 52px; margin: -5px 0; line-height: 0.9; -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(2px 2px 2px #000); }
        
        .rank-0 .score-val { background-image: linear-gradient(180deg, #fffceb 0%, #f1c40f 100%); }
        .rank-1 .score-val { background-image: linear-gradient(180deg, #ffffff 0%, #bdc3c7 100%); }
        .rank-2 .score-val { background-image: linear-gradient(180deg, #fff2e6 0%, #cd7f32 100%); }

        .pers-val { font-size: 13px; color: #bd9b5b; font-family: 'Anton', sans-serif; text-transform: uppercase; }
        .pers-val b { font-family: 'Arial', sans-serif; color: #fff; font-size: 16px; margin: 0 3px; }

        /* --- ELIMINATED STEMPEL --- */
        .stamp {
            position: absolute; width: 320px; z-index: 100;
            left: 50%; top: 50%; transform: translate(-50%, -50%) rotate(-12deg);
            display: none; pointer-events: none;
        }
        .stamp svg { width: 100%; filter: drop-shadow(0 0 15px rgba(0,0,0,0.9)); }

        .board-footer {
            height: 100px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; margin-top: auto; margin-bottom: 25px;
        }

        #inning-text { color: #fdfaf0; font-size: 18px; font-family: 'Anton', sans-serif; }
        .footer-balls { display: flex; gap: 12px; }
        .ball { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #000; box-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .f-1 { background: radial-gradient(circle at 30% 30%, #f1c40f, #a67c00); }
        .f-5 { background: radial-gradient(circle at 30% 30%, #e67e22, #834c16); }
        .f-3 { background: radial-gradient(circle at 30% 30%, #e74c3c, #962d22); }
        #status-msg { color: #fdfaf0; font-family: 'Anton', sans-serif; font-size: 16px; text-transform: uppercase; }

        .spinning { animation: cylinder-spin 0.6s cubic-bezier(0.15, 0.88, 0.3, 1.05); }
        @keyframes cylinder-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="wanted-board">
    <div class="board-header">
        <h1 class="wanted-title">WANTED</h1>
    </div>

    <div class="players-container" id="players-container">
        <div class="player-row" id="p0-row" data-last-fouls="0">
            <div class="stamp elim-stamp">
                <svg viewBox="0 0 400 120">
                    <rect x="10" y="10" width="380" height="100" rx="10" fill="rgba(180, 0, 0, 0.85)" stroke="#600" stroke-width="5"/>
                    <text x="50%" y="78" text-anchor="middle" font-family="Anton" font-size="65" fill="white" font-weight="bold" letter-spacing="2">ELIMINATED</text>
                </svg>
            </div>
            <div class="revolver-zone">
                <div class="revolver-cylinder"><div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div></div>
            </div>
            <div class="info-zone">
                <div class="player-name" id="p0-name">PLAYER 1</div>
                <div class="score-val" id="p0-score">0</div>
                <div class="pers-val">NÅ <b id="p0-now">0</b> | PERS <b id="best-0">0</b></div>
            </div>
        </div>
        <div class="player-row" id="p1-row" data-last-fouls="0">
            <div class="stamp elim-stamp">
                <svg viewBox="0 0 400 120"><rect x="10" y="10" width="380" height="100" rx="10" fill="rgba(180, 0, 0, 0.85)" stroke="#600" stroke-width="5"/><text x="50%" y="78" text-anchor="middle" font-family="Anton" font-size="65" fill="white" font-weight="bold" letter-spacing="2">ELIMINATED</text></svg>
            </div>
            <div class="revolver-zone"><div class="revolver-cylinder"><div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div></div></div>
            <div class="info-zone">
                <div class="player-name" id="p1-name">PLAYER 2</div>
                <div class="score-val" id="p1-score">0</div>
                <div class="pers-val">NÅ <b id="p1-now">0</b> | PERS <b id="best-1">0</b></div>
            </div>
        </div>
        <div class="player-row" id="p2-row" data-last-fouls="0">
            <div class="stamp elim-stamp">
                <svg viewBox="0 0 400 120"><rect x="10" y="10" width="380" height="100" rx="10" fill="rgba(180, 0, 0, 0.85)" stroke="#600" stroke-width="5"/><text x="50%" y="78" text-anchor="middle" font-family="Anton" font-size="65" fill="white" font-weight="bold" letter-spacing="2">ELIMINATED</text></svg>
            </div>
            <div class="revolver-zone"><div class="revolver-cylinder"><div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div></div></div>
            <div class="info-zone">
                <div class="player-name" id="p2-name">PLAYER 3</div>
                <div class="score-val" id="p2-score">0</div>
                <div class="pers-val">NÅ <b id="p2-now">0</b> | PERS <b id="best-2">0</b></div>
            </div>
        </div>
    </div>

    <div class="board-footer">
        <div id="inning-text">ROUND 1</div>
        <div class="footer-balls">
            <div class="ball f-1"></div><div class="ball f-5"></div><div class="ball f-3"></div>
        </div>
        <div id="status-msg">KRAV: CAROM</div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    const spinSound = new Audio('DIN_LYD_URL_HER'); 
    const shotSound = new Audio('DIN_LYD_URL_HER');

    db.on('value', snap => {
        const data = snap.val();
        if (!data) return;

        const rowH = 155; 
        const playerCount = data.playerCount || 3;

        let pList = [];
        for (let i = 0; i < playerCount; i++) {
            pList.push({
                id: i,
                score: (data.scores && data.scores[i] !== undefined) ? data.scores[i] : 0,
                fouls: (data.foulCounts && data.foulCounts[i] !== undefined) ? data.foulCounts[i] : 0,
                name: (data.names && data.names[i]) ? data.names[i] : `PLAYER ${i+1}`
            });
        }
        pList.sort((a, b) => b.score - a.score);

        pList.forEach((pData, rank) => {
            const row = document.getElementById(`p${pData.id}-row`);
            if (!row) return;

            row.style.display = "flex";
            row.style.transform = `translateY(${rank * rowH}px)`;
            row.className = `player-row rank-${rank} ${data.currentPlayer === pData.id ? 'active-turn' : ''}`;
            
            document.getElementById(`p${pData.id}-name`).innerText = pData.name;
            document.getElementById(`p${pData.id}-score`).innerText = pData.score;
            document.getElementById(`best-${pData.id}`).innerText = data.bestSeries ? (data.bestSeries[pData.id] || 0) : 0;
            
            const scoreStart = (data.scoreAtStart && data.scoreAtStart[pData.id] !== undefined) ? data.scoreAtStart[pData.id] : 0;
            document.getElementById(`p${pData.id}-now`).innerText = (data.currentPlayer === pData.id) ? (pData.score - scoreStart) : 0;

            const cylinder = row.querySelector('.revolver-cylinder');
            const prevFouls = parseInt(row.getAttribute('data-last-fouls') || 0);
            if (pData.fouls > prevFouls) {
                cylinder.classList.remove('spinning');
                void cylinder.offsetWidth; 
                cylinder.classList.add('spinning');
                if (pData.fouls < 3) { spinSound.currentTime = 0; spinSound.play().catch(e=>{}); }
                else { shotSound.currentTime = 0; shotSound.play().catch(e=>{}); }
            }
            row.setAttribute('data-last-fouls', pData.fouls);

            const chambers = cylinder.querySelectorAll('.chamber');
            chambers.forEach((c, i) => c.classList.toggle('active', i < pData.fouls));

            const stamp = row.querySelector('.elim-stamp');
            stamp.style.display = (pData.fouls >= 3) ? 'block' : 'none';
        });

        if (data.status) document.getElementById('status-msg').innerText = `KRAV: ${data.status.toUpperCase()}`;
        document.getElementById('inning-text').innerText = `ROUND ${Math.floor((data.innings || 0) / playerCount) + 1}`;
    });
</script>
</body>
</html>
