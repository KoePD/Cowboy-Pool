<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Rye&family=Cinzel:wght@900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Rye', serif;
            display: flex; justify-content: center; align-items: flex-start;
            padding-top: 50px;
        }

        /* --- HOVEDRAMME (WANTED BOARD) --- */
        .wanted-board {
            width: 450px; /* Vertikal bredde */
            background: radial-gradient(circle, #2a1a0f 0%, #0a0502 100%); /* Mørkt tre-effekt */
            border: 15px solid;
            border-image: linear-gradient(180deg, #1d1109 0%, #000 100%) 1; /* Mørk tre-ytterkant */
            border-radius: 8px;
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            overflow: hidden; /* Holder alt inne */
            position: relative;
            z-index: 10;
        }

        /* Stål-hjørner (CSS-simulert) */
        .corner {
            position: absolute; width: 40px; height: 40px;
            background: linear-gradient(135deg, #eee 0%, #666 40%, #000 100%);
            border-radius: 5px; z-index: 100;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }
        .top-left { top: -8px; left: -8px; }
        .top-right { top: -8px; right: -8px; transform: rotate(90deg); }
        .bottom-left { bottom: -8px; left: -8px; transform: rotate(-90deg); }
        .bottom-right { bottom: -8px; right: -8px; transform: rotate(180deg); }

        /* HEADER (WANTED-skiltet) */
        .board-header {
            width: 100%; height: 100px;
            background: url('https://koepd.github.io/Cowboy-Pool/image_b54acf.png') repeat; /* Papir-tekstur */
            background-size: 100px;
            border-bottom: 5px solid #bd9b5b;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }
        .wanted-title { font-size: 56px; color: #000; text-transform: uppercase; margin: 0; line-height: 0.8; }
        .wanted-sub { font-size: 16px; color: #333; text-transform: uppercase; letter-spacing: 2px; }
        
        /* HEADER BALLS */
        .header-balls { 
            position: absolute; top: 10px; right: 10px; display: flex; gap: 8px;
        }
        .ball { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #000; }
        .f-1 { background: radial-gradient(circle, #f1c40f 0%, #a67c00 100%); }
        .f-5 { background: radial-gradient(circle, #e67e22 0%, #834c16 100%); }
        .f-3 { background: radial-gradient(circle, #e74c3c 0%, #962d22 100%); }

        /* SPILLER-KORT */
        .player-row {
            display: flex; align-items: center; padding: 25px;
            border-bottom: 2px solid #2a1a0f; position: relative;
            transition: all 0.3s ease;
        }
        .rank-0 { background: rgba(189, 155, 91, 0.05); } /* Gull-glød til leder */

        /* INAKTIV/ELIMINERT RAD */
        .player-row.eliminated {
            filter: grayscale(1) brightness(0.2);
            opacity: 0.4;
        }

        /* REVOLVER-Sone */
        .revolver-cylinder {
            width: 90px; height: 90px;
            /* BYTT UT DENNE URLEN MED DITT TØNNE-BILDE */
            background: url('https://koepd.github.io/Cowboy-Pool/image_b55599.png') no-repeat center center;
            background-size: contain;
            position: relative; flex-shrink: 0;
            overflow: hidden; /* Ingen kulesting utenfor */
        }
        
        /* Spinn-animasjon */
        .spinning { animation: cylinder-spin 0.6s cubic-bezier(0.15, 0.88, 0.3, 1.05) forwards; }
        @keyframes cylinder-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .chamber { width: 18px; height: 18px; background: transparent; border-radius: 50%; position: absolute; z-index: 3; }
        .c1 { top: 9px; left: 34px; }
        .c2 { bottom: 20px; left: 14px; }
        .c3 { bottom: 20px; right: 14px; }
        
        .chamber.active { 
            background: radial-gradient(circle at 35% 35%, #fff7ad 0%, #f1c40f 45%, #b8860b 60%, #4a3600 100%); 
            border: 1.5px solid #fdfaf0; 
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.9), inset -2px -2px 3px rgba(0,0,0,0.5); 
            z-index: 5;
            animation: bullet-load 0.4s ease-out forwards;
        }

        @keyframes bullet-load {
            0% { transform: scale(2); opacity: 0; filter: brightness(3); }
            100% { transform: scale(1); opacity: 1; filter: brightness(1); }
        }

        /* NAVN & BOUNTY */
        .info-zone { flex-grow: 1; padding-left: 20px; display: flex; flex-direction: column; }
        .player-name {
            font-size: 38px; color: #fdfaf0; text-transform: uppercase; margin: 0;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 280px;
        }
        
        /* BOUNTY SEKSJON */
        .bounty-list {
            display: flex; gap: 8px; margin-top: 5px;
        }
        .bounty-item {
            width: 50px; height: 50px; border: 2px solid #6e5932; border-radius: 4px;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            font-size: 9px; color: #bd9b5b; text-align: center; font-family: 'Anton', sans-serif;
            text-transform: uppercase; position: relative;
        }
        .bounty-item b { font-size: 14px; color: #fdfaf0; display: block; }
        .foul-count { font-size: 16px; color: #d63031; font-family: 'Anton', sans-serif; }

        /* SCORE (Under bounty) */
        .score-block { margin-top: 10px; }
        .score-val { 
            font-size: 64px; margin: 0; line-height: 0.7;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(3px 3px 2px rgba(0,0,0,1));
        }
        
        /* Metall-gradienter */
        .rank-0 .score-val { background-image: linear-gradient(180deg, #fffceb 0%, #f1c40f 100%); }
        .rank-1 .score-val { background-image: linear-gradient(180deg, #ffffff 0%, #bdc3c7 100%); }
        .rank-2 .score-val { background-image: linear-gradient(180deg, #fff2e6 0%, #cd7f32 100%); }
        
        .pers-val { font-size: 12px; color: #bd9b5b; font-family: 'Anton', sans-serif; text-transform: uppercase; margin-top: 2px;}
        .pers-val b { font-family: Arial, sans-serif !important; color: #fdfaf0; font-size: 13px; margin-left: 2px; }

        /* STEMPLER (DEAD/ELIMINATED/CAUGHT) */
        .stamp {
            position: absolute; font-size: 48px; border: 6px solid; border-radius: 8px;
            text-transform: uppercase; z-index: 200; transform: rotate(-15deg);
            display: none; pointer-events: none; left: 100px;
        }
        .eliminert-stamp { color: #d63031; border-color: #d63031; background-color: rgba(0,0,0,0.7); animation: stamp-slam 0.3s ease-out forwards; }
        @keyframes stamp-slam { 0% { transform: rotate(-15deg) scale(3); opacity: 0; } 100% { transform: rotate(-15deg) scale(1); opacity: 1; } }
        .survivor { color: #f1c40f; border-color: #f1c40f; text-shadow: 0 0 15px #f1c40f; top: 15px; left: 200px; font-size: 40px;}

        /* BUNNSTATUS (FOOTER) */
        .board-footer {
            width: 100%; height: 70px;
            background: linear-gradient(0deg, #1d0f06 0%, #000 100%);
            border-top: 5px solid #6e5932;
            display: flex; align-items: center; padding: 0 25px; box-sizing: border-box;
        }
        .inning-num { color: #fdfaf0; font-size: 20px; text-transform: uppercase; }
        .status-msg { color: #bd9b5b; font-size: 14px; margin-left: auto; text-transform: uppercase; letter-spacing: 1px; font-family: 'Anton', sans-serif; }

    </style>
</head>
<body>

<div class="wanted-board">
    <div class="corner top-left"></div><div class="corner top-right"></div>
    <div class="corner bottom-left"></div><div class="corner bottom-right"></div>

    <div class="board-header">
        <h1 class="wanted-title">Wanted</h1>
        <div class="wanted-sub">Outlaws & Bounty Hunters</div>
        <div class="header-balls">
            <div class="ball f-1"></div>
            <div class="ball f-5"></div>
            <div class="ball f-3"></div>
        </div>
    </div>

    <div id="pList-container">
        
        <div class="player-row rank-0" id="p0-row" style="display:none;">
            <div class="stamp survivor">SURVIVOR</div><div class="stamp eliminert-stamp">ELIMINERT</div>
            <div class="revolver-cylinder">
                <div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div>
            </div>
            <div class="info-zone">
                <h2 class="player-name">PLAYER 1</h2>
                
                <div class="bounty-list">
                    <div class="bounty-item"><b>8-Ball</b>Combo</div>
                    <div class="bounty-item"><b>5x</b>Winstreak</div>
                    <div class="bounty-item foul-item"><b class="foul-count">1</b>Foul</div>
                </div>

                <div class="score-block">
                    <h1 class="score-val" id="p0-score">45</h1>
                    <div class="pers-val">NÅ <b id="p0-now">12</b> | PERS <b id="best-0">60</b></div>
                </div>
            </div>
        </div>
        
        <div class="player-row rank-1" id="p1-row" style="display:none;">
            <div class="stamp survivor">SURVIVOR</div><div class="stamp eliminert-stamp">ELIMINERT</div>
            <div class="revolver-cylinder">
                <div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div>
            </div>
            <div class="info-zone">
                <h2 class="player-name">PLAYER 2</h2>
                <div class="bounty-list">
                    <div class="bounty-item"><b>8-Ball</b>Combo</div>
                    <div class="bounty-item"><b>5x</b>Winstreak</div>
                    <div class="bounty-item foul-item"><b class="foul-count">1</b>Foul</div>
                </div>
                <div class="score-block">
                    <h1 class="score-val" id="p1-score">32</h1>
                    <div class="pers-val">NÅ <b id="p1-now">12</b> | PERS <b id="best-1">60</b></div>
                </div>
            </div>
        </div>

        <div class="player-row rank-2" id="p2-row" style="display:none;">
            <div class="stamp survivor">SURVIVOR</div><div class="stamp eliminert-stamp">ELIMINERT</div>
            <div class="revolver-cylinder">
                <div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div>
            </div>
            <div class="info-zone">
                <h2 class="player-name">PLAYER 3</h2>
                <div class="bounty-list">
                    <div class="bounty-item"><b>8-Ball</b>Combo</div>
                    <div class="bounty-item"><b>5x</b>Winstreak</div>
                    <div class="bounty-item foul-item"><b class="foul-count">1</b>Foul</div>
                </div>
                <div class="score-block">
                    <h1 class="score-val" id="p2-score">15</h1>
                    <div class="pers-val">NÅ <b id="p2-now">12</b> | PERS <b id="best-2">60</b></div>
                </div>
            </div>
        </div>

    </div>

    <div class="board-footer">
        <div class="inning-num" id="inning-text">Round 1</div>
        <div class="status-msg" id="status-msg">OPPDATERER...</div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    // Lyder (Bytt ut med dine Firebase-linker)
    const spinSound = new Audio('LINK_TIL_KLIKK_LYD'); 
    const shotSound = new Audio('LINK_TIL_SKUDD_LYD');

    db.on('value', snap => {
        const data = snap.val();
        if (!data) return;

        const playerCount = data.playerCount || 3;

        // 1. Lag og sorter spillerliste
        let pList = [];
        for (let i = 0; i < playerCount; i++) {
            pList.push({
                id: i,
                score: (data.scores && data.scores[i] !== undefined) ? data.scores[i] : 0,
                fouls: (data.foulCounts && data.foulCounts[i] !== undefined) ? data.foulCounts[i] : 0,
                name: (data.names && data.names[i]) ? data.names[i] : `PLAYER ${i+1}`
            });
        }
        pList.sort((a, b) => b.score - a.score);

        // Skjul alle rader først
        document.querySelectorAll('.player-row').forEach(r => r.style.display = 'none');

        // 2. Loop gjennom og oppdater rader
        pList.forEach((pData, rank) => {
            const pId = pData.id;
            const row = document.getElementById(`p${pId}-row`);
            if (!row) return;

            // Oppdater stil og visning
            row.className = `player-row rank-${rank}`;
            row.style.display = "flex";
            
            // Oppdater tekst
            row.querySelector('.player-name').innerText = pData.name;
            document.getElementById(`p${pId}-score`).innerText = pData.score;
            row.querySelector('.foul-count').innerText = pData.fouls;

            // NÅ & PERS
            const scoreStart = (data.scoreAtStart && data.scoreAtStart[pId] !== undefined) ? data.scoreAtStart[pId] : 0;
            document.getElementById(`p${pId}-now`).innerText = (data.currentPlayer === pId) ? (pData.score - scoreStart) : 0;
            document.getElementById(`best-${pId}`).innerText = data.bestSeries ? (data.bestSeries[pId] || 0) : 0;

            // Animasjon
            const cylinder = row.querySelector('.revolver-cylinder');
            const currentFouls = pData.fouls;
            const previousFouls = parseInt(row.getAttribute('data-last-fouls') || 0);

            if (currentFouls > previousFouls) {
                cylinder.classList.remove('spinning');
                void cylinder.offsetWidth; 
                cylinder.classList.add('spinning');
                if (currentFouls < 3) { spinSound.currentTime = 0; spinSound.play().catch(e => {}); } 
                else { shotSound.currentTime = 0; shotSound.play().catch(e => {}); }
            }
            row.setAttribute('data-last-fouls', currentFouls);

            // Hylser
            const chambers = cylinder.querySelectorAll('.chamber');
            chambers.forEach((c, i) => c.classList.toggle('active', i < currentFouls));

            // Stempler og Opacity
            const stamps = row.querySelectorAll('.stamp');
            stamps.forEach(s => s.style.display = 'none');
            row.classList.remove('eliminated');

            if (currentFouls >= 3) {
                row.querySelector('.eliminert-stamp').style.display = 'block';
                row.classList.add('eliminated');
            } else if (data.matchEnded && rank === 0) {
                row.querySelector('.survivor').style.display = 'block';
            } else {
                row.style.opacity = (data.currentPlayer === pId) ? "1" : "0.6";
            }
        });

        const roundNum = Math.floor((data.innings || 0) / playerCount) + 1;
        document.getElementById('inning-text').innerText = `Round ${roundNum}`;
    });
</script>
</body>
</html>
