<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Rye&family=Cinzel:wght@900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    
    <style>
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Rye', serif;
            display: flex; justify-content: center; align-items: flex-start;
            padding-top: 20px;
            height: 1080px; width: 1920px;
        }

        /* --- HOVEDRAMME (WANTED BOARD) --- */
        .wanted-board {
            width: 535px; /* Vertikal bredde som på bildet */
            background: radial-gradient(circle, #2a1a0f 0%, #0a0502 100%); /* Mørkt tre-effekt */
            border: 15px solid;
            border-image: linear-gradient(180deg, #1d1109 0%, #000 100%) 1; /* Mørk tre-ytterkant */
            border-radius: 8px;
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            overflow: hidden; /* Holder alt inne */
            position: relative;
            z-index: 10;
        }

        /* Stål-hjørner */
        .corner {
            position: absolute; width: 40px; height: 40px;
            background: linear-gradient(135deg, #eee 0%, #666 40%, #000 100%);
            border-radius: 5px; z-index: 100;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }
        .top-left { top: -8px; left: -8px; }
        .top-right { top: -8px; right: -8px; transform: rotate(90deg); }
        .bottom-left { bottom: -8px; left: -8px; transform: rotate(-90deg); }
        .bottom-right { bottom: -8px; right: -8px; transform: rotate(180deg); }

        /* HEADER (WANTED-skiltet) */
        .board-header {
            width: 100%; height: 100px;
            background: url('https://koepd.github.io/Cowboy-Pool/image_b54acf.png') repeat; /* Papir-tekstur */
            background-size: 100px;
            border-bottom: 5px solid #bd9b5b;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }
        .wanted-title { font-size: 56px; color: #000; text-transform: uppercase; margin: 0; line-height: 0.8; }
        .wanted-sub { font-size: 16px; color: #333; text-transform: uppercase; letter-spacing: 2px; }
        
        .players-container { 
            position: relative; 
            width: 100%; 
            /* Høyden her justeres dynamisk i JS basert på antall spillere */
            min-height: 150px; 
            background: rgba(0,0,0,0.3);
        }

        /* --- SPILLER-KORT (WANTED-POSTER LOOK) --- */
        .player-row {
            display: none; 
            width: 100%;
            height: 150px; /* Vertikal høyde for hver spiller */
            align-items: center;
            padding: 0 25px;
            box-sizing: border-box;
            border-bottom: 2px solid #2a1a0f;
            background: linear-gradient(180deg, #150e09 0%, #0a0502 100%);
            position: absolute; /* Påkrevd for translateY-flytting */
            top: 0;
            left: 0;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease, background-color 0.4s ease;
        }

        /* Marker lederen med en gyllen glød */
        .player-row.active-turn {
            background: linear-gradient(180deg, #2a1a0f 0%, #1a120b 100%);
            box-shadow: inset 0 0 30px rgba(241, 196, 15, 0.2);
            animation: active-pulse 2s infinite ease-in-out;
            z-index: 30;
        }

        @keyframes active-pulse {
            0% { box-shadow: 0 0 10px rgba(241, 196, 15, 0.1), inset 0 0 30px rgba(241, 196, 15, 0.1); }
            50% { box-shadow: 0 0 25px rgba(241, 196, 15, 0.3), inset 0 0 40px rgba(241, 196, 15, 0.2); }
            100% { box-shadow: 0 0 10px rgba(241, 196, 15, 0.1), inset 0 0 30px rgba(241, 196, 15, 0.1); }
        }

        .revolver-zone { width: 110px; height: 110px; position: relative; flex-shrink: 0; }
        .revolver-cylinder {
            width: 100px; height: 100px;
            background: url('https://koepd.github.io/Cowboy-Pool/image_b55599.png') no-repeat center center;
            background-size: contain;
            overflow: hidden; /* Sørger for at ingenting stikker utenfor ramma */
        }
        .spinning { animation: cylinder-spin 0.6s cubic-bezier(0.15, 0.88, 0.3, 1.05); }
        @keyframes cylinder-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- KULER (Perfekt posisjonert) --- */
        .chamber { 
            width: 20px; height: 20px; border-radius: 50%; position: absolute; z-index: 3;
            background: url('https://koepd.github.io/Cowboy-Pool/Hylse.png') no-repeat center center;
            background-size: contain;
            display: none; /* Skjult som standard */
        }
        /* Posisjoner (Finjustert) */
        .c1 { top: 9px; left: 39.5px; } /* Topp */
        .c2 { bottom: 23px; left: 16px; } /* Nederst venstre */
        .c3 { bottom: 23px; right: 16px; } /* Nederst høyre */
        
        .chamber.active { display: block; box-shadow: 0 0 15px rgba(241, 196, 15, 0.7); animation: load-in 0.3s ease-out; }
        @keyframes load-in { 0% { transform: scale(2.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .info-zone { flex: 1; padding-left: 20px; overflow: hidden; }
        .player-name { font-size: 30px; color: #fdfaf0; text-transform: uppercase; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .active-turn .player-name { color: #fff; text-shadow: 0 0 10px rgba(241, 196, 15, 0.8); }

        .score-val { font-size: 55px; margin: 2px 0; line-height: 0.8; -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(2px 2px 2px #000); }
        
        /* Metall-gradienter */
        .rank-0 .score-val { background-image: linear-gradient(180deg, #fffceb 0%, #f1c40f 100%); }
        .rank-1 .score-val { background-image: linear-gradient(180deg, #ffffff 0%, #bdc3c7 100%); }
        .rank-2 .score-val { background-image: linear-gradient(180deg, #fff2e6 0%, #cd7f32 100%); }

        .pers-val { font-size: 14px; color: #bd9b5b; font-family: 'Anton', sans-serif; text-transform: uppercase; }
        .pers-val b { font-family: 'Arial', sans-serif; color: #ffffff; font-size: 18px; margin-left: 2px; margin-right: 5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }

        /* ELIMINATED STEMPEL */
        .stamp { position: absolute; font-size: 35px; border: 5px solid; border-radius: 6px; padding: 5px 15px; text-transform: uppercase; z-index: 50; left: 50%; top: 50%; transform: translate(-50%, -50%) rotate(-15deg); display: none; }
        .elim-stamp { color: #d63031; border-color: #d63031; background: rgba(0,0,0,0.8); animation: slam 0.3s ease-out forwards; }
        @keyframes slam { 0% { transform: translate(-50%, -50%) scale(4); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        /* BUNNSTATUS (FOOTER) */
        .board-footer {
            background: #000; color: #bd9b5b; padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-top: 3px solid #8b5a2b; font-size: 18px;
            position: relative; z-index: 20;
        }
    </style>
</head>
<body>

<div class="wanted-board">
    <div class="corner top-left"></div><div class="corner top-right"></div>
    <div class="corner bottom-left"></div><div class="corner bottom-right"></div>

    <div class="board-header">
        <h1 class="wanted-title">WANTED</h1>
        <div class="wanted-sub">Outlaws & Bounty Hunters</div>
    </div>

    <div class="players-container" id="players-container">
        <div class="player-row" id="p0-row" data-last-fouls="0">
            <div class="stamp elim-stamp">ELIMINATED</div>
            <div class="revolver-zone"><div class="revolver-cylinder"><div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div></div></div>
            <div class="info-zone"><div class="player-name" id="p0-name">PLAYER 1</div><div class="score-val" id="p0-score">0</div><div class="pers-val">NÅ <b id="p0-now">0</b> | PERS <b id="best-0">0</b></div></div>
        </div>
        <div class="player-row" id="p1-row" data-last-fouls="0">
            <div class="stamp elim-stamp">ELIMINATED</div>
            <div class="revolver-zone"><div class="revolver-cylinder"><div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div></div></div>
            <div class="info-zone"><div class="player-name" id="p1-name">PLAYER 2</div><div class="score-val" id="p1-score">0</div><div class="pers-val">NÅ <b id="p1-now">0</b> | PERS <b id="best-1">0</b></div></div>
        </div>
        <div class="player-row" id="p2-row" data-last-fouls="0">
            <div class="stamp elim-stamp">ELIMINATED</div>
            <div class="revolver-zone"><div class="revolver-cylinder"><div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div></div></div>
            <div class="info-zone"><div class="player-name" id="p2-name">PLAYER 3</div><div class="score-val" id="p2-score">0</div><div class="pers-val">NÅ <b id="p2-now">0</b> | PERS <b id="best-2">0</b></div></div>
        </div>
    </div>

    <div class="board-footer">
        <div id="inning-text">Round 1</div>
        <div id="status-msg">OPPDATERER...</div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    // Lyder (Bytt ut med dine Firebase-linker)
    const spinSound = new Audio('LINK_TIL_KLIKK_LYD'); 
    const shotSound = new Audio('LINK_TIL_SKUDD_LYD');

    db.on('value', snap => {
        const data = snap.val();
        if (!data) return;

        const rowH = 150; 
        const playerCount = data.playerCount || 3;
        
        // Sett høyden på containeren basert på antall spillere
        document.getElementById('players-container').style.height = (playerCount * rowH) + "px";

        // Lag og sorter spillerliste
        let pList = [];
        for (let i = 0; i < playerCount; i++) {
            pList.push({
                id: i,
                score: (data.scores && data.scores[i] !== undefined) ? data.scores[i] : 0,
                fouls: (data.foulCounts && data.foulCounts[i] !== undefined) ? data.foulCounts[i] : 0,
                name: (data.names && data.names[i]) ? data.names[i] : `PLAYER ${i+1}`
            });
        }
        pList.sort((a, b) => b.score - a.score);

        // Skjul alle rader først
        document.querySelectorAll('.player-row').forEach(r => r.style.display = 'none');

        // Loop gjennom og oppdater rader
        pList.forEach((pData, rank) => {
            const pId = pData.id;
            const row = document.getElementById(`p${pId}-row`);
            if (!row) return;

            // Oppdater stil og visning
            row.className = `player-row rank-${rank}`;
            row.style.display = "flex";
            
            // FLYTT RADEN: Bruk translateY basert på rangering
            row.style.transform = `translateY(${rank * rowH}px)`;
            
            // Oppdater tekst
            document.getElementById(`p${pId}-name`).innerText = pData.name;
            document.getElementById(`p${pData.id}-score`).innerText = pData.score;
            document.getElementById(`best-${pData.id}`).innerText = data.bestSeries ? (data.bestSeries[pData.id] || 0) : 0;
            
            const scoreStart = (data.scoreAtStart && data.scoreAtStart[pData.id] !== undefined) ? data.scoreAtStart[pData.id] : 0;
            document.getElementById(`p${pData.id}-now`).innerText = (data.currentPlayer === pData.id) ? (pData.score - scoreStart) : 0;

            // Animasjon
            const cylinder = row.querySelector('.revolver-cylinder');
            const currentFouls = pData.fouls;
            const previousFouls = parseInt(row.getAttribute('data-last-fouls') || 0);

            if (currentFouls > previousFouls) {
                cylinder.classList.remove('spinning');
                void cylinder.offsetWidth; 
                cylinder.classList.add('spinning');
                if (currentFouls < 3) { spinSound.currentTime = 0; spinSound.play().catch(e => {}); } 
                else { shotSound.currentTime = 0; shotSound.play().catch(e => {}); }
            }
            row.setAttribute('data-last-fouls', currentFouls);

            // Hylser
            const chambers = cylinder.querySelectorAll('.chamber');
            chambers.forEach((c, i) => c.classList.toggle('active', i < currentFouls));

            // Status og Opacity
            const stamp = row.querySelector('.elim-stamp');
            if (currentFouls >= 3) {
                stamp.style.display = 'block';
                row.style.opacity = "0.4";
                row.classList.remove('active-turn');
            } else {
                stamp.style.display = 'none';
                if (data.currentPlayer === pId) {
                    row.classList.add('active-turn');
                    row.style.opacity = "1";
                } else {
                    row.style.opacity = "0.6";
                }
            }
        });

        const roundNum = Math.floor((data.innings || 0) / playerCount) + 1;
        document.getElementById('inning-text').innerText = `Round ${roundNum}`;
    });
</script>
</body>
</html>
