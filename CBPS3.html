<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Rye&family=Cinzel:wght@900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Rye', serif;
            display: flex; justify-content: center; align-items: flex-start;
            padding-top: 20px;
            height: 1080px; width: 1920px;
        }

        .wanted-board {
            width: 500px; 
            background: #0e0a07; 
            border: 12px solid #1a120b;
            border-radius: 4px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.9);
            position: relative;
            z-index: 10;
        }

        .corner { position: absolute; width: 35px; height: 35px; background: linear-gradient(135deg, #777 0%, #333 100%); border: 1px solid #555; z-index: 100; }
        .top-left { top: -6px; left: -6px; border-radius: 4px 0 15px 0; }
        .top-right { top: -6px; right: -6px; border-radius: 0 4px 0 15px; }
        .bottom-left { bottom: -6px; left: -6px; border-radius: 0 15px 0 4px; }
        .bottom-right { bottom: -6px; right: -6px; border-radius: 15px 0 4px 0; }

        .board-header {
            width: 100%; padding: 20px 0;
            background: #d9c5a0;
            border-bottom: 4px solid #8b5a2b;
            text-align: center;
            position: relative;
            z-index: 20;
        }
        .wanted-title { font-size: 65px; color: #1a120b; margin: 0; line-height: 0.9; }
        
        .players-container { 
            position: relative; 
            width: 100%; 
            min-height: 150px; 
            background: #0e0a07;
        }

        .player-row {
            display: none; 
            width: 100%;
            height: 150px; 
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            border-bottom: 2px solid #1d140c;
            background: linear-gradient(90deg, #150e09 0%, #0e0a07 100%);
            position: absolute;
            top: 0;
            left: 0;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
        }

        .revolver-zone { width: 110px; height: 110px; position: relative; flex-shrink: 0; }
        .revolver-cylinder {
            width: 100px; height: 100px;
            background: url('https://koepd.github.io/Cowboy-Pool/image_b55599.png') no-repeat center center;
            background-size: contain;
        }
        .spinning { animation: cylinder-spin 0.6s cubic-bezier(0.15, 0.88, 0.3, 1.05); }
        @keyframes cylinder-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .chamber { width: 20px; height: 20px; border-radius: 50%; position: absolute; }
        .c1 { top: 10px; left: 40px; }
        .c2 { bottom: 22px; left: 16px; }
        .c3 { bottom: 22px; right: 16px; }
        .chamber.active { background: radial-gradient(circle at 35% 35%, #fff7ad 0%, #f1c40f 100%); border: 1.5px solid #fff; box-shadow: 0 0 10px #f1c40f; animation: load-in 0.3s; }

        .info-zone { flex: 1; padding-left: 20px; overflow: hidden; }
        .player-name { font-size: 30px; color: #fdfaf0; text-transform: uppercase; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .score-val { font-size: 55px; margin: 2px 0; line-height: 0.8; -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(2px 2px 2px #000); }
        
        .rank-0 .score-val { background-image: linear-gradient(180deg, #fffceb 0%, #f1c40f 100%); }
        .rank-1 .score-val { background-image: linear-gradient(180deg, #ffffff 0%, #bdc3c7 100%); }
        .rank-2 .score-val { background-image: linear-gradient(180deg, #fff2e6 0%, #cd7f32 100%); }

        .pers-val { 
            font-size: 14px; 
            color: #bd9b5b; 
            font-family: 'Anton', sans-serif; 
            text-transform: uppercase;
        }
        
        .pers-val b { 
            font-family: 'Arial', sans-serif; 
            color: #ffffff; 
            font-size: 18px; 
            margin-left: 2px;
            margin-right: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8); 
        }

        .stamp { position: absolute; font-size: 35px; border: 5px solid; border-radius: 6px; padding: 5px 15px; text-transform: uppercase; z-index: 50; left: 50%; top: 50%; transform: translate(-50%, -50%) rotate(-15deg); display: none; }
        .elim-stamp { color: #d63031; border-color: #d63031; background: rgba(0,0,0,0.8); animation: slam 0.3s ease-out; }
        @keyframes slam { 0% { transform: translate(-50%, -50%) scale(4); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        .board-footer {
            background: #000; color: #bd9b5b; padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-top: 3px solid #8b5a2b; font-size: 18px;
            position: relative; z-index: 20;
        }

        #status-msg {
            font-family: 'Anton', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fdfaf0;
            text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>

<div class="wanted-board">
    <div class="corner top-left"></div><div class="corner top-right"></div>
    <div class="corner bottom-left"></div><div class="corner bottom-right"></div>

    <div class="board-header">
        <h1 class="wanted-title">WANTED</h1>
    </div>

    <div class="players-container" id="players-container">
        <div class="player-row" id="p0-row" data-last-fouls="0">
            <div class="stamp elim-stamp">DEAD</div>
            <div class="revolver-zone"><div class="revolver-cylinder"><div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div></div></div>
            <div class="info-zone"><div class="player-name" id="p0-name">PLAYER 1</div><div class="score-val" id="p0-score">0</div><div class="pers-val">NÅ <b id="p0-now">0</b> | PERS <b id="best-0">0</b></div></div>
        </div>
        <div class="player-row" id="p1-row" data-last-fouls="0">
            <div class="stamp elim-stamp">DEAD</div>
            <div class="revolver-zone"><div class="revolver-cylinder"><div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div></div></div>
            <div class="info-zone"><div class="player-name" id="p1-name">PLAYER 2</div><div class="score-val" id="p1-score">0</div><div class="pers-val">NÅ <b id="p1-now">0</b> | PERS <b id="best-1">0</b></div></div>
        </div>
        <div class="player-row" id="p2-row" data-last-fouls="0">
            <div class="stamp elim-stamp">DEAD</div>
            <div class="revolver-zone"><div class="revolver-cylinder"><div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div></div></div>
            <div class="info-zone"><div class="player-name" id="p2-name">PLAYER 3</div><div class="score-val" id="p2-score">0</div><div class="pers-val">NÅ <b id="p2-now">0</b> | PERS <b id="best-2">0</b></div></div>
        </div>
    </div>

    <div class="board-footer">
        <div id="inning-text">ROUND 1</div>
        <div id="status-msg">KRAV: CAROM</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    const spinSound = new Audio('https://koepd.github.io/Cowboy-Pool/cylinder_spin.mp3'); 
    const shotSound = new Audio('https://koepd.github.io/Cowboy-Pool/revolver_shot.mp3');

    db.on('value', snap => {
        const data = snap.val();
        if (!data) return;

        // --- STATUS-MELDING LOGIKK (Krav: Carom, etc) ---
        const statusEl = document.getElementById('status-msg');
        if (data.status) {
            // Hvis det står "Open" i basen, kan vi f.eks. legge til "Krav:" foran
            statusEl.innerText = data.status.toUpperCase().includes('ROUND') ? data.status : `KRAV: ${data.status}`;
        } else {
            statusEl.innerText = "VENTER...";
        }

        const rowH = 150; 
        const playerCount = data.playerCount || 3;
        document.getElementById('players-container').style.height = (playerCount * rowH) + "px";

        let pList = [];
        for (let i = 0; i < playerCount; i++) {
            pList.push({
                id: i,
                score: (data.scores && data.scores[i] !== undefined) ? data.scores[i] : 0,
                fouls: (data.foulCounts && data.foulCounts[i] !== undefined) ? data.foulCounts[i] : 0,
                name: (data.names && data.names[i]) ? data.names[i] : `PLAYER ${i+1}`
            });
        }

        pList.sort((a, b) => b.score - a.score);

        pList.forEach((pData, rank) => {
            const row = document.getElementById(`p${pData.id}-row`);
            if (!row) return;

            row.style.display = "flex";
            row.style.transform = `translateY(${rank * rowH}px)`;
            row.className = `player-row rank-${rank}`;
            
            document.getElementById(`p${pData.id}-name`).innerText = pData.name;
            document.getElementById(`p${pData.id}-score`).innerText = pData.score;
            document.getElementById(`best-${pData.id}`).innerText = data.bestSeries ? (data.bestSeries[pData.id] || 0) : 0;
            
            const scoreStart = (data.scoreAtStart && data.scoreAtStart[pData.id] !== undefined) ? data.scoreAtStart[pData.id] : 0;
            document.getElementById(`p${pData.id}-now`).innerText = (data.currentPlayer === pData.id) ? (pData.score - scoreStart) : 0;

            const cylinder = row.querySelector('.revolver-cylinder');
            const prevFouls = parseInt(row.getAttribute('data-last-fouls') || 0);
            if (pData.fouls > prevFouls) {
                cylinder.classList.remove('spinning');
                void cylinder.offsetWidth; 
                cylinder.classList.add('spinning');
                if (pData.fouls < 3) { spinSound.currentTime = 0; spinSound.play().catch(e=>{}); }
                else { shotSound.currentTime = 0; shotSound.play().catch(e=>{}); }
            }
            row.setAttribute('data-last-fouls', pData.fouls);

            const chambers = cylinder.querySelectorAll('.chamber');
            chambers.forEach((c, i) => c.classList.toggle('active', i < pData.fouls));

            const stamp = row.querySelector('.elim-stamp');
            stamp.style.display = (pData.fouls >= 3) ? 'block' : 'none';
            row.style.opacity = (pData.fouls >= 3) ? "0.4" : (data.currentPlayer === pData.id ? "1" : "0.7");
        });

        document.getElementById('inning-text').innerText = `ROUND ${Math.floor((data.innings || 0) / playerCount) + 1}`;
    });
</script>
</body>
</html>
