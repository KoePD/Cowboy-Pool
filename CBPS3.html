<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Rye&family=Cinzel:wght@900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    
    <style>
        body { background-color: rgba(0, 0, 0, 0); margin: 0; padding: 0; overflow: hidden; font-family: 'Rye', serif; display: flex; justify-content: flex-start; align-items: flex-start; padding-left: 30px; padding-top: 30px; height: 1080px; width: 1920px; }
        
        .wanted-board { 
            width: 320px; 
            height: 620px; 
            background: url('https://koepd.github.io/Cowboy-Pool/ScoreboardFrame.png') no-repeat center center; 
            background-size: 100% 100%; 
            position: relative; 
            z-index: 10; 
            transition: height 0.5s ease-in-out; 
        }

        /* Skjermristing animasjon */
        @keyframes gunshot-shake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-5px, -5px); }
            30% { transform: translate(5px, 5px); }
            50% { transform: translate(-5px, 5px); }
            70% { transform: translate(5px, -5px); }
            100% { transform: translate(0, 0); }
        }
        .shake { animation: gunshot-shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }

        .board-header { width: 100%; height: 90px; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 5px; }
        .wanted-title { font-size: 35px; color: #ffffff; margin: 0; letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; transform: translateY(-12px); }
        .players-container { position: relative; width: 100%; margin-top: 5px; padding: 0 10px; box-sizing: border-box; }
        .player-wrapper { position: absolute; width: 300px; height: 135px; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); display: none; }
        .player-row { width: 100%; height: 100%; display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; transition: opacity 0.4s ease, filter 0.4s ease; opacity: 0.5; background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0) 15%, rgba(0,0,0,0) 85%, rgba(0,0,0,0.15) 100%); }
        .player-wrapper.active-turn .player-row { opacity: 1; background: rgba(241, 196, 15, 0.08); box-shadow: inset 0 0 20px rgba(241, 196, 15, 0.2); border: 1px solid rgba(241, 196, 15, 0.3); border-radius: 10px; width: 290px; margin-left: 5.5px; }
        .player-wrapper.eliminated .player-row { opacity: 0.9; filter: grayscale(100%) brightness(20%); background: rgba(0, 0, 0, 0.8); width: 290px; margin-left: 5.5px; border-radius: 10px; overflow: hidden; }
        .stamp { position: absolute; width: 260px; z-index: 100; left: 50%; top: 50%; transform: translate(-50%, -50%) rotate(-8deg); display: none; pointer-events: none; }
        .player-wrapper.eliminated .stamp { display: block; }
        .stamp-box { border: 4px double #ff0000; background: rgba(80, 0, 0, 0.9); padding: 5px 10px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); display: flex; justify-content: center; align-items: center; }
        .stamp-text { color: #ff3333; font-family: 'Rye', serif; font-size: 24px; letter-spacing: 2px; text-shadow: 2px 2px 2px #000; text-transform: uppercase; border: 2px solid #ff3333; padding: 3px 8px; }
        
        .info-zone { flex: 1; width: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-left: 5px; box-sizing: border-box; overflow: visible; }
        .player-name { font-size: 13px; color: #fdfaf0; text-transform: uppercase; margin: 0; line-height: 1.1; text-shadow: 1px 1px 0px rgba(0,0,0,1), 2px 2px 4px rgba(0,0,0,0.9); width: 155px; text-align: center; white-space: normal; overflow: visible; display: block; }
        .score-val { font-size: 44px; line-height: 0.8; font-family: 'Rye', serif; -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(3px 4px 3px rgba(0,0,0,0.8)); letter-spacing: -1px; text-align: center; margin-top: 12px; }
        .rank-0 .score-val { background-image: linear-gradient(180deg, #fffceb 0%, #f1c40f 100%); }
        .rank-1 .score-val { background-image: linear-gradient(180deg, #ffffff 0%, #bdc3c7 100%); }
        .rank-2 .score-val { background-image: linear-gradient(180deg, #fff2e6 0%, #cd7f32 100%); }
        .pers-val { font-size: 10px; color: #bd9b5b; font-family: 'Anton', sans-serif; text-transform: uppercase; line-height: 1; margin-top: 10px; text-align: center; }
        .pers-val b { font-family: 'Arial', sans-serif; color: #fff; font-size: 13px; margin-left: 1px; margin-right: 6px; }
        .ad-container { position: absolute; width: 260px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 15; }
        .ad-label { font-size: 8px; color: rgba(26, 18, 11, 0.5); text-transform: uppercase; font-family: 'Anton', sans-serif; margin-bottom: 2px; }
        .ad-box { width: 100%; height: 32px; background: rgba(0, 0, 0, 0.05); border-top: 5px solid rgba(26, 18, 11, 0.15); border-bottom: 1px solid rgba(26, 18, 11, 0.15); display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .board-footer { height: 25px; width: 100%; left: 0; display: flex; flex-direction: row; justify-content: space-between; align-items: center; position: absolute; z-index: 20; bottom: 24px; padding: 0px 48px 0 35px; box-sizing: border-box; }
        #inning-text { color: #fdfaf0; font-size: 11px; font-family: 'Rye', serif; margin: 0; text-transform: uppercase; text-shadow: 1px 1px 1px #000; white-space: nowrap; width: 85px; text-align: left; }
        #status-msg { color: #fdfaf0; font-size: 10px; font-family: 'Rye', serif; margin: 0; text-transform: uppercase; text-shadow: 1px 1px 1px #000; white-space: nowrap; width: 125px; text-align: right; }
        .footer-balls { display: flex; gap: 4px; padding: 0px 4px 0px 0px; align-items: center; width: auto; justify-content: center; }
        .ball { width: 20px; height: 20px; border-radius: 50%; position: relative; box-sizing: border-box; filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.5)); }
        .ball:before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; background: white; border-radius: 50%; border: 1px solid rgba(0, 0, 0, 0.8); z-index: 2; box-sizing: border-box; }
        .ball:after { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: black; font-family: 'Anton', sans-serif; font-size: 7px; z-index: 3; line-height: 1; }
        
        .revolver-zone { width: 110px; height: 110px; position: relative; flex-shrink: 0; }
        .revolver-cylinder { width: 105px; height: 105px; background: url('https://koepd.github.io/Cowboy-Pool/image_b55599.png') no-repeat center center; background-size: contain; position: relative; filter: drop-shadow(4px 6px 5px rgba(0,0,0,0.8)); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1.2); }
        .chamber { width: 22px; height: 22px; position: absolute; z-index: 5; background: url('https://koepd.github.io/Cowboy-Pool/Hylse.png') no-repeat center center; background-size: contain; display: none; transform: translate(-50%, -50%); }
        .c1 { top: 20px; left: 52.5px; } .c2 { top: 68px; left: 24.5px; } .c3 { top: 68px; left: 80.5px; }
        .chamber.active { display: block; }
        
        .f-1 { background: radial-gradient(circle at 35% 35%, #fffceb 0%, #f1c40f 40%, #a67c00 100%); } .f-1:after { content: '1'; }
        .f-5 { background: radial-gradient(circle at 35% 35%, #fff2e6 0%, #e67e22 40%, #834c16 100%); } .f-5:after { content: '5'; }
        .f-3 { background: radial-gradient(circle at 35% 35%, #fff0f0 0%, #e74c3c 40%, #962d22 100%); } .f-3:after { content: '3'; }
    </style>
</head>
<body>

<div class="wanted-board" id="main-board">
    <div class="board-header"><h1 class="wanted-title" id="main-title">WANTED</h1></div>
    <div class="players-container" id="players-container">
        <div class="player-wrapper" id="p0-wrap"><div class="stamp"><div class="stamp-box"><span class="stamp-text">ELIMINATED</span></div></div><div class="player-row" id="p0-row"><div class="revolver-zone"><div class="revolver-cylinder" id="cyl-0"><div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div></div></div><div class="info-zone"><div class="player-name" id="p0-name">PLAYER 1</div><div class="score-val" id="p0-score">0</div><div class="pers-val">NÅ <b id="p0-now">0</b> PERS <b id="best-0">0</b></div></div></div></div>
        <div class="player-wrapper" id="p1-wrap"><div class="stamp"><div class="stamp-box"><span class="stamp-text">ELIMINATED</span></div></div><div class="player-row" id="p1-row"><div class="revolver-zone"><div class="revolver-cylinder" id="cyl-1"><div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div></div></div><div class="info-zone"><div class="player-name" id="p1-name">PLAYER 2</div><div class="score-val" id="p1-score">0</div><div class="pers-val">NÅ <b id="p1-now">0</b> PERS <b id="best-1">0</b></div></div></div></div>
        <div class="player-wrapper" id="p2-wrap"><div class="stamp"><div class="stamp-box"><span class="stamp-text">ELIMINATED</span></div></div><div class="player-row" id="p2-row"><div class="revolver-zone"><div class="revolver-cylinder" id="cyl-2"><div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div></div></div><div class="info-zone"><div class="player-name" id="p2-name">PLAYER 3</div><div class="score-val" id="p2-score">0</div><div class="pers-val">NÅ <b id="p2-now">0</b> PERS <b id="best-2">0</b></div></div></div></div>
    </div>
    <div class="ad-container" id="ad-area"><div class="ad-label">Sponsor</div><div class="ad-box"><span style="font-size: 12px; color: #1a120b; opacity: 0.6;">REKLAMEPLASS</span></div></div>
    <div class="board-footer">
        <div id="inning-text">INNING 1</div>
        <div class="footer-balls"><div class="ball f-1"></div><div class="ball f-5"></div><div class="ball f-3"></div></div>
        <div id="status-msg">KRAV: CAROM</div>
    </div>
</div>

<script>
    const gunShot = new Audio('https://koepd.github.io/Cowboy-Pool/Gunshot.mp3');
    
    // --- MANUELL JUSTERING AV LYD ---
    gunShot.playbackRate = 1.3;  // Litt raskere smell
    const lydStartTid = 0.05;    // Hopper over evt stillhet i starten
    const firedStatus = [false, false, false]; 

    const firebaseConfig = { 
        apiKey: "AIzaSyDabrKfEjl3rx7QyTmMDPjk6v5R0kVNvz8",
        authDomain: "cowboy-pool.firebaseapp.com",
        databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "cowboy-pool",
        storageBucket: "cowboy-pool.firebasestorage.app",
        messagingSenderId: "657609395404",
        appId: "1:657609395404:web:aa90fcec18878aad4ec669"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    db.on('value', snap => {
        const data = snap.val();
        if (!data) return;

        let kravText = "VALG: CAROM ELLER KULE";
        if (!data.breakDone) {
            kravText = "BREKK-STØT (3-BALL)";
        } else if (data.tableStatus === 'locked') {
            kravText = (data.lastType === 'pocket' ? "KRAV: CAROM" : "KRAV: POCKET");
        }
        document.getElementById('status-msg').innerText = kravText;

        const playerCount = data.playerCount || 2;
        const board = document.getElementById('main-board');
        const adArea = document.getElementById('ad-area');
        
        if (playerCount === 1) { board.style.height = "360px"; adArea.style.bottom = "72px"; }
        else if (playerCount === 2) { board.style.height = "495px"; adArea.style.bottom = "72px"; }
        else { board.style.height = "630px"; adArea.style.bottom = "72px"; }

        const rowH = 135;
        let pList = [];
        for (let i = 0; i < 3; i++) {
            if (i < playerCount) {
                let fCount = data.foulCounts ? data.foulCounts[i] || 0 : 0;
                let sVal = data.scores ? data.scores[i] || 0 : 0;
                pList.push({ id: i, score: sVal, fouls: fCount, name: data.names ? data.names[i] : `PLAYER ${i+1}` });
            }
            document.getElementById(`p${i}-wrap`).style.display = "none";
        }

        pList.sort((a, b) => {
            if (a.fouls >= 3 && b.fouls < 3) return 1;
            if (a.fouls < 3 && b.fouls >= 3) return -1;
            return b.score - a.score;
        });

        pList.forEach((pData, rank) => {
            const wrap = document.getElementById(`p${pData.id}-wrap`);
            wrap.style.display = "block";
            wrap.style.transform = `translateY(${rank * rowH}px)`;
            
            const isEliminated = pData.fouls >= 3;
            const isActive = (data.currentPlayer === pData.id && !isEliminated);
            wrap.className = `player-wrapper rank-${rank} ${isActive ? 'active-turn' : ''} ${isEliminated ? 'eliminated' : ''}`;
            
            document.getElementById(`p${pData.id}-name`).innerText = pData.name;
            document.getElementById(`p${pData.id}-score`).innerText = pData.score;
            document.getElementById(`best-${pData.id}`).innerText = data.bestSeries ? data.bestSeries[pData.id] || 0 : 0;
            let currentRun = (data.currentPlayer === pData.id) ? (pData.score - (data.scoreAtStart ? data.scoreAtStart[pData.id] || 0 : 0)) : 0;
            document.getElementById(`p${pData.id}-now`).innerText = currentRun;
            
            // SNURRING OG SKUDD VED 3 FOULS
            if (pData.fouls === 3 && !firedStatus[pData.id]) {
                firedStatus[pData.id] = true;
                
                // Start snurring umiddelbart sammen med stempel-tanken
                const cylinder = document.getElementById(`cyl-${pData.id}`);
                if (cylinder) {
                    cylinder.style.transform = `rotate(${pData.fouls * 120}deg)`;
                }

                // Avfyr lyden raskere (300ms delay i stedet for 600ms)
                setTimeout(() => {
                    gunShot.currentTime = lydStartTid;
                    gunShot.play().catch(e => console.log("Lyd blokkert"));
                    board.classList.add('shake');
                    setTimeout(() => board.classList.remove('shake'), 400);
                }, 350); 
            }

            // Normal snurring for 1 og 2 fouls
            if (pData.fouls < 3) {
                firedStatus[pData.id] = false; // Tillat skudd på nytt hvis f.eks. foul resettes
                const cylinder = document.getElementById(`cyl-${pData.id}`);
                if (cylinder) {
                    setTimeout(() => {
                        cylinder.style.transform = `rotate(${pData.fouls * 120}deg)`;
                    }, 150);
                }
            }

            const chambers = wrap.querySelectorAll('.chamber');
            chambers.forEach((c, idx) => c.classList.toggle('active', idx < pData.fouls));
        });

        document.getElementById('inning-text').innerText = `INNING ${Math.floor((data.innings || 0) / playerCount) + 1}`;
    });
</script>
</body>
</html>
