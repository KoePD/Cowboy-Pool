<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle at top, #1e4d2b 0%, #0a1a0f 100%);
            background-attachment: fixed;
            color: white; margin: 0; padding: 0; 
            display: flex; justify-content: center;
            min-height: 100vh; overflow-x: hidden;
        }
        .app-container { width: 100%; max-width: 430px; padding: 20px; padding-bottom: 120px; display: flex; flex-direction: column; }
        
        .header-actions { display: flex; justify-content: center; margin-bottom: 20px; }
        .btn-new-game-top { 
            background: rgba(0,0,0,0.6); color: #f1c40f; border: 1px solid rgba(241, 196, 15, 0.5); 
            padding: 10px 30px; border-radius: 50px; font-weight: 800; font-size: 0.75em; 
            letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
        }

        .player-card { background: linear-gradient(180deg, #0a0a0a 0%, #000000 100%); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .player-card.active { border: 2px solid #f1c40f; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9); transform: scale(1.03); }
        .player-info h2 { margin: 0; font-size: 1.2em; text-transform: uppercase; letter-spacing: 1px; color: #666; }
        .active .player-info h2 { color: #f1c40f; }
        .score-display { font-size: 3.5em; font-weight: 900; line-height: 1; margin: 0; color: #333; min-width: 60px; text-align: right; }
        .active .score-display { color: #f1c40f; }

        .sub-stats { font-size: 0.55em; color: #444; margin-top: 12px; display: flex; justify-content: flex-start; text-transform: uppercase; }
        .active .sub-stats { color: #888; }
        .stat-item { width: 55px; display: flex; flex-direction: column; }
        .stat-val { color: #eee; font-weight: 900; font-size: 1.1em; }
        .active .stat-val { color: #f1c40f; }
        .foul-dot { width: 12px; height: 12px; border-radius: 50%; background: #1a1a1a; border: 1px solid #222; }
        .foul-dot.active { background: #e74c3c; box-shadow: 0 0 10px #ff4757; }
        
        .game-status-zone { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); padding: 15px; border-radius: 20px 20px 0 0; text-align: center; border: 1px solid rgba(255,255,255,0.05); border-bottom: none; margin-top: 20px; min-height: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .req-text { font-size: 0.8em; letter-spacing: 2px; color: #2ecc71; font-weight: 800; text-transform: uppercase; }
        .timer-text { font-family: monospace; font-size: 1.2em; color: #f1c40f; margin-top: 3px; display: block; }
        .btn-rotate { background: rgba(241, 196, 15, 0.1); border: 1px solid #f1c40f; color: #f1c40f; padding: 6px 15px; border-radius: 8px; font-size: 0.65em; font-weight: bold; cursor: pointer; margin-top: 10px; }

        .ball-control-zone { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 20px 10px; border-radius: 0 0 35px 35px; border: 1px solid rgba(255,255,255,0.03); border-top: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        .ball-group { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .ball { width: 75px; height: 75px; border-radius: 50%; border: none; cursor: pointer; box-shadow: inset -6px -6px 15px rgba(0,0,0,0.7), 6px 12px 20px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; transition: 0.1s; }
        #ball1 { background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00); }
        #ball5 { background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082); }
        #ball3 { background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22); }
        .ball-inner { width: 28px; height: 28px; background: white; border-radius: 50%; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 2px solid #000; }
        .btn-sub-carom { background: rgba(52, 152, 219, 0.12); color: #3498db; border: 1px solid #3498db; border-radius: 8px; padding: 6px 12px; font-size: 0.6em; font-weight: 800; cursor: pointer; }
        
        .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 16px; border-radius: 16px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 0.75em; }
        .btn-blue { background: #2980b9; color: white; border-bottom: 4px solid #1c5982; }
        .btn-foul { background: #c0392b; color: white; border-bottom: 4px solid #7b241c; }
        .btn-turn { background: #27ae60; color: white; border-bottom: 4px solid #1e8449; grid-column: span 2; padding: 20px; font-size: 1.1em; }

        .setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,20,5,0.98); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(10px); }
        .setup-card { background: #000; border: 1px solid #f1c40f; padding: 30px; border-radius: 30px; width: 100%; max-width: 350px; text-align: center; }
        .btn-choice { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; font-weight: bold; cursor: pointer; }
        .name-field { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; margin-bottom: 10px; box-sizing: border-box; text-align: center; font-size: 1em; }
        .btn-start { width: 100%; padding: 18px; border-radius: 15px; background: #27ae60; color: white; border: none; font-weight: 900; text-transform: uppercase; margin-top: 10px; cursor: pointer; }
        .btn-back { background: none; border: none; color: #888; margin-top: 20px; cursor: pointer; font-size: 0.8em; text-decoration: underline; }

        /* SPESIELLE VALG FOR AVLEUTT KAMP */
        .btn-save-option { background: #2980b9; color: white; margin-bottom: 10px; width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-discard-option { background: #c0392b; color: white; width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: flex; justify-content: space-around; padding: 10px 0 35px 0; border-top: 1px solid #111; z-index: 1000; }
        .nav-item { color: #333; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.55em; font-weight: bold; }
        .nav-item.active { color: #f1c40f; }
        .nav-item i { font-size: 2.2em; margin-bottom: 4px; }
        .waiting-ball { opacity: 0.15; filter: grayscale(1); pointer-events: none; }
    </style>
</head>
<body>

<div id="setupOverlay" class="setup-overlay">
    <div class="setup-card">
        <h2 style="color:#f1c40f; margin-bottom: 20px;">NY KAMP</h2>
        
        <div id="step-confirm" style="display: none;">
            <p style="color:#888; margin-bottom: 20px;">En kamp pågår allerede. Hva vil du gjøre?</p>
            <button class="btn-save-option" onclick="handleFinishAndSave()">LAGRE & START NY</button>
            <button class="btn-discard-option" onclick="goToStep1()">SLETT & START NY</button>
            <button class="btn-back" onclick="closeSetup()">Avbryt</button>
        </div>

        <div id="step1">
            <p style="color:#888; margin-bottom: 15px;">Antall spillere?</p>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn-choice" onclick="selectPlayers(1)">1</button>
                <button class="btn-choice" onclick="selectPlayers(2)">2</button>
                <button class="btn-choice" onclick="selectPlayers(3)">3</button>
            </div>
            <button class="btn-back" onclick="closeSetup()">Fortsett kampen</button>
        </div>

        <div id="step2" style="display: none;">
            <p style="color:#888; margin-bottom: 15px;">Navn på spillere:</p>
            <div id="nameInputs"></div>
            <button class="btn-start" onclick="finalizeSetup()">START KAMP</button>
            <br>
            <button class="btn-back" onclick="goToStep1()">← Tilbake</button>
        </div>
    </div>
</div>

<div class="app-container">
    <div class="header-actions">
        <button class="btn-new-game-top" onclick="checkActiveGame()">New Match</button>
    </div>

    <div id="scoreboard-container"></div>

    <div class="game-status-zone">
        <span class="req-text" id="moveText">BREKK-STØT</span>
        <span class="timer-text" id="matchTimer">00:00:00</span>
        <div id="rotate-container">
            <button class="btn-rotate" onclick="rotateBreaker()">BYTT STARTSPILLER</button>
        </div>
    </div>

    <div class="ball-control-zone">
        <div class="ball-group">
            <button class="ball" id="ball1" onclick="action('pocket', 1)"><div class="ball-inner">1</div></button>
            <button class="btn-sub-carom" onclick="action('pocket_carom', 2)">+ CAROM</button>
        </div>
        <div class="ball-group">
            <button class="ball" id="ball5" onclick="action('pocket', 5)"><div class="ball-inner">5</div></button>
            <button class="btn-sub-carom" onclick="action('pocket_carom', 6)">+ CAROM</button>
        </div>
        <div class="ball-group">
            <button class="ball" id="ball3" onclick="action('pocket', 3)"><div class="ball-inner">3</div></button>
            <button class="btn-sub-carom" onclick="action('pocket_carom', 4)">+ CAROM</button>
        </div>
    </div>

    <div class="action-area">
        <button class="btn btn-blue" onclick="action('carom', 1)">Carom 1P</button>
        <button class="btn btn-blue" onclick="action('carom', 2)">Carom 2P</button>
        <button class="btn btn-foul" onclick="handleFoul()">FOUL</button>
        <button class="btn btn-blue" onclick="undo()">ANGRE</button>
        <button class="btn btn-turn" onclick="nextTurn()">AVSLUTT TUR</button>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><i class="material-icons">home</i>HJEM</a>
        <a href="stats.html" class="nav-item"><i class="material-icons">leaderboard</i>STATS</a>
        <a href="#" class="nav-item" onclick="toggleLanguage()"><i class="material-icons">language</i>EN/NO</a>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    let setupCount = 2;
    let state = { playerCount: 2, scores: [0,0,0], foulCounts: [0,0,0], scoreAtStart: [0,0,0], currentPlayer: 0, breakDone: false, tableStatus: 'open', lastType: null, innings: 0, seconds: 0, names: ["P1","P2","P3"], bestSeries: [0,0,0], lastSeries: [0,0,0], lang: 'no' };
    let history = [];

    db.on('value', (s) => { if(s.val()) { state = s.val(); updateUI(); } });

    // --- NY NEW GAME LOGIKK ---
    function checkActiveGame() {
        document.getElementById('setupOverlay').style.display = 'flex';
        // Hvis noen har mer enn 0 poeng, spør vi om de vil lagre
        const gameInProgress = state.scores.some(s => s > 0);
        if (gameInProgress) {
            document.getElementById('step-confirm').style.display = 'block';
            document.getElementById('step1').style.display = 'none';
        } else {
            goToStep1();
        }
    }

    function handleFinishAndSave() {
        const historyRef = firebase.database().ref('matchHistory'); 
        const kampData = { 
            dato: new Date().toLocaleString('no-NO'), 
            spillere: state.names.slice(0, state.playerCount), 
            resultat: state.scores.slice(0, state.playerCount), 
            varighet: document.getElementById('matchTimer').innerText, 
            innings: Math.floor(state.innings / state.playerCount) + 1 
        }; 
        historyRef.push(kampData).then(() => {
            goToStep1();
        });
    }

    function goToStep1() {
        document.getElementById('step-confirm').style.display = 'none';
        document.getElementById('step1').style.display = 'block';
        document.getElementById('step2').style.display = 'none';
    }

    function selectPlayers(n) { 
        setupCount = n; 
        document.getElementById('step1').style.display = 'none'; 
        document.getElementById('step2').style.display = 'block';
        const container = document.getElementById('nameInputs');
        container.innerHTML = '';
        for(let i=0; i<n; i++) container.innerHTML += `<input type="text" class="name-field" id="n${i}" placeholder="Navn ${i+1}">`;
    }

    function finalizeSetup() {
        const namesArr = [];
        for(let i=0; i<setupCount; i++) namesArr.push(document.getElementById(`n${i}`).value || `Spiller ${i+1}`);
        const newState = { ...state, playerCount: setupCount, names: namesArr, scores: [0,0,0], foulCounts: [0,0,0], scoreAtStart: [0,0,0], bestSeries: [0,0,0], lastSeries: [0,0,0], currentPlayer: 0, breakDone: false, seconds: 0, tableStatus: 'open', lastType: null, innings: 0 };
        db.set(newState).then(() => { closeSetup(); });
    }

    function closeSetup() { document.getElementById('setupOverlay').style.display = 'none'; }

    // --- SPILL LOGIKK ---
    function action(type, val) {
        saveHistory();
        let p = state.currentPlayer;
        if (state.scores[p] < 90 && state.scores[p] + val > 90) return;
        if (state.scores[p] >= 90 && state.scores[p] < 100 && state.scores[p] + val > 100) return;
        state.breakDone = true; state.foulCounts[p] = 0;
        if(type === 'pocket_carom') { state.tableStatus = 'open'; state.lastType = null; }
        else { state.tableStatus = 'locked'; state.lastType = type; }
        state.scores[p] += val; db.set(state);
    }

    function nextTurn() {
        saveHistory();
        let p = state.currentPlayer;
        let round = state.scores[p] - state.scoreAtStart[p];
        if (round > state.bestSeries[p]) state.bestSeries[p] = round;
        state.lastSeries[p] = round;
        state.currentPlayer = (state.currentPlayer + 1) % state.playerCount;
        state.tableStatus = 'open'; state.lastType = null;
        state.scoreAtStart[state.currentPlayer] = state.scores[state.currentPlayer];
        db.set(state);
    }

    function updateUI() {
        const l = state.lang === 'no' ? 
            {now:"NÅ",best:"PERS",last:"SISTE",break:"BREKK-STØT",req_carom:"KRAV: CAROM",req_pocket:"KRAV: POCKET",any:"VELG: CAROM / KULE"} : 
            {now:"NOW",best:"BEST",last:"LAST",break:"BREAK SHOT",req_carom:"REQ: CAROM",req_pocket:"REQ: POCKET",any:"CHOOSE: CAROM / POCKET"};
        
        const cont = document.getElementById('scoreboard-container');
        cont.innerHTML = '';
        for(let i=0; i<state.playerCount; i++) {
            const active = state.currentPlayer === i;
            cont.innerHTML += `<div class="player-card ${active?'active':''}">
                <div class="player-info">
                    <h2>${state.names[i]}</h2>
                    <div class="sub-stats">
                        <div class="stat-item">${l.now} <span class="stat-val">${active ? state.scores[i]-state.scoreAtStart[i] : 0}</span></div>
                        <div class="stat-item">${l.best} <span class="stat-val">${state.bestSeries[i]}</span></div>
                        <div class="stat-item">${l.last} <span class="stat-val">${state.lastSeries[i]}</span></div>
                    </div>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <div class="foul-dot ${state.foulCounts[i]>=1?'active':''}"></div>
                        <div class="foul-dot ${state.foulCounts[i]>=2?'active':''}"></div>
                        <div class="foul-dot ${state.foulCounts[i]>=3?'active':''}"></div>
                    </div>
                </div>
                <div class="score-display">${state.scores[i]}</div>
            </div>`;
        }
        document.getElementById('matchTimer').innerText = new Date(state.seconds * 1000).toISOString().substr(11, 8);
        const rotateCont = document.getElementById('rotate-container');
        if (!state.breakDone) {
            document.getElementById('moveText').innerText = l.break;
            rotateCont.style.display = 'block';
        } else {
            rotateCont.style.display = 'none';
            document.getElementById('moveText').innerText = state.tableStatus === 'locked' ? (state.lastType === 'pocket' ? l.req_carom : l.req_pocket) : l.any;
        }
        const lock = state.tableStatus === 'locked';
        const at90 = state.scores[state.currentPlayer] >= 90;
        document.getElementById('ball1').className = (!state.breakDone || (lock && state.lastType==='pocket') || at90) ? 'ball waiting-ball' : 'ball';
        document.getElementById('ball5').className = (!state.breakDone || (lock && state.lastType==='pocket') || at90) ? 'ball waiting-ball' : 'ball';
        document.getElementById('ball3').className = ((lock && state.lastType==='pocket') || at90) ? 'ball waiting-ball' : 'ball';
    }

    function handleFoul() { saveHistory(); state.foulCounts[state.currentPlayer]++; if(state.foulCounts[state.currentPlayer] >= 3) { state.scores[state.currentPlayer] = 0; state.foulCounts[state.currentPlayer] = 0; } else { state.scores[state.currentPlayer] = state.scoreAtStart[state.currentPlayer]; } nextTurn(); }
    function saveHistory() { history.push(JSON.stringify(state)); if(history.length > 20) history.shift(); }
    function undo() { if(history.length) { state = JSON.parse(history.pop()); db.set(state); } }
    function toggleLanguage() { state.lang = state.lang==='no'?'en':'no'; db.set(state); }
    function rotateBreaker() { if(!state.breakDone) { state.currentPlayer = (state.currentPlayer+1)%state.playerCount; db.set(state); } }
    setInterval(() => { if(state.breakDone) { state.seconds++; db.child('seconds').set(state.seconds); } }, 1000);
</script>
</body>
</html>
