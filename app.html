<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Controller</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        /* 1. LAYOUT & BAKGRUNN */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle at top, #1e4d2b 0%, #07120a 100%);
            background-attachment: fixed;
            color: white; 
            margin: 0; padding: 0; 
            display: flex; justify-content: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .app-container {
            width: 100%; max-width: 430px;
            padding: 20px; padding-bottom: 220px;
        }

        /* 2. MODUS VELGER (1P, 2P, 3P) */
        .mode-row {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;
        }
        .btn-mode {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold;
        }
        .btn-mode.active { background: #f1c40f; color: black; border-color: #f1c40f; }

        /* 3. STATUS & TIMER */
        .status-header {
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px);
            padding: 12px; border-radius: 15px; text-align: center;
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        .req-text { font-size: 0.75em; letter-spacing: 2px; color: #27ae60; font-weight: 800; text-transform: uppercase; }
        .timer-text { font-family: monospace; font-size: 1.2em; color: #f1c40f; margin-top: 5px; display: block; }

        /* 4. SPILLERKORT */
        .player-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(0,0,0,0.3) 100%);
            backdrop-filter: blur(10px); border-radius: 20px;
            padding: 15px 20px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s ease;
        }
        .player-card.active {
            border: 2px solid #f1c40f; box-shadow: 0 0 20px rgba(241, 196, 15, 0.25);
            transform: scale(1.02); background: linear-gradient(180deg, rgba(241, 196, 15, 0.1) 0%, rgba(0,0,0,0.4) 100%);
        }
        .player-info h2 { margin: 0; font-size: 1.1em; text-transform: uppercase; }
        .active .player-info h2 { color: #f1c40f; }
        .score-display { font-size: 3em; font-weight: 900; line-height: 1; }
        .active .score-display { color: #f1c40f; }

        /* 3 KOLONNER STATS */
        .sub-stats { 
            font-size: 0.6em; color: #888; margin-top: 8px; 
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-transform: uppercase; 
        }
        .stat-item { display: flex; flex-direction: column; }
        .stat-val { color: #f1c40f; font-weight: bold; font-size: 1.1em; }

        /* FOUL MARKERING */
        .foul-container { display: flex; gap: 5px; margin-top: 8px; }
        .foul-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.1); transition: 0.3s; }
        .foul-dot.active { background: #e74c3c; box-shadow: 0 0 8px #ff4757; }

        /* BALL KONTROLL */
        .ball-control-zone {
            display: flex; justify-content: space-around; margin: 25px 0;
            background: rgba(0,0,0,0.2); padding: 15px 10px; border-radius: 25px;
        }
        .ball-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .ball {
            width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer;
            box-shadow: inset -5px -5px 12px rgba(0,0,0,0.5), 5px 8px 15px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center; transition: 0.1s;
        }
        .ball:active { transform: scale(0.9); }
        .ball-inner { width: 25px; height: 25px; background: white; border-radius: 50%; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 1px solid #000; font-size: 0.8em; }

        #ball1 { background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00); }
        #ball5 { background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082); }
        #ball3 { background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22); }

        .btn-sub-carom { background: rgba(52, 152, 219, 0.2); color: #3498db; border: 1px solid #3498db; border-radius: 5px; padding: 4px 8px; font-size: 0.55em; font-weight: 800; cursor: pointer; }

        /* HANDLINGER BUNN */
        .action-area {
            position: fixed; bottom: 85px; left: 0; right: 0;
            padding: 0 20px; max-width: 430px; margin: auto;
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; z-index: 900;
        }
        .btn { padding: 12px; border-radius: 12px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 0.7em; }
        .btn-blue { background: #2980b9; color: white; border-bottom: 3px solid #1c5982; }
        .btn-foul { background: #c0392b; color: white; border-bottom: 3px solid #7b241c; }
        .btn-turn { background: #27ae60; color: white; border-bottom: 3px solid #1e8449; grid-column: span 2; padding: 15px; font-size: 0.9em; }

        /* NAVIGASJON */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #0a0a0a; display: flex; justify-content: space-around;
            padding: 10px 0 25px 0; border-top: 1px solid #222; z-index: 1000;
        }
        .nav-item { color: #444; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.55em; font-weight: bold; }
        .nav-item.active { color: #f1c40f; }
        .nav-item i { font-size: 1.8em; margin-bottom: 3px; }

        .waiting { opacity: 0.2; filter: grayscale(1); pointer-events: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="mode-row">
        <button class="btn-mode" id="m1" onclick="setPlayerCount(1)">1P</button>
        <button class="btn-mode" id="m2" onclick="setPlayerCount(2)">2P</button>
        <button class="btn-mode" id="m3" onclick="setPlayerCount(3)">3P</button>
    </div>

    <div class="status-header">
        <span class="req-text" id="moveText">BREKK-STØT (3-BALL)</span>
        <span class="timer-text" id="matchTimer">00:00:00</span>
    </div>

    <div id="scoreboard-container"></div>

    <div class="ball-control-zone">
        <div class="ball-group">
            <button class="ball" id="ball1" onclick="action('pocket', 1)"><div class="ball-inner">1</div></button>
            <button class="btn-sub-carom" onclick="action('pocket_carom', 2)">+ CAROM</button>
        </div>
        <div class="ball-group">
            <button class="ball" id="ball5" onclick="action('pocket', 5)"><div class="ball-inner">5</div></button>
            <button class="btn-sub-carom" onclick="action('pocket_carom', 6)">+ CAROM</button>
        </div>
        <div class="ball-group">
            <button class="ball" id="ball3" onclick="action('pocket', 3)"><div class="ball-inner">3</div></button>
            <button class="btn-sub-carom" onclick="action('pocket_carom', 4)">+ CAROM</button>
        </div>
    </div>

    <div class="action-area">
        <button class="btn btn-blue" onclick="action('carom', 1)">Carom 1P</button>
        <button class="btn btn-blue" onclick="action('carom', 2)">Carom 2P</button>
        <button class="btn btn-foul" onclick="handleFoul()">FOUL</button>
        <button class="btn btn-blue" onclick="undo()">ANGRE</button>
        <button class="btn btn-turn" onclick="nextTurn()" id="turnBtn">AVSLUTT TUR</button>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><i class="material-icons">home</i>HJEM</a>
        <a href="stats.html" class="nav-item"><i class="material-icons">leaderboard</i>STATS</a>
        <a href="#" class="nav-item" onclick="resetGame()"><i class="material-icons">refresh</i>RESET</a>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    let state = {
        playerCount: 2, scores: [0, 0, 0], foulCounts: [0, 0, 0], scoreAtStart: [0, 0, 0],
        currentPlayer: 0, breakDone: false, tableStatus: 'open', lastType: null,
        innings: 0, seconds: 0, names: ["Spiller 1", "Spiller 2", "Spiller 3"],
        bestSeries: [0, 0, 0], lastSeries: [0, 0, 0]
    };

    let history = [];

    db.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) { state = data; updateUI(); }
    });

    function updateUI() {
        // Oppdater Modus-knapper
        for(let i=1; i<=3; i++) {
            document.getElementById(`m${i}`).className = (state.playerCount === i) ? 'btn-mode active' : 'btn-mode';
        }

        const container = document.getElementById('scoreboard-container');
        container.innerHTML = '';

        for (let i = 0; i < state.playerCount; i++) {
            const isActive = state.currentPlayer === i;
            const currentRun = isActive ? (state.scores[i] - state.scoreAtStart[i]) : 0;
            const lastRun = state.lastSeries ? (state.lastSeries[i] || 0) : 0;
            const fouls = state.foulCounts ? state.foulCounts[i] : 0;
            
            let foulHtml = '<div class="foul-container">';
            for (let d = 1; d <= 3; d++) {
                foulHtml += `<div class="foul-dot ${d <= fouls ? 'active' : ''}"></div>`;
            }
            foulHtml += '</div>';

            container.innerHTML += `
                <div class="player-card ${isActive ? 'active' : ''}">
                    <div class="player-info">
                        <h2>${state.names[i]}</h2>
                        <div class="sub-stats">
                            <div class="stat-item">NÅ <span class="stat-val">${currentRun}</span></div>
                            <div class="stat-item">PERS <span class="stat-val">${state.bestSeries[i] || 0}</span></div>
                            <div class="stat-item">SISTE <span class="stat-val">${lastRun}</span></div>
                        </div>
                        ${foulHtml}
                    </div>
                    <div class="score-display">${state.scores[i]}</div>
                </div>`;
        }

        document.getElementById('matchTimer').innerText = new Date(state.seconds * 1000).toISOString().substr(11, 8);
        
        let moveText = "VELG: CAROM / KULE";
        if (!state.breakDone) moveText = "BREKK-STØT (3-BALL)";
        else if (state.tableStatus === 'locked') {
            moveText = state.lastType === 'pocket' ? "KRAV: CAROM" : "KRAV: POCKET";
        }
        document.getElementById('moveText').innerText = moveText;

        const isAtEnd = state.scores[state.currentPlayer] >= 90;
        const isLockedPocket = state.tableStatus === 'locked' && state.lastType === 'pocket';
        
        document.getElementById('ball1').parentElement.className = (!state.breakDone || isLockedPocket || isAtEnd) ? 'ball-group waiting' : 'ball-group';
        document.getElementById('ball5').parentElement.className = (!state.breakDone || isLockedPocket || isAtEnd) ? 'ball-group waiting' : 'ball-group';
        document.getElementById('ball3').parentElement.className = (isLockedPocket || isAtEnd) ? 'ball-group waiting' : 'ball-group';
    }

    function setPlayerCount(n) {
        if(confirm(`Bytte til ${n} spillere? Kampen resettes.`)) {
            state.playerCount = n;
            state.scores = [0,0,0];
            state.foulCounts = [0,0,0];
            state.scoreAtStart = [0,0,0];
            state.bestSeries = [0,0,0];
            state.lastSeries = [0,0,0];
            state.breakDone = false;
            state.seconds = 0;
            state.innings = 0;
            state.currentPlayer = 0;
            db.set(state);
        }
    }

    function action(type, val) {
        saveHistory();
        let p = state.currentPlayer;
        if (state.scores[p] < 90 && state.scores[p] + val > 90) return;
        if (state.scores[p] >= 90 && state.scores[p] < 100 && state.scores[p] + val > 100) return;
        state.breakDone = true;
        state.foulCounts[p] = 0;
        if (type === 'pocket_carom') {
            if (state.tableStatus === 'locked') state.lastType = (state.lastType === 'pocket') ? 'carom' : 'pocket';
        } else {
            state.tableStatus = 'locked';
            state.lastType = type;
        }
        state.scores[p] += val;
        db.set(state);
    }

    function nextTurn() {
        saveHistory();
        const p = state.currentPlayer;
        const roundScore = state.scores[p] - state.scoreAtStart[p];
        if (roundScore > (state.bestSeries[p] || 0)) state.bestSeries[p] = roundScore;
        if (!state.lastSeries) state.lastSeries = [0,0,0];
        state.lastSeries[p] = roundScore;
        
        state.currentPlayer = (state.currentPlayer + 1) % state.playerCount;
        state.tableStatus = 'open';
        state.lastType = null;
        state.scoreAtStart[state.currentPlayer] = state.scores[state.currentPlayer];
        state.innings++;
        db.set(state);
    }

    function handleFoul() {
        saveHistory();
        state.foulCounts[state.currentPlayer]++;
        if (state.foulCounts[state.currentPlayer] >= 3) {
            state.scores[state.currentPlayer] = 0; 
            state.foulCounts[state.currentPlayer] = 0;
        } else {
            state.scores[state.currentPlayer] = state.scoreAtStart[state.currentPlayer];
        }
        nextTurn();
    }

    function saveHistory() { history.push(JSON.stringify(state)); }
    function undo() { if(history.length) { state = JSON.parse(history.pop()); db.set(state); } }
    
    function resetGame() { 
        if(confirm("Reset kampen?")) {
            state.scores = [0,0,0]; state.foulCounts = [0,0,0];
            state.breakDone = false; state.seconds = 0; state.innings = 0;
            state.bestSeries = [0,0,0]; state.lastSeries = [0,0,0];
            db.set(state);
        }
    }

    setInterval(() => {
        if (state.breakDone) {
            state.seconds++;
            firebase.database().ref('gameData/seconds').set(state.seconds);
        }
    }, 1000);
</script>
</body>
</html>
