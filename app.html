<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        /* 1. BAKGRUNN: Realistisk biljardbord-look */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle at top, #1e4d2b 0%, #07120a 100%);
            background-attachment: fixed;
            color: white; 
            margin: 0; 
            padding: 0; 
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 430px; /* Typisk iPhone-bredde */
            padding: 20px;
            padding-bottom: 120px; /* Plass til nav-bar */
            position: relative;
        }

        /* 2. TOP BAR: Neste krav (Screen 2) */
        .status-header {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .req-text {
            font-size: 0.75em;
            letter-spacing: 2px;
            color: #27ae60;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* 3. SPILLERKORT: Den glødende gull-rammen */
        .player-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.4) 100%);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .player-card.active {
            border: 2px solid #f1c40f;
            box-shadow: 0 0 25px rgba(241, 196, 15, 0.3), inset 0 0 15px rgba(241, 196, 15, 0.1);
            transform: scale(1.02);
        }

        .player-info h2 { margin: 0; font-size: 1.4em; letter-spacing: 0.5px; }
        .active .player-info h2 { color: #f1c40f; }
        
        .score-display { font-size: 3.5em; font-weight: 900; margin: 0; line-height: 1; }
        .active .score-display { color: #f1c40f; text-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }

        .sub-stats { font-size: 0.7em; color: #888; margin-top: 8px; display: flex; gap: 15px; }
        .active .sub-stats { color: #ccc; }

        /* 4. BALLENE: 3D-effekt som på bildet */
        .ball-control-zone {
            display: flex;
            justify-content: space-around;
            margin: 40px 0;
        }
        .ball {
            width: 85px; height: 85px; border-radius: 50%;
            border: none; cursor: pointer; position: relative;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.5), 10px 15px 25px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .ball:active { transform: translateY(5px) scale(0.95); }

        .ball-inner { width: 32px; height: 32px; background: white; border-radius: 50%; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 2px solid #000; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }

        #ball1 { background: radial-gradient(circle at 35% 35%, #f1c40f 0%, #b38f00 100%); }
        #ball5 { background: radial-gradient(circle at 35% 35%, #8e44ad 0%, #4b0082 100%); }
        #ball3 { background: radial-gradient(circle at 35% 35%, #e74c3c 0%, #962d22 100%); }

        /* 5. HOVEDKNAPPER: "Foul" og "Avslutt" (Screen 2) */
        .main-actions {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 15px;
            position: fixed;
            bottom: 100px; /* Plass til nav-bar */
            left: 20px;
            right: 20px;
            max-width: 390px;
            margin: auto;
        }
        .btn {
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.85em;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-foul { background: #2c3e50; color: #bdc3c7; }
        .btn-turn { background: #27ae60; color: white; border-bottom: 4px solid #1e8449; }

        /* 6. NAVIGASJON (Screen 1 & 2) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #111;
            display: flex; justify-content: space-around;
            padding: 15px 0 30px 0;
            border-top: 1px solid #333;
            z-index: 1000;
        }
        .nav-item { color: #555; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.6em; font-weight: bold; }
        .nav-item.active { color: #f1c40f; }
        .nav-item i { font-size: 2.2em; margin-bottom: 4px; }

        .waiting { opacity: 0.2; filter: grayscale(1); pointer-events: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="status-header">
        <div class="req-text" id="moveText">BREKK-STØT (3-BALL)</div>
    </div>

    <div id="scoreboard-container">
        </div>

    <div class="ball-control-zone">
        <button class="ball" id="ball1" onclick="action('pocket', 1)"><div class="ball-inner">1</div></button>
        <button class="ball" id="ball5" onclick="action('pocket', 5)"><div class="ball-inner">5</div></button>
        <button class="ball" id="ball3" onclick="action('pocket', 3)"><div class="ball-inner">3</div></button>
    </div>

    <div class="main-actions">
        <button class="btn btn-foul" onclick="handleFoul()">FOUL</button>
        <button class="btn btn-turn" onclick="nextTurn()" id="turnBtn">AVSLUTT TUR</button>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><i class="material-icons">home</i>HJEM</a>
        <a href="stats.html" class="nav-item"><i class="material-icons">emoji_events</i>TOPPLISTE</a>
        <a href="#" class="nav-item"><i class="material-icons">menu_book</i>REGLER</a>
    </nav>
</div>

<script>
    // --- SAMME FIREBASE LOGIKK SOM FØR ---
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    let state = { playerCount: 2, scores: [0,0], currentPlayer: 0, names: ["Simen", "Lasse"], lang: 'no' };

    db.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) { state = data; updateUI(); }
    });

    function updateUI() {
        const scoreCont = document.getElementById('scoreboard-container');
        scoreCont.innerHTML = '';

        for(let i=0; i<state.playerCount; i++) {
            const isActive = state.currentPlayer === i;
            scoreCont.innerHTML += `
                <div class="player-card ${isActive ? 'active' : ''}">
                    <div class="player-info">
                        <h2>${state.names[i]}</h2>
                        <div class="sub-stats">
                            <span>SCORE: ${state.scores[i]}</span>
                            <span>SERIE: ${state.currentSeries || 0}</span>
                        </div>
                    </div>
                    <div class="score-display">${state.scores[i]}</div>
                </div>`;
        }
        
        // Oppdater tekst for krav
        document.getElementById('moveText').innerText = state.breakDone ? "KRAV: CAROM / KULE" : "BREKK-STØT (3-BALL)";
    }

    function action(type, val) {
        state.scores[state.currentPlayer] += val;
        state.breakDone = true;
        db.set(state);
    }

    function nextTurn() {
        state.currentPlayer = (state.currentPlayer + 1) % state.playerCount;
        db.set(state);
    }

    function handleFoul() {
        state.scores[state.currentPlayer] -= 5; // Eksempel
        nextTurn();
    }
</script>
</body>
</html>
