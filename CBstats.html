<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool - Stats</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #000; color: white; margin: 0; padding: 20px; padding-bottom: 120px; }
        .header { text-align: center; margin-bottom: 20px; }
        .history-list { display: flex; flex-direction: column; gap: 15px; }
        .history-item { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #222; }
        .history-date { font-size: 0.7em; color: #555; margin-bottom: 10px; }
        .history-players { display: flex; justify-content: space-between; align-items: center; }
        .player-score { display: flex; align-items: center; gap: 10px; }
        .winner { color: #f1c40f; font-weight: bold; }

        /* Bunn-navigasjon */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: flex; justify-content: space-around; padding: 10px 0 35px 0; border-top: 1px solid #111; z-index: 1000; }
        .nav-item { color: #333; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.55em; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: #f1c40f; }
        .nav-item i { font-size: 2.2em; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>KAMP HISTORIKK</h1>
    </div>

    <div class="history-list" id="historyList">
        </div>

    <nav class="bottom-nav">
        <a href="profile.html" class="nav-item">
            <i class="material-icons">person</i>
            <span>PROFIL</span>
        </a>
        <a href="index.html" class="nav-item">
            <i class="material-icons">home</i>
            <span>HJEM</span>
        </a>
        <a href="CBstats.html" class="nav-item active">
            <i class="material-icons">leaderboard</i>
            <span>STATS</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="toggleLanguage()">
            <i class="material-icons">language</i>
            <span>EN/NO</span>
        </a>
    </nav>

    <script>
        const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('matchHistory').orderByChild('date').limitToLast(20).on('value', (snapshot) => {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            
            const data = [];
            snapshot.forEach(child => { data.push(child.val()); });
            data.reverse(); // Nyeste først

            data.forEach(match => {
                const date = new Date(match.date).toLocaleDateString();
                const item = document.createElement('div');
                item.className = 'history-item';
                
                let playersHtml = '';
                match.names.forEach((name, i) => {
                    const isWinner = match.scores[i] === 101;
                    playersHtml += `
                        <div class="player-score ${isWinner ? 'winner' : ''}">
                            <span>${name}</span>
                            <span>${match.scores[i]}</span>
                        </div>
                    `;
                });

                item.innerHTML = `
                    <div class="history-date">${date} - Inninger: ${match.innings}</div>
                    <div class="history-players">${playersHtml}</div>
                `;
                list.appendChild(item);
            });
        });

        function toggleLanguage() {
            db.ref('gameData/lang').once('value', (s) => {
                const cur = s.val() || 'no';
                db.ref('gameData/lang').set(cur === 'no' ? 'en' : 'no');
            });
        }
    </script>
</body>
</html>
