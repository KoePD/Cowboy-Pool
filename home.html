<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Lobby</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --gold: #f1c40f;
            --pool-green: #1a4d2e;
            --leather-dark: #121212;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #000; color: white; margin: 0; padding: 0;
            display: flex; justify-content: center;
        }

        .app-container { 
            width: 100%; max-width: 430px; min-height: 100vh;
            background: #000; position: relative; padding-bottom: 110px;
            display: flex; flex-direction: column;
        }

        /* TOP SEKSJON: Lær-topp med bue nedover */
        .header-section {
            background: linear-gradient(180deg, #222 0%, #111 100%);
            padding: 40px 25px 50px;
            border-bottom: 2px solid #000;
            border-radius: 0 0 50% 50% / 0 0 25px 25px; /* Skaper den myke buen ned mot filten */
            z-index: 2;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .user-greeting h1 { margin: 0; font-size: 1.8em; color: var(--gold); font-weight: 800; }
        .user-rank { font-size: 0.85em; color: #888; margin-top: 4px; }
        
        .profile-pic { 
            width: 50px; height: 50px; border-radius: 50%; 
            border: 2px solid var(--gold); background: #222;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.3);
        }

        .xp-container { background: #000; height: 8px; border-radius: 4px; margin-top: 20px; border: 1px solid #333; position: relative; }
        .xp-fill { background: linear-gradient(90deg, #d4ac0d, #f1c40f); width: 65%; height: 100%; border-radius: 4px; }

        /* MIDT SEKSJON: Grønn filt som er buet i begge ender */
        .felt-area {
            background: radial-gradient(circle at center, #1e4d2b 0%, #0a1f11 100%);
            margin-top: -30px; /* Overlapper lær-toppen for helhet */
            padding: 50px 20px 60px;
            z-index: 1;
            position: relative;
            box-shadow: inset 0 20px 40px rgba(0,0,0,0.6), inset 0 -20px 40px rgba(0,0,0,0.6);
            border-left: 1px solid #1a3321;
            border-right: 1px solid #1a3321;
        }

        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .action-card { 
            background: rgba(0,0,0,0.2); 
            border: 2px solid rgba(241, 196, 15, 0.4); 
            border-radius: 15px; padding: 20px 5px; 
            text-align: center; text-decoration: none; color: white;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .action-card i { font-size: 2.8em; margin-bottom: 8px; }
        .action-card span { font-size: 0.7em; font-weight: 900; letter-spacing: 1px; }
        .card-green i { color: #2ecc71; }
        .card-gold i { color: var(--gold); }
        .card-white i { color: #eee; }

        /* BUNN SEKSJON: Lær-panel med bue oppover */
        .match-section {
            background: #121212;
            margin-top: -40px; /* Overlapper filten */
            padding: 50px 25px 30px;
            border-radius: 40px 40px 0 0; /* Buen oppover */
            z-index: 2;
            position: relative;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
            flex-grow: 1;
        }

        .section-header { font-size: 0.9em; font-weight: 800; color: #fff; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        
        .match-card { display: flex; justify-content: space-between; align-items: center; position: relative; }
        .p-info { text-align: center; flex: 1; }
        .p-img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid #333; margin-bottom: 10px; background: #222; }
        .winner .p-img { border-color: var(--gold); box-shadow: 0 0 15px rgba(241, 196, 15, 0.2); }
        .score-num { font-size: 2.2em; font-weight: 900; color: var(--gold); }
        .win-score { color: #2ecc71; }
        .vs-divider { color: #333; font-weight: 900; font-size: 1.2em; padding-top: 20px; }

        /* Stats raden nederst i kortet */
        .match-stats { 
            display: grid; grid-template-columns: repeat(5, 1fr); 
            background: rgba(0,0,0,0.3);
            margin-top: 25px; padding: 15px 5px; border-radius: 15px;
            text-align: center; border: 1px solid #222;
        }
        .stat-col { display: flex; flex-direction: column; gap: 4px; }
        .stat-col label { font-size: 0.55em; color: #666; font-weight: 900; text-transform: uppercase; }
        .stat-col span { font-size: 0.85em; font-weight: bold; color: #eee; }

        /* Navigasjon */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: flex; justify-content: space-around; padding: 10px 0 35px 0; border-top: 1px solid #111; z-index: 1000; }
        .nav-item { color: #444; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.6em; font-weight: bold; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 2.2em; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="header-section">
        <div class="header-top">
            <div class="user-greeting">
                <h1 id="greetName">Hei, Marius!</h1>
                <div class="user-rank">Cowboy Rank: <span style="color:white">Level 12 - Gunslinger</span></div>
            </div>
            <div class="profile-pic"></div>
        </div>
        <div class="xp-container"><div class="xp-fill"></div></div>
    </div>

    <div class="felt-area">
        <div class="action-grid">
            <a href="index.html?setup=true" class="action-card card-green">
                <i class="material-icons">add_circle_outline</i>
                <span>NY KAMP</span>
            </a>
            <a href="CBstats.html" class="action-card card-gold">
                <i class="material-icons">emoji_events</i>
                <span>TOPPLISTE</span>
            </a>
            <div class="action-card card-white">
                <i class="material-icons">menu_book</i>
                <span>REGLER</span>
            </div>
        </div>
    </div>

    <div class="match-section">
        <div class="section-header">
            <i class="material-icons" style="color:#2ecc71">history</i> MIN SISTE KAMP
        </div>
        
        <div class="match-card">
            <div class="p-info winner">
                <div class="p-img"></div>
                <div style="font-size:0.8em; font-weight:bold" id="p1Name">Mav</div>
                <div class="score-num win-score" id="p1Score">100</div>
                <div style="font-size:0.6em; color:#2ecc71; font-weight:900;">WIN</div>
            </div>
            
            <div class="vs-divider">VS</div>

            <div class="p-info">
                <div class="p-img"></div>
                <div style="font-size:0.8em; font-weight:bold" id="p2Name">Per</div>
                <div class="score-num" id="p2Score">82</div>
                <div style="height:12px"></div>
            </div>
        </div>

        <div class="match-stats">
            <div class="stat-col"><label>Score</label><span>82</span></div>
            <div class="stat-col"><label>Turn</label><span>8</span></div>
            <div class="stat-col"><label>Serie</label><span>16</span></div>
            <div class="stat-col"><label>Foul</label><span>2</span></div>
            <div class="stat-col"><label>Kats.</label><span>27</span></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active"><i class="material-icons">home</i><span>Hjem</span></a>
        <a href="CBstats.html" class="nav-item"><i class="material-icons">emoji_events</i><span>Toppliste</span></a>
        <a href="#" class="nav-item"><i class="material-icons">menu_book</i><span>Regler</span></a>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('gameData/names').once('value', (s) => {
        if(s.val()) document.getElementById('greetName').innerText = "Hei, " + s.val()[0] + "!";
    });

    db.ref('matchHistory').limitToLast(1).on('value', (s) => {
        if(s.val()) {
            const last = Object.values(s.val())[0];
            document.getElementById('p1Name').innerText = last.names[0];
            document.getElementById('p2Name').innerText = last.names[1] || "P2";
            document.getElementById('p1Score').innerText = last.scores[0];
            document.getElementById('p2Score').innerText = last.scores[1];
        }
    });
</script>
</body>
</html>
