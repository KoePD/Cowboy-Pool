<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Lobby</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0a0a0a; 
            color: white; margin: 0; padding: 0;
            display: flex; justify-content: center;
        }
        .app-container { 
            width: 100%; max-width: 430px; min-height: 100vh;
            background: linear-gradient(180deg, #1a1a1a 0%, #050505 100%);
            padding: 20px; box-sizing: border-box; padding-bottom: 110px;
        }

        /* Top Section: Table Felt Style */
        .lobby-table {
            background: radial-gradient(circle at center, #1e4d2b 0%, #0d2615 100%);
            border-radius: 30px;
            padding: 25px;
            border: 2px solid #333;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            position: relative;
        }

        .header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px; }
        .user-greeting h1 { margin: 0; font-size: 1.8em; color: #f1c40f; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .user-rank { font-size: 0.85em; color: #ccc; margin-top: 5px; font-weight: 500; }
        .profile-pic { 
            width: 55px; height: 55px; border-radius: 50%; 
            border: 2px solid #f1c40f; background: #222; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .xp-container { background: rgba(0,0,0,0.4); height: 8px; border-radius: 4px; margin-top: 15px; overflow: hidden; }
        .xp-fill { background: linear-gradient(90deg, #f1c40f, #d4ac0d); width: 65%; height: 100%; box-shadow: 0 0 10px rgba(241, 196, 15, 0.4); }

        /* Action Buttons Grid */
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 25px; }
        .action-card { 
            background: rgba(0,0,0,0.3); 
            border: 2px solid #f1c40f66; 
            border-radius: 15px; padding: 20px 5px; 
            text-align: center; cursor: pointer; text-decoration: none; color: white;
            transition: transform 0.2s;
        }
        .action-card:active { transform: scale(0.95); }
        .action-card i { font-size: 2.5em; margin-bottom: 8px; display: block; }
        .action-card span { font-size: 0.7em; font-weight: 800; letter-spacing: 1px; }
        
        .card-green i { color: #2ecc71; }
        .card-gold i { color: #f1c40f; }
        .card-brown i { color: #e67e22; }

        /* Last Match: Dashboard Style */
        .last-match-box {
            background: #1a1a1a; border-radius: 20px; padding: 20px;
            border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .match-header { font-size: 0.8em; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        
        .match-display { display: flex; justify-content: space-between; align-items: center; }
        .match-player { text-align: center; flex: 1; }
        .match-player img { width: 45px; height: 45px; border-radius: 50%; margin-bottom: 8px; border: 1px solid #444; }
        .match-score { font-size: 2.2em; font-weight: 900; color: #f1c40f; margin: 5px 0; }
        .win-label { color: #2ecc71; font-size: 0.7em; font-weight: 900; }

        /* Bottom Nav (Consistent) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: flex; justify-content: space-around; padding: 10px 0 35px 0; border-top: 1px solid #111; max-width: 430px; margin: 0 auto; }
        .nav-item { color: #444; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.6em; font-weight: bold; }
        .nav-item.active { color: #f1c40f; }
        .nav-item i { font-size: 2.2em; margin-bottom: 4px; }
        .lasso i { transform: rotate(-15deg); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="lobby-table">
        <div class="header">
            <div class="user-greeting">
                <h1 id="greetName">Hei, Marius!</h1>
                <div class="user-rank">Cowboy Rank: <span style="color:#f1c40f">Level 12 - Gunslinger</span></div>
            </div>
            <div class="profile-pic">
                <img src="https://via.placeholder.com/55" alt="P" style="width:100%; border-radius:50%;">
            </div>
        </div>

        <div class="xp-container"><div class="xp-fill"></div></div>

        <div class="action-grid">
            <a href="index.html?setup=true" class="action-card card-green">
                <i class="material-icons">add_circle</i>
                <span>NY KAMP</span>
            </a>
            <a href="CBstats.html" class="action-card card-gold">
                <i class="material-icons">emoji_events</i>
                <span>TOPPLISTE</span>
            </a>
            <div class="action-card card-brown">
                <i class="material-icons">menu_book</i>
                <span>REGLER</span>
            </div>
        </div>
    </div>

    <div class="last-match-box">
        <div class="match-header">
            <i class="material-icons" style="font-size: 1.2em; color:#2ecc71;">history</i>
            MIN SISTE KAMP
        </div>
        <div class="match-display">
            <div class="match-player">
                <img src="https://via.placeholder.com/45" alt="Mav">
                <div style="font-size: 0.8em; font-weight: bold;" id="p1Name">Mav</div>
                <div class="match-score" id="p1Score">100</div>
                <div class="win-label">WIN</div>
            </div>
            <div style="font-weight: 900; color: #333; font-size: 1.2em;">VS</div>
            <div class="match-player">
                <img src="https://via.placeholder.com/45" alt="Per">
                <div style="font-size: 0.8em; font-weight: bold;" id="p2Name">Per</div>
                <div class="match-score" id="p2Score" style="color:#444;">82</div>
                <div style="height: 14px;"></div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active">
            <i class="material-icons">home</i>
            <span>HJEM</span>
        </a>
        <a href="index.html" class="nav-item lasso">
            <i class="material-icons">all_inclusive</i>
            <span>RANGE</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="material-icons">person</i>
            <span>PROFIL</span>
        </a>
    </nav>
</div>

<script>
    // Firebase Config (Bruk din egen her)
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Hent data for å gjøre lobbyen levende
    db.ref('gameData').on('value', (s) => {
        const data = s.val();
        if(data && data.names) {
            document.getElementById('greetName').innerText = "Hei, " + data.names[0] + "!";
        }
    });

    db.ref('matchHistory').limitToLast(1).on('value', (s) => {
        if(s.val()) {
            const matches = Object.values(s.val());
            const last = matches[0];
            document.getElementById('p1Name').innerText = last.names[0];
            document.getElementById('p2Name').innerText = last.names[1] || "P2";
            document.getElementById('p1Score').innerText = last.scores[0];
            document.getElementById('p2Score').innerText = last.scores[1];
        }
    });
</script>
</body>
</html>
