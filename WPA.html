<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top, #1e4d2b 0%, #0a1a0f 100%); background-attachment: fixed; color: white; margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .app-container { width: 100%; max-width: 430px; padding: 20px; padding-bottom: 120px; display: flex; flex-direction: column; }
        .page { display: none; width: 100%; flex-direction: column; }
        .page.active { display: flex; }
        .btn-gold { background: rgba(0,0,0,0.6); color: #f1c40f; border: 1px solid rgba(241, 196, 15, 0.5); padding: 10px 30px; border-radius: 50px; font-weight: 800; font-size: 0.75em; text-transform: uppercase; cursor: pointer; }
        .btn-gold.selected { background: #f1c40f; color: black; border-color: #f1c40f; }
        .player-card { background: linear-gradient(180deg, #0a0a0a 0%, #000000 100%); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .player-card.active { border: 2px solid #f1c40f; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9); transform: scale(1.03); }
        .player-info h2 { margin: 0; font-size: 1.2em; text-transform: uppercase; letter-spacing: 1px; color: #666; }
        .active .player-info h2 { color: #f1c40f; }
        .score-display { font-size: 3.5em; font-weight: 900; line-height: 1; margin: 0; color: #333; min-width: 60px; text-align: right; }
        .active .score-display { color: #f1c40f; }
        .sub-stats { font-size: 0.55em; color: #444; margin-top: 12px; display: flex; justify-content: flex-start; text-transform: uppercase; gap: 10px; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-val { color: #eee; font-weight: 900; font-size: 1.1em; }
        .active .stat-val { color: #f1c40f; }
        .foul-dot { width: 12px; height: 12px; border-radius: 50%; background: #1a1a1a; border: 1px solid #222; margin-right: 4px; }
        .foul-dot.active { background: #e74c3c; box-shadow: 0 0 10px #ff4757; }
        .game-status-zone { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); padding: 15px; border-radius: 20px 20px 0 0; text-align: center; border: 1px solid rgba(255,255,255,0.05); margin-top: 20px; min-height: 60px; display: flex; flex-direction: column; justify-content: center; }
        .req-text { font-size: 0.8em; letter-spacing: 2px; color: #2ecc71; font-weight: 800; text-transform: uppercase; }
        .timer-text { font-family: monospace; font-size: 1.2em; color: #f1c40f; margin-top: 3px; display: block; }
        .ball-control-zone { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 20px 10px; border-radius: 0 0 35px 35px; border: 1px solid rgba(255,255,255,0.03); margin-bottom: 15px; }
        .ball { width: 75px; height: 75px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: inset -6px -6px 15px rgba(0,0,0,0.7); }
        .ball-inner { width: 28px; height: 28px; background: white; border-radius: 50%; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 2px solid #000; }
        .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 16px; border-radius: 16px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 0.75em; color: white; }
        .btn-win { background: linear-gradient(45deg, #f1c40f, #d4ac0d); color: black; grid-column: span 2; padding: 20px; font-weight: 900; border-radius: 16px; display: none; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: flex; justify-content: space-around; padding: 10px 0 35px 0; border-top: 1px solid #111; z-index: 1000; }
        .nav-item { color: #333; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.55em; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: #f1c40f; }
        .nav-item i { font-size: 2.2em; margin-bottom: 4px; }
        .waiting-ball { opacity: 0.15; filter: grayscale(1); pointer-events: none; }
        .setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,20,5,0.98); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(10px); }
        .setup-card { background: #000; border: 1px solid #f1c40f; padding: 30px; border-radius: 30px; width: 100%; max-width: 350px; text-align: center; }
        .btn-choice { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; font-weight: bold; cursor: pointer; }
        .btn-choice.selected { background: #f1c40f; color: black; }
        .name-field { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; margin-bottom: 10px; text-align: center; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="setupOverlay" class="setup-overlay">
    <div class="setup-card">
        <h2 style="color:#f1c40f">NY MATCH</h2>
        <div id="step-confirm" style="display: none;">
            <p style="color:#888">Kamp pågår.</p>
            <button class="btn-gold" style="width:100%; margin-bottom:10px;" onclick="handleFinishAndSave()">LAGRE & NY</button>
            <button class="btn-gold" style="width:100%; border-color:#e74c3c; color:#e74c3c;" onclick="goToStep1()">SLETT & NY</button>
            <button style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer;" onclick="closeSetup()">Fortsett</button>
        </div>
        <div id="step1" style="display: none;">
            <p style="color:#888">Modus:</p>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn-choice" id="modeStd" onclick="setMode('standard')">Standard</button>
                <button class="btn-choice" id="modeAlt" onclick="setMode('alternate')">Alternate</button>
            </div>
            <p style="color:#888">Spillere:</p>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn-choice" onclick="selectPlayers(1)">1</button>
                <button class="btn-choice" onclick="selectPlayers(2)">2</button>
                <button class="btn-choice" onclick="selectPlayers(3)">3</button>
            </div>
            <button style="background:none; border:none; color:#555; cursor:pointer;" onclick="closeSetup()">Avbryt</button>
        </div>
        <div id="step2" style="display: none;">
            <div id="nameInputs"></div>
            <button class="btn-gold" style="width:100%; margin-top:10px;" onclick="finalizeSetup()">START KAMP</button>
            <button style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer;" onclick="goToStep1()">← Tilbake</button>
        </div>
    </div>
</div>

<div class="app-container">
    <div id="profilePage" class="page">
        <div style="text-align:center; margin-bottom:20px;">
            <div style="width:80px; height:80px; background:#f1c40f; border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; color:black; font-size:2em; font-weight:900;" id="profInitial">?</div>
            <h2 id="profName" style="margin:0;">Spiller</h2>
        </div>
        <div class="player-card">
            <div style="text-align:left"><p class="info-label">Beste Serie</p><p class="info-value" id="profBest">0</p></div>
            <i class="material-icons" style="color:#f1c40f; font-size:2.5em">emoji_events</i>
        </div>
    </div>

    <div id="playPage" class="page active">
        <div class="header-actions"><button class="btn-new-game-top" onclick="checkActiveGame()">New Match</button></div>
        <div id="scoreboard-container"></div>
        <div class="game-status-zone">
            <div id="modeLabel" style="font-size:0.6em; color:#f1c40f; opacity:0.6; margin-bottom:5px;">MODUS: -</div>
            <span class="req-text" id="moveText">BREKK-STØT</span>
            <span class="timer-text" id="matchTimer">00:00:00</span>
            <div id="rotate-container"><button class="btn-rotate" onclick="rotateBreaker()">BYTT STARTSPILLER</button></div>
        </div>
        <div class="ball-control-zone">
            <div style="text-align:center"><button class="ball" id="ball1" style="background:radial-gradient(circle at 35% 35%, #f1c40f, #b38f00);" onclick="action('pocket', 1)"><div class="ball-inner">1</div></button><button style="background:none; color:#3498db; border:1px solid #3498db; font-size:0.5em; margin-top:8px; padding:3px; border-radius:4px; cursor:pointer;" onclick="action('pocket_carom', 2)">+CAROM</button></div>
            <div style="text-align:center"><button class="ball" id="ball5" style="background:radial-gradient(circle at 35% 35%, #8e44ad, #4b0082);" onclick="action('pocket', 5)"><div class="ball-inner">5</div></button><button style="background:none; color:#3498db; border:1px solid #3498db; font-size:0.5em; margin-top:8px; padding:3px; border-radius:4px; cursor:pointer;" onclick="action('pocket_carom', 6)">+CAROM</button></div>
            <div style="text-align:center"><button class="ball" id="ball3" style="background:radial-gradient(circle at 35% 35%, #e74c3c, #962d22);" onclick="action('pocket', 3)"><div class="ball-inner">3</div></button><button style="background:none; color:#3498db; border:1px solid #3498db; font-size:0.5em; margin-top:8px; padding:3px; border-radius:4px; cursor:pointer;" onclick="action('pocket_carom', 4)">+CAROM</button></div>
        </div>
        <div class="action-area">
            <button id="winButton" class="btn-win" onclick="action('winning_shot', 1)">WINNING SHOT (CUE VIA 1)</button>
            <button class="btn btn-blue" id="c1" onclick="action('carom', 1)">Carom 1P</button>
            <button class="btn btn-blue" id="c2" onclick="action('carom', 2)">Carom 2P</button>
            <button class="btn btn-foul" onclick="handleFoul()">FOUL</button>
            <button class="btn btn-blue" onclick="undo()">ANGRE</button>
            <button class="btn btn-turn" onclick="nextTurn()">AVSLUTT TUR</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a class="nav-item" id="nav-profile" onclick="switchPage('profilePage')"><i class="material-icons">person</i>PROFIL</a>
    <a class="nav-item active" id="nav-play" onclick="switchPage('playPage')"><i class="material-icons">home</i>HJEM</a>
    <a class="nav-item" onclick="window.location.href='stats.html'"><i class="material-icons">leaderboard</i>STATS</a>
    <a class="nav-item" onclick="toggleLanguage()"><i class="material-icons">language</i>EN/NO</a>
</nav>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    let tempPlayers = 2; let tempMode = 'standard';
    let state = { gameMode: 'standard', playerCount: 2, scores: [0,0,0], foulCounts: [0,0,0], scoreAtStart: [0,0,0], currentPlayer: 0, breakDone: false, tableStatus: 'open', lastType: null, seconds: 0, names: ["P1","P2","P3"], bestSeries: [0,0,0], lastSeries: [0,0,0], lang: 'no' };
    let history = [];

    db.on('value', (s) => { if(s.val()) { state = Object.assign(state, s.val()); updateUI(); } });

    function switchPage(pId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach((it, idx) => {
            it.classList.remove('active');
            if((pId==='profilePage' && idx===0) || (pId==='playPage' && idx===1)) it.classList.add('active');
        });
    }

    function action(type, val) {
        saveHistory(); let p = state.currentPlayer; let cur = state.scores[p];
        if ((cur < 90 && (cur + val) > 90) || (cur >= 90 && (cur + val) > 101)) { handleFoul(); return; }
        if (cur >= 90 && cur < 100 && type.includes('pocket') && type !== 'pocket_carom') return;
        if (cur === 100 && type !== 'winning_shot') return;
        state.breakDone = true; state.foulCounts[p] = 0;
        if (state.gameMode === 'alternate') {
            if (type === 'pocket_carom') { state.tableStatus = state.tableStatus === 'open' ? 'open' : 'locked'; state.lastType = 'pocket'; }
            else { state.tableStatus = 'locked'; state.lastType = type; }
        } else { state.tableStatus = 'open'; }
        state.scores[p] += val; db.set(state);
    }

    function updateUI() {
        const l = state.lang === 'no' ? {now:"NÅ",best:"PERS",last:"SISTE",win:"WINNING SHOT",break:"BREKK-STØT"} : {now:"NOW",best:"BEST",last:"LAST",win:"WINNING SHOT",break:"BREAK SHOT"};
        document.getElementById('modeLabel').innerText = "MODUS: " + (state.gameMode || 'STANDARD').toUpperCase();
        document.getElementById('profName').innerText = state.names[0] || "Spiller";
        document.getElementById('profInitial').innerText = (state.names[0] || "?").charAt(0).toUpperCase();
        document.getElementById('profBest').innerText = state.bestSeries ? state.bestSeries[0] : 0;

        const cont = document.getElementById('scoreboard-container'); 
        cont.innerHTML = '';
        for(let i=0; i<state.playerCount; i++) {
            const active = state.currentPlayer === i;
            const score = state.scores[i] || 0;
            const startScore = state.scoreAtStart ? state.scoreAtStart[i] : 0;
            const best = state.bestSeries ? state.bestSeries[i] : 0;
            const last = state.lastSeries ? state.lastSeries[i] : 0;
            const fouls = state.foulCounts ? state.foulCounts[i] : 0;

            cont.innerHTML += `<div class="player-card ${active?'active':''}">
                <div class="player-info">
                    <h2>${state.names[i] || 'P'+(i+1)}</h2>
                    <div class="sub-stats">
                        <div class="stat-item">${l.now}<span class="stat-val">${active ? score - startScore : 0}</span></div>
                        <div class="stat-item">${l.best}<span class="stat-val">${best}</span></div>
                        <div class="stat-item">${l.last}<span class="stat-val">${last}</span></div>
                    </div>
                    <div style="display:flex; margin-top:10px;">
                        <div class="foul-dot ${fouls>=1?'active':''}"></div>
                        <div class="foul-dot ${fouls>=2?'active':''}"></div>
                        <div class="foul-dot ${fouls>=3?'active':''}"></div>
                    </div>
                </div>
                <div class="score-display">${score}</div>
            </div>`;
        }

        const cur = state.scores[state.currentPlayer];
        const winPhase = cur === 100;
        const caromPhase = cur >= 90 && cur < 100;
        const lockPocket = state.gameMode === 'alternate' && state.tableStatus === 'locked' && state.lastType === 'pocket';
        const lockCarom = state.gameMode === 'alternate' && state.tableStatus === 'locked' && state.lastType === 'carom';

        document.getElementById('winButton').style.display = winPhase ? 'block' : 'none';
        document.getElementById('c1').style.display = winPhase ? 'none' : (lockCarom ? 'none' : 'block');
        document.getElementById('c2').style.display = winPhase ? 'none' : (lockCarom ? 'none' : 'block');
        document.getElementById('ball1').className = (!state.breakDone || caromPhase || winPhase || lockPocket) ? 'ball waiting-ball' : 'ball';
        document.getElementById('ball5').className = (!state.breakDone || caromPhase || winPhase || lockPocket) ? 'ball waiting-ball' : 'ball';
        document.getElementById('ball3').className = (caromPhase || winPhase || lockPocket) ? 'ball waiting-ball' : 'ball';
        document.getElementById('moveText').innerText = winPhase ? l.win : (caromPhase ? "KUN CAROMS" : (!state.breakDone ? l.break : (lockPocket ? "KRAV: CAROM" : (lockCarom ? "KRAV: POCKET" : "VELG FRITT"))));
        document.getElementById('rotate-container').style.display = state.breakDone ? 'none' : 'block';
        document.getElementById('matchTimer').innerText = new Date((state.seconds || 0) * 1000).toISOString().substr(11, 8);
    }

    function checkActiveGame() { document.getElementById('setupOverlay').style.display = 'flex'; const inP = state.scores.some(s=>s>0); document.getElementById('step-confirm').style.display = inP ? 'block' : 'none'; document.getElementById('step1').style.display = inP ? 'none' : 'block'; }
    function setMode(m) { tempMode = m; document.getElementById('modeStd').classList.toggle('selected', m==='standard'); document.getElementById('modeAlt').classList.toggle('selected', m==='alternate'); }
    function goToStep1() { document.getElementById('step-confirm').style.display='none'; document.getElementById('step1').style.display='block'; document.getElementById('step2').style.display='none'; setMode(tempMode); }
    function selectPlayers(n) { tempPlayers = n; document.getElementById('step1').style.display='none'; document.getElementById('step2').style.display='block'; const c = document.getElementById('nameInputs'); c.innerHTML = ''; for(let i=0; i<n; i++) c.innerHTML += `<input type="text" id="n${i}" class="name-field" placeholder="Navn ${i+1}">`; }
    function finalizeSetup() { const ns = []; for(let i=0; i<tempPlayers; i++) ns.push(document.getElementById(`n${i}`).value || `P${i+1}`); db.set({...state, gameMode:tempMode, playerCount:tempPlayers, names:ns, scores:[0,0,0], foulCounts:[0,0,0], scoreAtStart:[0,0,0], breakDone:false, seconds:0, currentPlayer:0, tableStatus:'open'}); closeSetup(); }
    function closeSetup() { document.getElementById('setupOverlay').style.display = 'none'; }
    function handleFoul() { saveHistory(); state.scores[state.currentPlayer] = state.scoreAtStart[state.currentPlayer]; state.foulCounts[state.currentPlayer]++; if(state.foulCounts[state.currentPlayer]>=3){state.scores[state.currentPlayer]=0; state.foulCounts[state.currentPlayer]=0;} nextTurn(); }
    function nextTurn() { saveHistory(); let p = state.currentPlayer; let s = state.scores[p] - state.scoreAtStart[p]; if(s>(state.bestSeries[p]||0)) state.bestSeries[p]=s; state.lastSeries[p]=s; state.currentPlayer = (state.currentPlayer + 1) % state.playerCount; state.tableStatus = 'open'; state.scoreAtStart[state.currentPlayer] = state.scores[state.currentPlayer]; db.set(state); }
    function undo() { if(history.length) { state = JSON.parse(history.pop()); db.set(state); } }
    function saveHistory() { history.push(JSON.stringify(state)); if(history.length > 10) history.shift(); }
    function toggleLanguage() { state.lang = state.lang==='no'?'en':'no'; db.set(state); }
    function rotateBreaker() { if(!state.breakDone) { state.currentPlayer = (state.currentPlayer+1)%state.playerCount; db.set(state); } }
    function handleFinishAndSave() { firebase.database().ref('matchHistory').push({ date: new Date().toISOString(), players: state.names.slice(0, state.playerCount), scores: state.scores.slice(0, state.playerCount) }).then(goToStep1); }
    setInterval(() => { if(state.breakDone) { state.seconds++; db.child('seconds').set(state.seconds); } }, 1000);
</script>
</body>
</html>
