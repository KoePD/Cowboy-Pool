<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cowboy Pool Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        /* App Container (Mobil-ramme) */
        .app-container {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            background: #121212;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
        }

        /* Farger og tema */
        .pool-green-gradient {
            background: linear-gradient(180deg, #1a4a36 0%, #0d251b 100%);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .gold-text { color: #d4af37; }
        .gold-border { border: 2px solid #d4af37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        
        /* Spesifikke knapper fra bildet */
        .grid-button {
            background: linear-gradient(145deg, #1b4d36, #0f2d20);
            border: 1px solid #d4af37;
            border-radius: 12px;
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* Baller */
        .ball {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            color: #000;
            box-shadow: inset -8px -8px 15px rgba(0,0,0,0.4), 0 5px 10px rgba(0,0,0,0.5);
        }

        /* Bottom Nav */
        .nav-bar {
            background: #1a1a1a;
            border-top: 1px solid #333;
            padding: 10px 0;
            display: flex;
            justify-content: space-around;
        }

        .nav-item { color: #666; font-size: 0.7rem; text-align: center; }
        .nav-item.active { color: #d4af37; }

        /* Skjul skjermer */
        .screen { display: none; height: 100%; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .screen.active { display: block; }

    </style>
</head>
<body>

<div class="app-container">
    
    <!-- SCREEN 1: LOBBY -->
    <div id="lobby" class="screen active">
        <div class="flex justify-between items-center mt-4">
            <div>
                <h1 class="text-2xl font-black gold-text">Hei, Marius!</h1>
                <p class="text-xs text-gray-400">Cowboy Rank: <span class="text-yellow-100">Level 12 - Gunslinger</span></p>
                <div class="w-48 h-1.5 bg-gray-800 rounded-full mt-2">
                    <div class="w-3/4 h-full bg-yellow-500 rounded-full" style="box-shadow: 0 0 10px #d4af37;"></div>
                </div>
            </div>
            <img src="https://via.placeholder.com/40" class="rounded-full border-2 border-yellow-600">
        </div>

        <div class="grid grid-cols-3 gap-3 mt-10">
            <div class="grid-button" onclick="showScreen('range')">
                <i class="fa-solid fa-plus text-3xl text-green-400 mb-2"></i>
                <span class="text-[10px] font-bold">NY KAMP</span>
            </div>
            <div class="grid-button">
                <i class="fa-solid fa-trophy text-3xl text-yellow-500 mb-2"></i>
                <span class="text-[10px] font-bold">TOPPLISTE</span>
            </div>
            <div class="grid-button">
                <i class="fa-solid fa-book text-3xl text-yellow-200 mb-2"></i>
                <span class="text-[10px] font-bold">REGLER</span>
            </div>
        </div>

        <div class="mt-10 bg-zinc-900/80 rounded-3xl p-5 border border-zinc-800">
            <h3 class="text-xs font-bold uppercase tracking-widest mb-4 opacity-70">Min Siste Kamp</h3>
            <div class="flex justify-between items-center px-2">
                <div class="text-center">
                    <div class="w-12 h-12 bg-gray-700 rounded-full mb-1 border border-zinc-600"></div>
                    <p class="text-[10px]">Mav</p>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-black text-green-500">100 - 82</div>
                    <div class="text-[9px] font-bold bg-green-900/30 text-green-400 px-2 py-0.5 rounded italic">WIN</div>
                </div>
                <div class="text-center">
                    <div class="w-12 h-12 bg-gray-700 rounded-full mb-1 border border-zinc-600"></div>
                    <p class="text-[10px]">Per</p>
                </div>
            </div>
        </div>
    </div>

    <!-- SCREEN 2: THE RANGE -->
    <div id="range" class="screen">
        <p class="text-center gold-text text-xs font-bold tracking-widest mb-4">NESTE KRAV: CAROM</p>
        
        <!-- Aktiv Spiller -->
        <div class="gold-border pool-green-gradient rounded-3xl p-6 mb-4 flex justify-between items-center relative overflow-hidden">
            <div class="text-6xl font-black text-yellow-500 opacity-80">1</div>
            <div class="text-right">
                <h2 class="text-2xl font-bold">Marius</h2>
                <div class="flex flex-col">
                    <span class="text-xs text-gray-300">Score</span>
                    <span class="text-4xl font-black">85</span>
                </div>
            </div>
            <div class="absolute bottom-2 right-4 text-[10px] text-yellow-500/50 italic">Turn serie: 8</div>
        </div>

        <!-- Motstander -->
        <div class="bg-zinc-900/50 rounded-2xl p-4 flex justify-between items-center border border-zinc-800 opacity-60">
            <div class="w-10 h-10 bg-gray-600 rounded-full"></div>
            <div class="flex-1 px-4">
                <p class="font-bold">Per</p>
                <p class="text-xs">Score: 20</p>
            </div>
            <div class="text-right text-xs italic">Turn serie: 1</div>
        </div>

        <!-- Baller -->
        <div class="flex justify-center gap-6 my-10">
            <div class="ball" style="background: #facc15;">1</div>
            <div class="ball" style="background: #8b5cf6;">5</div>
            <div class="ball" style="background: #ef4444;">3</div>
        </div>

        <!-- Knapper -->
        <div class="flex gap-4 mt-auto">
            <button class="flex-1 bg-zinc-8
