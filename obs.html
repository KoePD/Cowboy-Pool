<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        body { background-color: rgba(0, 0, 0, 0); margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; height: 1080px; width: 1920px; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; }
        .scoreline-wrapper { margin-bottom: 50px; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 1150px; }
        
        .compact-top { display: flex; align-items: center; gap: 20px; background: #000; padding: 5px 30px; border-radius: 20px 20px 0 0; border: 3px solid #111; border-bottom: none; position: relative; height: 38px; overflow: hidden; }
        .gradient-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, #083c2c 0%, #00af79 50%, #083c2c 100%); z-index: 1; }
        
        .scoreline { display: flex; justify-content: center; align-items: center; border-radius: 45px; background: #000; border: 3px solid #111; width: 100%; height: 95px; position: relative; z-index: 5; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        
        .player-area { display: flex; align-items: center; flex: 1; color: white; position: relative; z-index: 2; padding: 0 25px; min-width: 0; }
        .name { font-size: 32px; font-weight: 800; text-transform: uppercase; white-space: nowrap; margin: 0 15px; overflow: hidden; text-overflow: ellipsis; }

        .score-block { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 115px; height: 100%; z-index: 10; background: #000; }
        .score-val { font-size: 64px; font-weight: 900; color: #f1c40f; line-height: 0.85; }
        .pers-val { font-size: 11px; font-weight: 900; color: #aaa; text-transform: uppercase; margin-top: 5px; }
        .pers-val b { color: #f1c40f; font-size: 14px; margin-left: 3px; }

        .score-divider { color: #222; font-size: 40px; font-weight: 900; margin: 0 5px; padding-bottom: 15px; background: #000; height: 100%; display: flex; align-items: center; }

        .fouls { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(0,0,0,0.2); }
        .dot.active { background: #ff0000; box-shadow: 0 0 8px #ff0000; }

        .ball { width: 30px; height: 30px; border-radius: 50%; position: relative; background-color: #fff; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .ball-overlay-3d { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; z-index: 10; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.4), inset 1.5px 1.5px 3px rgba(255,255,255,0.2); border: 1px solid rgba(0,0,0,0.1); }
        .ball-num { font-size: 10px; font-weight: 900; z-index: 5; color: black; background: white; width: 15px; height: 15px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #000; }
        .f-1 { background: #ffcc00; } .f-3 { background: #cc0000; } .f-5 { background: #663399; }
        .ball-dimmed { opacity: 0.15; filter: grayscale(1); }

        .break-ball-3d { background-color: #fdfcf0 !important; width: 26px; height: 26px; position: relative; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .break-dot { position: absolute; width: 4px; height: 4px; background: #d00000; border-radius: 50%; z-index: 6; top: 50%; left: 50%; margin: -2px 0 0 -2px; }
        .break-dot:nth-child(1) { transform: translate(-5px, -3px); }
        .break-dot:nth-child(2) { transform: translate(5px, -3px); }
        .break-dot:nth-child(3) { transform: translate(0, 6.5px); }

        .is-not-turn { opacity: 0.35; }

        /* SPILLER 3 */
        .player3-row { display: none; width: 50%; height: 75px; background: #000; margin-top: -8px; border-radius: 0 0 35px 35px; border: 3px solid #111; border-top: none; position: relative; z-index: 4; overflow: hidden; }
        .p3-layout { display: flex; height: 100%; width: 100%; align-items: center; justify-content: space-between; }
        .p3-info-area { display: flex; align-items: center; padding-left: 25px; min-width: 0; flex: 1; }
    </style>
</head>
<body>
    <div class="scoreline-wrapper">
        <div class="compact-top">
            <div class="gradient-bg"></div>
            <div style="color:#f1c40f; font-weight:900; z-index:2; font-size:14px;" id="inning-text">INN 1</div>
            <div style="display:flex; gap:10px; z-index:2; margin-left:15px;">
                <div id="b-1" class="ball f-1"><div class="ball-num">1</div><div class="ball-overlay-3d"></div></div>
                <div id="b-3" class="ball f-3"><div class="ball-num">3</div><div class="ball-overlay-3d"></div></div>
                <div id="b-5" class="ball f-5"><div class="ball-num">5</div><div class="ball-overlay-3d"></div></div>
            </div>
            <div id="status-msg" style="color:white; font-weight:900; z-index:2; margin-left:15px; font-size:14px;">BREAK</div>
        </div>
        
        <div class="scoreline">
            <div class="gradient-bg"></div>
            
            <div class="player-area" id="p0-row" style="justify-content: flex-end;">
                <div id="p0-break" class="break-ball-3d"><div class="break-dot"></div><div class="break-dot"></div><div class="break-dot"></div><div class="ball-overlay-3d"></div></div>
                <div class="name" id="p0-name">PLAYER 1</div>
                <div class="fouls" id="p0-fouls"></div>
            </div>

            <div style="display:flex; align-items:center; background:#000; height:100%; border-left:3px solid #111; border-right:3px solid #111; padding: 0 5px; z-index:10;">
                <div class="score-block">
                    <div class="score-val" id="p0-score">0</div>
                    <div class="pers-val"><span class="l-pers">PERS</span> <b id="best-0">0</b></div>
                </div>
                <div class="score-divider">-</div>
                <div class="score-block">
                    <div class="score-val" id="p1-score">0</div>
                    <div class="pers-val"><span class="l-pers">PERS</span> <b id="best-1">0</b></div>
                </div>
            </div>

            <div class="player-area" id="p1-row" style="justify-content: flex-start;">
                <div class="fouls" id="p1-fouls"></div>
                <div class="name" id="p1-name">PLAYER 2</div>
                <div id="p1-break" class="break-ball-3d"><div class="break-dot"></div><div class="break-dot"></div><div class="break-dot"></div><div class="ball-overlay-3d"></div></div>
            </div>
        </div>

        <div class="player3-row" id="p2-container">
            <div class="gradient-bg"></div>
            <div class="p3-layout">
                <div class="p3-info-area" id="p2-row">
                    <div id="p2-break" class="break-ball-3d"><div class="break-dot"></div><div class="break-dot"></div><div class="break-dot"></div><div class="ball-overlay-3d"></div></div>
                    <div class="name" id="p2-name" style="font-size:24px;">PLAYER 3</div>
                    <div class="fouls" id="p2-fouls"></div>
                </div>
                <div class="score-block" style="border-left: 3px solid #111; min-width: 125px;">
                    <div class="score-val" id="p2-score" style="font-size: 44px;">0</div>
                    <div class="pers-val"><span class="l-pers">PERS</span> <b id="best-2">0</b></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('gameData');

        const i18n = {
            no: { pers: "PERS", inn: "INN", break: "BREAK", open: "ÅPEN", rc: "KRAV: CAROM", rp: "KRAV: POCKET" },
            en: { pers: "BEST", inn: "INN", break: "BREAK", open: "OPEN", rc: "REQ: CAROM", rp: "REQ: POCKET" }
        };

        db.on('value', snap => {
            const data = snap.val();
            if (data) {
                const lang = data.lang || 'no';
                const t = i18n[lang];

                document.getElementById('p2-container').style.display = (data.playerCount >= 3) ? "block" : "none";
                document.querySelectorAll('.l-pers').forEach(el => el.innerText = t.pers);

                for(let p=0; p < 3; p++) {
                    if (document.getElementById(`p${p}-name`)) document.getElementById(`p${p}-name`).innerText = data.names[p] || "";
                    if (document.getElementById(`p${p}-score`)) document.getElementById(`p${p}-score`).innerText = data.scores[p];
                    if (document.getElementById(`best-${p}`)) document.getElementById(`best-${p}`).innerText = data.bestSeries ? (data.bestSeries[p] || 0) : 0;

                    const row = (p === 2) ? document.getElementById('p2-row') : document.getElementById(`p${p}-row`);
                    if(row) row.classList.toggle('is-not-turn', data.currentPlayer !== p);
                    
                    const bBall = document.getElementById(`p${p}-break`);
                    if(bBall) bBall.style.visibility = (!data.breakDone && data.currentPlayer === p) ? "visible" : "hidden";

                    let fHtml = '';
                    for(let d=0; d<3; d++) fHtml += `<div class="dot ${d < data.foulCounts[p] ? 'active' : ''}"></div>`;
                    const fDiv = document.getElementById(`p${p}-fouls`);
                    if(fDiv) fDiv.innerHTML = fHtml;
                }

                document.getElementById('inning-text').innerText = t.inn + " " + (Math.floor(data.innings/data.playerCount) + 1);
                const curS = data.scores[data.currentPlayer];
                let statusText = t.break;
                if (data.breakDone) {
                    statusText = (data.tableStatus === 'locked') ? (data.lastType === 'pocket' ? t.rc : t.rp) : t.open;
                }
                document.getElementById('status-msg').innerText = statusText;
                document.getElementById('b-1').classList.toggle('ball-dimmed', !data.breakDone || (curS >= 90));
                document.getElementById('b-5').classList.toggle('ball-dimmed', !data.breakDone || (curS >= 90));
            }
        });
    </script>
</body>
</html>
