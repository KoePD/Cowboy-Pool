<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 1080px; width: 1920px;
            display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center;
        }

        .scoreline-wrapper {
            margin-bottom: 50px; display: flex; flex-direction: column;
            align-items: center; width: 100%; max-width: 1200px;
        }

        .compact-top {
            display: flex; align-items: center; gap: 20px;
            background: #000; padding: 8px 30px;
            border-radius: 20px 20px 0 0; border: 3px solid #111; border-bottom: none;
            position: relative; overflow: hidden; z-index: 10;
        }

        .gradient-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, #083c2c 0%, #00af79 50%, #083c2c 100%);
            z-index: 1;
        }

        .inning-text {
            font-size: 16px; font-weight: 900; color: #f1c40f;
            text-transform: uppercase; position: relative; z-index: 2;
            border-right: 2px solid rgba(255,255,255,0.2); padding-right: 15px;
        }

        .status-msg {
            font-size: 16px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 1px; position: relative; z-index: 2; color: white;
        }

        .balls-row { display: flex; gap: 10px; position: relative; z-index: 2; }

        .table-ball {
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: black; font-size: 13px;
            border: 2px solid #000;
        }

        .ball-1 { background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00); }
        .ball-3 { background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22); }
        .ball-5 { background: radial-gradient(circle at 35% 35%, #f39c12, #a36504); }
        .ball-dimmed { opacity: 0.15; filter: grayscale(1); }

        .scoreline {
            display: flex; justify-content: center; align-items: center;
            border-radius: 40px; background: #000; border: 3px solid #111;
            overflow: hidden; width: 100%; height: 60px; position: relative; z-index: 5;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .player3-row {
            display: none; width: 50%; height: 60px; background: #000; margin-top: -12px;
            border-radius: 0 0 30px 30px; border: 3px solid #111; border-top: none;
            overflow: hidden; position: relative; z-index: 4;
        }

        .player { display: flex; align-items: center; flex: 1; height: 100%; color: white; position: relative; z-index: 2; min-width: 0; }
        .player--A { padding-left: 20px; }
        .player--B { padding-right: 20px; justify-content: flex-end; }
        
        .is-not-turn { opacity: 0.3; }
        .name { font-size: 32px; font-weight: 800; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* DEN HVITE KULA MED RØDE PRIKKER */
        .break-ball {
            width: 28px; height: 28px; border-radius: 50%; display: inline-block; margin: 0 15px;
            background: 
                radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.7) 0%, rgba(255, 255, 255, 0) 25%),
                radial-gradient(circle at 50% 15%, #ff0000 12%, transparent 14%),
                radial-gradient(circle at 20% 70%, #ff0000 12%, transparent 14%),
                radial-gradient(circle at 85% 55%, #ff0000 12%, transparent 14%),
                radial-gradient(circle at 35% 35%, #ffffff 0%, #eeeeee 60%, #cccccc 100%);
            border: 2px solid #111; box-shadow: 0 0 15px rgba(255,255,255,0.5);
            flex-shrink: 0;
        }

        .score-box {
            background: #000; min-width: 150px; height: 100%; display: flex;
            justify-content: center; align-items: center; font-size: 64px; font-weight: 900;
            color: #f1c40f; z-index: 10; border-left: 3px solid #111; border-right: 3px solid #111;
        }

        .score-box-p3 {
            background: #000; min-width: 100px; height: 100%; display: flex;
            justify-content: center; align-items: center; font-size: 36px; font-weight: 900;
            color: #f1c40f; border-left: 3px solid #111; position: relative; z-index: 10;
        }

        .fouls { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            gap: 4px; 
            margin: 0 15px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(0,0,0,0.5); }
        .dot.active { background: #ff0000; box-shadow: 0 0 12px #ff0000; border-color: #ffaaaa; }
    </style>
</head>
<body>
    <div class="scoreline-wrapper">
        <div class="compact-top">
            <div class="gradient-bg"></div>
            <div class="inning-text" id="inning-text">Inn 1</div>
            <div class="balls-row">
                <div id="table-ball-1" class="table-ball ball-1">1</div>
                <div id="table-ball-3" class="table-ball ball-3">3</div>
                <div id="table-ball-5" class="table-ball ball-5">5</div>
            </div>
            <div id="status-msg" class="status-msg"></div>
        </div>

        <div class="scoreline">
            <div class="gradient-bg"></div>
            <div class="player player--A" id="p0-row">
                <div class="fouls" id="p0-fouls"></div>
                <div id="p0-break" style="display:none;" class="break-ball"></div>
                <div class="name" id="p0-name">Spiller 1</div>
            </div>
            <div class="score-box">
                <span id="p0-score">0</span>
                <span style="color:#333; margin: 0 15px;">-</span>
                <span id="p1-score">0</span>
            </div>
            <div class="player player--B" id="p1-row">
                <div class="name" id="p1-name">Spiller 2</div>
                <div id="p1-break" style="display:none;" class="break-ball"></div>
                <div class="fouls" id="p1-fouls"></div>
            </div>
        </div>

        <div class="player3-row" id="p2-container">
            <div class="gradient-bg"></div>
            <div class="player player--C" style="justify-content: space-between; padding: 0;" id="p2-row">
                <div style="display: flex; align-items: center; padding-left: 20px;">
                    <div class="fouls" id="p2-fouls"></div>
                    <div id="p2-break" style="display:none;" class="break-ball"></div>
                    <div class="name" style="font-size: 20px; margin-left: 10px;" id="p2-name">Spiller 3</div>
                </div>
                <div class="score-box-p3" id="p2-score">0</div>
            </div>
        </div>
    </div>

    <script>
        function update() {
            const scores = JSON.parse(localStorage.getItem('cb_scores')) || [0, 0, 0];
            const fouls = JSON.parse(localStorage.getItem('cb_fouls')) || [0, 0, 0];
            const active = parseInt(localStorage.getItem('cb_player')) || 0;
            const pCount = parseInt(localStorage.getItem('cb_pCount')) || 2;
            const breakDone = JSON.parse(localStorage.getItem('cb_break'));
            const tableStatus = localStorage.getItem('cb_tableStatus') || 'open';
            const lastType = localStorage.getItem('cb_lastType') || null;
            const innings = parseInt(localStorage.getItem('cb_innings')) || 0;

            document.getElementById('p0-name').innerText = localStorage.getItem('p0name') || "Spiller 1";
            document.getElementById('p1-name').innerText = localStorage.getItem('p1name') || "Spiller 2";
            document.getElementById('p0-score').innerText = scores[0];
            document.getElementById('p1-score').innerText = scores[1];
            document.getElementById('inning-text').innerText = "Inn " + (Math.floor(innings/pCount) + 1);

            const msgEl = document.getElementById('status-msg');
            const b1 = document.getElementById('table-ball-1');
            const b3 = document.getElementById('table-ball-3');
            const b5 = document.getElementById('table-ball-5');
            const curS = scores[active];

            [b1, b3, b5].forEach(b => b.classList.remove('ball-dimmed'));
            msgEl.innerText = "";

            if (!breakDone) {
                b1.classList.add('ball-dimmed'); b5.classList.add('ball-dimmed');
                msgEl.innerText = "Break";
                msgEl.style.color = "white";
            } else if (curS >= 90 || (tableStatus === 'locked' && lastType === 'pocket')) {
                [b1, b3, b5].forEach(b => b.classList.add('ball-dimmed'));
                msgEl.innerText = "Krav: Carom"; 
                msgEl.style.color = "#3498db";
            } else if (tableStatus === 'locked' && lastType === 'carom') {
                msgEl.innerText = "Krav: Pocket"; 
                msgEl.style.color = "#f39c12";
            } else { 
                msgEl.innerText = "Open"; 
                msgEl.style.color = "white"; 
            }

            const p2Cont = document.getElementById('p2-container');
            if (pCount >= 3) {
                p2Cont.style.display = "block";
                document.getElementById('p2-name').innerText = localStorage.getItem('p2name') || "Spiller 3";
                document.getElementById('p2-score').innerText = scores[2];
            } else { 
                p2Cont.style.display = "none"; 
            }

            for (let p = 0; p < 3; p++) {
                const row = document.getElementById(`p${p}-row`);
                const bIcon = document.getElementById(`p${p}-break`);
                if (row) {
                    row.classList.toggle('is-not-turn', active !== p);
                    // Den hvite ballen vises KUN hvis breakDone er false og det er spillerens tur
                    if (bIcon) bIcon.style.display = (!breakDone && active === p) ? "inline-block" : "none";
                    
                    let fHtml = '';
                    for (let d = 0; d < 3; d++) fHtml += `<div class="dot ${d < fouls[p] ? 'active' : ''}"></div>`;
                    const fDiv = document.getElementById(`p${p}-fouls`);
                    if (fDiv) fDiv.innerHTML = fHtml;
                }
            }
        }
        setInterval(update, 300); // Litt raskere for mer responsiv følelse
        update();
    </script>
</body>
</html>
