<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            /* Endret fra flex-end til center for at du skal se den i browseren */
            background-color: #1a1a1a; /* Mørk grå bakgrunn for test - fjern denne i OBS for gjennomsiktighet */
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 1080px; width: 1920px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .scoreline-wrapper {
            display: flex; flex-direction: column;
            align-items: center; width: 100%; max-width: 1200px;
        }

        /* TOPP-LINJE - NÅ ENDA TYDELIGERE */
        .compact-top {
            display: flex; align-items: center; gap: 30px;
            background: #000; padding: 12px 50px;
            border-radius: 25px 25px 0 0; border: 3px solid #111; border-bottom: none;
            position: relative; overflow: hidden; z-index: 10;
            height: 60px; 
        }

        .gradient-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, #083c2c 0%, #00af79 50%, #083c2c 100%);
            z-index: 1;
        }

        .inning-text {
            font-size: 22px; font-weight: 900; color: #f1c40f;
            text-transform: uppercase; position: relative; z-index: 2;
            border-right: 3px solid rgba(255,255,255,0.3); padding-right: 25px;
        }

        .status-msg {
            font-size: 20px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 1px; position: relative; z-index: 2; color: white;
        }

        .balls-row { display: flex; gap: 15px; position: relative; z-index: 2; }

        /* KULE-STIL - STORE OG TYDELIGE */
        .table-ball {
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #000;
            position: relative;
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.6);
        }

        .ball-num-circle {
            width: 26px; height: 26px;
            background: white; border-radius: 50%;
            border: 1px solid #000;
            display: flex; align-items: center; justify-content: center;
            color: black; font-size: 18px; font-weight: 900;
        }

        .ball-1 { background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00); }
        .ball-3 { background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22); }
        .ball-5 { background: radial-gradient(circle at 35% 35%, #f39c12, #a36504); }
        .ball-dimmed { opacity: 0.15; filter: grayscale(1); }

        /* HOVEDSCORE */
        .scoreline {
            display: flex; justify-content: center; align-items: center;
            border-radius: 45px; background: #000; border: 4px solid #111;
            overflow: hidden; width: 100%; height: 110px; position: relative; z-index: 5;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        /* SPILLER 3 RAD */
        .player3-row {
            display: none; width: 55%; height: 75px; background: #000; margin-top: -15px;
            border-radius: 0 0 35px 35px; border: 4px solid #111; border-top: none;
            overflow: hidden; position: relative; z-index: 4;
        }

        .player { display: flex; align-items: center; flex: 1; height: 100%; color: white; position: relative; z-index: 2; }
        .player--A { padding-left: 30px; }
        .player--B { padding-right: 30px; justify-content: flex-end; }
        
        .is-not-turn { opacity: 0.3; }
        .name { font-size: 38px; font-weight: 800; text-transform: uppercase; }

        /* POENGBOKSER - PERFEKT SENTRERT */
        .score-box {
            background: #000; min-width: 180px; height: 100%; display: flex;
            justify-content: center; align-items: center; 
            font-size: 75px; font-weight: 900; color: #f1c40f;
            border-left: 4px solid #111; border-right: 4px solid #111;
            z-index: 10;
        }

        .score-box-p3 {
            background: #000; min-width: 130px; height: 100%; display: flex;
            justify-content: center; align-items: center; 
            font-size: 45px; font-weight: 900; color: #f1c40f;
            border-left: 4px solid #111; z-index: 10;
        }

        /* FOULS - VERTIKALE */
        .fouls { display: flex; flex-direction: column; gap: 6px; margin: 0 20px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid #000; }
        .dot.active { background: #ff0000; box-shadow: 0 0 15px #ff0000; }
    </style>
</head>
<body>
    <div class="scoreline-wrapper">
        <div class="compact-top">
            <div class="gradient-bg"></div>
            <div class="inning-text" id="inning-text">Inn 1</div>
            <div class="balls-row">
                <div id="table-ball-1" class="table-ball ball-1"><div class="ball-num-circle">1</div></div>
                <div id="table-ball-3" class="table-ball ball-3"><div class="ball-num-circle">3</div></div>
                <div id="table-ball-5" class="table-ball ball-5"><div class="ball-num-circle">5</div></div>
            </div>
            <div id="status-msg" class="status-msg">Open</div>
        </div>

        <div class="scoreline">
            <div class="gradient-bg"></div>
            <div class="player player--A" id="p0-row">
                <div class="fouls" id="p0-fouls"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                <div class="name" id="p0-name">SIMEN</div>
            </div>
            <div class="score-box">
                <span id="p0-score">0</span>
                <span style="color:#333; margin: 0 20px;">-</span>
                <span id="p1-score">0</span>
            </div>
            <div class="player player--B" id="p1-row">
                <div class="name" id="p1-name">LASSE</div>
                <div class="fouls" id="p1-fouls"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            </div>
        </div>

        <div class="player3-row" id="p2-container">
            <div class="gradient-bg"></div>
            <div class="player player--C" style="justify-content: space-between; padding: 0;" id="p2-row">
                <div style="display: flex; align-items: center; padding-left: 25px;">
                    <div class="fouls" id="p2-fouls"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    <div class="name" style="font-size: 26px; margin-left: 20px;" id="p2-name">OLE ANDREAS</div>
                </div>
                <div class="score-box-p3" id="p2-score">0</div>
            </div>
        </div>
    </div>

    <script>
        function update() {
            const scores = JSON.parse(localStorage.getItem('cb_scores')) || [0, 0, 0];
            const fouls = JSON.parse(localStorage.getItem('cb_fouls')) || [0, 0, 0];
            const active = parseInt(localStorage.getItem('cb_player')) || 0;
            const pCount = parseInt(localStorage.getItem('cb_pCount')) || 2;
            const innings = parseInt(localStorage.getItem('cb_innings')) || 0;

            document.getElementById('p0-name').innerText = localStorage.getItem('p0name') || "Spiller 1";
            document.getElementById('p1-name').innerText = localStorage.getItem('p1name') || "Spiller 2";
            document.getElementById('p0-score').innerText = scores[0];
            document.getElementById('p1-score').innerText = scores[1];
            document.getElementById('inning-text').innerText = "Inn " + (Math.floor(innings/pCount) + 1);

            const p2Cont = document.getElementById('p2-container');
            if (pCount >= 3) {
                p2Cont.style.display = "block";
                document.getElementById('p2-name').innerText = localStorage.getItem('p2name') || "Spiller 3";
                document.getElementById('p2-score').innerText = scores[2];
            } else { p2Cont.style.display = "none"; }

            for (let p = 0; p < 3; p++) {
                const row = document.getElementById(`p${p}-row`);
                if (row) {
                    row.classList.toggle('is-not-turn', active !== p);
                    const dots = document.getElementById(`p${p}-fouls`).children;
                    for (let d = 0; d < 3; d++) dots[d].className = (d < fouls[p]) ? 'dot active' : 'dot';
                }
            }
        }
        setInterval(update, 500);
        update();
    </script>
</body>
</html>
