<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        body { background-color: rgba(0, 0, 0, 0); margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; height: 1080px; width: 1920px; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; }
        .scoreline-wrapper { margin-bottom: 50px; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 1200px; }
        
        /* TOPP-BAR (Innings og baller) */
        .compact-top { display: flex; align-items: center; gap: 20px; background: #000; padding: 5px 30px; border-radius: 20px 20px 0 0; border: 3px solid #111; border-bottom: none; position: relative; height: 42px; overflow: hidden; }
        .gradient-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, #083c2c 0%, #00af79 50%, #083c2c 100%); z-index: 1; }
        
        /* HOVED-SCOREBOARD */
        .scoreline { display: flex; justify-content: center; align-items: center; border-radius: 45px; background: #000; border: 3px solid #111; width: 100%; height: 95px; position: relative; z-index: 5; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        
        /* SERIE OG PERS LOGIKK */
        .series-container { display: flex; gap: 15px; margin-top: 5px; }
        .series-item { display: flex; flex-direction: column; align-items: center; }
        .series-label { font-size: 10px; color: #aaa; text-transform: uppercase; font-weight: 900; }
        .series-value { font-size: 18px; color: #f1c40f; font-weight: 900; }

        /* 3D KULER */
        .ball { width: 32px; height: 32px; border-radius: 50%; position: relative; background-color: #fff; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .ball-overlay-3d { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; z-index: 10; box-shadow: inset -3px -3px 6px rgba(0,0,0,0.4), inset 2px 2px 5px rgba(255,255,255,0.2); border: 1px solid rgba(0,0,0,0.15); box-sizing: border-box; }
        .ball-num { width: 16px; height: 16px; background: white; border-radius: 50%; color: black; font-size: 11px; font-weight: 900; display: flex; align-items: center; justify-content: center; z-index: 5; border: 1px solid #000; }
        .f-1 { background: #ffcc00; } .f-3 { background: #cc0000; } .f-5 { background: #663399; }
        .ball-dimmed { opacity: 0.15; filter: grayscale(1); }

        /* BREKKBALL */
        .break-ball-3d { background-color: #fdfcf0 !important; width: 28px !important; height: 28px !important; margin: 0 10px; position: relative; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .break-dot { position: absolute; width: 4px; height: 4px; background: #d00000; border-radius: 50%; z-index: 6; top: 50%; left: 50%; margin: -2px 0 0 -2px; }
        .break-dot:nth-child(1) { transform: translate(-6px, -3px); }
        .break-dot:nth-child(2) { transform: translate(6px, -3px); }
        .break-dot:nth-child(3) { transform: translate(0, 7px); }

        .name { font-size: 34px; font-weight: 800; text-transform: uppercase; }
        .score-box { background: #000; min-width: 170px; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 68px; font-weight: 900; color: #f1c40f; border-left: 3px solid #111; border-right: 3px solid #111; z-index: 10; }
        .player-info { display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; z-index: 2; color: white; transition: opacity 0.3s; }
        .is-not-turn { opacity: 0.3; }
        
        .fouls { display: flex; flex-direction: row; gap: 4px; margin-top: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.1); }
        .dot.active { background: #ff0000; box-shadow: 0 0 8px #ff0000; }
    </style>
</head>
<body>
    <div class="scoreline-wrapper">
        <div class="compact-top">
            <div class="gradient-bg"></div>
            <div style="color:#f1c40f; font-weight:900; z-index:2; font-size:16px;" id="inning-text">INN 1</div>
            <div class="balls-row" style="display:flex; gap:10px; z-index:2; margin-left:15px;">
                <div id="b-1" class="ball f-1"><div class="ball-num">1</div><div class="ball-overlay-3d"></div></div>
                <div id="b-3" class="ball f-3"><div class="ball-num">3</div><div class="ball-overlay-3d"></div></div>
                <div id="b-5" class="ball f-5"><div class="ball-num">5</div><div class="ball-overlay-3d"></div></div>
            </div>
            <div id="status-msg" style="color:white; font-weight:900; z-index:2; margin-left:20px; font-size:15px;">BREAK</div>
        </div>
        
        <div class="scoreline">
            <div class="gradient-bg"></div>
            <div class="player-info" id="p0-row">
                <div style="display:flex; align-items:center;">
                    <div id="p0-break" class="break-ball-3d"><div class="break-dot"></div><div class="break-dot"></div><div class="break-dot"></div><div class="ball-overlay-3d"></div></div>
                    <div class="name" id="p0-name">PLAYER 1</div>
                </div>
                <div class="series-container">
                    <div class="series-item"><span class="series-label" id="label-now-0">NÅ</span><span class="series-value" id="p0-now">0</span></div>
                    <div class="series-item"><span class="series-label" id="label-best-0">PERS</span><span class="series-value" id="best-0">0</span></div>
                    <div class="fouls" id="p0-fouls" style="margin-left:10px; align-self:center;"></div>
                </div>
            </div>

            <div class="score-box">
                <div id="p0-score">0</div>
                <div style="color:#333; margin:0 15px; font-size:40px; display:flex; align-items:center;">-</div>
                <div id="p1-score">0</div>
            </div>

            <div class="player-info" id="p1-row">
                <div style="display:flex; align-items:center;">
                    <div class="name" id="p1-name">PLAYER 2</div>
                    <div id="p1-break" class="break-ball-3d"><div class="break-dot"></div><div class="break-dot"></div><div class="break-dot"></div><div class="ball-overlay-3d"></div></div>
                </div>
                <div class="series-container">
                    <div class="fouls" id="p1-fouls" style="margin-right:10px; align-self:center;"></div>
                    <div class="series-item"><span class="series-label" id="label-now-1">NÅ</span><span class="series-value" id="p1-now">0</span></div>
                    <div class="series-item"><span class="series-label" id="label-best-1">PERS</span><span class="series-value" id="best-1">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('gameData');

        const i18n = {
            no: { now: "NÅ", best: "PERS", inning: "INN", break: "BREAK", open: "ÅPEN", reqCarom: "KRAV: CAROM", reqPocket: "KRAV: POCKET" },
            en: { now: "NOW", best: "BEST", inning: "INN", break: "BREAK", open: "OPEN", reqCarom: "REQ: CAROM", reqPocket: "REQ: POCKET" }
        };

        db.on('value', snap => {
            const data = snap.val();
            if (data) {
                const lang = data.lang || 'no';
                const t = i18n[lang];

                // Oppdater navn og poeng
                document.getElementById('p0-name').innerText = data.names[0];
                document.getElementById('p1-name').innerText = data.names[1];
                document.getElementById('p0-score').innerText = data.scores[0];
                document.getElementById('p1-score').innerText = data.scores[1];
                
                // Oppdater serier
                document.getElementById('p0-now').innerText = data.scores[0] - data.scoreAtStart[0];
                document.getElementById('p1-now').innerText = data.scores[1] - data.scoreAtStart[1];
                document.getElementById('best-0').innerText = data.bestSeries ? (data.bestSeries[0] || 0) : 0;
                document.getElementById('best-1').innerText = data.bestSeries ? (data.bestSeries[1] || 0) : 0;

                // Språk-oppdatering av labels
                document.getElementById('label-now-0').innerText = t.now;
                document.getElementById('label-now-1').innerText = t.now;
                document.getElementById('label-best-0').innerText = t.best;
                document.getElementById('label-best-1').innerText = t.best;
                document.getElementById('inning-text').innerText = t.inning + " " + (Math.floor(data.innings/data.playerCount) + 1);

                // Status melding og baller
                const curS = data.scores[data.currentPlayer];
                let statusText = t.open;
                if (!data.breakDone) statusText = t.break;
                else if (data.tableStatus === 'locked') statusText = (data.lastType === 'pocket' ? t.reqCarom : t.reqPocket);
                document.getElementById('status-msg').innerText = statusText;

                document.getElementById('b-1').classList.toggle('ball-dimmed', !data.breakDone || (curS >= 90));
                document.getElementById('b-5').classList.toggle('ball-dimmed', !data.breakDone || (curS >= 90));

                for(let p=0; p<2; p++) {
                    document.getElementById(`p${p}-row`).classList.toggle('is-not-turn', data.currentPlayer !== p);
                    document.getElementById(`p${p}-break`).style.visibility = (!data.breakDone && data.currentPlayer === p) ? "visible" : "hidden";
                    
                    let fHtml = '';
                    for(let d=0; d<3; d++) fHtml += `<div class="dot ${d < data.foulCounts[p] ? 'active' : ''}"></div>`;
                    document.getElementById(`p${p}-fouls`).innerHTML = fHtml;
                }
            }
        });
    </script>
</body>
</html>
