<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Pusher alt til bunnen */
            align-items: center;
        }

        .scoreline-wrapper {
            margin-bottom: 20px; /* Avstand fra bunnen av skjermen */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
        }

        .scoreline {
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 30px;
            background: #000000;
            border: 1px solid #000000;
            overflow: hidden;
            width: 100%;
            height: 73px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }

        .player {
            display: flex;
            align-items: center;
            flex: 1;
            height: 100%;
            color: white;
            position: relative;
            transition: opacity 0.3s;
        }

        /* Gradienter basert på din kode */
        .player--A {
            background: linear-gradient(90deg, #083c2c 50%, #00af79);
            padding-left: 20px;
            justify-content: flex-start;
        }

        .player--B {
            background: linear-gradient(90deg, #00af79, #083c2c 50%);
            padding-right: 20px;
            justify-content: flex-end;
            text-align: right;
        }

        /* Inaktiv spiller blir litt mørkere/gjennomsiktig */
        .is-not-turn {
            opacity: 0.6;
        }

        .name {
            font-size: 26px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .score-box {
            background: #000;
            min-width: 100px;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            font-weight: 900;
            color: #f1c40f;
            z-index: 10;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
        }

        .fouls {
            display: flex;
            gap: 6px;
            margin: 0 15px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .dot.active {
            background: #ff0000;
            box-shadow: 0 0 12px #ff0000;
            border-color: #ffaaaa;
        }

        .inning-tag {
            background: rgba(0, 0, 0, 0.8);
            color: #f1c40f;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 15px;
            border-radius: 0 0 10px 10px;
            text-transform: uppercase;
            border: 1px solid #000;
            border-top: none;
        }
    </style>
</head>
<body>

    <div class="scoreline-wrapper">
        <div class="scoreline">
            <div class="player player--A" id="p0-row">
                <div class="fouls" id="p0-fouls"></div>
                <div class="name" id="p0-name">PLAYER A</div>
            </div>

            <div class="score-box">
                <span id="p0-score">0</span>
                <span style="color:#444; margin: 0 10px;">-</span>
                <span id="p1-score">0</span>
            </div>

            <div class="player player--B" id="p1-row">
                <div class="name" id="p1-name">PLAYER B</div>
                <div class="fouls" id="p1-fouls"></div>
            </div>
        </div>
        <div class="inning-tag" id="inning-text">INNING 1</div>
    </div>

    <script>
        function updateScoreboard() {
            const scores = JSON.parse(localStorage.getItem('cb_scores')) || [0, 0, 0];
            const fouls = JSON.parse(localStorage.getItem('cb_fouls')) || [0, 0, 0];
            const activePlayer = parseInt(localStorage.getItem('cb_player')) || 0;
            const innings = parseInt(localStorage.getItem('cb_innings')) || 0;
            const playerCount = parseInt(localStorage.getItem('cb_pCount')) || 2;

            // Navn og Score
            document.getElementById('p0-name').innerText = localStorage.getItem('p0name') || "SPILLER 1";
            document.getElementById('p1-name').innerText = localStorage.getItem('p1name') || "SPILLER 2";
            document.getElementById('p0-score').innerText = scores[0];
            document.getElementById('p1-score').innerText = scores[1];
            document.getElementById('inning-text').innerText = "Inning " + (Math.floor(innings/playerCount) + 1);

            // Turn og Fouls
            for (let p = 0; p < 2; p++) {
                // Gjør inaktiv spiller litt mørkere
                document.getElementById(`p${p}-row`).className = (activePlayer === p) ? `player player--${p===0?'A':'B'}` : `player player--${p===0?'A':'B'} is-not-turn`;
                
                let foulHtml = '';
                for (let d = 0; d < 3; d++) {
                    foulHtml += `<div class="dot ${d < fouls[p] ? 'active' : ''}"></div>`;
                }
                document.getElementById(`p${p}-fouls`).innerHTML = foulHtml;
            }
        }

        setInterval(updateScoreboard, 1000);
        updateScoreboard();
    </script>
</body>
</html>
