<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        body { background-color: rgba(0, 0, 0, 0); margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; height: 1080px; width: 1920px; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; }
        .scoreline-wrapper { margin-bottom: 50px; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 1250px; }
        
        .compact-top { display: flex; align-items: center; gap: 20px; background: #000; padding: 5px 30px; border-radius: 20px 20px 0 0; border: 3px solid #111; border-bottom: none; position: relative; height: 42px; overflow: hidden; }
        .gradient-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, #083c2c 0%, #00af79 50%, #083c2c 100%); z-index: 1; }
        .scoreline { display: flex; justify-content: center; align-items: center; border-radius: 45px; background: #000; border: 3px solid #111; width: 100%; height: 110px; position: relative; z-index: 5; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        
        /* 3-SPILLER RAD */
        .player3-row { display: none; width: 50%; height: 75px; background: #000; margin-top: -10px; border-radius: 0 0 35px 35px; border: 3px solid #111; border-top: none; position: relative; z-index: 4; overflow: hidden; }

        /* NY SERIE-LAYOUT (Sider) */
        .series-sidebar { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 80px; height: 100%; background: rgba(0,0,0,0.4); }
        .series-label { font-size: 10px; color: #aaa; text-transform: uppercase; font-weight: 900; line-height: 1; }
        .series-value { font-size: 22px; color: #f1c40f; font-weight: 900; }

        .player-main { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: white; position: relative; z-index: 2; height: 100%; }
        .name { font-size: 36px; font-weight: 800; text-transform: uppercase; line-height: 1.1; }
        
        .score-box { background: #000; min-width: 180px; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 72px; font-weight: 900; color: #f1c40f; border-left: 3px solid #111; border-right: 3px solid #111; z-index: 10; }
        
        /* 3D KULER */
        .ball { width: 32px; height: 32px; border-radius: 50%; position: relative; background-color: #fff; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .ball-overlay-3d { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; z-index: 10; box-shadow: inset -3px -3px 6px rgba(0,0,0,0.4), inset 2px 2px 5px rgba(255,255,255,0.2); border: 1px solid rgba(0,0,0,0.15); box-sizing: border-box; }
        .ball-num { width: 16px; height: 16px; background: white; border-radius: 50%; color: black; font-size: 11px; font-weight: 900; display: flex; align-items: center; justify-content: center; z-index: 5; border: 1px solid #000; }
        .f-1 { background: #ffcc00; } .f-3 { background: #cc0000; } .f-5 { background: #663399; }
        .ball-dimmed { opacity: 0.15; filter: grayscale(1); }

        .break-ball-3d { background-color: #fdfcf0 !important; width: 26px !important; height: 26px !important; position: relative; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 0 10px; }
        .break-dot { position: absolute; width: 4px; height: 4px; background: #d00000; border-radius: 50%; z-index: 6; top: 50%; left: 50%; margin: -2px 0 0 -2px; }
        .break-dot:nth-child(1) { transform: translate(-5px, -3px); }
        .break-dot:nth-child(2) { transform: translate(5px, -3px); }
        .break-dot:nth-child(3) { transform: translate(0, 6px); }

        .is-not-turn { opacity: 0.25; }
        .fouls { display: flex; flex-direction: row; gap: 5px; margin-top: 8px; }
        .dot { width: 11px; height: 11px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(0,0,0,0.3); }
        .dot.active { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
    </style>
</head>
<body>
    <div class="scoreline-wrapper">
        <div class="compact-top">
            <div class="gradient-bg"></div>
            <div style="color:#f1c40f; font-weight:900; z-index:2; font-size:16px;" id="inning-text">INN 1</div>
            <div class="balls-row" style="display:flex; gap:10px; z-index:2; margin-left:15px;">
                <div id="b-1" class="ball f-1"><div class="ball-num">1</div><div class="ball-overlay-3d"></div></div>
                <div id="b-3" class="ball f-3"><div class="ball-num">3</div><div class="ball-overlay-3d"></div></div>
                <div id="b-5" class="ball f-5"><div class="ball-num">5</div><div class="ball-overlay-3d"></div></div>
            </div>
            <div id="status-msg" style="color:white; font-weight:900; z-index:2; margin-left:20px; font-size:15px;">BREAK</div>
        </div>
        
        <div class="scoreline">
            <div class="gradient-bg"></div>
            
            <div class="series-sidebar" style="border-radius: 35px 0 0 35px;">
                <span class="series-label" id="l-best-0">PERS</span>
                <span class="series-value" id="best-0">0</span>
            </div>
            <div class="series-sidebar">
                <span class="series-label" id="l-now-0">NÅ</span>
                <span class="series-value" id="p0-now">0</span>
            </div>
            
            <div class="player-main" id="p0-row">
                <div class="name" id="p0-name">PLAYER 1</div>
                <div style="display:flex; align-items:center;">
                    <div id="p0-break" class="break-ball-3d"><div class="break-dot"></div><div class="break-dot"></div><div class="break-dot"></div><div class="ball-overlay-3d"></div></div>
                    <div class="fouls" id="p0-fouls"></div>
                </div>
            </div>

            <div class="score-box">
                <div id="p0-score">0</div>
                <div style="color:#333; margin:0 15px;">-</div>
                <div id="p1-score">0</div>
            </div>

            <div class="player-main" id="p1-row">
                <div class="name" id="p1-name">PLAYER 2</div>
                <div style="display:flex; align-items:center;">
                    <div class="fouls" id="p1-fouls"></div>
                    <div id="p1-break" class="break-ball-3d"><div class="break-dot"></div><div class="break-dot"></div><div class="break-dot"></div><div class="ball-overlay-3d"></div></div>
                </div>
            </div>
            
            <div class="series-sidebar">
                <span class="series-label" id="l-now-1">NÅ</span>
                <span class="series-value" id="p1-now">0</span>
            </div>
            <div class="series-sidebar" style="border-radius: 0 35px 35px 0;">
                <span class="series-label" id="l-best-1">PERS</span>
                <span class="series-value" id="best-1">0</span>
            </div>
        </div>

        <div class="player3-row" id="p2-container">
            <div class="gradient-bg"></div>
            <div style="display:flex; height:100%; align-items:center;">
                <div class="series-sidebar" style="min-width:60px;">
                    <span class="series-label" style="font-size:8px;">PERS</span>
                    <span class="series-value" id="best-2" style="font-size:16px;">0</span>
                </div>
                <div class="series-sidebar" style="min-width:60px; margin-right:15px;">
                    <span class="series-label" style="font-size:8px;">NÅ</span>
                    <span class="series-value" id="p2-now" style="font-size:16px;">0</span>
                </div>
                <div class="player-main" id="p2-row" style="align-items:flex-start;">
                    <div class="name" id="p2-name" style="font-size:24px;">PLAYER 3</div>
                    <div style="display:flex; align-items:center;">
                        <div id="p2-break" class="break-ball-3d" style="width:22px; height:22px;"><div class="break-dot"></div><div class="break-dot"></div><div class="break-dot"></div><div class="ball-overlay-3d"></div></div>
                        <div class="fouls" id="p2-fouls"></div>
                    </div>
                </div>
                <div class="score-box" id="p2-score" style="min-width:100px; font-size:48px; border-right:none;">0</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('gameData');

        const i18n = {
            no: { now: "NÅ", best: "PERS", inning: "INN", break: "BREAK", open: "ÅPEN", reqCarom: "KRAV: CAROM", reqPocket: "KRAV: POCKET" },
            en: { now: "NOW", best: "BEST", inning: "INN", break: "BREAK", open: "OPEN", reqCarom: "REQ: CAROM", reqPocket: "REQ: POCKET" }
        };

        db.on('value', snap => {
            const data = snap.val();
            if (data) {
                const lang = data.lang || 'no';
                const t = i18n[lang];

                // Spiller 3 synlighet
                const p2Cont = document.getElementById('p2-container');
                if(data.playerCount >= 3) { p2Cont.style.display = "block"; } else { p2Cont.style.display = "none"; }

                for(let p=0; p < data.playerCount; p++) {
                    if (document.getElementById(`p${p}-name`)) document.getElementById(`p${p}-name`).innerText = data.names[p];
                    if (document.getElementById(`p${p}-score`)) document.getElementById(`p${p}-score`).innerText = data.scores[p];
                    if (document.getElementById(`p${p}-now`)) document.getElementById(`p${p}-now`).innerText = data.scores[p] - data.scoreAtStart[p];
                    if (document.getElementById(`best-${p}`)) document.getElementById(`best-${p}`).innerText = data.bestSeries ? (data.bestSeries[p] || 0) : 0;
                    
                    if (document.getElementById(`l-now-${p}`)) document.getElementById(`l-now-${p}`).innerText = t.now;
                    if (document.getElementById(`l-best-${p}`)) document.getElementById(`l-best-${p}`).innerText = t.best;

                    const row = document.getElementById(`p${p}-row`);
                    if(row) row.classList.toggle('is-not-turn', data.currentPlayer !== p);
                    
                    const bBall = document.getElementById(`p${p}-break`);
                    if(bBall) bBall.style.visibility = (!data.breakDone && data.currentPlayer === p) ? "visible" : "hidden";

                    let fHtml = '';
                    for(let d=0; d<3; d++) fHtml += `<div class="dot ${d < data.foulCounts[p] ? 'active' : ''}"></div>`;
                    document.getElementById(`p${p}-fouls`).innerHTML = fHtml;
                }

                document.getElementById('inning-text').innerText = t.inning + " " + (Math.floor(data.innings/data.playerCount) + 1);
                
                const curS = data.scores[data.currentPlayer];
                let statusText = t.open;
                if (!data.breakDone) statusText = t.break;
                else if (data.tableStatus === 'locked') statusText = (data.lastType === 'pocket' ? t.reqCarom : t.reqPocket);
                document.getElementById('status-msg').innerText = statusText;

                document.getElementById('b-1').classList.toggle('ball-dimmed', !data.breakDone || (curS >= 90));
                document.getElementById('b-5').classList.toggle('ball-dimmed', !data.breakDone || (curS >= 90));
            }
        });
    </script>
</body>
</html>
