<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Pusher scoreboardet til bunnen */
            align-items: center;
        }

        .scoreline-wrapper {
            margin-bottom: 30px; /* Avstand fra bunnen av streamen */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 95%; 
            max-width: 800px; /* ØKT BREDDE FOR LANGE NAVN */
            position: relative;
        }

        .scoreline {
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 35px;
            background: #000000;
            border: 2px solid #111;
            overflow: hidden;
            width: 100%;
            height: 73px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            position: relative;
        }

        /* SENTRERT GRADIENT-BAKGRUNN */
        .gradient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #083c2c 0%, #00af79 50%, #083c2c 100%);
            z-index: 1;
        }

        .player {
            display: flex;
            align-items: center;
            flex: 1; /* Lar spillerfeltene fylle tilgjengelig plass */
            height: 100%;
            color: white;
            position: relative;
            z-index: 2;
            transition: opacity 0.4s ease;
            min-width: 0; /* Viktig for at ellipsis skal fungere */
        }

        .player--A {
            padding-left: 25px;
            justify-content: flex-start;
        }

        .player--B {
            padding-right: 25px;
            justify-content: flex-end;
            text-align: right;
        }

        /* Inaktiv spiller får mørkere preg */
        .is-not-turn {
            opacity: 0.45;
        }

        .name {
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Kutter navnet med ... hvis det blir for langt */
        }

        .score-box {
            background: #000;
            min-width: 110px; /* Litt bredere score-felt */
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            font-weight: 900;
            color: #f1c40f; /* Cowboy Gul */
            z-index: 10;
            border-left: 3px solid #111;
            border-right: 3px solid #111;
        }

        .fouls {
            display: flex;
            gap: 7px;
            margin: 0 18px;
            flex-shrink: 0; /* Hindrer foul-prikkene i å bli klemt */
        }

        .dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .dot.active {
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
            border-color: #ffaaaa;
        }

        .inning-tag {
            background: rgba(0, 0, 0, 0.95);
            color: #f1c40f;
            font-size: 13px;
            font-weight: 900;
            padding: 5px 20px;
            border-radius: 0 0 12px 12px;
            text-transform: uppercase;
            border: 2px solid #111;
            border-top: none;
            margin-top: -2px;
            z-index: 11;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="scoreline-wrapper">
        <div class="scoreline">
            <div class="gradient-bg"></div>

            <div class="player player--A" id="p0-row">
                <div class="fouls" id="p0-fouls"></div>
                <div class="name" id="p0-name">PLAYER 1</div>
            </div>

            <div class="score-box">
                <span id="p0-score">0</span>
                <span style="color:#333; margin: 0 8px;">-</span>
                <span id="p1-score">0</span>
            </div>

            <div class="player player--B" id="p1-row">
                <div class="name" id="p1-name">PLAYER 2</div>
                <div class="fouls" id="p1-fouls"></div>
            </div>
        </div>
        <div class="inning-tag" id="inning-text">INNING 1</div>
    </div>

    <script>
        function updateScoreboard() {
            // Henter data fra localStorage
            const scores = JSON.parse(localStorage.getItem('cb_scores')) || [0, 0, 0];
            const fouls = JSON.parse(localStorage.getItem('cb_fouls')) || [0, 0, 0];
            const activePlayer = parseInt(localStorage.getItem('cb_player')) || 0;
            const innings = parseInt(localStorage.getItem('cb_innings')) || 0;
            const playerCount = parseInt(localStorage.getItem('cb_pCount')) || 2;

            // Navn
            document.getElementById('p0-name').innerText = localStorage.getItem('p0name') || "SPILLER 1";
            document.getElementById('p1-name').innerText = localStorage.getItem('p1name') || "SPILLER 2";
            
            // Score
            document.getElementById('p0-score').innerText = scores[0];
            document.getElementById('p1-score').innerText = scores[1];
            
            // Inning
            document.getElementById('inning-text').innerText = "Inning " + (Math.floor(innings/playerCount) + 1);

            // Aktiv spiller status og Fouls
            for (let p = 0; p < 2; p++) {
                const row = document.getElementById(`p${p}-row`);
                const baseClass = `player player--${p === 0 ? 'A' : 'B'}`;
                row.className = (activePlayer === p) ? baseClass : baseClass + " is-not-turn";
                
                let foulHtml = '';
                for (let d = 0; d < 3; d++) {
                    foulHtml += `<div class="dot ${d < fouls[p] ? 'active' : ''}"></div>`;
                }
                document.getElementById(`p${p}-fouls`).innerHTML = foulHtml;
            }
        }

        // Sjekker for oppdateringer hvert sekund
        setInterval(updateScoreboard, 1000);
        updateScoreboard();
    </script>
</body>
</html>
