<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        body { background-color: rgba(0, 0, 0, 0); margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; height: 1080px; width: 1920px; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; }
        
        .scoreline-wrapper { margin-bottom: 50px; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 1200px; }
        
        .compact-top { 
            display: flex; align-items: center; gap: 25px; background: #000; padding: 10px 40px; 
            border-radius: 25px 25px 0 0; border: 3px solid #111; border-bottom: none; 
            position: relative; height: 50px; overflow: hidden;
        }

        .gradient-bg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(90deg, #083c2c 0%, #00af79 50%, #083c2c 100%); 
            z-index: 1; 
        }

        .scoreline { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-radius: 45px; 
            background: #000; 
            border: 3px solid #111; 
            width: 100%; 
            height: 200px; 
            position: relative; 
            z-index: 5; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .player3-row { 
            display: none; width: 55%; height: 65px; background: #000; margin-top: -12px; 
            border-radius: 0 0 35px 35px; border: 3px solid #111; border-top: none; 
            position: relative; z-index: 4; overflow: hidden;
        }

        .inning-text { font-size: 20px; font-weight: 900; color: #f1c40f; text-transform: uppercase; position: relative; z-index: 2; padding-right: 20px; border-right: 2px solid rgba(255,255,255,0.2); }
        .status-msg { font-size: 18px; font-weight: 900; text-transform: uppercase; position: relative; z-index: 2; color: white; margin-left: 15px; }
        .balls-row { display: flex; gap: 15px; position: relative; z-index: 2; }
        .table-ball { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #000; display: flex; align-items: center; justify-content: center; }
        .ball-num-circle { width: 22px; height: 22px; background: white; border-radius: 50%; color: black; font-size: 16px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .ball-1 { background: radial-gradient(circle, #f1c40f, #b38f00); }
        .ball-3 { background: radial-gradient(circle, #e74c3c, #962d22); }
        .ball-5 { background: radial-gradient(circle, #f39c12, #a36504); }
        .ball-dimmed { opacity: 0.15; filter: grayscale(1); }
        
        .player { display: flex; align-items: center; flex: 1; color: white; position: relative; z-index: 2; height: 100%; }
        .is-not-turn { opacity: 0.3; }
        .name { font-size: 34px; font-weight: 800; text-transform: uppercase; white-space: nowrap; }

        /* OPPDATERT SCORE-BOX FOR PERFEKT SENTRERING */
        .score-box { 
            background: #000; 
            min-width: 170px; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 68px; 
            font-weight: 900; 
            color: #f1c40f; 
            border-left: 3px solid #111; 
            border-right: 3px solid #111; 
            z-index: 10;
        }

        .score-box-p3 { 
            background: #000; 
            min-width: 110px; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 42px; 
            font-weight: 900; 
            color: #f1c40f; 
            border-left: 3px solid #111; 
            position: relative; 
            z-index: 10;
        }
        
        .fouls { display: flex; flex-direction: column; gap: 5px; margin: 0 20px; }
        .dot { width: 11px; height: 11px; border-radius: 50%; background: rgba(255,255,255,0.1); }
        .dot.active { background: #ff0000; box-shadow: 0 0 12px #ff0000; }
        
        .break-ball { width: 28px; height: 28px; border-radius: 50%; margin: 0 15px; border: 2px solid #111; background: radial-gradient(circle at 35% 35%, #fff 0%, #ccc 100%); position: relative; }
        .break-dot { position: absolute; width: 4px; height: 4px; background: red; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="scoreline-wrapper">
        <div class="compact-top">
            <div class="gradient-bg"></div>
            <div class="inning-text" id="inning-text">Inn 1</div>
            <div class="balls-row">
                <div id="b-1" class="table-ball ball-1"><div class="ball-num-circle">1</div></div>
                <div id="b-3" class="table-ball ball-3"><div class="ball-num-circle">3</div></div>
                <div id="b-5" class="table-ball ball-5"><div class="ball-num-circle">5</div></div>
            </div>
            <div id="status-msg" class="status-msg"></div>
        </div>
        
        <div class="scoreline">
            <div class="gradient-bg"></div>
            <div class="player" id="p0-row" style="padding-left:25px;">
                <div class="fouls" id="p0-fouls"></div>
                <div id="p0-break" style="display:none;" class="break-ball"><div class="break-dot" style="top:5px;left:12px;"></div><div class="break-dot" style="top:18px;left:5px;"></div><div class="break-dot" style="top:18px;left:20px;"></div></div>
                <div class="name" id="p0-name"></div>
            </div>

            <div class="score-box">
                <div id="p0-score">0</div>
                <div style="color:#333; margin:0 15px; font-size:40px; display:flex; align-items:center;">-</div>
                <div id="p1-score">0</div>
            </div>

            <div class="player" id="p1-row" style="padding-right:25px; justify-content:flex-end;">
                <div class="name" id="p1-name"></div>
                <div id="p1-break" style="display:none;" class="break-ball"><div class="break-dot" style="top:5px;left:12px;"></div><div class="break-dot" style="top:18px;left:5px;"></div><div class="break-dot" style="top:18px;left:20px;"></div></div>
                <div class="fouls" id="p1-fouls"></div>
            </div>
        </div>

        <div class="player3-row" id="p2-container">
            <div class="gradient-bg"></div>
            <div class="player" id="p2-row" style="justify-content:space-between; padding:0 25px;">
                <div style="display:flex; align-items:center;">
                    <div class="fouls" id="p2-fouls"></div>
                    <div id="p2-break" style="display:none;" class="break-ball"><div class="break-dot" style="top:5px;left:12px;"></div><div class="break-dot" style="top:18px;left:5px;"></div><div class="break-dot" style="top:18px;left:20px;"></div></div>
                    <div class="name" style="font-size:24px; margin-left:15px;" id="p2-name"></div>
                </div>
                <div class="score-box-p3" id="p2-score">0</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSy...", // Husk din faktiske config her
            authDomain: "cowboy-pool.firebaseapp.com",
            databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "cowboy-pool",
            storageBucket: "cowboy-pool.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:12345:web:abcde"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('gameData');

        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('p0-name').innerText = data.names[0] || "";
                document.getElementById('p1-name').innerText = data.names[1] || "";
                document.getElementById('p0-score').innerText = data.scores[0];
                document.getElementById('p1-score').innerText = data.scores[1];
                document.getElementById('inning-text').innerText = "Inn " + (Math.floor(data.innings/data.playerCount) + 1);
                
                const p2Cont = document.getElementById('p2-container');
                if(data.playerCount >= 3) {
                    p2Cont.style.display = "block";
                    document.getElementById('p2-name').innerText = data.names[2] || "";
                    document.getElementById('p2-score').innerText = data.scores[2];
                } else { p2Cont.style.display = "none"; }

                const msgEl = document.getElementById('status-msg');
                const curS = data.scores[data.currentPlayer];
                if (!data.breakDone) { msgEl.innerText = "Break"; }
                else if (curS >= 90 || (data.tableStatus === 'locked' && data.lastType === 'pocket')) { msgEl.innerText = "Krav: Carom"; }
                else if (data.tableStatus === 'locked' && data.lastType === 'carom') { msgEl.innerText = "Krav: Pocket"; }
                else { msgEl.innerText = "Open"; }

                const b1 = document.getElementById('b-1'); const b5 = document.getElementById('b-5');
                b1.classList.toggle('ball-dimmed', !data.breakDone || (curS >= 90));
                b5.classList.toggle('ball-dimmed', !data.breakDone || (curS >= 90));

                for(let p=0; p<3; p++) {
                    const row = document.getElementById(`p${p}-row`);
                    if(row) row.classList.toggle('is-not-turn', data.currentPlayer !== p);
                    const bBall = document.getElementById(`p${p}-break`);
                    if(bBall) bBall.style.display = (!data.breakDone && data.currentPlayer === p) ? "block" : "none";
                    let fHtml = '';
                    for(let d=0; d<3; d++) fHtml += `<div class="dot ${d < data.foulCounts[p] ? 'active' : ''}"></div>`;
                    const foulsDiv = document.getElementById(`p${p}-fouls`);
                    if(foulsDiv) foulsDiv.innerHTML = fHtml;
                }
            }
        });
    </script>
</body>
</html>
