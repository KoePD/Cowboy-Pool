<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Segoe UI', sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center;
        }

        .scoreline-wrapper {
            margin-bottom: 30px; display: flex; flex-direction: column;
            align-items: center; width: 95%; max-width: 850px; position: relative;
        }

        /* LAST SHOT INDIKATOR - NY! */
        .last-shot-box {
            display: flex; gap: 10px; margin-bottom: 10px;
            height: 35px; align-items: center; transition: opacity 0.5s;
        }

        .shot-tag {
            padding: 4px 12px; border-radius: 6px; font-size: 14px;
            font-weight: 900; text-transform: uppercase; color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .tag-pocket { background: #e67e22; border: 1px solid #ff9f43; }
        .tag-carom { background: #2980b9; border: 1px solid #3498db; }

        .mini-ball {
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 900; color: black;
            border: 1px solid #111; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.5);
        }

        .inning-tag {
            background: rgba(0, 0, 0, 0.95); color: #f1c40f;
            font-size: 13px; font-weight: 900; padding: 5px 20px;
            border-radius: 12px 12px 0 0; text-transform: uppercase;
            border: 2px solid #111; border-bottom: none; z-index: 11;
        }

        .scoreline {
            display: flex; justify-content: center; align-items: center;
            border-radius: 35px; background: #000000; border: 2px solid #111;
            overflow: hidden; width: 100%; height: 73px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7); position: relative; z-index: 5;
        }

        .player3-row {
            display: none; width: 50%; height: 50px; background: #000;
            margin-top: -10px; border-radius: 0 0 25px 25px;
            border: 2px solid #111; border-top: none; overflow: hidden;
            position: relative; z-index: 4;
        }

        .gradient-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, #083c2c 0%, #00af79 50%, #083c2c 100%);
            z-index: 1;
        }

        .player {
            display: flex; align-items: center; flex: 1; height: 100%;
            color: white; position: relative; z-index: 2; transition: opacity 0.4s;
        }

        .player--A { padding-left: 25px; }
        .player--B { padding-right: 25px; justify-content: flex-end; }
        .player--C { padding: 0 20px; justify-content: space-between; }
        .is-not-turn { opacity: 0.4; }

        .name { font-size: 24px; font-weight: 800; text-transform: uppercase; }
        
        .break-ball {
            width: 16px; height: 16px; margin: 0 12px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fff 0%, #ddd 60%, #aaa 100%);
            border: 1px solid #111; box-shadow: 0 0 12px rgba(255,255,255,0.8);
        }

        .score-box {
            background: #000; min-width: 110px; height: 100%;
            display: flex; justify-content: center; align-items: center;
            font-size: 48px; font-weight: 900; color: #f1c40f;
            z-index: 10; border-left: 3px solid #111; border-right: 3px solid #111;
        }

        .fouls { display: flex; gap: 7px; margin: 0 15px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(0,0,0,0.6); }
        .dot.active { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
    </style>
</head>
<body>

    <div class="scoreline-wrapper">
        <div class="last-shot-box" id="lastShotBox" style="opacity: 0;">
            <div id="shotBall" class="mini-ball"></div>
            <div id="shotType" class="shot-tag"></div>
        </div>

        <div class="inning-tag" id="inning-text">Inning 1</div>

        <div class="scoreline">
            <div class="gradient-bg"></div>
            <div class="player player--A" id="p0-row">
                <div class="fouls" id="p0-fouls"></div>
                <div id="p0-break" style="display:none;" class="break-ball"></div>
                <div class="name" id="p0-name">PLAYER 1</div>
            </div>
            <div class="score-box">
                <span id="p0-score">0</span>
                <span style="color:#333; margin: 0 8px;">-</span>
                <span id="p1-score">0</span>
            </div>
            <div class="player player--B" id="p1-row">
                <div class="name" id="p1-name">PLAYER 2</div>
                <div id="p1-break" style="display:none;" class="break-ball"></div>
                <div class="fouls" id="p1-fouls"></div>
            </div>
        </div>

        <div class="player3-row" id="p2-container">
            <div class="gradient-bg"></div>
            <div class="player player--C" id="p2-row">
                <div class="fouls" id="p2-fouls"></div>
                <div style="display: flex; align-items: center;">
                    <div id="p2-break" style="display:none;" class="break-ball"></div>
                    <div class="name" style="font-size: 18px;" id="p2-name">PLAYER 3</div>
                </div>
                <div style="font-size: 32px; color: #f1c40f; font-weight: 900;" id="p2-score">0</div>
            </div>
        </div>
    </div>

    <script>
        function updateScoreboard() {
            const scores = JSON.parse(localStorage.getItem('cb_scores')) || [0, 0, 0];
            const fouls = JSON.parse(localStorage.getItem('cb_fouls')) || [0, 0, 0];
            const activePlayer = parseInt(localStorage.getItem('cb_player')) || 0;
            const innings = parseInt(localStorage.getItem('cb_innings')) || 0;
            const pCount = parseInt(localStorage.getItem('cb_pCount')) || 2;
            const breakDone = JSON.parse(localStorage.getItem('cb_break')) || false;
            
            // Henter siste støt-data fra appen
            const tableStatus = localStorage.getItem('cb_tableStatus'); // 'locked' betyr poeng
            const lastType = localStorage.getItem('cb_lastType'); // 'pocket' eller 'carom'

            // Oppdater grunnleggende info
            document.getElementById('p0-name').innerText = localStorage.getItem('p0name') || "P1";
            document.getElementById('p1-name').innerText = localStorage.getItem('p1name') || "P2";
            document.getElementById('p0-score').innerText = scores[0];
            document.getElementById('p1-score').innerText = scores[1];
            document.getElementById('inning-text').innerText = "Inning " + (Math.floor(innings/pCount) + 1);

            // LAST SHOT LOGIKK
            const shotBox = document.getElementById('lastShotBox');
            if (tableStatus === 'locked' && lastType) {
                shotBox.style.opacity = "1";
                const typeTag = document.getElementById('shotType');
                typeTag.innerText = lastType === 'pocket' ? "Ball in Pocket" : "Carom Score";
                typeTag.className = lastType === 'pocket' ? "shot-tag tag-pocket" : "shot-tag tag-carom";
                
                // Vis ballen som sist gikk ned (kun hvis pocket)
                const ball = document.getElementById('shotBall');
                if (lastType === 'pocket') {
                    ball.style.display = "flex";
                    ball.innerText = "!"; // Her kan du utvide app-logikken til å sende ballnummeret
                    ball.style.background = "white";
                } else {
                    ball.style.display = "none";
                }
            } else {
                shotBox.style.opacity = "0";
            }

            // P3 visning
            const p2Cont = document.getElementById('p2-container');
            if (pCount === 3) {
                p2Cont.style.display = "block";
                document.getElementById('p2-name').innerText = localStorage.getItem('p2name') || "P3";
                document.getElementById('p2-score').innerText = scores[2];
            } else { p2Cont.style.display = "none"; }

            for (let p = 0; p < 3; p++) {
                const row = document.getElementById(`p${p}-row`);
                const breakIcon = document.getElementById(`p${p}-break`);
                if (row) {
                    row.classList.toggle('is-not-turn', activePlayer !== p);
                    if (breakIcon) breakIcon.style.display = (!breakDone && activePlayer === p) ? "block" : "none";
                    let foulHtml = '';
                    for (let d = 0; d < 3; d++) foulHtml += `<div class="dot ${d < fouls[p] ? 'active' : ''}"></div>`;
                    const fDiv = document.getElementById(`p${p}-fouls`);
                    if (fDiv) fDiv.innerHTML = foulHtml;
                }
            }
        }
        setInterval(updateScoreboard, 1000);
        updateScoreboard();
    </script>
</body>
</html>
