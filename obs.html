<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center;
        }

        .scoreline-wrapper {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 95%; 
            max-width: 850px;
            position: relative;
        }

        /* INNING FLYTTET TIL TOPPEN */
        .inning-tag {
            background: rgba(0, 0, 0, 0.95);
            color: #f1c40f;
            font-size: 13px;
            font-weight: 900;
            padding: 5px 20px;
            border-radius: 12px 12px 0 0;
            text-transform: uppercase;
            border: 2px solid #111;
            border-bottom: none;
            z-index: 11;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
        }

        .scoreline {
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 35px;
            background: #000000;
            border: 2px solid #111;
            overflow: hidden;
            width: 100%;
            height: 73px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            position: relative;
            z-index: 5;
        }

        /* SPESIELL RAD FOR SPILLER 3 */
        .player3-row {
            display: none; /* Vises kun ved 3P */
            width: 50%;
            height: 50px;
            background: #000;
            margin-top: -10px; /* Overlapper litt for integrert look */
            border-radius: 0 0 25px 25px;
            border: 2px solid #111;
            border-top: none;
            overflow: hidden;
            position: relative;
            z-index: 4;
        }

        .gradient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #083c2c 0%, #00af79 50%, #083c2c 100%);
            z-index: 1;
        }

        .player {
            display: flex;
            align-items: center;
            flex: 1;
            height: 100%;
            color: white;
            position: relative;
            z-index: 2;
            transition: opacity 0.4s ease;
            min-width: 0;
        }

        .player--A { padding-left: 25px; justify-content: flex-start; }
        .player--B { padding-right: 25px; justify-content: flex-end; text-align: right; }
        .player--C { padding: 0 20px; justify-content: space-between; } /* Spiller 3 i midten */

        .is-not-turn { opacity: 0.4; }

        .name {
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .score-box {
            background: #000;
            min-width: 110px;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            font-weight: 900;
            color: #f1c40f;
            z-index: 10;
            border-left: 3px solid #111;
            border-right: 3px solid #111;
        }

        .score-p3 {
            font-size: 32px;
            color: #f1c40f;
            font-weight: 900;
            background: #000;
            padding: 0 15px;
            height: 100%;
            display: flex;
            align-items: center;
            border-left: 2px solid #111;
            border-right: 2px solid #111;
        }

        .fouls {
            display: flex;
            gap: 7px;
            margin: 0 15px;
            flex-shrink: 0;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .dot.active {
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }
    </style>
</head>
<body>

    <div class="scoreline-wrapper">
        <div class="inning-tag" id="inning-text">INNING 1</div>

        <div class="scoreline">
            <div class="gradient-bg"></div>
            <div class="player player--A" id="p0-row">
                <div class="fouls" id="p0-fouls"></div>
                <div class="name" id="p0-name">SPILLER 1</div>
            </div>

            <div class="score-box">
                <span id="p0-score">0</span>
                <span style="color:#333; margin: 0 8px;">-</span>
                <span id="p1-score">0</span>
            </div>

            <div class="player player--B" id="p1-row">
                <div class="name" id="p1-name">SPILLER 2</div>
                <div class="fouls" id="p1-fouls"></div>
            </div>
        </div>

        <div class="player3-row" id="p2-container">
            <div class="gradient-bg"></div>
            <div class="player player--C" id="p2-row">
                <div class="fouls" id="p2-fouls"></div>
                <div class="name" style="font-size: 18px;" id="p2-name">SPILLER 3</div>
                <div class="score-p3" id="p2-score">0</div>
            </div>
        </div>
    </div>

    <script>
        function updateScoreboard() {
            const scores = JSON.parse(localStorage.getItem('cb_scores')) || [0, 0, 0];
            const fouls = JSON.parse(localStorage.getItem('cb_fouls')) || [0, 0, 0];
            const activePlayer = parseInt(localStorage.getItem('cb_player')) || 0;
            const innings = parseInt(localStorage.getItem('cb_innings')) || 0;
            const pCount = parseInt(localStorage.getItem('cb_pCount')) || 2;

            // Oppdater grunnleggende info
            document.getElementById('p0-name').innerText = localStorage.getItem('p0name') || "P1";
            document.getElementById('p1-name').innerText = localStorage.getItem('p1name') || "P2";
            document.getElementById('p0-score').innerText = scores[0];
            document.getElementById('p1-score').innerText = scores[1];
            document.getElementById('inning-text').innerText = "Inning " + (Math.floor(innings/pCount) + 1);

            // Håndter Spiller 3 visning
            const p2Cont = document.getElementById('p2-container');
            if (pCount === 3) {
                p2Cont.style.display = "block";
                document.getElementById('p2-name').innerText = localStorage.getItem('p2name') || "P3";
                document.getElementById('p2-score').innerText = scores[2];
            } else {
                p2Cont.style.display = "none";
            }

            // Status (Turn) og Fouls for alle 3
            for (let p = 0; p < 3; p++) {
                const row = document.getElementById(`p${p}-row`);
                if (row) {
                    row.classList.toggle('is-not-turn', activePlayer !== p);
                    
                    let foulHtml = '';
                    for (let d = 0; d < 3; d++) {
                        foulHtml += `<div class="dot ${d < fouls[p] ? 'active' : ''}"></div>`;
                    }
                    const foulDiv = document.getElementById(`p${p}-fouls`);
                    if (foulDiv) foulDiv.innerHTML = foulHtml;
                }
            }
        }

        setInterval(updateScoreboard, 1000);
        updateScoreboard();
    </script>
</body>
</html>
