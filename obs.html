<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center;
        }

        .scoreline-wrapper {
            margin-bottom: 30px; display: flex; flex-direction: column;
            align-items: center; width: 95%; max-width: 850px; position: relative;
        }

        /* STATUS-TEKST OVER KULENE */
        .status-msg {
            font-size: 12px; font-weight: 900; text-transform: uppercase;
            margin-bottom: 5px; letter-spacing: 1px; transition: 0.3s;
            height: 15px;
        }
        .msg-carom { color: #3498db; text-shadow: 0 0 10px rgba(52,152,219,0.5); }
        .msg-pocket { color: #e67e22; text-shadow: 0 0 10px rgba(230,126,34,0.5); }

        /* LIVE KULER PÅ BORDET */
        .table-state {
            display: flex; gap: 15px; margin-bottom: 10px;
            background: rgba(0,0,0,0.8); padding: 8px 25px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            align-items: center; flex-direction: column;
        }

        .balls-row { display: flex; gap: 15px; }

        .table-ball {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: black; font-size: 15px;
            border: 2px solid #000; transition: all 0.4s ease;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.4);
            position: relative;
        }

        .ball-1 { background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00); }
        .ball-3 { background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22); }
        .ball-5 { background: radial-gradient(circle at 35% 35%, #f39c12, #a36504); }

        /* EFFEKTER FOR KRAV OG STATUS */
        .ball-dimmed {
            opacity: 0.15;
            filter: grayscale(1);
            transform: scale(0.9);
        }

        .ball-highlight {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255,255,255,0.5), inset -3px -3px 6px rgba(0,0,0,0.4);
        }

        /* SCOREBOARD DELER */
        .inning-tag {
            background: rgba(0, 0, 0, 0.95); color: #f1c40f; font-size: 13px; font-weight: 900;
            padding: 5px 20px; border-radius: 12px 12px 0 0; text-transform: uppercase;
            border: 2px solid #111; border-bottom: none; z-index: 11;
        }

        .scoreline {
            display: flex; justify-content: center; align-items: center;
            border-radius: 35px; background: #000; border: 2px solid #111;
            overflow: hidden; width: 100%; height: 73px; position: relative; z-index: 5;
        }

        .gradient-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, #083c2c 0%, #00af79 50%, #083c2c 100%);
            z-index: 1;
        }

        .player3-row {
            display: none; width: 50%; height: 50px; background: #000; margin-top: -10px;
            border-radius: 0 0 25px 25px; border: 2px solid #111; border-top: none;
            overflow: hidden; position: relative; z-index: 4;
        }

        .player {
            display: flex; align-items: center; flex: 1; height: 100%; color: white;
            position: relative; z-index: 2; transition: opacity 0.4s ease; min-width: 0;
        }

        .player--A { padding-left: 25px; justify-content: flex-start; }
        .player--B { padding-right: 25px; justify-content: flex-end; text-align: right; }
        .player--C { padding: 0 20px; justify-content: space-between; }
        .is-not-turn { opacity: 0.4; }
        .name { font-size: 24px; font-weight: 800; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .break-ball {
            width: 20px; height: 20px; border-radius: 50%; display: inline-block; margin: 0 12px;
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 25%),
                        radial-gradient(circle at 50% 15%, #ff0000 8%, transparent 10%),
                        radial-gradient(circle at 20% 70%, #ff0000 8%, transparent 10%),
                        radial-gradient(circle at 85% 55%, #ff0000 8%, transparent 10%),
                        radial-gradient(circle at 35% 35%, #fff 0%, #ddd 60%, #aaa 100%);
            border: 1px solid #111; box-shadow: 0 0 12px rgba(255,255,255,0.8);
        }

        .score-box {
            background: #000; min-width: 110px; height: 100%; display: flex;
            justify-content: center; align-items: center; font-size: 48px; font-weight: 900;
            color: #f1c40f; z-index: 10; border-left: 3px solid #111; border-right: 3px solid #111;
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(0,0,0,0.6); margin: 0 3px;}
        .dot.active { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
    </style>
</head>
<body>
    <div class="scoreline-wrapper">
        <div class="table-state">
            <div id="status-msg" class="status-msg"></div>
            <div class="balls-row">
                <div id="table-ball-1" class="table-ball ball-1">1</div>
                <div id="table-ball-3" class="table-ball ball-3">3</div>
                <div id="table-ball-5" class="table-ball ball-5">5</div>
            </div>
        </div>

        <div class="inning-tag" id="inning-text">Inning 1</div>

        <div class="scoreline">
            <div class="gradient-bg"></div>
            <div class="player player--A" id="p0-row">
                <div class="fouls" id="p0-fouls"></div>
                <div id="p0-break" style="display:none;" class="break-ball"></div>
                <div class="name" id="p0-name">P1</div>
            </div>
            <div class="score-box">
                <span id="p0-score">0</span>
                <span style="color:#333; margin: 0 8px;">-</span>
                <span id="p1-score">0</span>
            </div>
            <div class="player player--B" id="p1-row">
                <div class="name" id="p1-name">P2</div>
                <div id="p1-break" style="display:none;" class="break-ball"></div>
                <div class="fouls" id="p1-fouls"></div>
            </div>
        </div>

        <div class="player3-row" id="p2-container">
            <div class="gradient-bg"></div>
            <div class="player player--C" id="p2-row">
                <div class="fouls" id="p2-fouls"></div>
                <div style="display: flex; align-items: center;">
                    <div id="p2-break" style="display:none;" class="break-ball"></div>
                    <div class="name" style="font-size: 18px;" id="p2-name">P3</div>
                </div>
                <div style="font-size: 32px; color:#f1c40f; font-weight:900;" id="p2-score">0</div>
            </div>
        </div>
    </div>

    <script>
        function update() {
            const scores = JSON.parse(localStorage.getItem('cb_scores')) || [0, 0, 0];
            const fouls = JSON.parse(localStorage.getItem('cb_fouls')) || [0, 0, 0];
            const active = parseInt(localStorage.getItem('cb_player')) || 0;
            const pCount = parseInt(localStorage.getItem('cb_pCount')) || 2;
            const breakDone = JSON.parse(localStorage.getItem('cb_break')) || false;
            const tableStatus = localStorage.getItem('cb_tableStatus') || 'open';
            const lastType = localStorage.getItem('cb_lastType') || null;
            const innings = parseInt(localStorage.getItem('cb_innings')) || 0;

            // Navn og Inning
            document.getElementById('p0-name').innerText = localStorage.getItem('p0name') || "P1";
            document.getElementById('p1-name').innerText = localStorage.getItem('p1name') || "P2";
            document.getElementById('p0-score').innerText = scores[0];
            document.getElementById('p1-score').innerText = scores[1];
            document.getElementById('inning-text').innerText = "Inning " + (Math.floor(innings/pCount) + 1);

            // LOGIKK FOR KULER OG STATUSMELDING
            const msgEl = document.getElementById('status-msg');
            const ball1 = document.getElementById('table-ball-1');
            const ball3 = document.getElementById('table-ball-3');
            const ball5 = document.getElementById('table-ball-5');
            const currentScore = scores[active];

            // Nullstill alle kuler først
            [ball1, ball3, ball5].forEach(b => { b.className = b.className.replace(' ball-dimmed', '').replace(' ball-highlight', ''); });
            msgEl.innerText = "";
            msgEl.className = "status-msg";

            if (!breakDone) {
                // BREAK SHOT: Kun 3-ball er aktiv
                ball1.classList.add('ball-dimmed');
                ball5.classList.add('ball-dimmed');
                ball3.classList.add('ball-highlight');
                msgEl.innerText = "Krav: Break Shot (3-Ball)";
            } else if (currentScore >= 90 || (tableStatus === 'locked' && lastType === 'pocket')) {
                // LÅST TIL CAROM (Enten pga 90+ poeng eller forrige støt var pocket)
                ball1.classList.add('ball-dimmed');
                ball3.classList.add('ball-dimmed');
                ball5.classList.add('ball-dimmed');
                msgEl.innerText = "Krav: Carom";
                msgEl.classList.add('msg-carom');
            } else if (tableStatus === 'locked' && lastType === 'carom') {
                // LÅST TIL POCKET
                msgEl.innerText = "Krav: Ball i hull";
                msgEl.classList.add('msg-pocket');
                [ball1, ball3, ball5].forEach(b => b.classList.add('ball-highlight'));
            } else {
                // OPEN TABLE
                msgEl.innerText = "Open Table";
            }

            // P3 visning
            const p2Cont = document.getElementById('p2-container');
            if (pCount === 3) {
                p2Cont.style.display = "block";
                document.getElementById('p2-name').innerText = localStorage.getItem('p2name') || "P3";
                document.getElementById('p2-score').innerText = scores[2];
            } else { p2Cont.style.display = "none"; }

            // Turn og Fouls
            for (let p = 0; p < 3; p++) {
                const row = document.getElementById(`p${p}-row`);
                const bIcon = document.getElementById(`p${p}-break`);
                if (row) {
                    row.classList.toggle('is-not-turn', active !== p);
                    if (bIcon) bIcon.style.display = (!breakDone && active === p) ? "block" : "none";
                    let fHtml = '';
                    for (let d = 0; d < 3; d++) fHtml += `<div class="dot ${d < fouls[p] ? 'active' : ''}"></div>`;
                    const fDiv = document.getElementById(`p${p}-fouls`);
                    if (fDiv) fDiv.innerHTML = fHtml;
                }
            }
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
