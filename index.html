<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a3c1a; color: white; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: #222; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .mode-selector { height: 50px; margin-bottom: 15px; background: #333; padding: 0 10px; border-radius: 10px; display: flex; justify-content: center; gap: 10px; align-items: center; }
        .mode-selector button { background: #444; color: white; border: 1px solid #555; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .mode-selector button.active { background: #f1c40f !important; color: #000 !important; }
        .names-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .names-row input { flex: 1; padding: 10px 5px; border-radius: 8px; border: none; background: #444; color: white; text-align: center; font-weight: bold; }
        .scoreboard { display: flex; justify-content: center; margin-bottom: 15px; gap: 8px; }
        .player-box { flex: 1; padding: 15px 5px; border-radius: 15px; background: #333; border: 4px solid transparent; position: relative; }
        .active { border-color: #f1c40f; background: #3d3d3d; }
        .score { font-size: 2.5em; font-weight: 900; display: block; }
        
        /* SERIE INFO I KONTROLLER */
        .series-row { display: flex; justify-content: space-around; margin-top: 10px; font-size: 0.7em; font-weight: bold; text-transform: uppercase; border-top: 1px solid #444; padding-top: 5px; }
        .series-box { display: flex; flex-direction: column; }
        .series-val { color: #f1c40f; font-size: 1.4em; }

        .foul-dots { display: flex; justify-content: center; gap: 6px; margin-top: 10px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #444; border: 1px solid #111; }
        .dot.active { background: #c0392b; box-shadow: 0 0 8px #ff0000; }
        
        .timer-row { margin: 10px 0; padding: 10px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        .next-move-box { min-height: 50px; background: #2c3e50; padding: 10px; border-radius: 12px; margin: 10px 0; border-left: 6px solid #f1c40f; text-align: left; }
        
        /* 3D BALLER I KONTROLLER */
        .ball-row { display: flex; justify-content: space-around; margin: 20px 0; }
        .ball-group { display: flex; flex-direction: column; align-items: center; }
        .ball-btn { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #000; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.5); overflow: hidden; }
        .ball-num { width: 28px; height: 28px; background: white; border-radius: 50%; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; z-index: 5; border: 1px solid #000; }
        .overlay-3d { position: absolute; top:0; left:0; width:100%; height:100%; border-radius:50%; box-shadow: inset -4px -4px 8px rgba(0,0,0,0.4), inset 3px 3px 6px rgba(255,255,255,0.2); }
        
        .f-1 { background: #ffcc00; } .f-3 { background: #cc0000; } .f-5 { background: #663399; }
        .waiting { opacity: 0.15; filter: grayscale(1); pointer-events: none; }

        .control-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button.ctrl { padding: 15px 5px; border: none; border-radius: 10px; color: white; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .btn-turn { background: #27ae60; grid-column: span 3; font-size: 1.2em; }
    </style>
</head>
<body>
<div class="container">
    <div class="mode-selector">
        <button onclick="setPlayerCount(1)" id="btn-count-1">1P</button>
        <button onclick="setPlayerCount(2)" id="btn-count-2">2P</button>
        <button onclick="setPlayerCount(3)" id="btn-count-3">3P</button>
    </div>
    <div class="names-row" id="inputs-container"></div>
    <div class="scoreboard" id="scoreboard-container"></div>
    
    <div class="timer-row">
        <div id="matchTimer" style="font-size: 1.5em; color: #f1c40f; font-family: monospace;">00:00:00</div>
        <button onclick="toggleTimer()" id="timerBtn" style="background:#e67e22; border:none; color:white; padding:8px 15px; border-radius:5px; margin-top:5px; font-weight:bold;">START</button>
    </div>

    <div class="next-move-box"><div id="moveText" style="font-weight:900; font-size:0.9em;">BREAK SHOT (3-BALL)</div></div>
    
    <div class="ball-row">
        <div class="ball-group">
            <div class="ball-btn f-1" onclick="action('pocket', 1)" id="ctrl-b1"><div class="ball-num">1</div><div class="overlay-3d"></div></div>
            <button onclick="action('pocket_carom', 2)" style="margin-top:5px; font-size:0.7em; background:#3498db; color:white; border:none; padding:4px; border-radius:4px;">+ CAROM</button>
        </div>
        <div class="ball-group">
            <div class="ball-btn f-3" onclick="action('pocket', 3)" id="ctrl-b3"><div class="ball-num">3</div><div class="overlay-3d"></div></div>
            <button onclick="action('pocket_carom', 4)" style="margin-top:5px; font-size:0.7em; background:#3498db; color:white; border:none; padding:4px; border-radius:4px;">+ CAROM</button>
        </div>
        <div class="ball-group">
            <div class="ball-btn f-5" onclick="action('pocket', 5)" id="ctrl-b5"><div class="ball-num">5</div><div class="overlay-3d"></div></div>
            <button onclick="action('pocket_carom', 6)" style="margin-top:5px; font-size:0.7em; background:#3498db; color:white; border:none; padding:4px; border-radius:4px;">+ CAROM</button>
        </div>
    </div>

    <div class="control-grid">
        <button class="ctrl" style="background:#2980b9" onclick="action('carom', 1)">Carom 1p</button>
        <button class="ctrl" style="background:#2980b9" onclick="action('carom', 2)">Carom 2p</button>
        <button class="ctrl" style="background:#8e44ad" onclick="undo()">Angre</button>
        <button class="ctrl" style="background:#c0392b; grid-column: span 3;" onclick="handleFoul()">FOUL</button>
        <button class="ctrl btn-turn" onclick="nextTurn()">AVSLUTT TUR / BOM</button>
        <button class="ctrl" style="background:#444; grid-column: span 3; margin-top:10px; font-size:0.7em;" onclick="resetGame()">RESET GAME</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    let state = {
        playerCount: 2, scores: [0,0,0], foulCounts: [0,0,0], scoreAtStart: [0,0,0],
        currentPlayer: 0, breakDone: false, tableStatus: 'open', lastType: null,
        innings: 0, seconds: 0, names: ["Simen", "Lasse", "Ole Andreas"],
        bestSeries: [0,0,0]
    };

    let history = []; let isPaused = true; let timerInterval = null;

    db.on('value', snap => { if(snap.val()) { state = snap.val(); updateUI(); } });
    function pushData() { db.set(state); }

    function initUI() {
        const inputCont = document.getElementById('inputs-container');
        const scoreCont = document.getElementById('scoreboard-container');
        inputCont.innerHTML = ''; scoreCont.innerHTML = '';
        for(let i=0; i<state.playerCount; i++) {
            inputCont.innerHTML += `<input value="${state.names[i]}" oninput="saveName(${i}, this.value)">`;
            scoreCont.innerHTML += `
                <div id="p${i}-box" class="player-box">
                    <span class="player-label-display">${state.names[i]}</span>
                    <span class="score">${state.scores[i]}</span>
                    <div class="series-row">
                        <div class="series-box"><span>Nå</span><span class="series-val" id="p${i}-now">0</span></div>
                        <div class="series-box"><span>Pers</span><span class="series-val" id="p${i}-best">0</span></div>
                    </div>
                    <div class="foul-dots" id="p${i}-fouls"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                </div>`;
        }
    }

    function saveName(i, v) { state.names[i] = v; pushData(); }

    function action(type, val) {
        saveHistory();
        if(!state.breakDone) state.breakDone = true;
        state.scores[state.currentPlayer] += val;
        state.tableStatus = 'locked'; state.lastType = type;
        pushData();
    }

    function nextTurn() {
        saveHistory();
        let currentS = state.scores[state.currentPlayer] - state.scoreAtStart[state.currentPlayer];
        if (currentS > state.bestSeries[state.currentPlayer]) state.bestSeries[state.currentPlayer] = currentS;
        if (!state.breakDone) state.breakDone = true;
        state.currentPlayer = (state.currentPlayer + 1) % state.playerCount;
        state.innings++; state.tableStatus = 'open';
        state.scoreAtStart[state.currentPlayer] = state.scores[state.currentPlayer];
        pushData();
    }

    function handleFoul() {
        saveHistory();
        if (!state.breakDone) state.breakDone = true;
        state.scores[state.currentPlayer] = state.scoreAtStart[state.currentPlayer];
        state.foulCounts[state.currentPlayer]++;
        nextTurn();
    }

    function updateUI() {
        if (document.getElementById('scoreboard-container').children.length !== state.playerCount) initUI();
        for(let i=0; i<state.playerCount; i++) {
            document.getElementById(`p${i}-box`).className = (state.currentPlayer === i) ? 'player-box active' : 'player-box';
            document.getElementById(`p${i}-now`).innerText = state.scores[i] - state.scoreAtStart[i];
            document.getElementById(`p${i}-best`).innerText = state.bestSeries[i];
            const dots = document.getElementById(`p${i}-fouls`).children;
            for(let d=0; d<3; d++) dots[d].className = (d < state.foulCounts[i]) ? 'dot active' : 'dot';
        }
        
        const isLockedPocket = (state.tableStatus === 'locked' && state.lastType === 'pocket');
        document.getElementById('ctrl-b1').className = (!state.breakDone || isLockedPocket) ? 'ball-btn f-1 waiting' : 'ball-btn f-1';
        document.getElementById('ctrl-b3').className = (isLockedPocket) ? 'ball-btn f-3 waiting' : 'ball-btn f-3';
        document.getElementById('ctrl-b5').className = (!state.breakDone || isLockedPocket) ? 'ball-btn f-5 waiting' : 'ball-btn f-5';
        
        document.getElementById('matchTimer').innerText = new Date(state.seconds * 1000).toISOString().substr(11, 8);
    }

    function toggleTimer() {
        if(!isPaused) { clearInterval(timerInterval); isPaused = true; document.getElementById('timerBtn').innerText = "START"; }
        else { isPaused = false; timerInterval = setInterval(() => { state.seconds++; db.child('seconds').set(state.seconds); }, 1000); document.getElementById('timerBtn').innerText = "PAUSE"; }
    }

    function setPlayerCount(n) { state.playerCount = n; resetGame(); }
    function resetGame() { state.scores=[0,0,0]; state.bestSeries=[0,0,0]; state.innings=0; state.breakDone=false; state.seconds=0; pushData(); }
    function saveHistory() { history.push(JSON.stringify(state)); }
    function undo() { if(history.length) { state = JSON.parse(history.pop()); pushData(); } }
    window.onload = initUI;
</script>
</body>
</html>
