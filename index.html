<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cowboy Pool Match Guide</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a3c1a; color: white; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 480px; margin: auto; background: #222; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .names-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .names-row input { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #444; color: white; text-align: center; font-weight: bold; }
        .scoreboard { display: flex; justify-content: space-between; margin-bottom: 5px; gap: 10px; }
        .player-box { flex: 1; padding: 15px 5px; border-radius: 15px; background: #333; border: 4px solid transparent; }
        .active { border-color: #f1c40f; background: #3d3d3d; }
        .score { font-size: 3.5em; font-weight: 900; display: block; line-height: 1; }
        .player-label { font-size: 0.9em; color: #bbb; text-transform: uppercase; }
        
        .timer-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .timer-display { font-family: monospace; font-size: 1.2em; color: #aaa; }
        .btn-pause { background: #555; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7em; }

        /* DYNAMISK INSTRUKSJONS-BOKS */
        .instruction-box { 
            background: #2c3e50; 
            padding: 15px; 
            border-radius: 12px; 
            margin: 10px 0; 
            border-left: 6px solid #f1c40f;
            text-align: left;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.4);
        }
        .instruction-main { font-weight: 900; font-size: 1.1em; color: #f1c40f; text-transform: uppercase; letter-spacing: 1px; }
        .instruction-sub { font-size: 0.9em; color: #ecf0f1; margin-top: 5px; line-height: 1.3; }

        .ball-row { display: flex; justify-content: space-around; margin: 20px 0; }
        .ball-btn { width: 85px; height: 85px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: inset -8px -8px 15px rgba(0,0,0,0.6), 0 5px 10px rgba(0,0,0,0.4); position: relative; transition: 0.1s; }
        .ball-number { width: 40px; height: 40px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 1.5em; border: 2px solid #000; }
        #b1 { background: radial-gradient(circle at 40% 40%, #f1c40f, #b38f00); }
        #b3 { background: radial-gradient(circle at 40% 40%, #e74c3c, #962d22); }
        #b5 { background: radial-gradient(circle at 40% 40%, #f39c12, #a36504); }
        .ball-btn:disabled { opacity: 0.2; filter: grayscale(1); }

        .control-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button.ctrl { padding: 15px 5px; font-size: 0.9em; border: none; border-radius: 12px; cursor: pointer; color: white; font-weight: bold; box-shadow: 0 4px rgba(0,0,0,0.3); }
        .btn-carom { background: #2980b9; }
        .btn-minus { background: #7f8c8d; }
        .btn-foul { background: #c0392b; }
        .btn-undo { background: #8e44ad; }
        .btn-reset { background: #34495e; }
        .btn-turn { background: #27ae60; grid-column: span 3; font-size: 1.2em; margin-top: 5px; padding: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div class="names-row">
        <input type="text" id="p1-name" value="SPILLER 1" oninput="saveData()">
        <input type="text" id="p2-name" value="SPILLER 2" oninput="saveData()">
    </div>

    <div class="scoreboard">
        <div id="p1-box" class="player-box active" onclick="setTurn(0)">
            <span id="p1-label" class="player-label">SPILLER 1</span>
            <span id="p1-score" class="score">0</span>
        </div>
        <div id="p2-box" class="player-box" onclick="setTurn(1)">
            <span id="p2-label" class="player-label">SPILLER 2</span>
            <span id="p2-score" class="score">0</span>
        </div>
    </div>

    <div class="timer-container">
        <div class="timer-display" id="matchTimer">00:00:00</div>
        <button class="btn-pause" id="pauseBtn" onclick="toggleTimer()">PAUSE</button>
    </div>

    <div class="instruction-box">
        <div class="instruction-main" id="mainInstr">KLAR FOR BREAK</div>
        <div class="instruction-sub" id="subInstr">Spiller 1 må treffe 3-ballen først!</div>
    </div>

    <div class="ball-row">
        <button class="ball-btn" onclick="addScore(1)" id="b1"><div class="ball-number">1</div></button>
        <button class="ball-btn" onclick="addScore(3)" id="b3"><div class="ball-number">3</div></button>
        <button class="ball-btn" onclick="addScore(5)" id="b5"><div class="ball-number">5</div></button>
    </div>

    <div class="control-grid">
        <button class="ctrl btn-carom" onclick="addScore(1)">CAROM 1p</button>
        <button class="ctrl btn-carom" onclick="addScore(2)">CAROM 2p</button>
        <button class="ctrl btn-minus" onclick="addScore(-1)">−</button>
        <button class="ctrl btn-foul" onclick="handleFoul()">FOUL!</button>
        <button class="ctrl btn-undo" onclick="undo()">ANGRE</button>
        <button class="ctrl btn-reset" onclick="resetGame()">RESET</button>
        <button class="ctrl btn-turn" onclick="switchTurn()">NESTE SPILLER (BOM)</button>
    </div>
</div>

<script>
    let scores = JSON.parse(localStorage.getItem('cowboyScores')) || [0, 0];
    let scoreAtStartOfTurn = JSON.parse(localStorage.getItem('cowboyStartScore')) || [0, 0];
    let currentPlayer = JSON.parse(localStorage.getItem('cowboyPlayer')) || 0;
    let secondsElapsed = JSON.parse(localStorage.getItem('cowboyTime')) || 0;
    let timerInterval = null;
    let isPaused = JSON.parse(localStorage.getItem('cowboyPaused')) || false;
    let history = [];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function saveData() {
        localStorage.setItem('cowboyScores', JSON.stringify(scores));
        localStorage.setItem('cowboyStartScore', JSON.stringify(scoreAtStartOfTurn));
        localStorage.setItem('cowboyPlayer', JSON.stringify(currentPlayer));
        localStorage.setItem('cowboyTime', JSON.stringify(secondsElapsed));
        localStorage.setItem('cowboyPaused', JSON.stringify(isPaused));
        localStorage.setItem('p1name', document.getElementById('p1-name').value);
        localStorage.setItem('p2name', document.getElementById('p2-name').value);
    }

    function updateUI() {
        const p1N = document.getElementById('p1-name').value || "Spiller 1";
        const p2N = document.getElementById('p2-name').value || "Spiller 2";
        document.getElementById('p1-label').innerText = p1N;
        document.getElementById('p2-label').innerText = p2N;
        document.getElementById('p1-score').innerText = scores[0];
        document.getElementById('p2-score').innerText = scores[1];
        document.getElementById('p1-box').classList.toggle('active', currentPlayer === 0);
        document.getElementById('p2-box').classList.toggle('active', currentPlayer === 1);

        let s = scores[currentPlayer];
        let pActive = (currentPlayer === 0 ? p1N : p2N);
        let mInstr = document.getElementById('mainInstr');
        let sInstr = document.getElementById('subInstr');

        // DYNAMISK LOGIKK FOR INSTRUKSJONER
        if (scores[0] === 0 && scores[1] === 0) {
            mInstr.innerText = "KLAR FOR BREAK";
            sInstr.innerText = `${pActive} må treffe 3-ballen først fra bak headstring.`;
        } else if (s < 90) {
            mInstr.innerText = "POENG-FASE";
            sInstr.innerText = `${pActive}: Senk baller eller få caroms. Sikt på 90 poeng!`;
            document.getElementById('b1').disabled = false;
            document.getElementById('b3').disabled = false;
            document.getElementById('b5').disabled = false;
        } else if (s < 100) {
            mInstr.innerText = "CAROM-FASE";
            sInstr.innerText = `${pActive}: Kun caroms gir poeng nå. Baller i hull gir 0p og spottes.`;
            document.getElementById('b1').disabled = true;
            document.getElementById('b3').disabled = true;
            document.getElementById('b5').disabled = true;
        } else if (s === 100) {
            mInstr.innerText = "VINNERSTØTET";
            sInstr.innerText = `${pActive}: Du må carome av 1-ballen og senke hvit i en kalt lomme!`;
            document.getElementById('b1').disabled = true;
            document.getElementById('b3').disabled = true;
            document.getElementById('b5').disabled = true;
        } else {
            mInstr.innerText = "KAMP FERDIG";
            sInstr.innerText = `${pActive} har vunnet 101 poeng!`;
            confetti();
        }

        document.getElementById('matchTimer').innerText = new Date(secondsElapsed * 1000).toISOString().substr(11, 8);
        saveData();
    }

    function addScore(p) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startTimer();
        let s = scores[currentPlayer];
        if (p > 0) {
            if (s < 90 && s + p > 90) return alert("Du må treffe nøyaktig 90!");
            if (s >= 90 && s < 100 && s + p > 100) return alert("Du må treffe nøyaktig 100!");
        }
        history.push({p: currentPlayer, old: scores[currentPlayer]});
        scores[currentPlayer] = Math.max(0, scores[currentPlayer] + p);
        updateUI();
    }

    function switchTurn() {
        currentPlayer = (currentPlayer === 0 ? 1 : 0);
        scoreAtStartOfTurn[currentPlayer] = scores[currentPlayer];
        updateUI();
    }

    function handleFoul() {
        if(confirm("Foul! Poeng fra denne runden slettes.")) {
            scores[currentPlayer] = scoreAtStartOfTurn[currentPlayer];
            switchTurn();
        }
    }

    function toggleTimer() {
        if (timerInterval) { isPaused = true; clearInterval(timerInterval); timerInterval = null; } 
        else { isPaused = false; startTimer(); }
        updateUI();
    }

    function startTimer() {
        if (timerInterval || isPaused) return;
        timerInterval = setInterval(() => { secondsElapsed++; updateUI(); }, 1000);
    }

    function undo() {
        if (history.length > 0) {
            let last = history.pop();
            scores[last.p] = last.old;
            updateUI();
        }
    }

    function resetGame() {
        if(confirm("Reset alt?")) {
            localStorage.clear(); location.reload();
        }
    }

    function setTurn(i) { currentPlayer = i; updateUI(); }

    if(localStorage.getItem('p1name')) document.getElementById('p1-name').value = localStorage.getItem('p1name');
    if(localStorage.getItem('p2name')) document.getElementById('p2-name').value = localStorage.getItem('p2name');
    updateUI();
</script>
</body>
</html>
