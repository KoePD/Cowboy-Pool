    // Globale variabler (nå synkronisert med Firebase)
    let state = {
        playerCount: 2,
        scores: [0, 0, 0],
        foulCounts: [0, 0, 0],
        scoreAtStart: [0, 0, 0],
        currentPlayer: 0,
        breakDone: false,
        tableStatus: 'open',
        lastType: null,
        seconds: 0,
        innings: 0,
        names: ["Spiller 1", "Spiller 2", "Spiller 3"]
    };

    // Hent data fra Firebase ved oppstart
    db.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            state = data;
            updateUI();
        }
    });

    function pushData() {
        db.set(state);
    }

    function initUI() {
        // ... behold din eksisterende logikk for å tegne input-feltene ...

        updateUI();
    }

    function saveName(i, val) {
        state.names[i] = val;
        pushData();
    }
