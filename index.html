<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cowboy Pool Scoreboard</title>
    <style>
        body { font-family: sans-serif; background: #1a3c1a; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #222; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #f1c40f; margin-bottom: 10px; }
        .score-display { font-size: 4em; font-weight: bold; margin: 10px 0; color: #fff; }
        .phase-info { font-style: italic; color: #aaa; margin-bottom: 20px; min-height: 1.5em; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        button { padding: 15px 5px; font-size: 1.1em; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-ball { background: #e67e22; color: white; }
        .btn-carom { background: #3498db; color: white; }
        .btn-special { background: #e74c3c; color: white; grid-column: span 3; margin-top: 10px; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        button:disabled { background: #444; color: #777; cursor: not-allowed; }
        .history { margin-top: 20px; font-size: 0.9em; color: #888; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>Cowboy Pool</h1>
    <div id="phaseText" class="phase-info">Fase 1: Poeng for alt</div>
    <div class="score-display" id="score">0</div>

    <div class="btn-grid">
        <button class="btn-ball" onclick="addScore(1)" id="b1">Ball 1</button>
        <button class="btn-ball" onclick="addScore(3)" id="b3">Ball 3</button>
        <button class="btn-ball" onclick="addScore(5)" id="b5">Ball 5</button>
        
        <button class="btn-carom" onclick="addScore(1)">Carom (1p)</button>
        <button class="btn-carom" onclick="addScore(2)" style="grid-column: span 2;">Carom 3 kuler (2p)</button>
        
        <button class="btn-special" onclick="resetGame()">Nullstill Spill</button>
    </div>

    <div class="history" id="log">Siste hendelse: Startet spill</div>
</div>

<script>
    let score = 0;
    const scoreEl = document.getElementById('score');
    const phaseEl = document.getElementById('phaseText');
    const logEl = document.getElementById('log');
    
    const b1 = document.getElementById('b1');
    const b3 = document.getElementById('b3');
    const b5 = document.getElementById('b5');

    function updateUI() {
        scoreEl.innerText = score;
        
        if (score < 90) {
            phaseEl.innerText = "Fase 1: Alle poeng teller";
            b1.disabled = b3.disabled = b5.disabled = false;
        } else if (score < 100) {
            phaseEl.innerText = "Fase 2: KUN Caroms (Ingen poeng for senkede kuler)";
            b1.disabled = b3.disabled = b5.disabled = true;
        } else if (score === 100) {
            phaseEl.innerText = "FINALE: Senk hvit via 1-ball i valgfri lomme!";
            b1.disabled = b3.disabled = b5.disabled = true;
        } else if (score === 101) {
            phaseEl.innerText = "GRATULERER! Du har vunnet!";
            confetti();
        }
    }

    function addScore(points) {
        if (score + points > 90 && score < 90) {
            logEl.innerText = "Ulovlig støt: Du må treffe nøyaktig 90!";
            return;
        }
        if (score + points > 100 && score >= 90 && score < 100) {
            logEl.innerText = "Ulovlig støt: Du må treffe nøyaktig 100!";
            return;
        }
        if (score === 100 && points !== 1) {
            return; 
        }

        score += points;
        logEl.innerText = "Lagt til " + points + " poeng.";
        updateUI();
    }

    function resetGame() {
        if(confirm("Sikker på at du vil starte på nytt?")) {
            score = 0;
            logEl.innerText = "Spill nullstilt.";
            updateUI();
        }
    }
</script>

</body>
</html>
