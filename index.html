<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cowboy Pool Pro - Final Bilingual</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a3c1a; color: white; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; background: #222; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); position: relative; }
        .lang-toggle { position: absolute; top: 15px; right: 15px; background: #444; color: #f1c40f; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.7em; z-index: 10; }
        .mode-selector { margin-bottom: 15px; background: #333; padding: 10px; border-radius: 10px; display: flex; justify-content: center; gap: 10px; align-items: center; margin-right: 60px; }
        .mode-selector button { background: #444; color: white; border: 1px solid #555; padding: 5px 15px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .mode-selector button.active { background: #f1c40f; color: #000; font-weight: bold; }
        .names-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .names-row input { flex: 1; padding: 10px 5px; border-radius: 8px; border: none; background: #444; color: white; text-align: center; font-weight: bold; font-size: 0.8em; }
        .names-row input::placeholder { color: #888; font-weight: normal; font-style: italic; }
        .scoreboard { display: flex; justify-content: center; margin-bottom: 15px; gap: 8px; flex-wrap: wrap; }
        .player-box { flex: 1; min-width: 100px; padding: 10px 5px; border-radius: 15px; background: #333; border: 4px solid transparent; transition: 0.3s; position: relative; cursor: pointer; }
        .active { border-color: #f1c40f; background: #3d3d3d; transform: scale(1.02); }
        .score { font-size: 2.8em; font-weight: 900; display: block; line-height: 1; pointer-events: none; }
        .player-label-display { font-size: 0.7em; color: #aaa; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; padding-right: 25px; min-height: 1em; pointer-events: none; }
        .top-break-label { position: absolute; top: 10px; right: 10px; font-size: 0.6em; color: #f1c40f; font-weight: 900; background: rgba(0,0,0,0.3); padding: 2px 4px; border-radius: 4px; }
        .top-break-label::before { content: "★ "; font-size: 0.8em; }
        .series-label { font-size: 0.55em; color: #f1c40f; text-transform: uppercase; font-weight: 800; margin-top: 5px; pointer-events: none; }
        .series-value { font-size: 1em; color: #f1c40f; font-weight: 900; pointer-events: none; }
        .foul-dots { display: flex; justify-content: center; gap: 4px; margin-top: 5px; pointer-events: none; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #444; border: 1px solid #111; }
        .dot.active { background: #c0392b; box-shadow: 0 0 8px #ff0000; }
        .timer-row { display: flex; flex-direction: column; align-items: center; margin: 10px 0; padding: 10px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        .timer-display { font-family: monospace; font-size: 1.6em; color: #f1c40f; font-weight: bold; }
        .inning-display { font-size: 0.75em; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .next-move-box { background: #2c3e50; padding: 12px; border-radius: 12px; margin: 10px 0; border-left: 6px solid #f1c40f; text-align: left; }
        .move-label { font-size: 0.6em; text-transform: uppercase; color: #f1c40f; font-weight: 800; }
        .move-text { font-weight: 900; font-size: 1em; color: #fff; text-transform: uppercase; }
        .ball-row { display: flex; justify-content: space-around; margin: 15px 0; align-items: flex-start; min-height: 110px; }
        .ball-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .ball-btn { width: 75px; height: 75px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; box-shadow: inset -5px -5px 10px rgba(0,0,0,0.5); cursor: pointer; transition: 0.1s; }
        .ball-btn:active { transform: scale(0.95); }
        .ball-number { width: 35px; height: 35px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 1.4em; border: 2px solid #000; }
        #b1 { background: radial-gradient(circle at 40% 40%, #f1c40f, #b38f00); }
        #b3 { background: radial-gradient(circle at 40% 40%, #e74c3c, #962d22); }
        #b5 { background: radial-gradient(circle at 40% 40%, #f39c12, #a36504); }
        .btn-sub-carom { background: #3498db; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.65em; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .waiting { opacity: 0.15; filter: grayscale(0.8); }
        .control-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        button.ctrl { padding: 12px 5px; font-size: 0.75em; border: none; border-radius: 10px; color: white; font-weight: bold; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px rgba(0,0,0,0.2); }
        button.ctrl:active { transform: translateY(2px); box-shadow: 0 1px rgba(0,0,0,0.2); }
        .btn-carom { background: #2980b9; }
        .btn-foul-full { background: #c0392b; grid-column: span 3; font-size: 0.9em; padding: 15px; margin-top: 2px; }
        .btn-undo { background: #8e44ad; }
        .btn-rules { background: #555; }
        .btn-turn { background: #27ae60; grid-column: span 3; font-size: 1.1em; padding: 15px; margin-top: 5px; letter-spacing: 1px; }
        .btn-adj { background: #7f8c8d; font-size: 1.1em; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); overflow-y: auto; }
        .modal-content { background: #222; margin: 5% auto; padding: 25px; border: 2px solid #f1c40f; width: 85%; max-width: 600px; border-radius: 20px; text-align: left; position: relative; }
        .modal-header { color: #f1c40f; font-size: 1.5em; font-weight: 900; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .modal-body { font-size: 0.85em; line-height: 1.6; color: #ddd; }
        .modal-body h4 { color: #f1c40f; margin-bottom: 5px; margin-top: 15px; text-transform: uppercase; }
        .modal-body p, .modal-body li { margin-bottom: 8px; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #aaa; font-size: 30px; font-weight: bold; cursor: pointer; }

        #bWin { display: none; background: radial-gradient(circle at 40% 40%, #fff, #bbb); color: black; flex-direction: column; justify-content: center; align-items: center; line-height: 1.1; }
        #hazardTxt { font-size: 0.45em; text-transform: uppercase; font-weight: bold; opacity: 0.8; }
        #winTxt { font-size: 1.3em; font-weight: 900; }
    </style>
</head>
<body>

<div id="rulesModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeRules()">&times;</span>
        <div class="modal-header" id="modalHeader">Regler: Cowboy Pool</div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<div class="container">
    <button class="lang-toggle" onclick="toggleLanguage()" id="langBtn">EN</button>
    <div class="mode-selector">
        <span style="font-size: 0.8em; font-weight: bold; color: #888;" id="modeTxt">MODUS:</span>
        <button onclick="setPlayerCount(1)" id="btn-count-1">1P</button>
        <button onclick="setPlayerCount(2)" id="btn-count-2" class="active">2P</button>
        <button onclick="setPlayerCount(3)" id="btn-count-3">3P</button>
    </div>
    <div class="names-row" id="inputs-container"></div>
    <div class="scoreboard" id="scoreboard-container"></div>
    <div class="timer-row">
        <div class="timer-display" id="matchTimer">00:00:00</div>
        <div class="inning-display" id="inningText">Inning: 1</div>
        <button style="background:#e67e22; border:none; color:white; padding:6px 15px; border-radius:6px; font-size:0.75em; margin-top:8px; cursor:pointer; font-weight:800;" onclick="toggleTimer()" id="timerBtn">START KLOKKE</button>
    </div>
    <div class="next-move-box">
        <div class="move-label" id="moveLabel">KRAV:</div>
        <div id="moveText" class="move-text">BREAK SHOT (3-BALL)</div>
    </div>
    <div class="ball-row">
        <div class="ball-group">
            <button class="ball-btn" onclick="action('pocket', 1)" id="b1"><div class="ball-number">1</div></button>
            <button class="btn-sub-carom" onclick="action('pocket_carom', 2)" id="sc1">+ CAROM</button>
        </div>
        <div class="ball-group">
            <button class="ball-btn" onclick="action('pocket', 3)" id="b3"><div class="ball-number">3</div></button>
            <button class="btn-sub-carom" onclick="action('pocket_carom', 4)" id="sc3">+ CAROM</button>
        </div>
        <div class="ball-group">
            <button class="ball-btn" onclick="action('pocket', 5)" id="b5"><div class="ball-number">5</div></button>
            <button class="btn-sub-carom" onclick="action('pocket_carom', 6)" id="sc5">+ CAROM</button>
        </div>
        <button class="ball-btn" onclick="action('win', 1)" id="bWin">
            <div id="hazardTxt">Hazard</div>
            <div id="winTxt">WIN</div>
        </button>
    </div>
    <div class="control-grid">
        <button class="ctrl btn-carom" onclick="action('carom', 1)" id="c1">Carom 1p</button>
        <button class="ctrl btn-carom" onclick="action('carom', 2)" id="c2">Carom 2p</button>
        <button class="ctrl btn-undo" onclick="undo()" id="undoBtn">Angre</button>
        <button class="ctrl btn-rules" onclick="openRules()" id="rulesBtn">Regler</button>
        <button class="ctrl btn-adj" onclick="action('adjust', 1)">+</button>
        <button class="ctrl btn-adj" onclick="action('adjust', -1)">−</button>
        <button class="ctrl btn-foul-full" onclick="handleFoul()" id="foulBtn">FOUL / SCRATCH</button>
        <button class="ctrl btn-turn" onclick="nextTurn()" id="turnBtn">AVSLUTT TUR / BOM</button>
        <button class="ctrl" style="background:#34495e; grid-column: span 3; font-size:0.6em; margin-top:5px; opacity:0.6;" onclick="resetGame()" id="resetBtn">NULLSTILL ALT</button>
    </div>
</div>

<script>
    const i18n = {
        no: {
            mode: "MODUS:", starter: "START KLOKKE", resume: "FORTSETT", pause: "PAUSE",
            krav: "KRAV:", break: "BREAK SHOT (3-BALL)", open: "VALG: CAROM ELLER KULE",
            lockedPocket: "KRAV: CAROM", lockedCarom: "KRAV: KULE",
            winner: "101: HAZARD VIA 1-BALLEN", statusWinner: "STATUS: VINNERSTØT",
            undo: "Angre", rules: "Regler", foul: "FOUL / SCRATCH", turn: "AVSLUTT TUR / BOM",
            reset: "NULLSTILL ALT", placeholder: "Skriv navn...", noName: "INGEN NAVN",
            confirmReset: "Nullstille alt?", confirmMode: "Nullstille for ny modus?",
            modalHeader: "Regler: Cowboy Pool",
            modalBody: `<h4>Mål</h4><p>Nøyaktig <b>101 poeng</b>.</p><h4>Break</h4><p>Må treffe <b>3-ball først</b>.</p><h4>Veksling (0-90p)</h4><ul><li><b>Open Table:</b> Hver tur starter åpen. Valgfritt.</li><li><b>Jokeren:</b> Pocket+Carom holder bordet åpent.</li><li><b>Locked:</b> Kun Pocket/Carom låser rekkefølgen.</li></ul><h4>Sluttspill</h4><p>90-100p: Kun carom. Pocket = FOUL.<br>101p: Carom hvitball av 1-ball og scratch. Senking av 1-ball uten scratch er <b>ikke foul</b>, man bare fortsetter forsøket.</p><h4>Foul</h4><p>Poeng i nåværende serie tapes.</p>`
        },
        en: {
            mode: "MODE:", starter: "START CLOCK", resume: "RESUME", pause: "PAUSE",
            krav: "REQ:", break: "BREAK SHOT (3-BALL)", open: "OPEN TABLE: CHOOSE ANY",
            lockedPocket: "REQ: CAROM", lockedCarom: "REQ: POCKET",
            winner: "101: HAZARD VIA 1-BALL", statusWinner: "STATUS: WINNING SHOT",
            undo: "Undo", rules: "Rules", foul: "FOUL / SCRATCH", turn: "END TURN / MISS",
            reset: "RESET MATCH", placeholder: "Enter name...", noName: "NO NAME",
            confirmReset: "Reset everything?", confirmMode: "Reset for new mode?",
            modalHeader: "Rules: Cowboy Pool",
            modalBody: `<h4>Objective</h4><p>Exactly <b>101 points</b>.</p><h4>The Break</h4><p>Must strike <b>3-ball first</b>.</p><h4>Rotation (0-90p)</h4><ul><li><b>Open Table:</b> Turn starts open. Your choice.</li><li><b>The Joker:</b> Pocket+Carom keeps table open.</li><li><b>Locked:</b> Single type locks sequence.</li></ul><h4>Endgame</h4><p>90-100p: Carom only. Pocket = FOUL.<br>101p: Carom off 1-ball and scratch. Pocketing the 1-ball without a scratch is <b>not a foul</b>, just continue your attempt.</p><h4>Foul</h4><p>Loss of points in current break.</p>`
        }
    };

    let lang = localStorage.getItem('cb_lang') || 'no';
    let playerCount = parseInt(localStorage.getItem('cb_pCount')) || 2;
    let scores = JSON.parse(localStorage.getItem('cb_scores')) || [0, 0, 0];
    let topBreaks = JSON.parse(localStorage.getItem('cb_topBreaks')) || [0, 0, 0];
    let foulCounts = JSON.parse(localStorage.getItem('cb_fouls')) || [0, 0, 0];
    let scoreAtStart = JSON.parse(localStorage.getItem('cb_startScore')) || [0, 0, 0];
    let currentPlayer = parseInt(localStorage.getItem('cb_player')) || 0;
    let breakDone = JSON.parse(localStorage.getItem('cb_break')) || false;
    let tableStatus = localStorage.getItem('cb_tableStatus') || 'open';
    let lastType = localStorage.getItem('cb_lastType') || null;
    let seconds = parseInt(localStorage.getItem('cb_time')) || 0;
    let innings = parseInt(localStorage.getItem('cb_innings')) || 0;
    let isPaused = true; let timerInterval = null; let history = [];

    function toggleLanguage() { lang = lang === 'no' ? 'en' : 'no'; localStorage.setItem('cb_lang', lang); updateUI(); }
    function setPlayerCount(num) { if(!confirm(i18n[lang].confirmMode)) return; playerCount = num; localStorage.setItem('cb_pCount', num); resetGame(); }

    function initUI() {
        const inputCont = document.getElementById('inputs-container');
        const scoreCont = document.getElementById('scoreboard-container');
        inputCont.innerHTML = ''; scoreCont.innerHTML = '';
        for(let i=0; i<playerCount; i++) {
            const input = document.createElement('input');
            input.type = 'text'; input.id = `p${i}-name`;
            input.value = localStorage.getItem(`p${i}name`) || "";
            input.placeholder = i18n[lang].placeholder;
            input.oninput = () => { localStorage.setItem(`p${i}name`, input.value); updateUI(); };
            inputCont.appendChild(input);
            const box = document.createElement('div');
            box.id = `p${i}-box`; box.className = 'player-box';
            box.onclick = () => selectStarter(i);
            box.innerHTML = `<div id="p${i}-top-break" class="top-break-label">0</div><span id="p${i}-label-display" class="player-label-display"></span><span id="p${i}-score" class="score">0</span><div class="series-label">Current Break</div><div id="p${i}-turn-score" class="series-value">0</div><div class="foul-dots" id="p${i}-fouls"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            scoreCont.appendChild(box);
        }
        updateUI();
    }

    function selectStarter(idx) { if (!breakDone && seconds === 0 && isPaused) { currentPlayer = idx; updateUI(); } }

    function updateUI() {
        const t = i18n[lang];
        document.getElementById('langBtn').innerText = lang === 'no' ? 'EN' : 'NO';
        document.getElementById('modeTxt').innerText = t.mode;
        document.getElementById('undoBtn').innerText = t.undo;
        document.getElementById('rulesBtn').innerText = t.rules;
        document.getElementById('foulBtn').innerText = t.foul;
        document.getElementById('turnBtn').innerText = t.turn;
        document.getElementById('resetBtn').innerText = t.reset;
        document.getElementById('timerBtn').innerText = isPaused ? (seconds === 0 ? t.starter : t.resume) : t.pause;
        document.getElementById('modalHeader').innerText = t.modalHeader;
        document.getElementById('modalBody').innerHTML = t.modalBody;

        for(let i=0; i<playerCount; i++) {
            const input = document.getElementById(`p${i}-name`);
            if(input) {
                input.placeholder = t.placeholder;
                document.getElementById(`p${i}-label-display`).innerText = input.value || t.noName;
            }
            document.getElementById(`p${i}-score`).innerText = scores[i];
            const curBreak = scores[i] - scoreAtStart[i];
            document.getElementById(`p${i}-turn-score`).innerText = curBreak;
            if (curBreak > topBreaks[i]) topBreaks[i] = curBreak;
            document.getElementById(`p${i}-top-break`).innerText = topBreaks[i];
            document.getElementById(`p${i}-box`).className = (currentPlayer === i) ? 'player-box active' : 'player-box';
            const dots = document.getElementById(`p${i}-fouls`).children;
            for(let d=0; d<3; d++) dots[d].className = (d < foulCounts[i]) ? 'dot active' : 'dot';
        }

        const s = scores[currentPlayer]; const winBall = document.getElementById('bWin');
        if (s === 100) {
            winBall.style.display = "flex"; document.querySelectorAll('.ball-group').forEach(el => el.style.display = "none");
            document.getElementById('moveLabel').innerText = t.statusWinner; document.getElementById('moveText').innerText = t.winner;
        } else {
            winBall.style.display = "none"; document.querySelectorAll('.ball-group').forEach(el => el.style.display = "flex");
            if (!breakDone) {
                document.getElementById('moveLabel').innerText = t.krav;
                document.getElementById('moveText').innerText = t.break;
            } else if (s >= 90) {
                document.getElementById('moveLabel').innerText = t.krav;
                document.getElementById('moveText').innerText = t.lockedPocket; 
            } else if (tableStatus === 'open') {
                document.getElementById('moveLabel').innerText = "STATUS:";
                document.getElementById('moveText').innerText = t.open;
            } else {
                document.getElementById('moveLabel').innerText = t.krav;
                document.getElementById('moveText').innerText = (lastType === 'pocket') ? t.lockedPocket : t.lockedCarom;
            }
        }

        const pWait = s >= 90 || !breakDone || (tableStatus === 'locked' && lastType === 'pocket');
        const caromWait = (tableStatus === 'locked' && lastType === 'carom' && s < 90);
        document.getElementById('b1').disabled = !breakDone || s >= 90;
        document.getElementById('sc1').disabled = !breakDone || s >= 90;
        document.getElementById('b5').disabled = !breakDone || s >= 90;
        document.getElementById('sc5').disabled = !breakDone || s >= 90;
        document.querySelectorAll('.ball-btn, .btn-sub-carom').forEach(el => {
            if(!el.id.includes('Win')) { el.classList.toggle('waiting', pWait); }
        });
        document.getElementById('c1').classList.toggle('waiting', caromWait);
        document.getElementById('c2').classList.toggle('waiting', caromWait);
        document.getElementById('inningText').innerText = "Inning: " + (Math.floor(innings/playerCount) + 1);
        saveData();
    }

    function action(type, val) {
        if (isPaused && type !== 'adjust') toggleTimer();
        const s = scores[currentPlayer];
        if (type !== 'adjust') {
            if (s < 90 && s + val > 90) return alert(lang === 'no' ? "Må ha nøyaktig 90!" : "Must be 90!");
            if (s >= 90 && s < 100 && s + val > 100) return alert(lang === 'no' ? "Må ha nøyaktig 100!" : "Must be 100!");
            foulCounts[currentPlayer] = 0;
        }
        saveHistory();
        if (type === 'win') { scores[currentPlayer] = 101; confetti(); stopTimer(); }
        else if (type === 'pocket_carom') { if (!breakDone) breakDone = true; tableStatus = 'open'; scores[currentPlayer] += val; }
        else if (type !== 'adjust') {
            if (!breakDone) { breakDone = true; tableStatus = 'locked'; lastType = 'pocket'; }
            else { tableStatus = 'locked'; lastType = type; }
            scores[currentPlayer] += val;
        } else { scores[currentPlayer] = Math.max(0, scores[currentPlayer] + val); }
        updateUI();
    }

    function openRules() { document.getElementById('rulesModal').style.display = 'block'; }
    function closeRules() { document.getElementById('rulesModal').style.display = 'none'; }
    function nextTurn() { saveHistory(); innings++; tableStatus = 'open'; lastType = null; currentPlayer = (currentPlayer + 1) % playerCount; scoreAtStart[currentPlayer] = scores[currentPlayer]; updateUI(); }
    function handleFoul() { saveHistory(); foulCounts[currentPlayer]++; scores[currentPlayer] = scoreAtStart[currentPlayer]; nextTurn(); }
    function saveHistory() { history.push({ scores: [...scores], topBreaks: [...topBreaks], foulCounts: [...foulCounts], scoreAtStart: [...scoreAtStart], currentPlayer, breakDone, tableStatus, lastType, innings, seconds }); if(history.length > 30) history.shift(); }
    function undo() { if (history.length > 0) { const st = history.pop(); scores = st.scores; topBreaks = st.topBreaks; foulCounts = st.foulCounts; scoreAtStart = st.scoreAtStart; currentPlayer = st.currentPlayer; breakDone = st.breakDone; tableStatus = st.tableStatus; lastType = st.lastType; innings = st.innings; seconds = st.seconds; updateUI(); } }
    function toggleTimer() { if (!isPaused) { isPaused = true; clearInterval(timerInterval); updateUI(); } else { isPaused = false; timerInterval = setInterval(() => { seconds++; document.getElementById('matchTimer').innerText = new Date(seconds * 1000).toISOString().substr(11, 8); saveData(); }, 1000); updateUI(); } }
    function stopTimer() { isPaused = true; clearInterval(timerInterval); updateUI(); }
    function resetGame() { if(confirm(i18n[lang].confirmReset)) { scores = [0, 0, 0]; topBreaks = [0, 0, 0]; foulCounts = [0, 0, 0]; scoreAtStart = [0, 0, 0]; currentPlayer = 0; breakDone = false; tableStatus = 'open'; lastType = null; innings = 0; seconds = 0; history = []; if(timerInterval) clearInterval(timerInterval); isPaused = true; localStorage.clear(); initUI(); } }
    function saveData() { localStorage.setItem('cb_scores', JSON.stringify(scores)); localStorage.setItem('cb_topBreaks', JSON.stringify(topBreaks)); localStorage.setItem('cb_fouls', JSON.stringify(foulCounts)); localStorage.setItem('cb_startScore', JSON.stringify(scoreAtStart)); localStorage.setItem('cb_player', currentPlayer); localStorage.setItem('cb_break', breakDone); localStorage.setItem('cb_tableStatus', tableStatus); localStorage.setItem('cb_lastType', lastType); localStorage.setItem('cb_time', seconds); localStorage.setItem('cb_innings', innings); localStorage.setItem('cb_lang', lang); }
    initUI();
</script>
</body>
</html>
