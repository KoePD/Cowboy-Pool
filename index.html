<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cowboy Pool - Pro Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a3c1a; color: white; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 480px; margin: auto; background: #222; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        
        .names-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .names-row input { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #444; color: white; text-align: center; font-weight: bold; }
        
        .scoreboard { display: flex; justify-content: space-between; margin-bottom: 15px; gap: 10px; }
        .player-box { flex: 1; padding: 15px 5px; border-radius: 15px; background: #333; border: 4px solid transparent; transition: 0.3s; position: relative; }
        .active { border-color: #f1c40f; background: #3d3d3d; }
        .score { font-size: 3.5em; font-weight: 900; display: block; line-height: 1; }
        .player-label { font-size: 0.9em; color: #bbb; text-transform: uppercase; }
        
        .foul-dots { display: flex; justify-content: center; gap: 5px; margin-top: 5px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #444; border: 1px solid #000; }
        .dot.active { background: #c0392b; box-shadow: 0 0 5px #ff0000; }

        .timer-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; padding: 10px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        .timer-display { font-family: monospace; font-size: 1.6em; color: #f1c40f; letter-spacing: 1px; font-weight: bold; }
        .btn-timer-ctrl { background: #e67e22; color: white; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9em; text-transform: uppercase; }

        .next-move-box { background: #2c3e50; padding: 15px; border-radius: 12px; margin: 15px 0; border-left: 6px solid #f1c40f; min-height: 65px; display: flex; flex-direction: column; justify-content: center; transition: 0.3s; }
        .move-label { font-size: 0.7em; text-transform: uppercase; color: #f1c40f; font-weight: bold; margin-bottom: 3px; }
        .move-text { font-weight: 900; font-size: 1.25em; color: #fff; letter-spacing: 0.5px; }

        .ball-row { display: flex; justify-content: space-around; margin: 20px 0; position: relative; min-height: 100px; align-items: center; }
        .ball-btn { width: 85px; height: 85px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: inset -8px -8px 15px rgba(0,0,0,0.6), 0 5px 10px rgba(0,0,0,0.4); position: relative; }
        .ball-number { width: 42px; height: 42px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 1.6em; border: 2px solid #000; }
        
        #b1 { background: radial-gradient(circle at 40% 40%, #f1c40f, #b38f00); }
        #b3 { background: radial-gradient(circle at 40% 40%, #e74c3c, #962d22); }
        #b5 { background: radial-gradient(circle at 40% 40%, #f39c12, #a36504); }
        
        #bWin {
            background: radial-gradient(circle at 40% 40%, #fff, #bbb);
            color: black;
            display: none;
            box-shadow: inset -8px -8px 15px rgba(0,0,0,0.3), 0 5px 20px rgba(255,255,255,0.4);
            flex-direction: column;
        }
        .win-tag { font-size: 0.6em; font-weight: 900; margin-bottom: -5px; }

        .ball-btn:disabled { opacity: 0.2; filter: grayscale(1); cursor: not-allowed; }

        .control-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button.ctrl { padding: 15px 5px; font-size: 0.9em; border: none; border-radius: 12px; cursor: pointer; color: white; font-weight: bold; }
        .btn-carom { background: #2980b9; }
        .btn-foul { background: #c0392b; }
        .btn-undo { background: #8e44ad; }
        .btn-turn { background: #27ae60; grid-column: span 3; font-size: 1.2em; margin-top: 5px; padding: 15px; }
        .btn-reset { background: #34495e; grid-column: span 3; padding: 10px; margin-top: 5px; }

        .match-log { margin-top: 20px; background: #111; border-radius: 10px; padding: 10px; text-align: left; font-size: 0.8em; color: #888; max-height: 100px; overflow-y: auto; }
        .log-entry { border-bottom: 1px solid #222; padding: 3px 0; }
        .rules-container { margin-top: 20px; text-align: left; background: #111; border-radius: 10px; overflow: hidden; }
        .rules-header { padding: 10px; background: #333; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; }
        .rules-content { padding: 15px; font-size: 0.85em; display: none; line-height: 1.4; color: #ccc; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="names-row">
        <input type="text" id="p1-name" value="SPILLER 1" oninput="saveData()">
        <input type="text" id="p2-name" value="SPILLER 2" oninput="saveData()">
    </div>

    <div class="scoreboard">
        <div id="p1-box" class="player-box active">
            <span id="p1-label" class="player-label">SPILLER 1</span>
            <span id="p1-score" class="score">0</span>
            <div class="foul-dots" id="p1-fouls">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>
        <div id="p2-box" class="player-box">
            <span id="p2-label" class="player-label">SPILLER 2</span>
            <span id="p2-score" class="score">0</span>
            <div class="foul-dots" id="p2-fouls">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>
    </div>

    <div class="timer-row">
        <div class="timer-display" id="matchTimer">00:00:00</div>
        <button class="btn-timer-ctrl" id="timerBtn" onclick="toggleTimer()">START</button>
    </div>

    <div class="next-move-box" id="moveBox">
        <div class="move-label">NESTE STØT:</div>
        <div class="move-text" id="moveText">SENK 3-BALLEN (BREAK)</div>
    </div>

    <div class="ball-row" id="ballRow">
        <button class="ball-btn" onclick="action('pocket', 1)" id="b1"><div class="ball-number">1</div></button>
        <button class="ball-btn" onclick="action('pocket', 3)" id="b3"><div class="ball-number">3</div></button>
        <button class="ball-btn" onclick="action('pocket', 5)" id="b5"><div class="ball-number">5</div></button>
        <button class="ball-btn" onclick="action('win', 1)" id="bWin">
            <span class="win-tag">Losing Hazard</span>
            <span style="font-size: 1.2em; font-weight: 900;">101</span>
        </button>
    </div>

    <div class="control-grid">
        <button class="ctrl btn-carom" onclick="action('carom', 1)" id="c1">CAROM 1p</button>
        <button class="ctrl btn-carom" onclick="action('carom', 2)" id="c2">CAROM 2p</button>
        <button class="ctrl btn-minus" style="background:#7f8c8d" onclick="action('adjust', -1)">−</button>
        <button class="ctrl btn-foul" onclick="handleFoul()">FOUL!</button>
        <button class="ctrl btn-undo" onclick="undo()">ANGRE</button>
        <button class="ctrl btn-turn" onclick="nextTurn()">BOM / BYTT TUR</button>
        <button class="ctrl btn-reset" onclick="resetGame()">NULLSTILL MATCH</button>
    </div>

    <div class="match-log" id="matchLog"></div>

    <div class="rules-container">
        <div class="rules-header" onclick="toggleRules()">
            <span>📜 Se Regler</span>
            <span id="rule-arrow">▼</span>
        </div>
        <div id="rulesContent" class="rules-content">
            <b>0-90:</b> Veksle mellom kule og carom.<br>
            <b>90-100:</b> Kun caroms gir poeng.<br>
            <b>101:</b> Treff 1-ballen og senk hvit (Losing Hazard).<br>
            <b>Foul:</b> 3 på rad er tap.
        </div>
    </div>
</div>

<script>
    let scores = JSON.parse(localStorage.getItem('cb_scores')) || [0, 0];
    let foulCounts = JSON.parse(localStorage.getItem('cb_fouls')) || [0, 0];
    let scoreAtStart = JSON.parse(localStorage.getItem('cb_startScore')) || [0, 0];
    let currentPlayer = JSON.parse(localStorage.getItem('cb_player')) || 0;
    let breakDone = JSON.parse(localStorage.getItem('cb_break')) || false;
    let firstPostBreakDone = JSON.parse(localStorage.getItem('cb_first')) || false;
    let lastType = JSON.parse(localStorage.getItem('cb_lastType')) || null;
    let seconds = JSON.parse(localStorage.getItem('cb_time')) || 0;
    let logEntries = JSON.parse(localStorage.getItem('cb_log')) || ["Match klar"];
    let isPaused = true;
    let timerInterval = null;
    let history = [];

    function formatTime(s) { return new Date(s * 1000).toISOString().substr(11, 8); }

    function addLog(msg) {
        logEntries.unshift(msg);
        if(logEntries.length > 10) logEntries.pop();
        document.getElementById('matchLog').innerHTML = logEntries.map(e => `<div class="log-entry">${e}</div>`).join('');
        saveData();
    }

    function saveData() {
        localStorage.setItem('cb_scores', JSON.stringify(scores));
        localStorage.setItem('cb_fouls', JSON.stringify(foulCounts));
        localStorage.setItem('cb_startScore', JSON.stringify(scoreAtStart));
        localStorage.setItem('cb_player', JSON.stringify(currentPlayer));
        localStorage.setItem('cb_break', JSON.stringify(breakDone));
        localStorage.setItem('cb_first', JSON.stringify(firstPostBreakDone));
        localStorage.setItem('cb_lastType', JSON.stringify(lastType));
        localStorage.setItem('cb_time', JSON.stringify(seconds));
        localStorage.setItem('cb_log', JSON.stringify(logEntries));
        localStorage.setItem('p1name', document.getElementById('p1-name').value);
        localStorage.setItem('p2name', document.getElementById('p2-name').value);
    }

    function updateUI() {
        const names = [document.getElementById('p1-name').value || "S1", document.getElementById('p2-name').value || "S2"];
        document.getElementById('p1-label').innerText = names[0];
        document.getElementById('p2-label').innerText = names[1];
        document.getElementById('p1-score').innerText = scores[0];
        document.getElementById('p2-score').innerText = scores[1];
        document.getElementById('p1-box').className = currentPlayer === 0 ? "player-box active" : "player-box";
        document.getElementById('p2-box').className = currentPlayer === 1 ? "player-box active" : "player-box";

        [0, 1].forEach(pIdx => {
            const dots = document.getElementById(`p${pIdx+1}-fouls`).children;
            for(let i=0; i<3; i++) dots[i].className = i < foulCounts[pIdx] ? "dot active" : "dot";
        });

        const s = scores[currentPlayer];
        const moveText = document.getElementById('moveText');
        const moveBox = document.getElementById('moveBox');
        const winBall = document.getElementById('bWin');

        if (foulCounts[0] >= 3 || foulCounts[1] >= 3) {
            moveText.innerText = `FORFEIT: ${foulCounts[0] >= 3 ? names[1] : names[0]} VINNER!`;
            moveBox.style.background = "#c0392b";
            stopTimer(); return;
        }

        if (!breakDone) {
            moveText.innerText = "SENK 3-BALLEN (BREAK)";
            moveBox.style.borderLeftColor = "#f1c40f";
        } else if (s >= 101) {
            moveText.innerText = "🏆 MATCH VINNER! 🏆";
            moveBox.style.borderLeftColor = "#27ae60";
            stopTimer();
        } else if (s === 100) {
            moveText.innerText = "SENK HVIT VIA 1-BALLEN";
            moveBox.style.borderLeftColor = "#d35400";
        } else if (s >= 90) {
            moveText.innerText = "GJØR EN CAROM";
            moveBox.style.borderLeftColor = "#8e44ad";
        } else if (!firstPostBreakDone) {
            moveText.innerText = "VALG: CAROM ELLER SENK KULE";
        } else {
            moveText.innerText = lastType === 'pocket' ? "GJØR EN CAROM" : "SENK EN BALL";
        }

        // Toggle vinnerkule
        if (s === 100) {
            winBall.style.display = "flex";
            document.getElementById('b1').style.display = "none";
            document.getElementById('b3').style.display = "none";
            document.getElementById('b5').style.display = "none";
        } else {
            winBall.style.display = "none";
            document.getElementById('b1').style.display = "flex";
            document.getElementById('b3').style.display = "flex";
            document.getElementById('b5').style.display = "flex";
        }

        let pocketOff = s >= 90 || (firstPostBreakDone && lastType === 'pocket');
        let caromOff = (firstPostBreakDone && lastType === 'carom');

        document.getElementById('b1').disabled = pocketOff;
        document.getElementById('b3').disabled = pocketOff;
        document.getElementById('b5').disabled = pocketOff;
        document.getElementById('c1').disabled = caromOff;
        document.getElementById('c2').disabled = caromOff;
        saveData();
    }

    function toggleTimer() {
        if (!isPaused) {
            isPaused = true; clearInterval(timerInterval);
            document.getElementById('timerBtn').innerText = "START";
        } else {
            isPaused = false;
            document.getElementById('timerBtn').innerText = "PAUSE";
            timerInterval = setInterval(() => { seconds++; document.getElementById('matchTimer').innerText = formatTime(seconds); saveData(); }, 1000);
        }
    }

    function stopTimer() { isPaused = true; clearInterval(timerInterval); document.getElementById('timerBtn').innerText = "START"; }

    function action(type, val) {
        if (isPaused && type !== 'adjust') toggleTimer();
        const s = scores[currentPlayer];
        const pName = document.getElementById(`p${currentPlayer+1}-name`).value;
        if (type !== 'adjust') {
            if ((s < 90 && s + val > 90) || (s >= 90 && s < 100 && s + val > 100)) return alert("Nøyaktig score!");
            foulCounts[currentPlayer] = 0;
        }
        history.push({scores: [...scores], foulCounts: [...foulCounts], breakDone, firstPostBreakDone, lastType, currentPlayer, logEntries: [...logEntries]});
        if (type !== 'adjust') {
            if (!breakDone) breakDone = true;
            else if (!firstPostBreakDone) firstPostBreakDone = true;
            lastType = type;
            addLog(`${pName}: ${type==='win'?'Vinnerstøt':(type==='pocket'?'Kule':'Carom')} (+${val}p)`);
        }
        scores[currentPlayer] = Math.max(0, scores[currentPlayer] + val);
        if ([90, 100, 101].includes(scores[currentPlayer])) confetti();
        updateUI();
    }

    function nextTurn() {
        firstPostBreakDone = false; lastType = null;
        currentPlayer = currentPlayer === 0 ? 1 : 0;
        scoreAtStart[currentPlayer] = scores[currentPlayer];
        updateUI();
    }

    function handleFoul() {
        history.push({scores: [...scores], foulCounts: [...foulCounts], breakDone, firstPostBreakDone, lastType, currentPlayer, logEntries: [...logEntries]});
        foulCounts[currentPlayer]++;
        addLog(`FOUL ${foulCounts[currentPlayer]}/3: ${document.getElementById(`p${currentPlayer+1}-name`).value}`);
        if (foulCounts[currentPlayer] >= 3) updateUI(); else { scores[currentPlayer] = scoreAtStart[currentPlayer]; nextTurn(); }
    }

    function undo() {
        if (history.length > 0) {
            let st = history.pop();
            scores = st.scores; foulCounts = st.foulCounts; breakDone = st.breakDone; 
            firstPostBreakDone = st.firstPostBreakDone; lastType = st.lastType; 
            currentPlayer = st.currentPlayer; logEntries = st.logEntries;
            updateUI();
        }
    }

    function toggleRules() { let c = document.getElementById('rulesContent'); c.style.display = (c.style.display === "block") ? "none" : "block"; }
    function resetGame() { if(confirm("Nullstill?")) { localStorage.clear(); location.reload(); } }

    updateUI();
</script>
</body>
</html>
