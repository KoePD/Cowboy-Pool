<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cowboy Pool Match</title>
    <style>
        body { font-family: sans-serif; background: #1a3c1a; color: white; text-align: center; margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; background: #222; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .scoreboard { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .player-box { flex: 1; padding: 15px; border-radius: 10px; background: #333; border: 3px solid transparent; transition: 0.3s; }
        .active { border-color: #f1c40f; background: #444; transform: scale(1.05); }
        
        .score { font-size: 3em; font-weight: bold; display: block; }
        .player-name { font-size: 1.2em; color: #f1c40f; text-transform: uppercase; }

        .phase-info { font-style: italic; color: #aaa; margin: 15px 0; min-height: 3em; font-size: 0.9em; border-top: 1px solid #444; padding-top: 10px; }
        
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button { padding: 15px 5px; font-size: 1em; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        
        .btn-ball { background: #e67e22; } /* Oransje for baller */
        .btn-carom { background: #3498db; } /* Blå for caroms */
        .btn-turn { background: #2ecc71; grid-column: span 3; font-size: 1.2em; margin: 10px 0; } /* Grønn for neste spiller */
        .btn-undo { background: #95a5a6; grid-column: span 1; }
        .btn-reset { background: #e74c3c; grid-column: span 2; }

        button:active { transform: scale(0.95); opacity: 0.8; }
        button:disabled { background: #444; color: #777; opacity: 0.5; }
        
        #log { margin-top: 15px; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <div class="scoreboard">
        <div id="p1-box" class="player-box active">
            <span class="player-name">Spiller 1</span>
            <span id="p1-score" class="score">0</span>
        </div>
        <div id="p2-box" class="player-box">
            <span class="player-name">Spiller 2</span>
            <span id="p2-score" class="score">0</span>
        </div>
    </div>

    <div id="phaseText" class="phase-info">Spiller 1 sin tur.<br>Fase 1: Poeng for alt.</div>

    <div class="btn-grid">
        <button class="btn-ball" onclick="addScore(1)" id="b1">Ball 1</button>
        <button class="btn-ball" onclick="addScore(3)" id="b3">Ball 3</button>
        <button class="btn-ball" onclick="addScore(5)" id="b5">Ball 5</button>
        
        <button class="btn-carom" onclick="addScore(1)">Carom 1p</button>
        <button class="btn-carom" onclick="addScore(2)" style="grid-column: span 2;">Carom 3 baller (2p)</button>
        
        <button class="btn-turn" onclick="switchTurn()">NESTE SPILLER (Ferdig)</button>
        <button class="btn-undo" onclick="undo()">Angre</button>
        <button class="btn-reset" onclick="resetGame()">Nullstill Match</button>
    </div>

    <div id="log">Kamp startet!</div>
</div>

<script>
    let scores = [0, 0];
    let currentPlayer = 0; // 0 for Spiller 1, 1 for Spiller 2
    let history = [];

    const scoreEls = [document.getElementById('p1-score'), document.getElementById('p2-score')];
    const boxEls = [document.getElementById('p1-box'), document.getElementById('p2-box')];
    const phaseEl = document.getElementById('phaseText');
    const logEl = document.getElementById('log');
    
    const ballBtns = [document.getElementById('b1'), document.getElementById('b3'), document.getElementById('b5')];

    function updateUI() {
        scoreEls[0].innerText = scores[0];
        scoreEls[1].innerText = scores[1];
        
        // Marker aktiv spiller
        boxEls[0].classList.toggle('active', currentPlayer === 0);
        boxEls[1].classList.toggle('active', currentPlayer === 1);

        let s = scores[currentPlayer];
        let pName = "Spiller " + (currentPlayer + 1);
        
        if (s < 90) {
            phaseEl.innerHTML = `<b>${pName}</b> sin tur.<br>Fase 1: Alle poeng teller.`;
            ballBtns.forEach(b => b.disabled = false);
        } else if (s < 100) {
            phaseEl.innerHTML = `<b>${pName}</b> sin tur.<br>Fase 2: Kun Caroms (90-100).`;
            ballBtns.forEach(b => b.disabled = true);
        } else if (s === 100) {
            phaseEl.innerHTML = `<b>${pName}</b>: FINALE!<br>Senk hvit via 1-ball!`;
            ballBtns.forEach(b => b.disabled = true);
        } else if (s === 101) {
            phaseEl.innerHTML = `🏆 <b>${pName} VANT!</b> 🏆`;
            ballBtns.forEach(b => b.disabled = true);
        }
    }

    function addScore(points) {
        let s = scores[currentPlayer];
        
        // Sjekk regler for nøyaktig score
        if (s < 90 && s + points > 90) {
            alert("Du må treffe nøyaktig 90!");
            return;
        }
        if (s >= 90 && s < 100 && s + points > 100) {
            alert("Du må treffe nøyaktig 100!");
            return;
        }
        if (s === 100 && points !== 1) return;

        // Lagre historikk for angre-funksjon
        history.push({player: currentPlayer, scoreBefore: scores[currentPlayer]});
        
        scores[currentPlayer] += points;
        logEl.innerText = `Spiller ${currentPlayer+1} fikk ${points} poeng.`;
        updateUI();
    }

    function switchTurn() {
        currentPlayer = currentPlayer === 0 ? 1 : 0;
        logEl.innerText = `Neste spiller: Spiller ${currentPlayer+1}`;
        updateUI();
    }

    function undo() {
        if (history.length > 0) {
            let last = history.pop();
            scores[last.player] = last.scoreBefore;
            currentPlayer = last.player;
            logEl.innerText = "Siste poeng ble angret.";
            updateUI();
        }
    }

    function resetGame() {
        if(confirm("Vil du slette matchen og starte på nytt?")) {
            scores = [0, 0];
            currentPlayer = 0;
            history = [];
            logEl.innerText = "Match nullstilt.";
            updateUI();
        }
    }
</script>

</body>
</html>
