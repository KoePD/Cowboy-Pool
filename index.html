<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Kontroller</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #f1c40f; --danger: #e74c3c; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .status-header { text-align: center; margin-bottom: 20px; }
        .status-msg { font-size: 1.2rem; font-weight: 900; color: var(--primary); text-transform: uppercase; }
        
        .player-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.05); }
        .active-player { border: 2px solid var(--primary); background: rgba(241,196,15,0.1); }
        .player-name { font-weight: bold; font-size: 1.1rem; }
        .player-score { font-size: 1.5rem; font-weight: 900; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; transition: transform 0.1s, filter 0.2s; text-transform: uppercase; }
        button:active { transform: scale(0.95); }
        
        .btn-score { background: var(--primary); color: #000; }
        .btn-foul { background: var(--danger); color: white; }
        .btn-end { background: #34495e; color: white; grid-column: span 2; margin-top: 10px; }
        .btn-lang { background: #444; color: white; font-size: 0.8rem; padding: 5px 10px; }
        
        .foul-dots { display: flex; gap: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #444; }
        .dot.active { background: var(--danger); box-shadow: 0 0 5px var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="card status-header">
        <div id="display-inning" style="font-size: 0.9rem; opacity: 0.7;">INNING 1</div>
        <div id="display-status" class="status-msg">STARTSTØT (3-BALL)</div>
        <button class="btn-lang" onclick="toggleLang()" style="margin-top:10px">Språk / Language</button>
    </div>

    <div id="players-list"></div>

    <div class="card">
        <div class="btn-grid">
            <button class="btn-score" onclick="addScore(1)">+1 Poeng</button>
            <button class="btn-score" onclick="addScore(2)">+2 Poeng</button>
            <button class="btn-score" onclick="addScore(4)">+4 Poeng</button>
            <button class="btn-score" onclick="addScore(5)">+5 Poeng</button>
            <button class="btn-foul" onclick="registerFoul()">FOUL</button>
            <button class="btn-end" onclick="endTurn()">Avslutt tur / Bom</button>
        </div>
    </div>
    
    <button onclick="resetGame()" style="background:none; color:grey; border:1px solid grey; width:100%; font-size:0.7rem;">Nullstill alt</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    let gameData = {
        names: ["Spiller 1", "Spiller 2", "Spiller 3"],
        scores: [0, 0, 0],
        scoreAtStart: [0, 0, 0], // Brukes for å vite hva man skal falle tilbake til ved 3 fouls
        bestSeries: [0, 0, 0],
        foulCounts: [0, 0, 0],
        currentPlayer: 0,
        playerCount: 3,
        innings: 0,
        tableStatus: 'open',
        lastType: 'pocket',
        breakDone: false,
        lang: 'no'
    };

    const i18n = {
        no: { break: "STARTSTØT (3-BALL)", open: "VALG: CAROM / POCKET", rc: "KRAV: CAROM", rp: "KRAV: POCKET", inn: "INNING" },
        en: { break: "BREAKSHOT (3-BALL)", open: "CHOICE: CAROM / POCKET", rc: "REQ: CAROM", rp: "REQ: POCKET", inn: "INNING" }
    };

    // Hent data fra Firebase
    db.on('value', snap => {
        const data = snap.val();
        if (data) {
            gameData = data;
            render();
        }
    });

    function render() {
        const t = i18n[gameData.lang || 'no'];
        document.getElementById('display-inning').innerText = `${t.inn} ${Math.floor(gameData.innings/gameData.playerCount) + 1}`;
        
        let statusText = t.break;
        if (gameData.breakDone) {
            statusText = (gameData.tableStatus === 'locked') ? (gameData.lastType === 'pocket' ? t.rc : t.rp) : t.open;
        }
        document.getElementById('display-status').innerText = statusText;

        let html = '';
        for(let i=0; i<gameData.playerCount; i++) {
            const isActive = i === gameData.currentPlayer;
            html += `
                <div class="player-info ${isActive ? 'active-player' : ''}">
                    <div>
                        <div class="player-name">${gameData.names[i]}</div>
                        <div class="foul-dots">
                            <div class="dot ${gameData.foulCounts[i] >= 1 ? 'active' : ''}"></div>
                            <div class="dot ${gameData.foulCounts[i] >= 2 ? 'active' : ''}"></div>
                            <div class="dot ${gameData.foulCounts[i] >= 3 ? 'active' : ''}"></div>
                        </div>
                    </div>
                    <div class="player-score">${gameData.scores[i]}</div>
                </div>
            `;
        }
        document.getElementById('players-list').innerHTML = html;
    }

    function addScore(pts) {
        // Logikk for Carom vs Pocket veksling
        if (!gameData.breakDone) {
            gameData.breakDone = true;
            gameData.tableStatus = 'locked';
            gameData.lastType = 'break'; // Spesialhåndtering for startstøt
        } else {
            gameData.tableStatus = 'locked';
            gameData.lastType = (pts === 1) ? 'carom' : 'pocket';
        }
        
        gameData.scores[gameData.currentPlayer] += pts;
        
        // Oppdater personlig rekord hvis aktuelt
        const series = gameData.scores[gameData.currentPlayer] - gameData.scoreAtStart[gameData.currentPlayer];
        if (!gameData.bestSeries) gameData.bestSeries = [0,0,0];
        if (series > gameData.bestSeries[gameData.currentPlayer]) {
            gameData.bestSeries[gameData.currentPlayer] = series;
        }
        
        // RESET FOULS VED GYLDIG STØT
        gameData.foulCounts[gameData.currentPlayer] = 0;
        
        save();
    }

    function registerFoul() {
        gameData.foulCounts[gameData.currentPlayer]++;
        
        if (gameData.foulCounts[gameData.currentPlayer] >= 3) {
            // 3 FOULS - SERIEN RYKER
            gameData.scores[gameData.currentPlayer] = gameData.scoreAtStart[gameData.currentPlayer];
            // Vi lar foulCount stå på 3 litt slik at scoreboardet kan fjerne spilleren
            save();
            
            // Vent litt før turen avsluttes automatisk
            setTimeout(() => {
                endTurn();
            }, 1000);
        } else {
            // Ved 1 eller 2 fouls, avsluttes turen i dette oppsettet
            endTurn();
        }
    }

    function endTurn() {
        // NULLSTILL FOULS FOR SPILLEREN SOM GÅR FRA BORDET
        gameData.foulCounts[gameData.currentPlayer] = 0;
        
        // Gå til neste spiller
        gameData.currentPlayer = (gameData.currentPlayer + 1) % gameData.playerCount;
        
        // Sett poengsum ved start av ny tur
        gameData.scoreAtStart[gameData.currentPlayer] = gameData.scores[gameData.currentPlayer];
        
        // Nullstill bordstatus
        gameData.tableStatus = 'open';
        gameData.innings++;
        
        save();
    }

    function toggleLang() {
        gameData.lang = (gameData.lang === 'no') ? 'en' : 'no';
        save();
    }

    function resetGame() {
        if(confirm("Sikker på at du vil starte på nytt?")) {
            gameData.scores = [0,0,0];
            gameData.scoreAtStart = [0,0,0];
            gameData.foulCounts = [0,0,0];
            gameData.currentPlayer = 0;
            gameData.innings = 0;
            gameData.breakDone = false;
            gameData.tableStatus = 'open';
            save();
        }
    }

    function save() {
        db.set(gameData);
    }
</script>

</body>
</html>
