<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool - Firebase Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        /* DESIGN: Her styres farger og utseende på kontrolleren */
        body { font-family: 'Segoe UI', sans-serif; background: #1a3c1a; color: white; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 600px; margin: auto; background: #222; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); position: relative; }
        
        /* MODUS-VELGER: Knappene for 1P, 2P, 3P øverst */
        .top-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        .mode-selector { flex: 1; height: 50px; background: #333; padding: 0 10px; border-radius: 10px; display: flex; justify-content: center; gap: 10px; align-items: center; }
        .mode-selector button { background: #444; color: white; border: 1px solid #555; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 60px; }
        .mode-selector button.active { background: #f1c40f !important; color: #000 !important; border-color: #f1c40f; }
        
        .lang-btn { background: #34495e; color: white; border: 2px solid #5d6d7e; padding: 0 15px; border-radius: 10px; cursor: pointer; font-weight: 800; height: 50px; font-size: 0.8em; }

        /* NAVNE-FELT: Input-boksene der du skriver inn spillernavn */
        .names-row { height: 40px; display: flex; gap: 5px; margin-bottom: 10px; justify-content: center; }
        .names-row input { flex: 1; padding: 10px 5px; border-radius: 8px; border: none; background: #444; color: white; text-align: center; font-size: 0.85em; font-weight: bold; }
        
        /* SCOREBOARD-KORTENE: Boksene som viser score, fouls og serie */
        .scoreboard { display: flex; justify-content: center; margin-bottom: 15px; gap: 8px; align-items: stretch; }
        .player-box { flex: 1; min-width: 0; padding: 15px 5px; border-radius: 15px; background: #333; border: 4px solid transparent; position: relative; }
        .active { border-color: #f1c40f; background: #3d3d3d; } /* Rammen rundt den aktive spilleren */
        .score { font-size: 2.8em; font-weight: 900; display: block; line-height: 1; }
        
        /* SERIE-INFO: Viser "Nå" (gjeldende serie) og "Pers" */
        .series-info { display: flex; justify-content: space-around; margin-top: 8px; border-top: 1px solid #444; padding-top: 5px; }
        .series-val { font-size: 0.95em; color: #f1c40f; font-weight: 900; }

        /* FOUL-DOTS: De tre små prikkene som blir røde ved feil */
        .foul-dots { display: flex; justify-content: center; gap: 6px; margin-top: 12px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #444; border: 1px solid #111; }
        .dot.active { background: #c0392b; box-shadow: 0 0 8px #ff0000; }

        /* TIMER: Match-klokken i midten */
        .timer-row { display: flex; flex-direction: column; align-items: center; margin: 10px 0; padding: 10px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        .timer-display { font-family: monospace; font-size: 1.8em; color: #f1c40f; font-weight: bold; }
        
        /* STATUS-BOKS: Den store boksen som forteller hva neste krav er (KRAV: CAROM osv.) */
        .next-move-box { min-height: 60px; background: #2c3e50; padding: 12px; border-radius: 12px; margin: 10px 0; border-left: 6px solid #f1c40f; text-align: left; display: flex; flex-direction: column; justify-content: center; }
        
        /* BALL-KNAPPER: Knappene for 1, 3 og 5 baller */
        .ball-row { display: flex; justify-content: space-around; margin: 20px 0; align-items: flex-start; min-height: 125px; }
        .ball-btn { width: 75px; height: 75px; border-radius: 50%; border: 3px solid #000; display: flex; align-items: center; justify-content: center; box-shadow: inset -5px -5px 10px rgba(0,0,0,0.5); cursor: pointer; }
       
        /* Den hvite sirkelen bak tallet på kula */
        .ball-num-circle { 
            width: 32px; 
            height: 32px; 
            background: white; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: black; 
            font-weight: 900; 
            border: 3px solid #000; /* Dette lager den svarte kanten rundt det hvite */
        }

        /* Fargene på selve kulene */
        #b1 { background: radial-gradient(circle at 40% 40%, #f1c40f, #b38f00); }
        #b3 { background: radial-gradient(circle at 40% 40%, #e74c3c, #962d22); }
        #b5 { background: radial-gradient(circle at 40% 40%, #8e44ad, #4b0082); }
        .waiting { opacity: 0.15; filter: grayscale(0.8); pointer-events: none; } /* Gjør baller grå når de ikke er lov å putte */

        /* Lyseblå farge for Carom-knappene */
        .btn-carom { background: #2980b9 !important; }

        /* De små + CAROM knappene rett under kulene */
        .btn-sub-carom { 
            background: #3498db; 
            color: white; 
            border: none; 
            padding: 6px 8px; 
            border-radius: 5px; 
            font-size: 0.65em; 
            font-weight: bold; 
            text-transform: uppercase; 
            cursor: pointer; 
            margin-top: 10px; 
            width: 75px; 
        }

        /* KONTROLL-KNAPPER: Carom, Angre, Foul og Avslutt tur */
        .control-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button.ctrl { padding: 14px 5px; font-size: 0.8em; border: none; border-radius: 10px; color: white; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .btn-foul { background: #c0392b; grid-column: span 3; font-size: 1em; padding: 18px; }
        .btn-turn { background: #27ae60; grid-column: span 3; font-size: 1.2em; padding: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-row">
        <div class="mode-selector">
            <button onclick="setPlayerCount(1)" id="btn-count-1">1P</button>
            <button onclick="setPlayerCount(2)" id="btn-count-2">2P</button>
            <button onclick="setPlayerCount(3)" id="btn-count-3">3P</button>
        </div>
        <button class="lang-btn" onclick="toggleLang()" id="langBtn">NO / EN</button>
    </div>

    <div class="names-row" id="inputs-container"></div>
    <div class="scoreboard" id="scoreboard-container"></div>
    
    <div class="timer-row">
        <div class="timer-display" id="matchTimer">00:00:00</div>
        <div class="inning-display" id="inningText" style="color:#aaa; font-weight:bold; margin-top:5px;">Inning: 1</div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button style="background:#e67e22; border:none; color:white; padding:8px 18px; border-radius:6px; font-size:0.8em; cursor:pointer; font-weight:800;" onclick="toggleTimer()" id="timerBtn">START KLOKKE</button>
            <button id="changeBreakerBtn" style="background:#3498db; border:none; color:white; padding:8px 18px; border-radius:6px; font-size:0.8em; cursor:pointer; font-weight:800;" onclick="rotateBreaker()">BYTT STARTSPILLER</button>
        </div>
    </div>

    <div class="next-move-box"><div id="moveText" class="move-text">BREAK SHOT (3-BALL)</div></div>
    
    <div class="ball-row">
        <div class="ball-group">
            <button class="ball-btn" onclick="action('pocket', 1)" id="b1"><div class="ball-num-circle">1</div></button>
            <button class="btn-sub-carom" onclick="action('pocket_carom', 2)" id="sc1">+ CAROM</button>
        </div>
        
        <div class="ball-group">
            <button class="ball-btn" onclick="action('pocket', 5)" id="b5"><div class="ball-num-circle">5</div></button>
            <button class="btn-sub-carom" onclick="action('pocket_carom', 6)" id="sc5">+ CAROM</button>
        </div>

        <div class="ball-group">
            <button class="ball-btn" onclick="action('pocket', 3)" id="b3"><div class="ball-num-circle">3</div></button>
            <button class="btn-sub-carom" onclick="action('pocket_carom', 4)" id="sc3">+ CAROM</button>
        </div>
    </div>

    <div class="control-grid">
        <button class="ctrl btn-carom" onclick="action('carom', 1)" id="c1">Carom 1p</button>
        <button class="ctrl btn-carom" onclick="action('carom', 2)" id="c2">Carom 2p</button>
        <button class="ctrl" style="background:#8e44ad" onclick="undo()" id="undoBtn">Angre</button>
        <button class="ctrl" style="background:#7f8c8d; display: none;" onclick="adjustScore(1)">+</button>
        <button class="ctrl" style="background:#7f8c8d; display: none;" onclick="adjustScore(-1)">−</button>
        <button class="ctrl" style="background:#444; grid-column: span 3;" onclick="showRules()" id="rulesBtn">REGLER</button>
        <button class="ctrl btn-foul" onclick="handleFoul()" id="foulBtn">FOUL (MISTER SERIE)</button>
        <button class="ctrl btn-turn" onclick="nextTurn()" id="turnBtn">AVSLUTT TUR / BOM</button>
        <button class="ctrl" style="background:#34495e; grid-column: span 3; margin-top:10px; font-size:0.7em;" onclick="resetGame()" id="resetBtn">HARD RESET</button>
</div>
</div>

<script>
    /* FIREBASE: Koblingen til databasen din */
    const firebaseConfig = {
        databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    /* ORDBOK: Her styres alle tekstene for norsk og engelsk */
    const i18n = {
        no: {
            start: "START KLOKKE", resume: "FORTSETT", pause: "PAUSE", breaker: "BYTT STARTSPILLER",
            rules: "REGLER", foul: "FOUL (MISTER SERIE)", turn: "AVSLUTT TUR / BOM", reset: "HARD RESET",
            undo: "Angre", inning: "Inning", now: "Nå", best: "Pers",
            msgBreak: "BREAK SHOT (3-BALL)", msgOpen: "VALG: CAROM ELLER KULE", 
            msgReqCarom: "KRAV: CAROM", msgReqPocket: "KRAV: POCKET",
            confirmReset: "Er du sikker på at du vil starte spillet helt på nytt? Alle poeng og personlige rekorder blir slettet!"
        },
        en: {
            start: "START CLOCK", resume: "RESUME", pause: "PAUSE", breaker: "CHANGE BREAKER",
            rules: "RULES", foul: "FOUL (LOSE SERIES)", turn: "END TURN / MISS", reset: "HARD RESET",
            undo: "Undo", inning: "Inning", now: "Now", best: "Best",
            msgBreak: "BREAK SHOT (3-BALL)", msgOpen: "CHOICE: CAROM OR POCKET", 
            msgReqCarom: "REQ: CAROM", msgReqPocket: "REQ: POCKET",
            confirmReset: "Are you sure you want to reset the game? All scores and personal bests will be cleared!"
        }
    };

    /* START-TILSTAND: Standardverdiene når spillet starter */
    let state = {
        playerCount: 2, scores: [0, 0, 0], foulCounts: [0, 0, 0], scoreAtStart: [0, 0, 0],
        currentPlayer: 0, breakDone: false, tableStatus: 'open', lastType: null,
        innings: 0, seconds: 0, names: ["Spiller 1", "Spiller 2", "Spiller 3"],
        bestSeries: [0, 0, 0], lang: 'no'
    };

    let timerInterval = null; let isPaused = true; let history = [];

    /* DATABASE-LYTTER: Oppdaterer kontrolleren når noe endres i Firebase */
    db.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) { state = data; updateUI(); }
    });

    /* SEND DATA: Funksjon for å dytte endringer til Firebase */
    function pushData() { db.set(state); }

    /* SPRÅK: Bytter mellom norsk og engelsk */
    function toggleLang() {
        state.lang = state.lang === 'no' ? 'en' : 'no';
        pushData();
    }

    /* INITIALISER: Lager boksene og input-feltene basert på spillerantall */
    function initUI() {
        const inputCont = document.getElementById('inputs-container');
        const scoreCont = document.getElementById('scoreboard-container');
        inputCont.innerHTML = ''; scoreCont.innerHTML = '';
        const t = i18n[state.lang || 'no'];
        
        
        for(let i=0; i<state.playerCount; i++) {
            inputCont.innerHTML += `<input id="p${i}-name-in" value="${state.names[i]}" oninput="saveName(${i}, this.value)">`;
            scoreCont.innerHTML += `
                <div id="p${i}-box" class="player-box">
                    <span id="p${i}-label" class="player-label-display">${state.names[i]}</span>
                    <span id="p${i}-score" class="score">${state.scores[i]}</span>
                    <div class="series-info">
                        <div class="series-box"><span class="series-label">${t.now}</span><div id="p${i}-turn-score" class="series-val">0</div></div>
                        <div class="series-box"><span class="series-label">${t.best}</span><div id="p${i}-best-score" class="series-val">0</div></div>
                    </div>
                    <div class="foul-dots" id="p${i}-fouls"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                </div>`;
        }
    }

    function saveName(i, val) { state.names[i] = val; pushData(); }

    /* HANDLINGER: Håndterer poeng fra kuler og Carom, og styrer KRAV-logikken */
    function action(type, val) {
        if(isPaused) toggleTimer();
        saveHistory();
        let s = state.scores[state.currentPlayer];
        state.lastShotValue = val;
        
        /* POENG-SPERRE: Hindrer poeng over 90/100 hvis man må ha carom */
        if (s < 90 && s + val > 90) return;
        if (s >= 90 && s < 100 && s + val > 100) return;
        
        if(!state.breakDone) state.breakDone = true;
        
        /* GYLDIG STØT: Nullstiller fouls hvis man scorer poeng */
        state.foulCounts[state.currentPlayer] = 0;
        
        if (type === 'pocket_carom') {
            /* Veksel-logikk for kule + carom knapper */
            if (state.tableStatus === 'locked') state.lastType = (state.lastType === 'pocket') ? 'carom' : 'pocket';
            else state.tableStatus = 'open';
        } else { 
            state.tableStatus = 'locked'; 
            state.lastType = type; 
        }
        state.scores[state.currentPlayer] += val;
        pushData();
    }

    /* JUSTER: Knappene for + og - poeng */
    function adjustScore(val) { saveHistory(); state.scores[state.currentPlayer] = Math.max(0, state.scores[state.currentPlayer] + val); pushData(); }

    /* NESTE TUR: Kjører ved "Avslutt tur / Bom". Nullstiller fouls og bytter spiller. */
    function nextTurn() {
        saveHistory();
        /* Oppdater pers hvis serien som nettopp ble ferdig er rekord */
        let currentSeries = state.scores[state.currentPlayer] - state.scoreAtStart[state.currentPlayer];
        if (currentSeries > (state.bestSeries[state.currentPlayer] || 0)) {
            state.bestSeries[state.currentPlayer] = currentSeries;
        }
        if (!state.breakDone) state.breakDone = true;

        /* NULLSTILLER FOULS FOR SPILLEREN SOM GÅR FRA BORDET */
        state.foulCounts[state.currentPlayer] = 0;

        state.currentPlayer = (state.currentPlayer + 1) % state.playerCount;
        state.innings++;
        state.tableStatus = 'open';
        state.lastType = null;
        state.scoreAtStart[state.currentPlayer] = state.scores[state.currentPlayer];
        pushData();
    }

    /* FOUL: Håndterer feilstøt. Mister serien og bytter tur uten å resette fouls før ETTERpå. */
    function handleFoul() {
        saveHistory();
        if (!state.breakDone) state.breakDone = true;
        state.foulCounts[state.currentPlayer]++;
        state.scores[state.currentPlayer] = state.scoreAtStart[state.currentPlayer];
        
        if (state.foulCounts[state.currentPlayer] >= 3) alert("3 FOULS!");
        
        /* Bytter tur manuelt slik at fouls blir synlig på scoreboardet før de nullstilles i nextTurn logikken */
        let nextPlayer = (state.currentPlayer + 1) % state.playerCount;
        state.currentPlayer = nextPlayer;
        state.innings++;
        state.tableStatus = 'open';
        state.lastType = null;
        state.scoreAtStart[state.currentPlayer] = state.scores[state.currentPlayer];
        pushData();
    }

    /* OPPDATER UI: Oppdaterer alle tekster, knapper og farger i kontrolleren */
    function updateUI() {
        const t = i18n[state.lang || 'no'];
        if (document.getElementById('scoreboard-container').children.length !== state.playerCount) initUI();
        
        /* Aktiv modus-knapp (1P/2P/3P) */
        document.querySelectorAll('.mode-selector button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-count-${state.playerCount}`).classList.add('active');
        
        /* Inning, Klokke og knapper */
        document.getElementById('inningText').innerText = t.inning + ": " + (Math.floor(state.innings/state.playerCount) + 1);
        document.getElementById('matchTimer').innerText = new Date(state.seconds * 1000).toISOString().substr(11, 8);
        document.getElementById('turnBtn').innerText = t.turn;
        document.getElementById('rulesBtn').innerText = t.rules;
        document.getElementById('undoBtn').innerText = t.undo;

        /* Klokke-knapp tekst */
        if(!isPaused) { document.getElementById('timerBtn').innerText = t.pause; } 
        else { document.getElementById('timerBtn').innerText = state.seconds > 0 ? t.resume : t.start; }

        /* Oppdatering av spiller-boksene (Score, Serie, Pers, Fouls) */
        for(let i=0; i<state.playerCount; i++) {
            document.getElementById(`p${i}-label`).innerText = state.names[i];
            document.getElementById(`p${i}-score`).innerText = state.scores[i];
            document.getElementById(`p${i}-turn-score`).innerText = state.scores[i] - state.scoreAtStart[i];
            document.getElementById(`p${i}-best-score`).innerText = state.bestSeries ? (state.bestSeries[i] || 0) : 0;
            document.getElementById(`p${i}-box`).className = (state.currentPlayer === i) ? 'player-box active' : 'player-box';
            
            const dots = document.getElementById(`p${i}-fouls`).children;
            for(let d=0; d<3; d++) dots[d].className = (d < state.foulCounts[i]) ? 'dot active' : 'dot';
        }

        /* LOGIKK FOR KRAV-TEKST: Viser hva spilleren MÅ gjøre */
        let reqText = t.msgOpen;
        if (!state.breakDone) reqText = t.msgBreak;
        else if (state.tableStatus === 'locked') reqText = (state.lastType === 'pocket' ? t.msgReqCarom : t.msgReqPocket);
        document.getElementById('moveText').innerText = reqText;

        /* BALL-SYNLIGHET: Gjør baller grå/inaktive basert på om de er lovlige å putte */
        const isLockedPocket = (state.tableStatus === 'locked' && state.lastType === 'pocket');
        const isAtEnd = state.scores[state.currentPlayer] >= 90;
        document.getElementById('b1').className = (!state.breakDone || isLockedPocket || isAtEnd) ? 'ball-btn waiting' : 'ball-btn';
        document.getElementById('b3').className = (isLockedPocket || isAtEnd) ? 'ball-btn waiting' : 'ball-btn';
        document.getElementById('b5').className = (!state.breakDone || isLockedPocket || isAtEnd) ? 'ball-btn waiting' : 'ball-btn';
    
        /* CAROM-SYNLIGHET: Gjør carom-knapper grå hvis man må ta kule */
        const isLockedCarom = (state.tableStatus === 'locked' && state.lastType === 'carom');
        
        document.getElementById('c1').className = (isLockedCarom) ? 'ctrl btn-carom waiting' : 'ctrl btn-carom';
        document.getElementById('c2').className = (isLockedCarom) ? 'ctrl btn-carom waiting' : 'ctrl btn-carom';
    }
        
    /* REGLER: Viser en enkel popup med regler */
    function showRules() {
        const rules = { no: "REGLER:\n- Brekk må treffe 3-ball.\n- Etter pocket må du ta carom.\n- Etter carom må du ta pocket.\n- Ved 90 poeng er alt carom.", en: "RULES:\n- Break must hit the 3-ball.\n- After a pocket, you must score a carom.\n- After a carom, you must score a pocket.\n- At 90 points, everything is carom." };
        alert(rules[state.lang || 'no']);
    }

    /* TIMER-LOGIKK: Teller sekunder og lagrer til Firebase hvert sekund */
    function toggleTimer() { if(!isPaused) { clearInterval(timerInterval); isPaused = true; } else { isPaused = false; timerInterval = setInterval(() => { state.seconds++; db.child('gameData/seconds').set(state.seconds); }, 1000); } updateUI(); }
    
    function setPlayerCount(n) { state.playerCount = n; resetGame(); }

    /* RESET: Nullstiller hele spillet til start-verdier */
    function resetGame() { const t = i18n[state.lang || 'no']; if (confirm(t.confirmReset)) { state.scores=[0,0,0]; state.foulCounts=[0,0,0]; state.scoreAtStart=[0,0,0]; state.bestSeries=[0,0,0]; state.breakDone=false; state.tableStatus='open'; state.innings=0; state.seconds=0; pushData(); } }
    
    function rotateBreaker() { if(!state.breakDone) { state.currentPlayer = (state.currentPlayer + 1) % state.playerCount; pushData(); } }
    
    /* ANGRE: Lagrer forrige tilstand så du kan hoppe ett steg tilbake */
    function saveHistory() { history.push(JSON.stringify(state)); }
    function undo() { if(history.length) { state = JSON.parse(history.pop()); pushData(); } }
    
    window.onload = initUI;
</script>
</body>
</html>
