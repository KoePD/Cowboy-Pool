<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cowboy Pool Pro Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a3c1a; color: white; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 480px; margin: auto; background: #222; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .names-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .names-row input { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #444; color: white; text-align: center; font-weight: bold; }
        
        .scoreboard { display: flex; justify-content: space-between; margin-bottom: 5px; gap: 10px; }
        .player-box { flex: 1; padding: 15px 5px; border-radius: 15px; background: #333; border: 4px solid transparent; }
        .active { border-color: #f1c40f; background: #3d3d3d; }
        .score { font-size: 3.5em; font-weight: 900; display: block; line-height: 1; }
        .player-label { font-size: 0.9em; color: #bbb; text-transform: uppercase; }

        /* Timer-stil */
        .timer-display { font-family: monospace; font-size: 1.2em; color: #aaa; margin-bottom: 10px; letter-spacing: 1px; }

        .phase-info { font-style: italic; color: #f1c40f; margin: 10px 0; min-height: 3em; font-size: 0.95em; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .ball-row { display: flex; justify-content: space-around; margin: 20px 0; }
        .ball-btn { width: 85px; height: 85px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: inset -8px -8px 15px rgba(0,0,0,0.6), 0 5px 10px rgba(0,0,0,0.4); position: relative; transition: 0.1s; padding: 0; }
        .ball-number { width: 40px; height: 40px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 1.5em; border: 2px solid #000; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.3); }
        .ball-btn::after { content: ''; position: absolute; top: 10%; left: 15%; width: 25px; height: 15px; background: rgba(255,255,255,0.25); border-radius: 50%; transform: rotate(-20deg); }
        #b1 { background: radial-gradient(circle at 40% 40%, #f1c40f, #b38f00); }
        #b3 { background: radial-gradient(circle at 40% 40%, #e74c3c, #962d22); }
        #b5 { background: radial-gradient(circle at 40% 40%, #f39c12, #a36504); }

        .control-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button.ctrl { padding: 15px 5px; font-size: 1em; border: none; border-radius: 12px; cursor: pointer; color: white; font-weight: bold; box-shadow: 0 4px rgba(0,0,0,0.3); }
        .btn-carom { background: #2980b9; }
        .btn-minus { background: #7f8c8d; }
        .btn-foul { background: #c0392b; }
        .btn-undo { background: #8e44ad; }
        .btn-reset { background: #34495e; }
        .btn-turn { background: #27ae60; grid-column: span 3; font-size: 1.3em; margin-top: 5px; }
        .rules-container { margin-top: 20px; text-align: left; background: #111; border-radius: 10px; overflow: hidden; }
        .rules-header { padding: 10px; background: #333; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; }
        .rules-content { padding: 15px; font-size: 0.85em; display: none; line-height: 1.4; color: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <div class="names-row">
        <input type="text" id="p1-name" value="SPILLER 1" oninput="saveData()">
        <input type="text" id="p2-name" value="SPILLER 2" oninput="saveData()">
    </div>

    <div class="scoreboard">
        <div id="p1-box" class="player-box active" onclick="setTurn(0)">
            <span id="p1-label" class="player-label">SPILLER 1</span>
            <span id="p1-score" class="score">0</span>
        </div>
        <div id="p2-box" class="player-box" onclick="setTurn(1)">
            <span id="p2-label" class="player-label">SPILLER 2</span>
            <span id="p2-score" class="score">0</span>
        </div>
    </div>

    <div class="timer-display" id="matchTimer">00:00:00</div>

    <div id="phaseText" class="phase-info">Gjør klar!</div>

    <div class="ball-row">
        <button class="ball-btn" onclick="addScore(1)" id="b1"><div class="ball-number">1</div></button>
        <button class="ball-btn" onclick="addScore(3)" id="b3"><div class="ball-number">3</div></button>
        <button class="ball-btn" onclick="addScore(5)" id="b5"><div class="ball-number">5</div></button>
    </div>

    <div class="control-grid">
        <button class="ctrl btn-carom" onclick="addScore(1)">Carom 1p</button>
        <button class="ctrl btn-carom" onclick="addScore(2)">Carom 2p</button>
        <button class="ctrl btn-minus" onclick="addScore(-1)">−</button>
        <button class="ctrl btn-foul" onclick="handleFoul()">FOUL!</button>
        <button class="ctrl btn-undo" onclick="undo()">Angre</button>
        <button class="ctrl btn-reset" onclick="resetGame()">Reset</button>
        <button class="ctrl btn-turn" onclick="switchTurn()">NESTE SPILLER</button>
    </div>

    <div class="rules-container">
        <div class="rules-header" onclick="toggleRules()">
            <span>📜 Se Regler</span>
            <span id="rule-arrow">▼</span>
        </div>
        <div id="rulesContent" class="rules-content">
            <b>Mål:</b> 101 poeng.<br>
            <b>Fase 1 (0-90):</b> Baller + Caroms.<br>
            <b>Fase 2 (90-100):</b> Kun Caroms.<br>
            <b>Fase 3 (101):</b> Senk hvit via 1-ball.
        </div>
    </div>
</div>

<script>
    let scores = JSON.parse(localStorage.getItem('cowboyScores')) || [0, 0];
    let scoreAtStartOfTurn = JSON.parse(localStorage.getItem('cowboyStartScore')) || [0, 0];
    let currentPlayer = JSON.parse(localStorage.getItem('cowboyPlayer')) || 0;
    let innings = JSON.parse(localStorage.getItem('cowboyInnings')) || 0;
    let secondsElapsed = JSON.parse(localStorage.getItem('cowboyTime')) || 0;
    let timerInterval = null;
    let history = [];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function formatTime(sec) {
        let h = Math.floor(sec / 3600).toString().padStart(2, '0');
        let m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
        let s = (sec % 60).toString().padStart(2, '0');
        return `${h}:${m}:${s}`;
    }

    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            secondsElapsed++;
            document.getElementById('matchTimer').innerText = formatTime(secondsElapsed);
            saveData();
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    function playWinSound() {
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freq;
            osc.type = 'square';
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.15);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i * 0.15);
            osc.stop(audioCtx.currentTime + i * 0.15 + 0.3);
        });
    }

    function saveData() {
        localStorage.setItem('cowboyScores', JSON.stringify(scores));
        localStorage.setItem('cowboyStartScore', JSON.stringify(scoreAtStartOfTurn));
        localStorage.setItem('cowboyPlayer', JSON.stringify(currentPlayer));
        localStorage.setItem('cowboyInnings', JSON.stringify(innings));
        localStorage.setItem('cowboyTime', JSON.stringify(secondsElapsed));
        localStorage.setItem('p1name', document.getElementById('p1-name').value);
        localStorage.setItem('p2name', document.getElementById('p2-name').value);
    }

    function updateUI() {
        const p1Name = document.getElementById('p1-name').value || "Spiller 1";
        const p2Name = document.getElementById('p2-name').value || "Spiller 2";
        document.getElementById('p1-label').innerText = p1Name;
        document.getElementById('p2-label').innerText = p2Name;
        document.getElementById('p1-score').innerText = scores[0];
        document.getElementById('p2-score').innerText = scores[1];
        document.getElementById('p1-box').classList.toggle('active', currentPlayer === 0);
        document.getElementById('p2-box').classList.toggle('active', currentPlayer === 1);
        document.getElementById('matchTimer').innerText = formatTime(secondsElapsed);

        let s = scores[currentPlayer];
        let status = (currentPlayer === 0 ? p1Name : p2Name);
        if (s < 90) status += "<br>Fase 1: Alt teller";
        else if (s < 100) status += "<br>Fase 2: Kun Caroms";
        else if (s === 100) status += "<br>FINALE: Senk hvit via 1-ball!";
        else {
            status += "<br>🏆 VINNER! 🏆";
            stopTimer();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            playWinSound();
        }
        
        document.getElementById('phaseText').innerHTML = status + `<br><small style="color:#666">Inning: ${Math.floor(innings/2)+1}</small>`;
        document.getElementById('b1').disabled = document.getElementById('b3').disabled = document.getElementById('b5').disabled = (s >= 90);
        saveData();
    }

    function addScore(points) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startTimer(); // Starter timeren ved første poengregistrering
        let s = scores[currentPlayer];
        if (points > 0) {
            if (s < 90 && s + points > 90) return alert("Må være nøyaktig 90!");
            if (s >= 90 && s < 100 && s + points > 100) return alert("Må være nøyaktig 100!");
        }
        history.push({player: currentPlayer, scoreBefore: scores[currentPlayer]});
        scores[currentPlayer] = Math.max(0, scores[currentPlayer] + points);
        updateUI();
    }

    function handleFoul() {
        if(confirm("Foul nullstiller runden.")) {
            history.push({player: currentPlayer, scoreBefore: scores[currentPlayer]});
            scores[currentPlayer] = scoreAtStartOfTurn[currentPlayer];
            switchTurn();
        }
    }

    function switchTurn() {
        innings++;
        currentPlayer = currentPlayer === 0 ? 1 : 0;
        scoreAtStartOfTurn[currentPlayer] = scores[currentPlayer];
        updateUI();
    }

    function resetGame() {
        if(confirm("Slette match og timer?")) {
            stopTimer();
            scores = [0, 0]; scoreAtStartOfTurn = [0, 0]; innings = 0; secondsElapsed = 0; history = [];
            localStorage.clear(); updateUI();
        }
    }

    function toggleRules() {
        let content = document.getElementById('rulesContent');
        document.getElementById('rule-arrow').innerText = (content.style.display === "block") ? "▼" : "▲";
        content.style.display = (content.style.display === "block") ? "none" : "block";
    }

    if(localStorage.getItem('p1name')) document.getElementById('p1-name').value = localStorage.getItem('p1name');
    if(localStorage.getItem('p2name')) document.getElementById('p2-name').value = localStorage.getItem('p2name');
    
    // Hvis det var en pågående match, fortsett timeren
    if (secondsElapsed > 0 && scores[0] < 101 && scores[1] < 101) startTimer();

    updateUI();
</script>
</body>
</html>
