<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Profil - Cowboy Pool</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a1a0f; color: white; display: flex; justify-content: center; padding: 20px; }
        .profile-container { width: 100%; max-width: 400px; text-align: center; }
        .avatar { width: 120px; height: 120px; background: #f1c40f; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; color: black; font-size: 3.5em; font-weight: 900; }
        .stat-card { background: #000; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .nav-back { position: absolute; top: 20px; left: 20px; color: #f1c40f; text-decoration: none; display: flex; align-items: center; }
    </style>
</head>
<body>
    <a href="index.html" class="nav-back"><i class="material-icons">arrow_back</i> TILBAKE</a>
    <div class="profile-container">
        <div class="avatar" id="avatar">?</div>
        <h1 id="name">Laster...</h1>
        <div class="stat-card">
            <div style="text-align:left"><small style="color:#666">ALL-TIME BESTE SERIE</small><div id="best" style="font-size:1.5em; font-weight:bold; color:#f1c40f">0</div></div>
            <i class="material-icons" style="font-size:3em; color:#f1c40f">stars</i>
        </div>
        </div>

    <script>
        const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        firebase.database().ref('gameData').on('value', (s) => {
            const d = s.val();
            if(d) {
                document.getElementById('avatar').innerText = d.names[0].charAt(0).toUpperCase();
                document.getElementById('name').innerText = d.names[0];
                document.getElementById('best').innerText = d.bestSeries[0];
            }
        });
    </script>
</body>
</html>
