<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool - Profil</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #000; color: white; margin: 0; padding: 20px; padding-bottom: 120px; }
        .header { text-align: center; margin-bottom: 30px; }
        .profile-card { background: #111; border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #222; }
        .avatar { width: 100px; height: 100px; background: #f1c40f; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; color: black; font-size: 3em; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-box { background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid #222; }
        .stat-label { font-size: 0.7em; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 1.5em; font-weight: bold; color: #f1c40f; }

        /* Bunn-navigasjon */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: flex; justify-content: space-around; padding: 10px 0 35px 0; border-top: 1px solid #111; z-index: 1000; }
        .nav-item { color: #333; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.55em; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: #f1c40f; }
        .nav-item i { font-size: 2.2em; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MIN PROFIL</h1>
    </div>

    <div class="profile-card">
        <div class="avatar" id="userInitial">?</div>
        <h2 id="userName">Laster...</h2>
        
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Beste Serie</div>
                <div class="stat-value" id="bestSerie">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Innings Snitt</div>
                <div class="stat-value" id="avgInnings">0</div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="material-icons" style="transform:none">home</i>
            <span>HJEM</span>
    </a>
        <a href="index.html" class="nav-item active">
            <i class="material-icons">all_inclusive</i>
            <span>RANGE</span>
    </a>
        <a href="profile.html" class="nav-item">
            <i class="material-icons" style="transform:none">person</i>
            <span>PROFIL</span>
    </a>
        <a href="CBstats.html" class="nav-item">
            <i class="material-icons" style="transform:none">leaderboard</i>
            <span>STATS</span>
    </a>
</nav>

    <script>
        const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('gameData');

        let state = {};
        db.on('value', (s) => {
            if(s.val()) {
                state = s.val();
                // Her kan du legge til logikk for å vise data for en spesifikk spiller
                document.getElementById('userName').innerText = state.names[0];
                document.getElementById('userInitial').innerText = state.names[0].charAt(0).toUpperCase();
                document.getElementById('bestSerie').innerText = Math.max(...state.bestSeries);
            }
        });

        function toggleLanguage() {
            const newLang = state.lang === 'no' ? 'en' : 'no';
            db.child('lang').set(newLang);
        }
    </script>
</body>
</html>
