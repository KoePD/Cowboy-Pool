<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biljard App - Master Template</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #2fa34b 0%, #155e2d 60%, #082411 100%);
            --gold: #d4af37;
            --leather: #121212;
            --card-bg: rgba(0, 0, 0, 0.75);
            /* Standard høyder for "Hjem" */
            --header-padding: 80px 30px 140px;
            --bottom-padding: 130px 30px 40px;
            --stitch-pos-top: 18px;
            --stitch-pos-bottom: 18px;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.4s ease; /* Myk overgang mellom sider */
        }

        /* DYNAMISK JUSTERING FOR RANGE / ANDRE SIDER */
        .app-container.slim-mode {
            --header-padding: 40px 30px 60px; /* Mye lavere */
            --bottom-padding: 60px 30px 30px;  /* Mye lavere */
            --stitch-pos-top: 8px;
            --stitch-pos-bottom: 8px;
        }

        .felt-base {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--felt-green);
            z-index: 1;
        }

        .felt-texture {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("https://www.transparenttextures.com/patterns/felt.png");
            opacity: 0.12;
            z-index: 2;
            pointer-events: none;
        }

        /* TOPP-PANEL */
        .header {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: var(--header-padding);
            z-index: 10;
            border-bottom-left-radius: 50% 50px;
            border-bottom-right-radius: 50% 50px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.9);
            position: relative;
            transition: padding 0.4s ease;
        }

        .header::after {
            content: "";
            position: absolute;
            bottom: var(--stitch-pos-top); left: 5%; width: 90%; height: 50px;
            border-bottom: 2px dashed rgba(212, 175, 55, 0.3);
            border-radius: 50%;
        }

        .header h1 { color: #fff; margin: 0; font-size: 32px; font-weight: 800; }
        .rank { color: var(--gold); font-size: 16px; margin: 8px 0; font-weight: 500; }
        
        .progress-bar {
            width: 100%; height: 10px; background: #222;
            border-radius: 5px; margin-top: 25px;
        }
        .progress-fill {
            width: 65%; height: 100%;
            background: linear-gradient(90deg, #b38f36, var(--gold));
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            border-radius: 5px;
        }

        /* MIDTPARTI */
        .main-content {
            position: relative;
            z-index: 5;
            flex-grow: 1;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 10px;
        }

        /* De massive knappene dine */
        .action-card {
            width: 250px;
            height: 280px;
            background: var(--card-bg);
            border: 3.5px solid var(--gold);
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9), 0 25px 50px rgba(0,0,0,0.8), 0 0 20px rgba(212, 175, 55, 0.25);
            backdrop-filter: blur(10px);
            margin: 0 3px;
        }

        .action-card i { font-size: 90px; margin-bottom: 25px; color: var(--gold); }
        .action-card.green-icon i { color: #2ecc71; }
        .action-card span { font-size: 22px; font-weight: 950; letter-spacing: 2px; text-transform: uppercase; }

        /* BUNN-PANEL */
        .bottom-panel {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: var(--bottom-padding);
            z-index: 10;
            border-top-left-radius: 50% 50px;
            border-top-right-radius: 50% 50px;
            box-shadow: 0 -25px 45px rgba(0,0,0,0.9);
            position: relative;
            transition: padding 0.4s ease;
        }

        .bottom-panel::before {
            content: "";
            position: absolute;
            top: var(--stitch-pos-bottom); left: 5%; width: 90%; height: 50px;
            border-top: 2px dashed rgba(212, 175, 55, 0.3);
            border-radius: 50%;
        }

        .match-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid #333;
            border-radius: 24px;
            padding: 25px;
        }

        /* NAVBAR */
        .navbar {
            background: #080808;
            height: 95px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #1a1a1a;
            z-index: 20;
            padding-bottom: 20px;
        }

        .nav-item { color: #444; text-align: center; font-size: 14px; text-decoration: none; font-weight: 800; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { display: block; font-size: 32px; margin-bottom: 8px; }

    </style>
</head>
<body>

<div class="app-container" id="app">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>

    <header class="header">
        <h1 id="user-greeting">Hei, Lasse!</h1>
        <div class="rank">Cowboy Rank: Level 12 - Gunslinger</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </header>

    <main class="main-content">
        <div class="action-card green-icon">
            <i class="fa-solid fa-circle-plus"></i>
            <span>NY KAMP</span>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-trophy"></i>
            <span>TOPPLISTE</span>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-book-open"></i>
            <span>REGLER</span>
        </div>
    </main>

    <section class="bottom-panel">
        <div class="match-card">
            <div style="color:#666; font-size:14px; margin-bottom:15px; font-weight:800; text-transform: uppercase;">Min Siste Kamp</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="text-align:center;">
                    <div style="width:60px; height:60px; border-radius:50%; background:#1a1a1a; border:3px solid var(--gold);"></div>
                </div>
                <div style="font-size:36px; font-weight:950; color:#fff;">0 - 0</div>
                <div style="text-align:center;">
                    <div style="width:60px; height:60px; border-radius:50%; background:#1a1a1a; border:3px solid #333;"></div>
                </div>
            </div>
        </div>
    </section>

    <nav class="navbar">
        <a href="#" class="nav-item active" onclick="toggleMode(false)"><i class="fa-solid fa-house-chimney"></i>HJEM</a>
        <a href="#" class="nav-item" onclick="toggleMode(true)"><i class="fa-solid fa-infinity"></i>RANGE</a>
        <a href="#" class="nav-item" onclick="toggleMode(true)"><i class="fa-solid fa-user"></i>PROFIL</a>
    </nav>
</div>

<script>
    // Enkel funksjon for å demonstrere hvordan du bytter modus
    function toggleMode(isSlim) {
        const app = document.getElementById('app');
        if(isSlim) {
            app.classList.add('slim-mode');
        } else {
            app.classList.remove('slim-mode');
        }
    }
</script>

</body>
</html>
