<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Unified</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #1e4d2b 0%, #0a1a0f 100%);
            --gold: #f1c40f;
            --leather: #121212;
            --card-bg: rgba(0, 0, 0, 0.75);
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            color: white; -webkit-font-smoothing: antialiased;
        }

        .app-container { height: 100%; display: flex; flex-direction: column; position: relative; }

        /* BAKGRUNN */
        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.12; z-index: 2; pointer-events: none; }

        /* LÆR PANELER */
        .header { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 60px 30px 80px; z-index: 10; 
            border-bottom-left-radius: 50% 40px; border-bottom-right-radius: 50% 40px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); transition: all 0.5s ease;
        }
        .bottom-panel { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 80px 30px 20px; z-index: 10; 
            border-top-left-radius: 50% 40px; border-top-right-radius: 50% 40px; 
            box-shadow: 0 -20px 40px rgba(0,0,0,0.8); transition: all 0.5s ease;
        }

        .slim-mode .header { padding: 15px 30px 25px; border-bottom-left-radius: 50% 20px; border-bottom-right-radius: 50% 20px; }
        .slim-mode .bottom-panel { padding: 25px 30px 10px; border-top-left-radius: 50% 20px; border-top-right-radius: 50% 20px; }

        .hide-on-slim { transition: opacity 0.3s ease; }
        .slim-mode .hide-on-slim { opacity: 0; display: none; }

        /* MIDTPARTIET */
        .main-content { position: relative; z-index: 5; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 10px; }
        .main-content::-webkit-scrollbar { display: none; }

        /* HJEM-SKJERM */
        .home-cards { display: flex; flex-direction: column; gap: 15px; align-items: center; justify-content: center; height: 100%; }
        .action-card { 
            width: 85%; max-width: 300px; padding: 25px; background: var(--card-bg); border: 2px solid var(--gold); 
            border-radius: 25px; display: flex; align-items: center; gap: 20px; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .action-card i { font-size: 35px; color: var(--gold); width: 45px; text-align: center; }
        .action-card span { font-size: 18px; font-weight: 900; letter-spacing: 1px; }

        .slim-mode .home-cards { display: none; }

        /* RANGE-INNHOLD (Basert på index.html) */
        .range-content { display: none; width: 100%; max-width: 430px; margin: 0 auto; }
        .slim-mode .range-content { display: block; }

        .player-card { 
            background: linear-gradient(180deg, #0a0a0a 0%, #000 100%); border-radius: 24px; padding: 18px; 
            margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.08); 
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .player-card.active { border: 2px solid var(--gold); transform: scale(1.02); box-shadow: 0 15px 35px rgba(0,0,0,0.9); }
        .score-display { font-size: 3.2em; font-weight: 900; color: #333; line-height: 1; }
        .active .score-display { color: var(--gold); }
        
        .sub-stats { display: flex; gap: 15px; font-size: 10px; color: #444; margin-top: 10px; text-transform: uppercase; }
        .active .sub-stats { color: #888; }
        .stat-val { color: #eee; font-weight: 900; font-size: 1.1em; }

        .foul-dot { width: 12px; height: 12px; border-radius: 50%; background: #1a1a1a; border: 1px solid #222; display: inline-block; }
        .foul-dot.active { background: #e74c3c; box-shadow: 0 0 10px #ff4757; }

        /* KONTROLL-SONE (Bilde 2 layout) */
        .game-status-zone { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 20px 20px 0 0; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .ball-control-zone { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 20px 10px; border-radius: 0 0 35px 35px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        
        .ball-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .ball { width: 75px; height: 75px; border-radius: 50%; border: none; cursor: pointer; box-shadow: inset -6px -6px 15px rgba(0,0,0,0.7), 6px 12px 20px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; }
        #ball1 { background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00); }
        #ball5 { background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082); }
        #ball3 { background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22); }
        .ball-inner { width: 28px; height: 28px; background: white; border-radius: 50%; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 2px solid #000; }
        .btn-sub-carom { background: rgba(52, 152, 219, 0.12); color: #3498db; border: 1px solid #3498db; border-radius: 8px; padding: 6px 12px; font-size: 0.6em; font-weight: 800; cursor: pointer; }

        .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 16px; border-radius: 16px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 0.75em; color: white; }
        .btn-blue { background: #2980b9; border-bottom: 4px solid #1c5982; }
        .btn-foul { background: #c0392b; border-bottom: 4px solid #7b241c; }
        .btn-turn { background: #27ae60; border-bottom: 4px solid #1e8449; grid-column: span 2; padding: 20px; font-size: 1.1em; }
        .btn-win { background: linear-gradient(45deg, #f1c40f, #d4ac0d); color: black; grid-column: span 2; padding: 20px; font-weight: 900; border-radius: 16px; border: none; margin-bottom: 10px; cursor: pointer; display: none; }
        
        .waiting-ball { opacity: 0.15; filter: grayscale(1); pointer-events: none; }

        /* NAVBAR */
        .navbar { background: #000; height: 90px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 20; padding-bottom: 25px; }
        .nav-item { color: #333; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 26px; margin-bottom: 4px; }

        /* SETUP OVERLAY */
        .setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,20,5,0.98); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .setup-card { background: #000; border: 1px solid var(--gold); padding: 30px; border-radius: 30px; width: 100%; max-width: 350px; text-align: center; }
        .btn-choice { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; font-weight: bold; cursor: pointer; }
        .btn-choice.selected { background: var(--gold); color: black; }
        .name-field { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; margin-bottom: 10px; text-align: center; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>

    <header class="header">
        <div class="hide-on-slim">
            <h1 style="color:#fff; margin:0; font-size:32px; font-weight:800;">Hei, Marius!</h1>
            <div style="color:var(--gold); font-size:16px; margin-top:8px;">Cowboy Rank: Level 12</div>
            <div style="width:100%; height:10px; background:#222; border-radius:5px; margin-top:25px;">
                <div style="width:65%; height:100%; background:var(--gold); border-radius:5px;"></div>
            </div>
        </div>
        <div id="gameStatus" style="display:none; text-align:center;">
             <div id="modeLabel" style="font-size:0.6em; color:var(--gold); opacity:0.6; text-transform:uppercase;">MODUS: STANDARD</div>
             <span id="moveText" style="color:#2ecc71; font-weight:900; font-size:16px; letter-spacing:2px;">BREKK-STØT</span>
             <div id="matchTimer" style="color:var(--gold); font-family:monospace; font-size:1.5em; margin: 3px 0;">00:00:00</div>
             <div id="inningDisplay" style="font-size:11px; color:#888; font-weight:bold; text-transform:uppercase;">INNING: 1</div>
        </div>
    </header>

    <main class="main-content">
        <div class="home-cards">
            <div class="action-card" onclick="checkActiveGame()">
                <i class="fa-solid fa-circle-plus" style="color:#2ecc71;"></i>
                <span>NY KAMP</span>
            </div>
            <div class="action-card">
                <i class="fa-solid fa-trophy"></i>
                <span>TOPPLISTE</span>
            </div>
            <div class="action-card">
                <i class="fa-solid fa-book-open"></i>
                <span>REGLER</span>
            </div>
        </div>

        <div class="range-content">
            <div id="scoreboard-container"></div>
            
            <div class="game-status-zone">
                <div id="rotate-container"><button onclick="rotateBreaker()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 15px; border-radius:8px; font-size:10px; font-weight:bold; cursor:pointer;">BYTT STARTSPILLER</button></div>
            </div>

            <div class="ball-control-zone">
                <div class="ball-group">
                    <button class="ball" id="ball1" onclick="action('pocket', 1)"><div class="ball-inner">1</div></button>
                    <button class="btn-sub-carom" id="pc1" onclick="action('pocket_carom', 2)">+ CAROM</button>
                </div>
                <div class="ball-group">
                    <button class="ball" id="ball5" onclick="action('pocket', 5)"><div class="ball-inner">5</div></button>
                    <button class="btn-sub-carom" id="pc5" onclick="action('pocket_carom', 6)">+ CAROM</button>
                </div>
                <div class="ball-group">
                    <button class="ball" id="ball3" onclick="action('pocket', 3)"><div class="ball-inner">3</div></button>
                    <button class="btn-sub-carom" id="pc3" onclick="action('pocket_carom', 4)">+ CAROM</button>
                </div>
            </div>

            <div class="action-area">
                <button id="winButton" class="btn-win" onclick="action('winning_shot', 1)">WINNING SHOT (CUE VIA 1)</button>
                <button class="btn btn-blue" id="carom1PBtn" onclick="action('carom', 1)">Carom 1P</button>
                <button class="btn btn-blue" id="carom2PBtn" onclick="action('carom', 2)">Carom 2P</button>
                <button class="btn btn-foul" id="foulActionBtn" onclick="handleFoul()">FOUL</button>
                <button class="btn btn-blue" id="undoActionBtn" onclick="undo()">ANGRE</button>
                <button class="btn btn-turn" id="endTurnBtn" onclick="nextTurn()">AVSLUTT TUR</button>
            </div>
        </div>
    </main>

    <footer class="bottom-panel">
        <div class="hide-on-slim" style="text-align:center;">
            <div style="background:rgba(255,255,255,0.04); border:1px solid #333; border-radius:20px; padding:20px;">
                <div style="color:#666; font-size:12px; font-weight:900; text-transform:uppercase; margin-bottom:10px;">Siste Resultat</div>
                <div style="font-size:24px; font-weight:950; color:#fff;">101 - 82</div>
            </div>
        </div>
    </footer>

    <nav class="navbar">
        <a href="javascript:void(0)" class="nav-item active" onclick="navTo('home', this)"><i class="material-icons">home</i>HJEM</a>
        <a href="javascript:void(0)" class="nav-item" onclick="navTo('range', this)"><i class="material-icons">all_inclusive</i>RANGE</a>
        <a href="javascript:void(0)" class="nav-item"><i class="material-icons">person</i>PROFIL</a>
        <a href="javascript:void(0)" class="nav-item"><i class="material-icons">leaderboard</i>STATS</a>
    </nav>
</div>

<div id="setupOverlay" class="setup-overlay">
    <div class="setup-card" id="overlayCard"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    let state = { gameMode: 'standard', playerCount: 2, scores: [0,0,0], foulCounts: [0,0,0], scoreAtStart: [0,0,0], currentPlayer: 0, breakDone: false, tableStatus: 'open', lastType: null, seconds: 0, names: ["P1","P2","P3"], bestSeries: [0,0,0], lastSeries: [0,0,0], innings: 1 };
    let history = [];
    let tempMode = 'standard';
    let setupCount = 2;

    db.on('value', (s) => { if(s.val()) { state = s.val(); updateUI(); } });

    function navTo(page, el) {
        const app = document.getElementById('app');
        const status = document.getElementById('gameStatus');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(page === 'range') { app.classList.add('slim-mode'); status.style.display = 'block'; } 
        else { app.classList.remove('slim-mode'); status.style.display = 'none'; }
    }

    function action(type, val) {
        saveHistory();
        let p = state.currentPlayer;
        let cur = state.scores[p];
        if ((cur < 90 && (cur + val) > 90) || (cur >= 90 && (cur + val) > 101)) { handleFoul(); return; }
        
        state.breakDone = true;
        state.foulCounts[p] = 0;

        if (state.gameMode === 'alternate') {
            if (state.tableStatus === 'open') {
                if (type === 'pocket_carom') state.tableStatus = 'open';
                else { state.tableStatus = 'locked'; state.lastType = type; }
            } else {
                if (type === 'pocket_carom') state.lastType = (state.lastType === 'pocket') ? 'carom' : 'pocket';
                else state.lastType = type;
            }
        }
        
        state.scores[p] += val;
        if (state.scores[p] === 101) showWinnerUI(p);
        db.set(state);
    }

    function updateUI() {
        const cont = document.getElementById('scoreboard-container');
        if(!cont) return;
        cont.innerHTML = '';
        for(let i=0; i<state.playerCount; i++) {
            const active = state.currentPlayer === i;
            cont.innerHTML += `
                <div class="player-card ${active?'active':''}">
                    <div class="player-info">
                        <h2>${state.names[i]}</h2>
                        <div class="sub-stats">
                            <div>NÅ <span class="stat-val">${active ? state.scores[i]-state.scoreAtStart[i] : 0}</span></div>
                            <div>PERS <span class="stat-val">${state.bestSeries[i]}</span></div>
                            <div>SISTE <span class="stat-val">${state.lastSeries[i]||0}</span></div>
                        </div>
                        <div style="margin-top:10px;">
                            <div class="foul-dot ${state.foulCounts[i]>=1?'active':''}"></div>
                            <div class="foul-dot ${state.foulCounts[i]>=2?'active':''}"></div>
                            <div class="foul-dot ${state.foulCounts[i]>=3?'active':''}"></div>
                        </div>
                    </div>
                    <div class="score-display">${state.scores[i]}</div>
                </div>`;
        }

        const cur = state.scores[state.currentPlayer];
        const winPhase = cur === 100;
        const caromPhase = cur >= 90 && cur < 100;
        const isAlt = state.gameMode === 'alternate';
        const lockPocket = isAlt && state.tableStatus === 'locked' && state.lastType === 'pocket';
        const lockCarom = isAlt && state.tableStatus === 'locked' && state.lastType === 'carom';

        document.getElementById('winButton').style.display = winPhase ? 'block' : 'none';
        document.getElementById('rotate-container').style.display = state.breakDone ? 'none' : 'block';
        
        // Logikk for deaktivering av knapper (fra index.html)
        document.getElementById('ball1').className = (!state.breakDone || caromPhase || winPhase || lockPocket) ? 'ball waiting-ball' : 'ball';
        document.getElementById('ball5').className = (!state.breakDone || caromPhase || winPhase || lockPocket) ? 'ball waiting-ball' : 'ball';
        document.getElementById('ball3').className = (caromPhase || winPhase || lockPocket) ? 'ball waiting-ball' : 'ball';
        document.getElementById('carom1PBtn').className = (winPhase || (lockCarom && !caromPhase)) ? 'btn btn-blue waiting-ball' : 'btn btn-blue';
        document.getElementById('carom2PBtn').className = (winPhase || (lockCarom && !caromPhase)) ? 'btn btn-blue waiting-ball' : 'btn btn-blue';

        document.getElementById('matchTimer').innerText = new Date(state.seconds * 1000).toISOString().substr(11, 8);
        document.getElementById('inningDisplay').innerText = "INNING: " + state.innings;
        document.getElementById('modeLabel').innerText = "MODUS: " + state.gameMode.toUpperCase();
        
        let msg = "VELG: CAROM / POCKET";
        if (!state.breakDone) msg = "BREKK-STØT";
        else if (winPhase) msg = "VINNER STØTET!";
        else if (caromPhase) msg = "KUN CAROMS";
        else if (lockPocket) msg = "KRAV: CAROM";
        else if (lockCarom) msg = "KRAV: POCKET";
        document.getElementById('moveText').innerText = msg;
    }

    function nextTurn() {
        saveHistory();
        let p = state.currentPlayer;
        state.lastSeries[p] = state.scores[p] - state.scoreAtStart[p];
        if(state.lastSeries[p] > state.bestSeries[p]) state.bestSeries[p] = state.lastSeries[p];
        if(p === state.playerCount - 1) state.innings++;
        state.currentPlayer = (state.currentPlayer + 1) % state.playerCount;
        state.tableStatus = 'open';
        state.scoreAtStart[state.currentPlayer] = state.scores[state.currentPlayer];
        db.set(state);
    }

    function handleFoul() {
        saveHistory();
        state.scores[state.currentPlayer] = state.scoreAtStart[state.currentPlayer];
        state.foulCounts[state.currentPlayer]++;
        if(state.foulCounts[state.currentPlayer] >= 3) { state.scores[state.currentPlayer] = 0; state.foulCounts[state.currentPlayer] = 0; }
        nextTurn();
    }

    function undo() { if(history.length) { state = JSON.parse(history.pop()); db.set(state); } }
    function saveHistory() { history.push(JSON.stringify(state)); if(history.length > 10) history.shift(); }
    function rotateBreaker() { if(!state.breakDone) { state.currentPlayer = (state.currentPlayer+1)%state.playerCount; db.set(state); } }

    function checkActiveGame() {
        document.getElementById('setupOverlay').style.display = 'flex';
        if (state.scores.some(s => s > 0)) {
            document.getElementById('overlayCard').innerHTML = `
                <h2 style="color:var(--gold);">NY MATCH?</h2>
                <button class="btn-blue" style="width:100%; margin-bottom:10px; border-radius:10px;" onclick="handleDiscard()">SLETT & NY</button>
                <button onclick="closeSetup()" style="background:none; border:none; color:#555; text-decoration:underline;">Fortsett kamp</button>
            `;
        } else { goToStep1(); }
    }

    function goToStep1() {
        document.getElementById('overlayCard').innerHTML = `
            <h2 style="color:var(--gold);">MODUS</h2>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn-choice ${tempMode==='standard'?'selected':''}" onclick="tempMode='standard'; goToStep1()">Standard</button>
                <button class="btn-choice ${tempMode==='alternate'?'selected':''}" onclick="tempMode='alternate'; goToStep1()">Alternate</button>
            </div>
            <p style="color:#555;">Antall spillere?</p>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn-choice" onclick="selectPlayers(1)">1</button>
                <button class="btn-choice" onclick="selectPlayers(2)">2</button>
                <button class="btn-choice" onclick="selectPlayers(3)">3</button>
            </div>
        `;
    }

    function selectPlayers(n) {
        setupCount = n;
        let inputs = '';
        for(let i=0; i<n; i++) inputs += `<input type="text" id="n${i}" class="name-field" placeholder="Navn ${i+1}">`;
        document.getElementById('overlayCard').innerHTML = `
            <h2 style="color:var(--gold);">NAVN</h2>
            ${inputs}
            <button class="btn-turn" style="width:100%;" onclick="finalizeSetup()">START</button>
        `;
    }

    function finalizeSetup() {
        const ns = [];
        for(let i=0; i<setupCount; i++) ns.push(document.getElementById(`n${i}`).value || `P${i+1}`);
        db.set({...state, gameMode: tempMode, playerCount: setupCount, names: ns, scores: [0,0,0], foulCounts:[0,0,0], scoreAtStart:[0,0,0], breakDone:false, seconds:0, currentPlayer:0, innings:1});
        closeSetup(); navTo('range', document.querySelectorAll('.nav-item')[1]);
    }

    function showWinnerUI(p) {
        document.getElementById('setupOverlay').style.display = 'flex';
        document.getElementById('overlayCard').innerHTML = `<h1 style="color:var(--gold);">VINNER!</h1><h2>${state.names[p]}</h2><button class="btn-turn" style="width:100%;" onclick="handleDiscard()">NY MATCH</button>`;
    }

    function closeSetup() { document.getElementById('setupOverlay').style.display = 'none'; }
    function handleDiscard() { db.set({...state, scores:[0,0,0], seconds:0, innings:1, breakDone:false}).then(goToStep1); }

    setInterval(() => { if(state.breakDone) { state.seconds++; db.child('seconds').set(state.seconds); } }, 1000);
</script>
</body>
</html>
