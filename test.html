<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biljard App - 100% Fasit</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --felt-green: radial-gradient(circle, #247339 0%, #103a1d 100%);
            --leather: #121212;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        .phone {
            width: 360px;
            height: 760px;
            background: var(--felt-green); /* Hele telefonen har grønn duk som base */
            border-radius: 45px;
            border: 10px solid #282828;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
        }

        /* LÆR-PANEL TOPP */
        .leather-top {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: 45px 25px 60px;
            position: relative;
            z-index: 10;
            /* Denne lager den "smilende" buen nederst */
            clip-path: ellipse(120% 80% at 50% 20%);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Sømmen (den stiplede linjen langs buen) */
        .stitch-top {
            position: absolute;
            bottom: 25px;
            left: -10%;
            width: 120%;
            height: 80px;
            border-bottom: 2px dashed rgba(212, 175, 55, 0.4);
            border-radius: 50%;
            pointer-events: none;
        }

        .header-content h1 { color: #fff; margin: 0; font-size: 26px; font-weight: 700; }
        .rank { color: var(--gold); font-size: 14px; margin: 6px 0; font-weight: 500; }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #222;
            border-radius: 4px;
            margin-top: 15px;
        }
        .progress-fill {
            width: 65%;
            height: 100%;
            background: linear-gradient(90deg, #b38f36, var(--gold));
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        /* MIDTRE SEKSJON (GRØNN DUK) */
        .main-felt {
            flex-grow: 1;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 0 10px;
            background-image: url("https://www.transparenttextures.com/patterns/felt.png"); /* Tekstur på duken */
            position: relative;
            z-index: 1;
        }

        .action-card {
            width: 95px;
            height: 110px;
            background: rgba(0,0,0,0.45);
            border: 1.5px solid var(--gold);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            backdrop-filter: blur(2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .action-card i { font-size: 32px; margin-bottom: 12px; color: var(--gold); }
        .action-card.plus i { color: #2ecc71; }
        .action-card span { font-size: 10px; font-weight: 800; letter-spacing: 0.5px; }

        /* LÆR-PANEL BUNN */
        .leather-bottom {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: 60px 20px 20px;
            position: relative;
            z-index: 10;
            /* Denne lager buen som peker oppover */
            clip-path: ellipse(120% 80% at 50% 80%);
            margin-top: -10px;
        }

        .stitch-bottom {
            position: absolute;
            top: 25px;
            left: -10%;
            width: 120%;
            height: 80px;
            border-top: 2px dashed rgba(212, 175, 55, 0.4);
            border-radius: 50%;
            pointer-events: none;
        }

        .match-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 10px;
        }

        /* NAVIGASJON */
        .navbar {
            background: #0d0d0d;
            height: 75px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
            z-index: 20;
        }

        .nav-link { color: #555; text-align: center; font-size: 11px; text-decoration: none; }
        .nav-link.active { color: var(--gold); }
        .nav-link i { display: block; font-size: 22px; margin-bottom: 5px; }

    </style>
</head>
<body>

<div class="phone">
    <div class="leather-top">
        <div class="header-content">
            <h1>Hei, Marius!</h1>
            <div class="rank">Cowboy Rank: Level 12 - Gunslinger</div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>
        <div class="stitch-top"></div>
    </div>

    <div class="main-felt">
        <div class="action-card plus">
            <i class="fa-solid fa-plus"></i>
            <span>NY KAMP</span>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-trophy"></i>
            <span>TOPPLISTE</span>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-book-open"></i>
            <span>REGLER</span>
        </div>
    </div>

    <div class="leather-bottom">
        <div class="stitch-bottom"></div>
        <div class="match-card">
            <div style="color:#aaa; font-size:13px; margin-bottom:12px; font-weight:600;">Min Siste Kamp</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="text-align:center;">
                    <div style="width:52px; height:52px; border-radius:50%; background:#333; border:2.5px solid var(--gold); margin-bottom:5px;"></div>
                    <div style="color:#fff; font-size:12px;">Mav</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:28px; font-weight:800; color:#fff; letter-spacing:1px;">
                        <span style="color:#2ecc71">100</span> - <span style="color:var(--gold)">82</span>
                    </div>
                    <div style="color:#2ecc71; font-size:11px; font-weight:bold; margin-top:4px;">WIN</div>
                </div>
                <div style="text-align:center;">
                    <div style="width:52px; height:52px; border-radius:50%; background:#333; border:2px solid #444; margin-bottom:5px;"></div>
                    <div style="color:#fff; font-size:12px;">Per</div>
                </div>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <a href="#" class="nav-link active"><i class="fa-solid fa-house"></i>Hjem</a>
        <a href="#" class="nav-link"><i class="fa-solid fa-trophy"></i>Toppliste</a>
        <a href="#" class="nav-item nav-link"><i class="fa-solid fa-book"></i>Regler</a>
    </nav>
</div>

</body>
</html>
