<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biljard App UI - Buede Kanter</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            /* Grønn radial gradient for biljardduken */
            --felt-green: radial-gradient(circle at center, #2e7d32 0%, #1a5e20 50%, #0d3b14 100%);
            --leather-black: #1a1a1a;
            --gold: #d4af37;
            --text-gray: #b0b0b0;
            --phone-width: 375px;
        }

        body {
            background-color: #222;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Mobil-container */
        .phone-container {
            width: var(--phone-width);
            height: 750px;
            background: var(--bg-dark);
            border: 12px solid #333;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* Felles stil for lærpaneler med bue */
        .leather-panel {
            background: linear-gradient(to bottom, #111, #1a1a1a);
            position: relative;
            z-index: 2;
        }

        /* Toppseksjon (bue nederst) */
        .header {
            padding: 30px 20px 40px; /* Mer padding i bunn for buen */
            /* Magien som skaper buen: En stor sirkelmaske som 'klipper' panelet */
            -webkit-mask-image: radial-gradient(circle 500px at 50% -390px, transparent 100%, black 100%);
            mask-image: radial-gradient(circle 500px at 50% -390px, transparent 100%, black 100%);
        }

        .profile-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .greeting h1 {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
        }

        .rank-text {
            color: var(--text-gray);
            font-size: 14px;
            margin-top: 4px;
        }

        .rank-text span {
            color: var(--gold);
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: #333;
            overflow: hidden;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
        }

        .progress-fill {
            width: 65%;
            height: 100%;
            background: var(--gold);
            border-radius: 3px;
        }

        /* Hovedområde med grønn duk (ligger *bak* buen) */
        .main-felt {
            background: var(--felt-green);
            height: 320px;
            margin-top: -30px; /* Overlapper topp-buen */
            margin-bottom: -30px; /* Overlapper bunn-buen */
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 15px;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.6);
        }

        .action-card {
            width: 100px;
            height: 120px;
            background: rgba(0,0,0,0.5);
            border: 1.5px solid var(--gold);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .action-card i {
            font-size: 35px;
            margin-bottom: 10px;
            color: var(--gold);
        }

        .action-card.green-plus i {
            color: #4caf50;
        }

        .action-label {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Kamp-info seksjon (bue øverst) */
        .match-section {
            padding: 40px 20px 20px; /* Mer padding i topp for buen */
            /* Magien som skaper buen: En stor sirkelmaske som 'klipper' panelet */
            -webkit-mask-image: radial-gradient(circle 500px at 50% 540px, transparent 100%, black 100%);
            mask-image: radial-gradient(circle 500px at 50% 540px, transparent 100%, black 100%);
            flex-grow: 1; /* Fyller resten av plassen */
        }

        .match-card {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .match-card h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cat-icon {
            color: #4caf50;
            font-size: 18px;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .player {
            text-align: center;
            width: 80px;
        }

        .player-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #444;
            margin: 0 auto 5px;
            overflow: hidden;
            border: 1px solid #555;
        }
        .player-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .player-name {
            font-size: 14px;
        }

        .score-display {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            line-height: 1;
        }

        .win-tag {
            color: #4caf50;
            font-size: 11px;
            font-weight: bold;
            display: block;
            margin-top: 2px;
        }

        /* Statistikk-tabell */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            text-align: center;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-gray);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 15px;
            font-weight: bold;
        }

        /* Bunnmeny */
        .nav-bar {
            width: 100%;
            height: 70px;
            background: #111;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
            margin-top: auto; /* Sørger for at den alltid er nederst */
        }

        .nav-item {
            text-align: center;
            color: var(--text-gray);
            font-size: 11px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 80px;
        }

        .nav-item.active {
            color: var(--gold);
        }

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header leather-panel">
        <div class="profile-row">
            <div class="greeting">
                <h1>Hei, Marius!</h1>
                <div class="rank-text">Cowboy Rank: <span>Level 12 - Gunslinger</span></div>
            </div>
            <div class="avatar">
                <img src="https://via.placeholder.com/50" alt="Marius Avatar">
            </div>
        </div>
        <div class="progress-bar-container">
            <div class="progress-fill"></div>
        </div>
    </div>

    <div class="main-felt">
        <div class="action-card green-plus">
            <i class="fa-solid fa-plus"></i>
            <div class="action-label">Ny Kamp</div>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-trophy"></i>
            <div class="action-label">Toppliste</div>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-book-open"></i>
            <div class="action-label">Regler</div>
        </div>
    </div>

    <div class="match-section leather-panel">
        <div class="match-card">
            <h3>
                Min Siste Kamp
                <i class="fa-solid fa-cat cat-icon"></i>
            </h3>
            <div class="score-row">
                <div class="player">
                    <div class="player-img">
                        <img src="https://via.placeholder.com/60" alt="Mav">
                    </div>
                    <div class="player-name">Mav</div>
                </div>
                <div class="score-display">
                    <span style="color: #4caf50;">100</span> - <span style="color: var(--gold);">82</span>
                    <span class="win-tag">WIN</span>
                </div>
                <div class="player">
                    <div class="player-img">
                        <img src="https://via.placeholder.com/60" alt="Per">
                    </div>
                    <div class="player-name">Per</div>
                </div>
            </div>
            <div class="stats-grid">
                <div><div class="stat-label">Score</div><div class="stat-value">82</div></div>
                <div><div class="stat-label">Turn</div><div class="stat-value">8</div></div>
                <div><div class="stat-label">Serie</div><div class="stat-value">16</div></div>
                <div><div class="stat-label">Foul</div><div class="stat-value">2</div></div>
                <div><div class="stat-label">Kats.</div><div class="stat-value">27</div></div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <a href="#" class="nav-item active">
            <i class="fa-solid fa-house"></i>
            Hjem
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-trophy"></i>
            Toppliste
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-book"></i>
            Regler
        </a>
    </div>
</div>

</body>
</html>
