<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Expanded Range</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #1e4d2b 0%, #0a1a0f 100%);
            --gold: #f1c40f;
            --leather: #121212;
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            color: white; -webkit-font-smoothing: antialiased;
        }

        .app-container { height: 100%; display: flex; flex-direction: column; position: relative; }

        /* BAKGRUNN */
        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.12; z-index: 2; pointer-events: none; }

        /* LÆR RAMME */
        .header { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 30px 30px 45px; z-index: 10; 
            border-bottom-left-radius: 50% 25px; border-bottom-right-radius: 50% 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); transition: all 0.5s ease;
        }
        .bottom-panel { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 45px 30px 10px; z-index: 10; 
            border-top-left-radius: 50% 25px; border-top-right-radius: 50% 25px; 
            box-shadow: 0 -20px 40px rgba(0,0,0,0.8); transition: all 0.5s ease;
        }

        /* HOVEDINNHOLD */
        .main-content { 
            position: relative; z-index: 5; flex-grow: 1; 
            display: flex; flex-direction: column; 
            padding: 10px 20px; /* Mer luft på sidene */
            scrollbar-width: none; width: 100%; box-sizing: border-box;
            justify-content: center; /* Sentrerer alt vertikalt */
        }

        /* RANGE KONTROLLER FYLLER BREDDEN */
        .range-content { display: flex; flex-direction: column; width: 100%; height: 100%; }

        /* SPILLERKORT - EKSPANDERT */
        .player-card { 
            background: linear-gradient(180deg, #0a0a0a 0%, #000 100%); border-radius: 24px; padding: 20px; 
            margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.08); 
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; box-sizing: border-box;
        }
        .player-card.active { border: 2px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .score-display { font-size: 3.5em; font-weight: 900; line-height: 1; color: #333; }
        .active .score-display { color: var(--gold); }
        
        .sub-stats { font-size: 0.6em; color: #444; margin-top: 10px; display: flex; gap: 20px; text-transform: uppercase; }
        .active .sub-stats { color: #888; }
        .stat-val { color: #eee; font-weight: 900; font-size: 1.1em; }

        /* BALLSONE */
        .game-status-zone { background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 20px 20px 0 0; text-align: center; border: 1px solid rgba(255,255,255,0.05); border-bottom: none; }
        .ball-control-zone { 
            display: flex; justify-content: space-around; 
            background: rgba(0,0,0,0.5); padding: 25px 10px; 
            border-radius: 0 0 35px 35px; border: 1px solid rgba(255,255,255,0.03); 
            border-top: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; 
        }

        /* KNAPPER - FYLLER UT */
        .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
        .btn { padding: 18px; border-radius: 18px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 0.8em; color: white; }
        .btn-blue { background: #2980b9; border-bottom: 4px solid #1c5982; }
        .btn-foul { background: #c0392b; border-bottom: 4px solid #7b241c; }
        .btn-turn { background: #27ae60; border-bottom: 4px solid #1e8449; grid-column: span 2; padding: 22px; font-size: 1.2em; }
        
        /* NAVBAR */
        .navbar { background: #000; height: 85px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; z-index: 20; padding-bottom: 20px; }
        .nav-item { color: #333; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body class="slim-mode">

<div class="app-container" id="app">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>

    <header class="header"></header>

    <main class="main-content">
        <div class="range-content">
            <div id="scoreboard-container">
                </div>
            
            <div class="game-status-zone">
                <span style="color:#2ecc71; font-weight:800; font-size:1em; letter-spacing:2px;">ANY POINT</span>
                <div style="color:var(--gold); font-family:monospace; font-size:1.4em; margin-top:5px;">00:10:06</div>
            </div>

            <div class="ball-control-zone">
                <div class="ball-group">
                    <button class="ball" id="ball1" style="background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00); width:80px; height:80px; border-radius:50%; border:none; box-shadow:0 10px 20px rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center;">
                        <div style="width:28px; height:28px; background:white; border-radius:50%; color:black; font-weight:900; display:flex; align-items:center; justify-content:center; border:2px solid black;">1</div>
                    </button>
                    <button style="background:none; border:1px solid #3498db; color:#3498db; padding:5px 10px; border-radius:8px; font-size:0.6em; margin-top:10px;">+ CAROM</button>
                </div>
                </div>

            <div class="action-area">
                <button class="btn btn-blue">Carom 1P</button>
                <button class="btn btn-blue">Carom 2P</button>
                <button class="btn btn-foul">Foul</button>
                <button class="btn btn-blue">Angre</button>
                <button class="btn btn-turn">Avslutt Tur</button>
            </div>
        </div>
    </main>

    <footer class="bottom-panel"></footer>

    <nav class="navbar">
        <a href="#" class="nav-item"><i class="material-icons">home</i>HJEM</a>
        <a href="#" class="nav-item active"><i class="material-icons">all_inclusive</i>RANGE</a>
        <a href="#" class="nav-item"><i class="material-icons">person</i>PROFIL</a>
        <a href="#" class="nav-item"><i class="material-icons">leaderboard</i>STATS</a>
    </nav>
</div>

</body>
</html>
