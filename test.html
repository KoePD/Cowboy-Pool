<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biljard App - Pixel Perfect</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .phone {
            width: 360px;
            height: 740px;
            background: #0a0a0a;
            border-radius: 40px;
            border: 8px solid #222;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* Lær-tekstur felles */
        .leather {
            background-color: #151515;
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
        }

        /* TOP SEKSJON */
        .header {
            padding: 40px 20px 30px;
            z-index: 5;
        }

        .header h1 { color: #f2e6d0; margin: 0; font-size: 24px; }
        .rank { color: #888; font-size: 13px; margin: 5px 0; }
        .rank span { color: #c4a45d; }

        .progress-bg { height: 6px; background: #222; border-radius: 3px; width: 100%; margin-top: 10px; }
        .progress-fill { height: 100%; background: #c4a45d; border-radius: 3px; width: 60%; box-shadow: 0 0 10px rgba(196,164,93,0.5); }

        /* DE BUEDE OVERGANGENE (SVG) */
        .curve-top { margin-top: -20px; width: 100%; fill: #151515; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); }
        .curve-bottom { margin-bottom: -20px; width: 100%; fill: #151515; transform: rotate(180deg); filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); }

        /* GRØNT FELT */
        .table-felt {
            background: radial-gradient(circle, #1e5a2d 0%, #0d3517 100%);
            flex-grow: 1;
            margin: -10px 0;
            padding: 40px 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .btn-card {
            width: 100px;
            height: 110px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #c4a45d;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .btn-card i { font-size: 32px; margin-bottom: 10px; color: #c4a45d; }
        .btn-card.green i { color: #2ecc71; }
        .btn-card span { font-size: 11px; font-weight: bold; letter-spacing: 0.5px; }

        /* BUNN SEKSJON */
        .bottom-panel {
            flex-grow: 0.8;
            padding: 20px;
            z-index: 5;
        }

        .match-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
        }

        .match-card h3 { margin: 0 0 15px; font-size: 14px; color: #aaa; }

        .score-row { display: flex; justify-content: space-between; align-items: center; }
        .player { text-align: center; }
        .p-img { width: 50px; height: 50px; border-radius: 50%; background: #333; border: 2px solid #c4a45d; }
        
        .score-box { text-align: center; font-size: 28px; font-weight: bold; }
        .win-text { color: #2ecc71; font-size: 10px; display: block; }

        .nav {
            height: 70px;
            background: #0f0f0f;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
        }

        .nav-item { color: #555; text-align: center; font-size: 10px; }
        .nav-item.active { color: #c4a45d; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="phone">
    <div class="header leather">
        <h1>Hei, Marius!</h1>
        <div class="rank">Cowboy Rank: <span>Level 12 - Gunslinger</span></div>
        <div class="progress-bg"><div class="progress-fill"></div></div>
    </div>

    <svg class="curve-top" viewBox="0 0 360 40">
        <path d="M0,0 Q180,40 360,0 L360,40 L0,40 Z" />
    </svg>

    <div class="table-felt">
        <div class="btn-card green">
            <i class="fa-solid fa-plus"></i>
            <span>NY KAMP</span>
        </div>
        <div class="btn-card">
            <i class="fa-solid fa-trophy"></i>
            <span>TOPPLISTE</span>
        </div>
        <div class="btn-card">
            <i class="fa-solid fa-book-open"></i>
            <span>REGLER</span>
        </div>
    </div>

    <svg class="curve-bottom" viewBox="0 0 360 40">
        <path d="M0,0 Q180,40 360,0 L360,40 L0,40 Z" />
    </svg>

    <div class="bottom-panel leather">
        <div class="match-card">
            <h3>Min Siste Kamp</h3>
            <div class="score-row">
                <div class="player"><div class="p-img"></div><div style="font-size:12px; margin-top:5px;">Mav</div></div>
                <div class="score-box">
                    <span style="color:#2ecc71">100</span> - <span style="color:#c4a45d">82</span>
                    <span class="win-text">WIN</span>
                </div>
                <div class="player"><div class="p-img" style="border-color:#555"></div><div style="font-size:12px; margin-top:5px;">Per</div></div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active"><i class="fa-solid fa-house"></i>Hjem</div>
        <div class="nav-item"><i class="fa-solid fa-trophy"></i>Toppliste</div>
        <div class="nav-item"><i class="fa-solid fa-book"></i>Regler</div>
    </div>
</div>

</body>
</html>
