<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Ultra Massive UI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #1e4d2b 0%, #0a1a0f 100%);
            --gold: #f1c40f;
            --leather: #121212;
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            color: white; -webkit-font-smoothing: antialiased;
        }

        .app-container { height: 100%; display: flex; flex-direction: column; position: relative; }

        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.12; z-index: 2; pointer-events: none; }

        /* RAMME */
        .header { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 20px 30px 30px; z-index: 10; 
            border-bottom-left-radius: 50% 20px; border-bottom-right-radius: 50% 20px; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
        }
        .bottom-panel { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 30px 30px 10px; z-index: 10; 
            border-top-left-radius: 50% 20px; border-top-right-radius: 50% 20px; 
            box-shadow: 0 -15px 30px rgba(0,0,0,0.8);
        }

        .main-content { 
            position: relative; z-index: 5; flex-grow: 1; 
            display: flex; flex-direction: column; 
            padding: 5px 10px; 
            width: 100%; box-sizing: border-box;
            overflow-y: auto;
        }

        .top-spacer { height: 15px; width: 100%; }

        /* SCOREBOARD */
        .player-card { 
            background: linear-gradient(180deg, #0a0a0a 0%, #000 100%); 
            border-radius: 30px; min-height: 130px; padding: 25px 30px; 
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.08); 
            display: flex; align-items: center; width: 100%; box-sizing: border-box;
            gap: 20px;
        }
        .player-card.active { border: 5px solid var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.9); transform: scale(1.02); }
        
        .foul-sidebar { display: flex; flex-direction: column; gap: 10px; }
        .foul-dot { width: 18px; height: 18px; border-radius: 50%; background: #000; border: 1px solid #222; }
        .foul-dot.active { background: #e74c3c; box-shadow: 0 0 15px #ff4757; }

        .player-info { flex-grow: 1; display: flex; flex-direction: column; }
        .player-info h2 { margin: 0; font-size: 1.8em; text-transform: uppercase; color: #333; font-weight: 900; letter-spacing: 1px; }
        .active .player-info h2 { color: var(--gold); }
        
        .sub-stats { margin-top: 10px; display: flex; gap: 25px; }
        .stat-group { display: flex; flex-direction: column; align-items: flex-start; }
        .stat-label { font-size: 0.9em; color: #222; text-transform: uppercase; font-weight: 900; margin-bottom: 2px; }
        .active .stat-label { color: #888; }
        .stat-val { color: #fff; font-size: 1.3em; font-weight: 900; }

        .score-display { font-size: 6.5em; font-weight: 950; line-height: 1; color: #111; text-align: right; min-width: 1.2em; }
        .active .score-display { color: var(--gold); }

        /* KONTROLLER */
        .controls-group { width: 100%; margin-top: auto; padding-bottom: 5px; }
        
        .game-status-zone { background: rgba(0, 0, 0, 0.85); padding: 15px; border-radius: 25px 25px 0 0; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        
        /* STØRRE TEKST */
        .req-text { font-size: 1.6em; letter-spacing: 4px; color: #2ecc71; font-weight: 900; text-transform: uppercase; }
        /* STØRRE TID */
        .timer-text { font-family: monospace; font-size: 2.5em; color: var(--gold); margin-top: 5px; display: block; }

        .ball-control-zone { 
            display: flex; justify-content: space-around; background: rgba(0,0,0,0.75); 
            padding: 35px 2px; 
            border-radius: 0 0 50px 50px; 
            border: 1px solid rgba(255,255,255,0.05); border-top: none; margin-bottom: 20px; 
        }
        .ball-group { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 33%; }
        
        .ball { 
            width: 135px; height: 135px; 
            border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset -10px -10px 30px rgba(0,0,0,0.9), 10px 20px 35px rgba(0,0,0,0.8); 
            transition: transform 0.1s;
        }
        .ball:active { transform: scale(0.92); }
        .ball-inner { width: 45px; height: 45px; background: white; border-radius: 50%; color: black; font-weight: 950; display: flex; align-items: center; justify-content: center; border: 3px solid #000; font-size: 24px; }
        
        .btn-sub-carom { 
            background: rgba(52, 152, 219, 0.2); color: #3498db; border: 2px solid #3498db; 
            border-radius: 15px; padding: 12px 15px; 
            font-size: 0.9em; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; width: fit-content; min-width: 80px;
        }

        .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 30px 10px; border-radius: 25px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 1.4em; color: white; }
        .btn-blue { background: #2980b9; border-bottom: 8px solid #1c5982; }
        .btn-foul { background: #c0392b; border-bottom: 8px solid #7b241c; }
        .btn-turn { background: #27ae60; border-bottom: 10px solid #1e8449; grid-column: span 2; padding: 40px; font-size: 2em; margin-top: 10px; }

        .navbar { background: #000; height: 95px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; z-index: 20; padding-bottom: 25px; }
        .nav-item { color: #333; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 12px; font-weight: 900; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>
    <header class="header"></header>

    <main class="main-content">
        <div class="top-spacer"></div>

        <div id="scoreboard-container">
            <div class="player-card active">
                <div class="foul-sidebar">
                    <div class="foul-dot active"></div><div class="foul-dot"></div><div class="foul-dot"></div>
                </div>
                <div class="player-info">
                    <h2>MARIUS</h2>
                    <div class="sub-stats">
                        <div class="stat-group">
                            <span class="stat-label">NÅ</span>
                            <span class="stat-val">12</span>
                        </div>
                        <div class="stat-group">
                            <span class="stat-label">BEST</span>
                            <span class="stat-val">32</span>
                        </div>
                    </div>
                </div>
                <div class="score-display">82</div>
            </div>

            <div class="player-card">
                <div class="foul-sidebar">
                    <div class="foul-dot"></div><div class="foul-dot"></div><div class="foul-dot"></div>
                </div>
                <div class="player-info">
                    <h2>PLAYER 2</h2>
                    <div class="sub-stats">
                        <div class="stat-group">
                            <span class="stat-label">NÅ</span>
                            <span class="stat-val">0</span>
                        </div>
                        <div class="stat-group">
                            <span class="stat-label">BEST</span>
                            <span class="stat-val">15</span>
                        </div>
                    </div>
                </div>
                <div class="score-display">45</div>
            </div>

            <div class="player-card">
                <div class="foul-sidebar">
                    <div class="foul-dot"></div><div class="foul-dot"></div><div class="foul-dot"></div>
                </div>
                <div class="player-info">
                    <h2>PLAYER 3</h2>
                    <div class="sub-stats">
                        <div class="stat-group">
                            <span class="stat-label">NÅ</span>
                            <span class="stat-val">0</span>
                        </div>
                        <div class="stat-group">
                            <span class="stat-label">BEST</span>
                            <span class="stat-val">0</span>
                        </div>
                    </div>
                </div>
                <div class="score-display">0</div>
            </div>
        </div>

        <div class="controls-group">
            <div class="game-status-zone">
                <span class="req-text">VELG: CAROM / POCKET</span>
                <span class="timer-text">00:21:36</span>
            </div>

            <div class="ball-control-zone">
                <div class="ball-group">
                    <button class="ball" style="background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00);"><div class="ball-inner">1</div></button>
                    <button class="btn-sub-carom">+ CAROM</button>
                </div>
                <div class="ball-group">
                    <button class="ball" style="background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082);"><div class="ball-inner">5</div></button>
                    <button class="btn-sub-carom">+ CAROM</button>
                </div>
                <div class="ball-group">
                    <button class="ball" style="background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22);"><div class="ball-inner">3</div></button>
                    <button class="btn-sub-carom">+ CAROM</button>
                </div>
            </div>

            <div class="action-area">
                <button class="btn btn-blue">CAROM 1P</button>
                <button class="btn btn-blue">CAROM 2P</button>
                <button class="btn btn-foul">FOUL</button>
                <button class="btn btn-blue">ANGRE</button>
                <button class="btn btn-turn">AVSLUTT TUR</button>
            </div>
        </div>
    </main>

    <footer class="bottom-panel"></footer>

    <nav class="navbar">
        <div class="nav-item"><i class="material-icons">home</i>HJEM</div>
        <div class="nav-item active"><i class="material-icons">all_inclusive</i>RANGE</div>
        <div class="nav-item"><i class="material-icons">person</i>PROFIL</div>
        <div class="nav-item"><i class="material-icons">leaderboard</i>STATS</div>
    </nav>
</div>

</body>
</html>
