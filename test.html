<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Lobby</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --gold-text: #d4af37;
            --gold-border: #8a6d3b;
            --pool-green: #1a472a;
            --leather-black: #1a1a1a;
            --card-bg: #2a2a2a;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #000; color: white; margin: 0; padding: 0;
            display: flex; justify-content: center;
        }

        .app-container { 
            width: 100%; max-width: 430px; min-height: 100vh;
            background: #000; position: relative; padding-bottom: 90px;
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        /* Lær-header med tekstur */
        .header-section {
            background: 
                linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
                url('https://www.transparenttextures.com/patterns/black-leather.png'), #1a1a1a;
            padding: 50px 25px 40px;
            border-bottom: 2px solid #333;
            border-radius: 0 0 40% 40% / 0 0 20px 20px;
            z-index: 3;
            position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.7);
        }

        .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .user-greeting h1 { margin: 0; font-size: 1.6em; color: #fff; font-weight: 700; }
        .user-rank { font-size: 0.9em; color: #aaa; margin-top: 4px; }
        .rank-highlight { color: var(--gold-text); }
        
        .profile-pic { 
            width: 45px; height: 45px; border-radius: 50%; 
            border: 2px solid var(--gold-border);
            background: url('https://via.placeholder.com/100') center/cover;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .xp-container { 
            background: #222; height: 10px; border-radius: 10px; margin-top: 15px; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); overflow: hidden;
        }
        .xp-fill { 
            background: linear-gradient(90deg, #8a6d3b, #d4af37); 
            width: 60%; height: 100%; border-radius: 10px;
        }

        /* Biljardfilt-området */
        .felt-area {
            background: 
                radial-gradient(circle, rgba(26,71,42,0.8) 0%, rgba(10,31,17,1) 100%),
                url('https://www.transparenttextures.com/patterns/felt.png'), #1a472a;
            margin-top: -20px;
            padding: 60px 20px 80px;
            z-index: 1;
            position: relative;
        }

        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .action-card { 
            background: rgba(0,0,0,0.4); 
            border: 2px solid #5d4a26; 
            border-radius: 12px; padding: 15px 5px; 
            text-align: center; text-decoration: none; color: white;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        .action-card i { font-size: 2.5em; margin-bottom: 8px; font-weight: bold; }
        .action-card span { font-size: 0.75em; font-weight: 800; letter-spacing: 0.5px; color: #eee; }
        
        .card-green i { color: #2ecc71; }
        .card-gold i { color: #f1c40f; }
        .card-white i { color: #fff; }

        /* Siste kamp seksjon med "Innfelt" look */
        .match-section {
            background: #1a1a1a;
            margin: -50px 15px 20px;
            padding: 20px;
            border-radius: 20px;
            z-index: 4;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .section-header { 
            font-size: 0.85em; font-weight: 700; color: #fff; 
            margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between;
        }
        
        .match-card-content { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .p-info { text-align: center; width: 30%; }
        .p-img { 
            width: 55px; height: 55px; border-radius: 50%; 
            border: 2px solid #444; margin: 0 auto 8px;
            background: #333;
        }
        .winner .p-img { border-color: var(--gold-text); }
        .score-num { font-size: 1.8em; font-weight: 800; color: #fff; }
        .win-score { color: #2ecc71; }
        .vs-text { color: #f1c40f; font-weight: 800; font-size: 1.2em; }

        /* Stats Tabell - Ligner nøyaktig på bildet */
        .match-stats { 
            display: grid; grid-template-columns: repeat(5, 1fr); 
            background: #111;
            padding: 12px 5px; border-radius: 10px;
            text-align: center; border: 1px solid #222;
        }
        .stat-col { border-right: 1px solid #222; }
        .stat-col:last-child { border-right: none; }
        .stat-col label { font-size: 0.55em; color: #777; font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .stat-col span { font-size: 0.9em; font-weight: 700; color: #fff; }

        /* Navigasjon */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; max-width: 430px;
            background: #000; display: flex; justify-content: space-around; 
            padding: 10px 0 25px 0; border-top: 1px solid #222; z-index: 100;
        }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 0.65em; font-weight: 700; }
        .nav-item.active { color: var(--gold-text); }
        .nav-item i { font-size: 2em; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="header-section">
        <div class="header-top">
            <div class="user-greeting">
                <h1>Hei, Marius!</h1>
                <div class="user-rank">Cowboy Rank: <span class="rank-highlight">Level 12 - Gunslinger</span></div>
            </div>
            <div class="profile-pic"></div>
        </div>
        <div class="xp-container"><div class="xp-fill"></div></div>
    </div>

    <div class="felt-area">
        <div class="action-grid">
            <div class="action-card card-green">
                <i class="material-icons">add</i>
                <span>NY KAMP</span>
            </div>
            <div class="action-card card-gold">
                <i class="material-icons">emoji_events</i>
                <span>TOPPLISTE</span>
            </div>
            <div class="action-card card-white">
                <i class="material-icons">import_contacts</i>
                <span>REGLER</span>
            </div>
        </div>
    </div>

    <div class="match-section">
        <div class="section-header">
            <span>Min Siste Kamp</span>
            <i class="material-icons" style="color:#2ecc71; font-size: 1.2em;">history</i>
        </div>
        
        <div class="match-card-content">
            <div class="p-info winner">
                <div class="p-img"></div>
                <div style="font-size:0.75em; font-weight:bold">Mav</div>
                <div class="score-num win-score">100</div>
                <div style="font-size:0.55em; color:#2ecc71; font-weight:900;">WIN</div>
            </div>
            
            <div class="vs-text">100 - 82</div>

            <div class="p-info">
                <div class="p-img"></div>
                <div style="font-size:0.75em; font-weight:bold">Per</div>
                <div class="score-num">82</div>
                <div style="height:10px"></div>
            </div>
        </div>

        <div class="match-stats">
            <div class="stat-col"><label>Score</label><span>82</span></div>
            <div class="stat-col"><label>Turn</label><span>8</span></div>
            <div class="stat-col"><label>Serie</label><span>16</span></div>
            <div class="stat-col"><label>Foul</label><span>2</span></div>
            <div class="stat-col"><label>Kats.</label><span>27</span></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="material-icons">home</i>Hjem</div>
        <div class="nav-item"><i class="material-icons">emoji_events</i>Toppliste</div>
        <div class="nav-item"><i class="material-icons">import_contacts</i>Regler</div>
    </nav>
</div>

</body>
</html>
