<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Mobile Optimized</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #1e4d2b 0%, #0a1a0f 100%);
            --gold: #f1c40f;
            --leather: #121212;
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            color: white; -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }

        .app-container { height: 100vh; display: flex; flex-direction: column; position: relative; }
        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.12; z-index: 2; pointer-events: none; }

        /* RAMME */
        .header { background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); padding: 2vh 30px 3vh; z-index: 10; border-bottom-left-radius: 50% 20px; border-bottom-right-radius: 50% 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.8); }
        .bottom-panel { background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); padding: 3vh 30px 1vh; z-index: 10; border-top-left-radius: 50% 20px; border-top-right-radius: 50% 20px; box-shadow: 0 -15px 30px rgba(0,0,0,0.8); }

        .main-content { position: relative; z-index: 5; flex-grow: 1; display: flex; flex-direction: column; padding: 2vh 15px; width: 100%; box-sizing: border-box; justify-content: space-between; }

        /* SCOREBOARD RE-DESIGN */
        .player-card { 
            background: linear-gradient(180deg, #0a0a0a 0%, #000 100%); 
            border-radius: 25px; min-height: 18vh; padding: 20px; 
            margin-bottom: 2vh; border: 1px solid rgba(255,255,255,0.08); 
            display: flex; align-items: center; width: 100%; box-sizing: border-box;
            gap: 15px;
        }
        .player-card.active { border: 4px solid var(--gold); box-shadow: 0 10px 40px rgba(0,0,0,0.9); }

        /* Venstre side: Fouls (Sitter helt til venstre) */
        .foul-sidebar { display: flex; flex-direction: column; gap: 8px; justify-content: center; }
        .foul-dot { width: 14px; height: 14px; border-radius: 50%; background: #111; border: 1px solid #222; }
        .foul-dot.active { background: #e74c3c; box-shadow: 0 0 15px #ff4757; }

        /* Midten: Navn og Stor Score under hverandre */
        .player-main { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .player-main h2 { margin: 0; font-size: 1.5em; text-transform: uppercase; color: #444; font-weight: 900; letter-spacing: 1px; }
        .active .player-main h2 { color: var(--gold); }
        .score-row { font-size: 4.5em; font-weight: 950; line-height: 1; color: #111; margin-top: 5px; }
        .active .score-row { color: var(--gold); }

        /* Høyre side: Stats (Tall under Label) */
        .player-stats { display: flex; gap: 20px; text-align: center; justify-content: flex-end; }
        .stat-box { display: flex; flex-direction: column; align-items: center; min-width: 45px; }
        .stat-label { font-size: 0.7em; color: #333; text-transform: uppercase; font-weight: 900; margin-bottom: 4px; }
        .active .stat-label { color: #888; }
        .stat-val { color: #fff; font-size: 1.6em; font-weight: 900; }

        /* KONTROLLER */
        .controls-group { width: 100%; }
        .game-status-zone { background: rgba(0, 0, 0, 0.8); padding: 10px; border-radius: 20px 20px 0 0; text-align: center; }
        .req-text { font-size: 1em; letter-spacing: 3px; color: #2ecc71; font-weight: 900; text-transform: uppercase; }
        .timer-text { font-family: monospace; font-size: 1.5em; color: var(--gold); }

        .ball-control-zone { 
            display: flex; justify-content: space-around; background: rgba(0,0,0,0.7); 
            padding: 2.5vh 5px; border-radius: 0 0 40px 40px; margin-bottom: 1.5vh; 
        }
        .ball-group { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 33%; }
        .ball { 
            width: 22vw; height: 22vw; max-width: 95px; max-height: 95px; border-radius: 50%; border: none; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.9), 5px 10px 20px rgba(0,0,0,0.7); 
        }
        .ball-inner { width: 8vw; height: 8vw; max-width: 30px; max-height: 30px; background: white; border-radius: 50%; color: black; font-weight: 950; display: flex; align-items: center; justify-content: center; border: 2px solid #000; font-size: 14px; }
        .btn-sub-carom { background: rgba(52, 152, 219, 0.2); color: #3498db; border: 1px solid #3498db; border-radius: 10px; padding: 8px 5px; font-size: 0.7em; font-weight: 900; width: 90%; text-transform: uppercase; }

        .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 2.5vh 5px; border-radius: 18px; border: none; font-weight: 900; text-transform: uppercase; font-size: 1.1em; color: white; }
        .btn-blue { background: #2980b9; border-bottom: 5px solid #1c5982; }
        .btn-foul { background: #c0392b; border-bottom: 5px solid #7b241c; }
        .btn-turn { background: #27ae60; border-bottom: 7px solid #1e8449; grid-column: span 2; padding: 3vh; font-size: 1.6em; }

        .navbar { background: #000; height: 10vh; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid #111; z-index: 20; padding-bottom: 2vh; }
        .nav-item { color: #333; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 900; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>
    <header class="header"></header>

    <main class="main-content">
        <div id="scoreboard-container">
            <div class="player-card active">
                <div class="foul-sidebar">
                    <div class="foul-dot"></div><div class="foul-dot"></div><div class="foul-dot"></div>
                </div>
                <div class="player-main">
                    <h2>MARIUS</h2>
                    <div class="score-row">82</div>
                </div>
                <div class="player-stats">
                    <div class="stat-box">
                        <span class="stat-label">NÅ</span>
                        <span class="stat-val">12</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">BEST</span>
                        <span class="stat-val">32</span>
                    </div>
                </div>
            </div>

            <div class="player-card">
                <div class="foul-sidebar">
                    <div class="foul-dot active"></div><div class="foul-dot"></div><div class="foul-dot"></div>
                </div>
                <div class="player-main">
                    <h2>PLAYER 2</h2>
                    <div class="score-row">45</div>
                </div>
                <div class="player-stats">
                    <div class="stat-box">
                        <span class="stat-label">NÅ</span>
                        <span class="stat-val">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">BEST</span>
                        <span class="stat-val">15</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls-group">
            <div class="game-status-zone">
                <span class="req-text">VELG: CAROM / POCKET</span>
                <div class="timer-text">00:21:36</div>
            </div>

            <div class="ball-control-zone">
                <div class="ball-group">
                    <button class="ball" style="background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00);"><div class="ball-inner">1</div></button>
                    <button class="btn-sub-carom">+ CAROM</button>
                </div>
                <div class="ball-group">
                    <button class="ball" style="background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082);"><div class="ball-inner">5</div></button>
                    <button class="btn-sub-carom">+ CAROM</button>
                </div>
                <div class="ball-group">
                    <button class="ball" style="background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22);"><div class="ball-inner">3</div></button>
                    <button class="btn-sub-carom">+ CAROM</button>
                </div>
            </div>

            <div class="action-area">
                <button class="btn btn-blue">CAROM 1P</button>
                <button class="btn btn-blue">CAROM 2P</button>
                <button class="btn btn-foul">FOUL</button>
                <button class="btn btn-blue">ANGRE</button>
                <button class="btn btn-turn">AVSLUTT TUR</button>
            </div>
        </div>
    </main>

    <footer class="bottom-panel"></footer>

    <nav class="navbar">
        <div class="nav-item"><i class="material-icons">home</i>HJEM</div>
        <div class="nav-item active"><i class="material-icons">all_inclusive</i>RANGE</div>
        <div class="nav-item"><i class="material-icons">person</i>PROFIL</div>
        <div class="nav-item"><i class="material-icons">leaderboard</i>STATS</div>
    </nav>
</div>

</body>
</html>
