<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biljard App - Pixel Perfect Fyldig</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* Den nøyaktige, mettede radial gradienten fra bilde 1 - Dyper Grønn */
            --felt-green: radial-gradient(circle at center, #2fa34b 0%, #155e2d 60%, #0a2b15 100%);
            --gold: #d4af37;
            --leather: #121212;
            --card-bg: rgba(0, 0, 0, 0.6);
        }

        /* Fullskjerm setup for en ren mobil-app følelse */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Hindrer rulling for å låse app-layouten */
            background-color: var(--leather); /* Basefarge */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Hoved-container som fyller telefonen */
        .app-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* GRØNN DUK (Bakgrunnen i midten) */
        .felt-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--felt-green);
            background-image: url("https://www.transparenttextures.com/patterns/felt.png");
            z-index: 1;
        }

        /* TOPP-PANEL (Lær) - STØRRE PADDING */
        .header {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: 60px 30px 90px; /* Økt padding for å bli større */
            z-index: 10;
            border-bottom-left-radius: 50% 40px;
            border-bottom-right-radius: 50% 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            position: relative;
        }

        /* Den stiplede sømmen langs buen */
        .header::after {
            content: "";
            position: absolute;
            bottom: 12px; left: 5%; width: 90%; height: 40px;
            border-bottom: 1.5px dashed rgba(212, 175, 55, 0.35);
            border-radius: 50%;
        }

        .header h1 { color: #fff; margin: 0; font-size: 28px; letter-spacing: 0.5px; font-weight: 700; }
        .rank { color: var(--gold); font-size: 15px; margin: 6px 0; font-weight: 500; }
        
        .progress-bar {
            width: 100%; height: 8px; background: #222;
            border-radius: 4px; margin-top: 18px; position: relative;
        }
        .progress-fill {
            width: 65%; height: 100%;
            background: linear-gradient(90deg, #b38f36, var(--gold));
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
            border-radius: 4px;
        }

        /* MIDTPARTI (Kortene på grønn duk) */
        .main-felt {
            position: relative;
            z-index: 5;
            flex-grow: 1; /* Fyller resten av plassen mellom topp og bunn */
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 20px 10px;
        }

        /* KORTENE - MYE STØRRE */
        .action-card {
            width: 125px; /* Økt bredde */
            height: 130px; /* Økt høyde */
            background: var(--card-bg);
            border: 1.5px solid var(--gold);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.7), 0 8px 20px rgba(0,0,0,0.4);
            backdrop-filter: blur(2px);
        }

        .action-card i { font-size: 40px; margin-bottom: 15px; color: var(--gold); }
        .action-card.green-icon i { color: #2ecc71; }
        .action-card span { font-size: 12px; font-weight: 800; letter-spacing: 1px; }

        /* BUNN-PANEL (Lær) - STØRRE PADDING */
        .bottom-panel {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: 85px 25px 25px; /* Økt padding i topp for å bli større */
            z-index: 10;
            border-top-left-radius: 50% 40px;
            border-top-right-radius: 50% 40px;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.9);
            position: relative;
        }

        .bottom-panel::before {
            content: "";
            position: absolute;
            top: 12px; left: 5%; width: 90%; height: 40px;
            border-top: 1.5px dashed rgba(212, 175, 55, 0.35);
            border-radius: 50%;
        }

        .last-match {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 20px;
        }

        /* NAVBAR - Helt nederst */
        .navbar {
            background: #0a0a0a;
            height: 80px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
            z-index: 20;
        }

        .nav-item { color: #666; text-align: center; font-size: 12px; text-decoration: none; font-weight: 500;}
        .nav-item.active { color: var(--gold); }
        .nav-item i { display: block; font-size: 26px; margin-bottom: 6px; }

    </style>
</head>
<body>

<div class="app-container">
    <div class="felt-layer"></div>

    <header class="header">
        <h1>Hei, Marius!</h1>
        <div class="rank">Cowboy Rank: <span>Level 12 - Gunslinger</span></div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </header>

    <main class="main-felt">
        <div class="action-card green-icon">
            <i class="fa-solid fa-plus"></i>
            <span>NY KAMP</span>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-trophy"></i>
            <span>TOPPLISTE</span>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-book-open"></i>
            <span>REGLER</span>
        </div>
    </main>

    <section class="bottom-panel">
        <div class="last-match">
            <div style="color:#aaa; font-size:13px; margin-bottom:15px; font-weight:600;">Min Siste Kamp</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="text-align:center;">
                    <div style="width:55px; height:55px; border-radius:50%; background:#333; border:2.5px solid var(--gold); margin-bottom:6px;"></div>
                    <div style="color:#fff; font-size:13px;">Mav</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:30px; font-weight:900; color:#fff; letter-spacing:1px;">
                        <span style="color:#2ecc71">100</span> - <span style="color:var(--gold)">82</span>
                    </div>
                    <div style="color:#2ecc71; font-size:11px; font-weight:bold; margin-top:3px;">WIN</div>
                </div>
                <div style="text-align:center;">
                    <div style="width:55px; height:55px; border-radius:50%; background:#333; border:2px solid #444; margin-bottom:6px;"></div>
                    <div style="color:#fff; font-size:13px;">Per</div>
                </div>
            </div>
        </div>
    </section>

    <nav class="navbar">
        <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i>Hjem</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-trophy"></i>Toppliste</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-book"></i>Regler</a>
    </nav>
</div>

</body>
</html>
