<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Unified</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #2fa34b 0%, #155e2d 60%, #082411 100%);
            --gold: #f1c40f;
            --leather: #121212;
            --card-bg: rgba(0, 0, 0, 0.75);
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased; color: white;
        }

        .app-container {
            height: 100%; display: flex; flex-direction: column; position: relative;
        }

        /* BAKGRUNN */
        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.12; z-index: 2; pointer-events: none; }

        /* LÆR-PANELER */
        .header { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 60px 30px 100px; z-index: 10; 
            border-bottom-left-radius: 50% 40px; border-bottom-right-radius: 50% 40px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); transition: all 0.4s ease;
        }
        .bottom-panel { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 100px 30px 40px; z-index: 10; 
            border-top-left-radius: 50% 40px; border-top-right-radius: 50% 40px; 
            box-shadow: 0 -20px 40px rgba(0,0,0,0.8); transition: all 0.4s ease;
        }

        /* SLIM MODE (Når Range er aktiv) */
        .slim-mode .header { padding: 0; height: 15px; border-radius: 0; }
        .slim-mode .bottom-panel { padding: 0; height: 15px; border-radius: 0; }
        .slim-mode .hide-on-slim { display: none; }

        .main-content { position: relative; z-index: 5; flex-grow: 1; display: flex; flex-direction: column; }
        
        /* HJEM-SKJERM */
        .home-cards { 
            display: flex; flex-direction: column; gap: 20px; align-items: center; 
            justify-content: center; height: 100%; padding: 20px;
        }
        .action-card { 
            width: 85%; max-width: 300px; background: var(--card-bg); 
            border: 2px solid var(--gold); border-radius: 25px; padding: 25px;
            display: flex; align-items: center; gap: 20px; cursor: pointer;
        }
        .action-card i { font-size: 35px; color: var(--gold); }
        .action-card span { font-size: 20px; font-weight: 800; }

        /* RANGE MODUS (INDEX.HTML STIL) */
        .range-content { display: none; width: 100%; flex-grow: 1; padding: 10px; box-sizing: border-box; }
        .slim-mode .home-cards { display: none; }
        .slim-mode .range-content { display: flex; flex-direction: column; }

        /* Score-kort fra index */
        .player-card { 
            background: rgba(0,0,0,0.85); border-radius: 20px; padding: 15px 25px; 
            margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .player-card.active { border: 3px solid var(--gold); background: #000; transform: scale(1.02); }
        .player-info h2 { margin: 0; font-size: 1.4em; }
        .score-display { font-size: 3.5em; font-weight: 900; color: #fff; }
        .active .score-display { color: var(--gold); }
        
        .game-status-zone { text-align: center; padding: 10px; }
        .ball-control-zone { 
            display: flex; justify-content: space-around; padding: 15px 0; 
            background: rgba(0,0,0,0.3); border-radius: 20px; margin-bottom: 15px;
        }
        
        .ball { width: 80px; height: 80px; border-radius: 50%; border: none; position: relative; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        #ball1 { background: radial-gradient(circle at 30% 30%, #f1c40f, #9b7b00); }
        #ball5 { background: radial-gradient(circle at 30% 30%, #a29bfe, #4834d4); }
        #ball3 { background: radial-gradient(circle at 30% 30%, #ff7675, #d63031); }
        .ball-num { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; background: white; border-radius: 50%; color: #000; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 2px solid #000; }
        
        .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: auto; padding-bottom: 10px; }
        .btn { padding: 18px; border-radius: 15px; border: none; font-weight: 900; font-size: 14px; text-transform: uppercase; color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .btn-blue { background: #2980b9; }
        .btn-foul { background: #c0392b; }
        .btn-turn { background: #27ae60; grid-column: span 2; font-size: 18px; padding: 22px; margin-top: 5px; }

        .navbar { background: #000; height: 85px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 20; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>

    <header class="header">
        <div class="hide-on-slim">
            <h1 style="margin:0; font-size:28px;">Hei, Marius!</h1>
            <p style="color:var(--gold); margin:5px 0;">Pro Cowboy • Level 12</p>
        </div>
    </header>

    <main class="main-content">
        <div class="home-cards">
            <div class="action-card" onclick="navTo('range', document.getElementById('nav-range'))">
                <i class="fa-solid fa-play"></i>
                <span>START NY KAMP</span>
            </div>
            <div class="action-card">
                <i class="fa-solid fa-trophy"></i>
                <span>TOPPLISTE</span>
            </div>
        </div>

        <div class="range-content">
            <div id="scoreboard-container"></div>
            
            <div class="game-status-zone">
                <span id="moveText" style="color:var(--gold); font-weight:900; letter-spacing:1px;">BREKK-STØT</span>
                <div id="matchTimer" style="font-size: 20px; font-family: monospace;">00:00:00</div>
            </div>

            <div class="ball-control-zone">
                <button class="ball" id="ball1" onclick="action(1)"><div class="ball-num">1</div></button>
                <button class="ball" id="ball5" onclick="action(5)"><div class="ball-num">5</div></button>
                <button class="ball" id="ball3" onclick="action(3)"><div class="ball-num">3</div></button>
            </div>

            <div class="action-area">
                <button class="btn btn-blue" onclick="action(1)">Carom 1P</button>
                <button class="btn btn-blue" onclick="action(2)">Carom 2P</button>
                <button class="btn btn-foul" onclick="handleFoul()">FOUL</button>
                <button class="btn btn-blue" onclick="undo()">ANGRE</button>
                <button class="btn btn-turn" onclick="nextTurn()">AVSLUTT TUR</button>
            </div>
        </div>
    </main>

    <section class="bottom-panel">
        <div class="hide-on-slim">
            <div style="text-align:center; opacity:0.5;">Siste aktivitet: Seier over Erik (100-82)</div>
        </div>
    </section>

    <nav class="navbar">
        <a href="#" class="nav-item active" onclick="navTo('home', this)"><i class="material-icons">home</i>HJEM</a>
        <a href="#" class="nav-item" id="nav-range" onclick="navTo('range', this)"><i class="material-icons">sports_handball</i>RANGE</a>
        <a href="#" class="nav-item"><i class="material-icons">person</i>PROFIL</a>
    </nav>
</div>

<script>
    // Logikk
    let state = {
        playerCount: 2,
        scores: [0, 0],
        currentPlayer: 0,
        names: ["Marius", "Motstander"],
        seconds: 0,
        isActive: false
    };

    function navTo(page, el) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(page === 'range') {
            document.getElementById('app').classList.add('slim-mode');
            state.isActive = true;
        } else {
            document.getElementById('app').classList.remove('slim-mode');
        }
        updateUI();
    }

    function action(pts) {
        state.scores[state.currentPlayer] += pts;
        updateUI();
    }

    function nextTurn() {
        state.currentPlayer = (state.currentPlayer + 1) % state.playerCount;
        updateUI();
    }

    function handleFoul() {
        alert("Foul registrert!");
        nextTurn();
    }

    function updateUI() {
        const cont = document.getElementById('scoreboard-container');
        cont.innerHTML = '';
        for(let i=0; i<state.playerCount; i++) {
            cont.innerHTML += `
                <div class="player-card ${state.currentPlayer === i ? 'active' : ''}">
                    <div class="player-info"><h2>${state.names[i]}</h2></div>
                    <div class="score-display">${state.scores[i]}</div>
                </div>`;
        }
    }

    setInterval(() => {
        if(state.isActive) {
            state.seconds++;
            document.getElementById('matchTimer').innerText = new Date(state.seconds * 1000).toISOString().substr(11, 8);
        }
    }, 1000);

    updateUI();
</script>
</body>
</html>
