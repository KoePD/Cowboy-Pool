<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Mobile Optimized</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #1e4d2b 0%, #0a1a0f 100%);
            --gold: #f1c40f;
            --leather: #121212;
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            color: white; -webkit-font-smoothing: antialiased;
            touch-action: manipulation; /* Hindrer zooming ved raske trykk */
        }

        .app-container { height: 100vh; display: flex; flex-direction: column; position: relative; }

        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.12; z-index: 2; pointer-events: none; }

        /* LÆR RAMME - Justert for telefon */
        .header { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 4vh 5vw 5vh; z-index: 10; 
            border-bottom-left-radius: 50% 20px; border-bottom-right-radius: 50% 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }
        .bottom-panel { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 5vh 5vw 2vh; z-index: 10; 
            border-top-left-radius: 50% 20px; border-top-right-radius: 50% 20px; 
            box-shadow: 0 -10px 20px rgba(0,0,0,0.8);
        }

        /* MIDTPARTIET - Skalerer innholdet */
        .main-content { 
            position: relative; z-index: 5; flex-grow: 1; 
            display: flex; flex-direction: column; 
            padding: 2vh 4vw; width: 100%; box-sizing: border-box;
            justify-content: space-between; /* Presser innholdet fra hverandre for å fylle skjermen */
        }

        /* SCOREBOARD - Bruker vh (viewport height) */
        .player-card { 
            background: linear-gradient(180deg, #0a0a0a 0%, #000 100%); 
            border-radius: 20px; 
            height: 16vh; /* Fast høyde relativt til skjermen */
            padding: 0 6vw; 
            margin-bottom: 2vh; 
            border: 1px solid rgba(255,255,255,0.08); 
            display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box;
        }
        .player-card.active { border: 3px solid var(--gold); box-shadow: 0 5px 25px rgba(0,0,0,0.9); }
        
        .player-info h2 { margin: 0; font-size: 5vw; text-transform: uppercase; color: #444; font-weight: 900; }
        .active .player-info h2 { color: var(--gold); }
        .score-display { font-size: 14vw; font-weight: 950; color: #111; }
        .active .score-display { color: var(--gold); }
        
        .sub-stats { font-size: 2.8vw; color: #333; margin-top: 1vh; display: flex; gap: 4vw; text-transform: uppercase; font-weight: 900; }
        .active .sub-stats { color: #888; }
        .stat-val { color: #fff; font-size: 3.5vw; }

        .foul-container { margin-top: 1.5vh; display: flex; gap: 2vw; }
        .foul-dot { width: 3vw; height: 3vw; max-width: 15px; max-height: 15px; border-radius: 50%; background: #000; border: 1px solid #222; }
        .foul-dot.active { background: #e74c3c; box-shadow: 0 0 10px #ff4757; }

        /* KONTROLLER - Skalert for telefon */
        .controls-group { width: 100%; }

        .game-status-zone { background: rgba(0, 0, 0, 0.8); padding: 1.5vh; border-radius: 20px 20px 0 0; text-align: center; }
        .req-text { font-size: 3.5vw; letter-spacing: 2px; color: #2ecc71; font-weight: 900; text-transform: uppercase; }
        .timer-text { font-family: monospace; font-size: 5vw; color: var(--gold); }

        .ball-control-zone { 
            display: flex; justify-content: space-around; background: rgba(0,0,0,0.7); 
            padding: 3vh 2vw; border-radius: 0 0 35px 35px; margin-bottom: 2vh; 
        }
        .ball-group { display: flex; flex-direction: column; align-items: center; gap: 1.5vh; width: 30%; }
        
        /* KULER SOM ALDRI BLIR FOR STORE FOR BREDDEN */
        .ball { 
            width: 20vw; height: 20vw; max-width: 100px; max-height: 100px;
            border-radius: 50%; border: none; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset -4px -4px 15px rgba(0,0,0,0.9), 4px 10px 20px rgba(0,0,0,0.7); 
        }
        .ball-inner { width: 7vw; height: 7vw; max-width: 30px; max-height: 30px; background: white; border-radius: 50%; color: black; font-weight: 950; display: flex; align-items: center; justify-content: center; border: 2px solid #000; font-size: 3.5vw; }
        
        .btn-sub-carom { 
            background: rgba(52, 152, 219, 0.2); color: #3498db; border: 1px solid #3498db; 
            border-radius: 10px; padding: 1vh 2vw; 
            font-size: 2.5vw; font-weight: 900; width: 90%; text-transform: uppercase;
        }

        /* ACTION BUTTONS */
        .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 2vw; }
        .btn { padding: 2.5vh 2vw; border-radius: 15px; border: none; font-weight: 900; text-transform: uppercase; font-size: 4vw; color: white; }
        .btn-blue { background: #2980b9; border-bottom: 4px solid #1c5982; }
        .btn-foul { background: #c0392b; border-bottom: 4px solid #7b241c; }
        .btn-turn { background: #27ae60; border-bottom: 6px solid #1e8449; grid-column: span 2; padding: 3vh; font-size: 5vw; }

        /* NAVBAR */
        .navbar { background: #000; height: 10vh; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; z-index: 20; padding-bottom: 2vh; }
        .nav-item { color: #333; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 2.5vw; font-weight: 900; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>
    <header class="header"></header>

    <main class="main-content">
        <div id="scoreboard-container">
            <div class="player-card active">
                <div class="player-info">
                    <h2>MARIUS</h2>
                    <div class="sub-stats">
                        <div>NÅ <span class="stat-val">12</span></div>
                        <div>BEST <span class="stat-val">32</span></div>
                    </div>
                    <div class="foul-container">
                        <div class="foul-dot"></div><div class="foul-dot"></div><div class="foul-dot"></div>
                    </div>
                </div>
                <div class="score-display">82</div>
            </div>

            <div class="player-card">
                <div class="player-info">
                    <h2>PLAYER 2</h2>
                    <div class="sub-stats">
                        <div>NÅ <span class="stat-val">0</span></div>
                        <div>BEST <span class="stat-val">15</span></div>
                    </div>
                    <div class="foul-container">
                        <div class="foul-dot active"></div><div class="foul-dot"></div><div class="foul-dot"></div>
                    </div>
                </div>
                <div class="score-display">45</div>
            </div>

            <div class="player-card">
                <div class="player-info">
                    <h2>PLAYER 3</h2>
                    <div class="sub-stats">
                        <div>NÅ <span class="stat-val">0</span></div>
                        <div>BEST <span class="stat-val">0</span></div>
                    </div>
                    <div class="foul-container">
                        <div class="foul-dot"></div><div class="foul-dot"></div><div class="foul-dot"></div>
                    </div>
                </div>
                <div class="score-display">0</div>
            </div>
        </div>

        <div class="controls-group">
            <div class="game-status-zone">
                <span class="req-text">VELG: CAROM / POCKET</span>
                <span class="timer-text">00:21:36</span>
            </div>

            <div class="ball-control-zone">
                <div class="ball-group">
                    <button class="ball" style="background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00);"><div class="ball-inner">1</div></button>
                    <button class="btn-sub-carom">+ CAROM</button>
                </div>
                <div class="ball-group">
                    <button class="ball" style="background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082);"><div class="ball-inner">5</div></button>
                    <button class="btn-sub-carom">+ CAROM</button>
                </div>
                <div class="ball-group">
                    <button class="ball" style="background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22);"><div class="ball-inner">3</div></button>
                    <button class="btn-sub-carom">+ CAROM</button>
                </div>
            </div>

            <div class="action-area">
                <button class="btn btn-blue">CAROM 1P</button>
                <button class="btn btn-blue">CAROM 2P</button>
                <button class="btn btn-foul">FOUL</button>
                <button class="btn btn-blue">ANGRE</button>
                <button class="btn btn-turn">AVSLUTT TUR</button>
            </div>
        </div>
    </main>

    <footer class="bottom-panel"></footer>

    <nav class="navbar">
        <div class="nav-item"><i class="material-icons">home</i>HJEM</div>
        <div class="nav-item active"><i class="material-icons">all_inclusive</i>RANGE</div>
        <div class="nav-item"><i class="material-icons">person</i>PROFIL</div>
        <div class="nav-item"><i class="material-icons">leaderboard</i>STATS</div>
    </nav>
</div>

</body>
</html>
