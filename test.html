<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Range</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #1e4d2b 0%, #0a1a0f 100%);
            --gold: #f1c40f;
            --card-bg: rgba(0, 0, 0, 0.6);
        }

        html, body {
            height: 100%; margin: 0; padding: 0; 
            background-color: #0a1a0f; font-family: 'Segoe UI', sans-serif;
            color: white; overflow-x: hidden;
        }

        .felt-base { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: -1; }

        /* Hovedcontainer som tillater scrolling */
        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px 15px 120px 15px; /* God plass i bunn for navbar */
            box-sizing: border-box;
        }

        /* HEADER STIL */
        .game-header { text-align: center; margin-bottom: 20px; }
        .btn-new-game-top { 
            background: rgba(0,0,0,0.6); color: var(--gold); border: 1px solid rgba(241, 196, 15, 0.5); 
            padding: 8px 25px; border-radius: 50px; font-weight: 800; font-size: 12px; 
            text-transform: uppercase; cursor: pointer; margin-bottom: 20px;
        }

        /* SCOREBOARD CARDS */
        #scoreboard-container { width: 100%; max-width: 400px; margin: 0 auto; }
        .player-card { 
            background: linear-gradient(180deg, #111 0%, #000 100%); 
            border-radius: 20px; padding: 15px 20px; margin-bottom: 10px; 
            border: 1px solid rgba(255,255,255,0.08); 
            display: flex; justify-content: space-between; align-items: center; 
            transition: 0.3s;
        }
        .player-card.active { border: 2px solid var(--gold); box-shadow: 0 10px 25px rgba(0,0,0,0.5); transform: scale(1.02); }
        .player-info h2 { margin: 0; font-size: 1.1em; text-transform: uppercase; color: #888; }
        .active .player-info h2 { color: var(--gold); }
        .score-display { font-size: 3em; font-weight: 900; color: #333; }
        .active .score-display { color: var(--gold); }
        
        .sub-stats { font-size: 10px; color: #555; margin-top: 8px; display: flex; gap: 12px; }
        .active .sub-stats { color: #aaa; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-val { color: #eee; font-weight: bold; font-size: 12px; }

        /* STATUS SONE */
        .status-zone {
            background: var(--card-bg); border-radius: 20px 20px 0 0;
            padding: 15px; margin-top: 10px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05); border-bottom: none;
            width: 100%; max-width: 400px; margin-left: auto; margin-right: auto;
        }
        .req-text { color: #2ecc71; font-weight: 800; letter-spacing: 1px; font-size: 14px; text-transform: uppercase; }
        .timer-text { font-family: monospace; font-size: 1.2em; color: var(--gold); display: block; margin: 4px 0; }

        /* BALLER OG KONTROLLER */
        .control-panel { 
            background: rgba(0,0,0,0.4); border-radius: 0 0 20px 20px; 
            padding: 20px 10px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            width: 100%; max-width: 400px; margin-left: auto; margin-right: auto;
        }
        .ball-row { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .ball-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .ball { width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer; box-shadow: inset -5px -5px 12px rgba(0,0,0,0.7), 4px 8px 15px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
        #ball1 { background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00); }
        #ball5 { background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082); }
        #ball3 { background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22); }
        .ball-inner { width: 25px; height: 25px; background: white; border-radius: 50%; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 2px solid #000; font-size: 12px; }
        
        .btn-sub-carom { background: rgba(52, 152, 219, 0.15); color: #3498db; border: 1px solid #3498db; border-radius: 8px; padding: 5px 10px; font-size: 10px; font-weight: 800; cursor: pointer; }

        /* ACTION BUTTONS */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; margin: 0 auto; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 12px; color: white; }
        .btn-blue { background: #2980b9; border-bottom: 3px solid #1c5982; }
        .btn-foul { background: #c0392b; border-bottom: 3px solid #7b241c; }
        .btn-turn { background: #27ae60; border-bottom: 4px solid #1e8449; grid-column: span 2; padding: 18px; font-size: 16px; margin-top: 5px; }
        .waiting-ball { opacity: 0.2; filter: grayscale(1); pointer-events: none; }

        /* NAVBAR */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: flex; justify-content: space-around; padding: 10px 0 30px; border-top: 1px solid #222; z-index: 100; }
        .nav-item { color: #444; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }

        /* OVERLAYS */
        .setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .setup-card { background: #111; border: 1px solid var(--gold); padding: 30px; border-radius: 25px; width: 90%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>

<div class="felt-base"></div>

<div class="app-container">
    <div class="game-header">
        <button class="btn-new-game-top" onclick="checkActiveGame()">New Match</button>
    </div>

    <div id="scoreboard-container"></div>

    <div class="status-zone">
        <div id="modeLabel" style="font-size:10px; color:var(--gold); opacity:0.6; margin-bottom:5px;">MODUS: STANDARD</div>
        <span class="req-text" id="moveText">BREKK-STØT</span>
        <span class="timer-text" id="matchTimer">00:00:00</span>
        <div id="inningDisplay" style="font-size:11px; color:#666; font-weight:bold; margin-top:5px;">INNING: 1</div>
        <div id="rotate-container" style="margin-top:10px;">
            <button onclick="rotateBreaker()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:4px 12px; border-radius:5px; font-size:10px; font-weight:bold; cursor:pointer;">BYTT STARTSPILLER</button>
        </div>
    </div>

    <div class="control-panel">
        <div class="ball-row">
            <div class="ball-group">
                <button class="ball" id="ball1" onclick="action('pocket', 1)"><div class="ball-inner">1</div></button>
                <button class="btn-sub-carom" id="pc1" onclick="action('pocket_carom', 2)">+ CAROM</button>
            </div>
            <div class="ball-group">
                <button class="ball" id="ball5" onclick="action('pocket', 5)"><div class="ball-inner">5</div></button>
                <button class="btn-sub-carom" id="pc5" onclick="action('pocket_carom', 6)">+ CAROM</button>
            </div>
            <div class="ball-group">
                <button class="ball" id="ball3" onclick="action('pocket', 3)"><div class="ball-inner">3</div></button>
                <button class="btn-sub-carom" id="pc3" onclick="action('pocket_carom', 4)">+ CAROM</button>
            </div>
        </div>

        <div class="action-grid">
            <button id="winButton" class="btn btn-blue" style="grid-column: span 2; display:none; background:var(--gold); color:black;" onclick="action('winning_shot', 1)">WINNING SHOT (CUE VIA 1)</button>
            <button class="btn btn-blue" id="carom1PBtn" onclick="action('carom', 1)">Carom 1P</button>
            <button class="btn btn-blue" id="carom2PBtn" onclick="action('carom', 2)">Carom 2P</button>
            <button class="btn btn-foul" id="foulActionBtn" onclick="handleFoul()">FOUL</button>
            <button class="btn btn-blue" id="undoActionBtn" onclick="undo()">ANGRE</button>
            <button class="btn btn-turn" id="endTurnBtn" onclick="nextTurn()">AVSLUTT TUR</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item"><i class="material-icons">home</i>HJEM</a>
    <a href="#" class="nav-item active"><i class="material-icons">all_inclusive</i>RANGE</a>
    <a href="#" class="nav-item"><i class="material-icons">person</i>PROFIL</a>
    <a href="#" class="nav-item"><i class="material-icons">leaderboard</i>STATS</a>
</nav>

<div id="setupOverlay" class="setup-overlay">
    <div class="setup-card" id="overlayCard"></div>
</div>

<script>
    // Firebase konfigurasjon (bruk din egen database-lenke her)
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    let state = { gameMode: 'standard', playerCount: 2, scores: [0,0,0], foulCounts: [0,0,0], scoreAtStart: [0,0,0], currentPlayer: 0, breakDone: false, tableStatus: 'open', lastType: null, seconds: 0, names: ["P1","P2","P3"], bestSeries: [0,0,0], lastSeries: [0,0,0], innings: 1 };
    let history = [];
    let setupCount = 2;
    let tempMode = 'standard';

    db.on('value', (s) => { if(s.val()) { state = s.val(); updateUI(); } });

    function updateUI() {
        // Scoreboard
        const cont = document.getElementById('scoreboard-container');
        cont.innerHTML = '';
        for(let i=0; i<state.playerCount; i++) {
            const active = state.currentPlayer === i;
            cont.innerHTML += `
                <div class="player-card ${active?'active':''}">
                    <div class="player-info">
                        <h2>${state.names[i]}</h2>
                        <div class="sub-stats">
                            <div class="stat-item">NÅ <span class="stat-val">${active ? state.scores[i]-state.scoreAtStart[i] : 0}</span></div>
                            <div class="stat-item">PERS <span class="stat-val">${state.bestSeries[i]}</span></div>
                            <div class="stat-item">SISTE <span class="stat-val">${state.lastSeries[i]||0}</span></div>
                        </div>
                        <div style="display:flex; gap:5px; margin-top:8px;">
                            <div class="foul-dot ${state.foulCounts[i]>=1?'active':''}" style="width:10px; height:10px; border-radius:50%; background:#222; border:1px solid #333;"></div>
                            <div class="foul-dot ${state.foulCounts[i]>=2?'active':''}" style="width:10px; height:10px; border-radius:50%; background:#222; border:1px solid #333;"></div>
                            <div class="foul-dot ${state.foulCounts[i]>=3?'active':''}" style="width:10px; height:10px; border-radius:50%; background:#222; border:1px solid #333;"></div>
                        </div>
                    </div>
                    <div class="score-display">${state.scores[i]}</div>
                </div>`;
            // Oppdaterer foul dots farge manuelt for enkelthets skyld
            const cards = cont.querySelectorAll('.foul-dot.active');
            cards.forEach(dot => { dot.style.background = '#e74c3c'; dot.style.boxShadow = '0 0 8px #ff4757'; });
        }

        // Spill-logikk knapper (fra din bilde-logikk)
        const cur = state.scores[state.currentPlayer];
        const winPhase = cur === 100;
        const caromPhase = cur >= 90 && cur < 100;
        const isAlt = state.gameMode === 'alternate';
        const lockPocket = isAlt && state.tableStatus === 'locked' && state.lastType === 'pocket';
        const lockCarom = isAlt && state.tableStatus === 'locked' && state.lastType === 'carom';

        document.getElementById('winButton').style.display = winPhase ? 'block' : 'none';
        document.getElementById('rotate-container').style.display = state.breakDone ? 'none' : 'block';
        
        // Deaktivering av baller basert på Cowboy Pool regler
        document.getElementById('ball1').className = (!state.breakDone || caromPhase || winPhase || lockPocket) ? 'ball waiting-ball' : 'ball';
        document.getElementById('ball5').className = (!state.breakDone || caromPhase || winPhase || lockPocket) ? 'ball waiting-ball' : 'ball';
        document.getElementById('ball3').className = (caromPhase || winPhase || lockPocket) ? 'ball waiting-ball' : 'ball';
        
        document.getElementById('carom1PBtn').className = (winPhase || (lockCarom && !caromPhase)) ? 'btn btn-blue waiting-ball' : 'btn btn-blue';
        document.getElementById('carom2PBtn').className = (winPhase || (lockCarom && !caromPhase)) ? 'btn btn-blue waiting-ball' : 'btn btn-blue';

        document.getElementById('matchTimer').innerText = new Date(state.seconds * 1000).toISOString().substr(11, 8);
        document.getElementById('inningDisplay').innerText = "INNING: " + state.innings;
        document.getElementById('modeLabel').innerText = "MODUS: " + state.gameMode.toUpperCase();
        
        // Status melding
        let msg = "VELG: CAROM / POCKET";
        if (!state.breakDone) msg = "BREKK-STØT";
        else if (winPhase) msg = "VINNER STØTET!";
        else if (caromPhase) msg = "KUN CAROMS";
        else if (lockPocket) msg = "KRAV: CAROM";
        else if (lockCarom) msg = "KRAV: POCKET";
        document.getElementById('moveText').innerText = msg;
    }

    // Logikk-funksjoner
    function action(type, val) {
        saveHistory();
        let p = state.currentPlayer;
        let cur = state.scores[p];
        if ((cur < 90 && (cur + val) > 90) || (cur >= 90 && (cur + val) > 101)) { handleFoul(); return; }
        
        state.breakDone = true;
        state.foulCounts[p] = 0;

        if (state.gameMode === 'alternate') {
            if (state.tableStatus === 'open') {
                if (type === 'pocket_carom') state.tableStatus = 'open';
                else { state.tableStatus = 'locked'; state.lastType = type; }
            } else {
                if (type === 'pocket_carom') state.lastType = (state.lastType === 'pocket') ? 'carom' : 'pocket';
                else state.lastType = type;
            }
        }
        
        state.scores[p] += val;
        if (state.scores[p] === 101) showWinnerUI(p);
        db.set(state);
    }

    function nextTurn() {
        saveHistory();
        let p = state.currentPlayer;
        let series = state.scores[p] - state.scoreAtStart[p];
        state.lastSeries[p] = series;
        if(series > state.bestSeries[p]) state.bestSeries[p] = series;
        
        if(p === state.playerCount - 1) state.innings++;
        state.currentPlayer = (state.currentPlayer + 1) % state.playerCount;
        state.tableStatus = 'open';
        state.scoreAtStart[state.currentPlayer] = state.scores[state.currentPlayer];
        db.set(state);
    }

    function handleFoul() {
        saveHistory();
        state.scores[state.currentPlayer] = state.scoreAtStart[state.currentPlayer];
        state.foulCounts[state.currentPlayer]++;
        if(state.foulCounts[state.currentPlayer] >= 3) {
            state.scores[state.currentPlayer] = 0;
            state.foulCounts[state.currentPlayer] = 0;
        }
        nextTurn();
    }

    function undo() { if(history.length) { state = JSON.parse(history.pop()); db.set(state); } }
    function saveHistory() { history.push(JSON.stringify(state)); if(history.length > 10) history.shift(); }
    function rotateBreaker() { if(!state.breakDone) { state.currentPlayer = (state.currentPlayer+1)%state.playerCount; db.set(state); } }

    // Setup og Vinner UI
    function checkActiveGame() {
        document.getElementById('setupOverlay').style.display = 'flex';
        if (state.scores.some(s => s > 0)) {
            document.getElementById('overlayCard').innerHTML = `
                <h2 style="color:var(--gold);">NY MATCH?</h2>
                <p>En kamp pågår. Hva vil du gjøre?</p>
                <button class="btn-save-option" onclick="handleFinishAndSave()" style="background:#2980b9; color:white; width:100%; padding:12px; border-radius:10px; border:none; margin-bottom:10px; font-weight:bold;">LAGRE & NY</button>
                <button class="btn-discard-option" onclick="handleDiscard()" style="background:#c0392b; color:white; width:100%; padding:12px; border-radius:10px; border:none; font-weight:bold;">SLETT & NY</button>
                <button onclick="closeSetup()" style="background:none; border:none; color:#888; margin-top:15px; text-decoration:underline;">Fortsett kamp</button>
            `;
        } else { goToStep1(); }
    }

    function goToStep1() {
        document.getElementById('overlayCard').innerHTML = `
            <h2 style="color:var(--gold);">NY MATCH</h2>
            <p style="font-size:12px; color:#888;">MODUS:</p>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn-choice ${tempMode==='standard'?'selected':''}" onclick="tempMode='standard'; goToStep1()" style="flex:1; padding:10px; border-radius:10px; border:1px solid #333; background:#000; color:white;">Standard</button>
                <button class="btn-choice ${tempMode==='alternate'?'selected':''}" onclick="tempMode='alternate'; goToStep1()" style="flex:1; padding:10px; border-radius:10px; border:1px solid #333; background:#000; color:white;">Alternate</button>
            </div>
            <p style="font-size:12px; color:#888;">SPILLERE:</p>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button onclick="selectPlayers(1)" style="flex:1; padding:10px; background:#222; color:white; border:none; border-radius:10px;">1</button>
                <button onclick="selectPlayers(2)" style="flex:1; padding:10px; background:#222; color:white; border:none; border-radius:10px;">2</button>
                <button onclick="selectPlayers(3)" style="flex:1; padding:10px; background:#222; color:white; border:none; border-radius:10px;">3</button>
            </div>
            <button onclick="closeSetup()" style="color:#555; background:none; border:none;">Avbryt</button>
        `;
        // Mark valgt modus
        const btns = document.querySelectorAll('.btn-choice');
        btns.forEach(b => { if(b.innerText.toLowerCase() === tempMode) b.style.borderColor = '#f1c40f'; });
    }

    function selectPlayers(n) {
        setupCount = n;
        let inputs = '';
        for(let i=0; i<n; i++) inputs += `<input type="text" id="n${i}" class="name-field" placeholder="Navn ${i+1}" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #333; background:#000; color:white; box-sizing:border-box;">`;
        document.getElementById('overlayCard').innerHTML = `
            <h2 style="color:var(--gold);">SPILLERNAVN</h2>
            ${inputs}
            <button class="btn-turn" style="width:100%; margin-top:10px;" onclick="finalizeSetup()">START KAMP</button>
            <button onclick="goToStep1()" style="color:#555; background:none; border:none; margin-top:10px;">Tilbake</button>
        `;
    }

    function finalizeSetup() {
        const ns = [];
        for(let i=0; i<setupCount; i++) ns.push(document.getElementById(`n${i}`).value || `P${i+1}`);
        db.set({...state, gameMode: tempMode, playerCount: setupCount, names: ns, scores: [0,0,0], foulCounts:[0,0,0], scoreAtStart:[0,0,0], breakDone:false, seconds:0, currentPlayer:0, innings:1, lastSeries:[0,0,0], bestSeries:[0,0,0]});
        closeSetup();
    }

    function showWinnerUI(p) {
        document.getElementById('setupOverlay').style.display = 'flex';
        document.getElementById('overlayCard').innerHTML = `
            <h1 style="color:var(--gold);">VINNER!</h1>
            <h2 style="color:white;">${state.names[p]}</h2>
            <div style="font-size:3em; font-weight:900; color:var(--gold);">101</div>
            <button class="btn-save-option" onclick="handleFinishAndSave()" style="background:#27ae60; color:white; width:100%; padding:12px; border-radius:10px; border:none; font-weight:bold; margin-top:15px;">NY KAMP</button>
        `;
    }

    function closeSetup() { document.getElementById('setupOverlay').style.display = 'none'; }
    function handleDiscard() { db.set({...state, scores:[0,0,0], seconds:0, innings:1, breakDone:false}).then(goToStep1); }
    function handleFinishAndSave() { handleDiscard(); }

    setInterval(() => { if(state.breakDone) { state.seconds++; db.child('seconds').set(state.seconds); } }, 1000);
</script>
</body>
</html>
