<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biljard App UI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* Fargepalett fra bildet */
            --bg-dark: #111111;
            --bg-card: #1a1a1a;
            --green-felt: linear-gradient(135deg, #1d6e3e 0%, #114e2b 100%);
            --gold: #d4af37;
            --text-gray: #b0b0b0;
            --white: #ffffff;
            --green-win: #4caf50;
        }

        body {
            background-color: #222;
            color: var(--white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Ytre container (mobil-ramme) */
        .phone-container {
            width: 375px;
            height: 750px;
            background: var(--bg-dark);
            border: 12px solid #333;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* 1. Header sektion */
        .header {
            padding: 25px 20px 10px;
            background: #111; /* Litt mørkere lær */
        }

        .profile-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .greeting h1 {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
        }

        .rank-text {
            color: var(--text-gray);
            font-size: 14px;
            margin-top: 4px;
        }

        .rank-text span {
            color: var(--gold);
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: #333;
            overflow: hidden;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
        }

        .progress-fill {
            width: 65%;
            height: 100%;
            background: var(--gold);
            border-radius: 3px;
        }

        /* 2. Seksjon med grønn duk og aktivitetskort */
        .activity-felt-container {
            padding: 10px 20px;
            background-color: var(--bg-dark);
        }

        .main-felt {
            background: var(--green-felt);
            border-radius: 15px; /* De buede hjørnene på det grønne */
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        .action-card {
            background: rgba(0,0,0,0.4);
            border: 1.5px solid var(--gold);
            border-radius: 12px;
            aspect-ratio: 1; /* Gjør de firkantede */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .action-card:hover {
            transform: translateY(-3px);
            background: rgba(0,0,0,0.5);
        }

        .action-card i {
            font-size: 30px;
            margin-bottom: 8px;
            color: var(--gold);
        }

        .action-card.green-plus i {
            color: var(--green-win);
        }

        .action-label {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* 3. Seksjon for siste kamp */
        .last-match-container {
            padding: 10px 20px 20px;
            background-color: var(--bg-dark);
            flex-grow: 1; /* Fyller resten av plassen */
        }

        .match-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #333;
        }

        .match-card h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .player {
            text-align: center;
            width: 80px;
        }

        .player-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #444;
            margin: 0 auto 5px;
            overflow: hidden;
            border: 1px solid #555;
        }
        .player-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .player-name {
            font-size: 14px;
        }

        .score-display {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            line-height: 1;
        }

        .score-display .final {
            color: var(--green-win);
        }

        .win-tag {
            color: var(--green-win);
            font-size: 11px;
            font-weight: bold;
            display: block;
            margin-top: 2px;
        }

        /* Statistikk-tabell */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            text-align: center;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-gray);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 15px;
            font-weight: bold;
        }

        /* 4. Bunnmeny */
        .nav-bar {
            width: 100%;
            height: 70px;
            background: #111;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
            margin-top: auto; /* Sørger for at den alltid er nederst */
        }

        .nav-item {
            text-align: center;
            color: var(--text-gray);
            font-size: 11px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 80px;
        }

        .nav-item.active {
            color: var(--gold);
        }

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <header class="header">
        <div class="profile-row">
            <div class="greeting">
                <h1>Hei, Marius!</h1>
                <div class="rank-text">Cowboy Rank: <span>Level 12 - Gunslinger</span></div>
            </div>
            <div class="avatar">
                <img src="https://via.placeholder.com/50" alt="Marius Avatar">
            </div>
        </div>
        <div class="progress-bar-container">
            <div class="progress-fill"></div>
        </div>
    </header>

    <section class="activity-felt-container">
        <div class="main-felt">
            <div class="action-card green-plus">
                <i class="fa-solid fa-plus"></i>
                <div class="action-label">Ny Kamp</div>
            </div>
            <div class="action-card">
                <i class="fa-solid fa-trophy"></i>
                <div class="action-label">Toppliste</div>
            </div>
            <div class="action-card">
                <i class="fa-solid fa-book-open"></i>
                <div class="action-label">Regler</div>
            </div>
        </div>
    </section>

    <section class="last-match-container">
        <div class="match-card">
            <h3>Min Siste Kamp</h3>
            <div class="score-row">
                <div class="player">
                    <div class="player-img">
                        <img src="https://via.placeholder.com/60" alt="Mav">
                    </div>
                    <div class="player-name">Mav</div>
                </div>
                <div class="score-display">
                    <span class="final">100</span> - <span style="color: var(--gold);">82</span>
                    <span class="win-tag">WIN</span>
                </div>
                <div class="player">
                    <div class="player-img">
                        <img src="https://via.placeholder.com/60" alt="Per">
                    </div>
                    <div class="player-name">Per</div>
                </div>
            </div>
            <div class="stats-grid">
                <div><div class="stat-label">Score</div><div class="stat-value">82</div></div>
                <div><div class="stat-label">Turn</div><div class="stat-value">8</div></div>
                <div><div class="stat-label">Serie</div><div class="stat-value">16</div></div>
                <div><div class="stat-label">Foul</div><div class="stat-value">2</div></div>
                <div><div class="stat-label">Kats.</div><div class="stat-value">27</div></div>
            </div>
        </div>
    </section>

    <nav class="nav-bar">
        <a href="#" class="nav-item active">
            <i class="fa-solid fa-house"></i>
            Hjem
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-trophy"></i>
            Toppliste
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-book"></i>
            Regler
        </a>
    </nav>
</div>

</body>
</html>
