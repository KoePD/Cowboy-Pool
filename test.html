<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Fixed Layout</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #1e4d2b 0%, #0a1a0f 100%);
            --gold: #f1c40f;
            --leather: #121212;
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            color: white; -webkit-font-smoothing: antialiased;
        }

        .app-container { height: 100%; display: flex; flex-direction: column; position: relative; }

        /* BAKGRUNN */
        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.12; z-index: 2; pointer-events: none; }

        /* LÆR RAMME (SLIM MODE) */
        .header { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 30px 30px 45px; z-index: 10; 
            border-bottom-left-radius: 50% 25px; border-bottom-right-radius: 50% 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .bottom-panel { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 45px 30px 10px; z-index: 10; 
            border-top-left-radius: 50% 25px; border-top-right-radius: 50% 25px; 
            box-shadow: 0 -20px 40px rgba(0,0,0,0.8);
        }

        /* MIDTPARTIET - VIKTIG ENDRING HER */
        .main-content { 
            position: relative; z-index: 5; flex-grow: 1; 
            display: flex; flex-direction: column; 
            padding: 20px; width: 100%; box-sizing: border-box;
            overflow-y: auto; /* Tillater scrolling hvis mange spillere */
            justify-content: flex-start; /* Starter fra toppen, ikke senter */
        }

        /* SCOREBOARD I TOPPEN */
        #scoreboard-container {
            width: 100%;
            margin-bottom: 20px;
        }

        .player-card { 
            background: linear-gradient(180deg, #0a0a0a 0%, #000 100%); border-radius: 24px; padding: 18px 20px; 
            margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.08); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .player-card.active { border: 2px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.8); transform: scale(1.02); }
        .score-display { font-size: 3.2em; font-weight: 900; line-height: 1; color: #333; }
        .active .score-display { color: var(--gold); }
        .player-info h2 { margin: 0; font-size: 1.1em; text-transform: uppercase; color: #666; }
        .active .player-info h2 { color: var(--gold); }
        
        .sub-stats { font-size: 0.55em; color: #444; margin-top: 10px; display: flex; gap: 15px; text-transform: uppercase; }
        .active .sub-stats { color: #888; }
        .stat-val { color: #eee; font-weight: 900; font-size: 1.1em; }
        .foul-dot { width: 11px; height: 11px; border-radius: 50%; background: #1a1a1a; border: 1px solid #222; display: inline-block; margin-right: 4px; }
        .foul-dot.active { background: #e74c3c; box-shadow: 0 0 10px #ff4757; }

        /* STATUS & KONTROLLER SENTRERT UNDER */
        .controls-group {
            width: 100%;
            margin-top: auto; /* Presser kontrollene litt ned hvis det er plass */
            margin-bottom: 20px;
        }

        .game-status-zone { background: rgba(0, 0, 0, 0.6); padding: 12px; border-radius: 20px 20px 0 0; text-align: center; border: 1px solid rgba(255,255,255,0.05); border-bottom: none; }
        .req-text { font-size: 0.8em; letter-spacing: 2px; color: #2ecc71; font-weight: 800; text-transform: uppercase; }
        .timer-text { font-family: monospace; font-size: 1.2em; color: var(--gold); margin-top: 3px; display: block; }

        .ball-control-zone { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 20px 10px; border-radius: 0 0 35px 35px; border: 1px solid rgba(255,255,255,0.03); border-top: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        .ball-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .ball { width: 75px; height: 75px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: inset -6px -6px 15px rgba(0,0,0,0.7), 6px 12px 20px rgba(0,0,0,0.6); }
        .ball-inner { width: 28px; height: 28px; background: white; border-radius: 50%; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 2px solid #000; font-size: 13px; }
        .btn-sub-carom { background: rgba(52, 152, 219, 0.12); color: #3498db; border: 1px solid #3498db; border-radius: 8px; padding: 6px 12px; font-size: 0.6em; font-weight: 800; cursor: pointer; margin-top: 4px; }

        .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 16px; border-radius: 16px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 0.75em; color: white; }
        .btn-blue { background: #2980b9; border-bottom: 4px solid #1c5982; }
        .btn-foul { background: #c0392b; border-bottom: 4px solid #7b241c; }
        .btn-turn { background: #27ae60; border-bottom: 4px solid #1e8449; grid-column: span 2; padding: 20px; font-size: 1.1em; }

        /* NAVBAR */
        .navbar { background: #000; height: 85px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; z-index: 20; padding-bottom: 25px; }
        .nav-item { color: #333; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>

    <header class="header"></header>

    <main class="main-content">
        <div id="scoreboard-container">
            <div class="player-card">
                <div class="player-info">
                    <h2>PLAYER 1</h2>
                    <div class="sub-stats">
                        <div class="stat-item">NÅ <span class="stat-val">0</span></div>
                        <div class="stat-item">PERS <span class="stat-val">3</span></div>
                        <div class="stat-item">SISTE <span class="stat-val">3</span></div>
                    </div>
                </div>
                <div class="score-display">3</div>
            </div>
            </div>

        <div class="controls-group">
            <div class="game-status-zone">
                <div style="font-size:0.5em; color:var(--gold); opacity:0.6; text-transform:uppercase; margin-bottom:4px;">MODUS: STANDARD</div>
                <span class="req-text">BREKK-STØT</span>
                <span class="timer-text">00:21:36</span>
                <div style="font-size:0.6em; color:#888; font-weight:bold; margin-top:4px; text-transform:uppercase;">INNING: 1</div>
            </div>

            <div class="ball-control-zone">
                <div class="ball-group">
                    <button class="ball" style="background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00);"><div class="ball-inner">1</div></button>
                    <button class="btn-sub-carom">+ CAROM</button>
                </div>
                <div class="ball-group">
                    <button class="ball" style="background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082);"><div class="ball-inner">5</div></button>
                    <button class="btn-sub-carom">+ CAROM</button>
                </div>
                <div class="ball-group">
                    <button class="ball" style="background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22);"><div class="ball-inner">3</div></button>
                    <button class="btn-sub-carom">+ CAROM</button>
                </div>
            </div>

            <div class="action-area">
                <button class="btn btn-blue">Carom 1P</button>
                <button class="btn btn-blue">Carom 2P</button>
                <button class="btn btn-foul">Foul</button>
                <button class="btn btn-blue">Angre</button>
                <button class="btn btn-turn">AVSLUTT TUR</button>
            </div>
        </div>
    </main>

    <footer class="bottom-panel"></footer>

    <nav class="navbar">
        <div class="nav-item"><i class="material-icons">home</i>HJEM</div>
        <div class="nav-item active"><i class="material-icons">all_inclusive</i>RANGE</div>
        <div class="nav-item"><i class="material-icons">person</i>PROFIL</div>
        <div class="nav-item"><i class="material-icons">leaderboard</i>STATS</div>
    </nav>
</div>

</body>
</html>
