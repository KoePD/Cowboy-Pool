<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Perfect Fit</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #1e4d2b 0%, #0a1a0f 100%);
            --gold: #f1c40f;
            --leather: #121212;
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .app-container { height: 100%; display: flex; flex-direction: column; position: relative; z-index: 5; }

        /* BAKGRUNN */
        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.1; z-index: 2; pointer-events: none; }

        /* LÆR PANELER */
        .header { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 40px 20px 50px; z-index: 10; 
            border-bottom-left-radius: 50% 25px; border-bottom-right-radius: 50% 25px; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.8); transition: 0.4s;
        }
        .bottom-panel { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 50px 20px 10px; z-index: 10; 
            border-top-left-radius: 50% 25px; border-top-right-radius: 50% 25px; 
            box-shadow: 0 -15px 30px rgba(0,0,0,0.8); transition: 0.4s;
        }

        /* SLIM MODE - Viktig for å fylle siden */
        .slim-mode .header { padding: 10px 20px 15px; border-bottom-left-radius: 50% 15px; border-bottom-right-radius: 50% 15px; }
        .slim-mode .bottom-panel { padding: 15px 20px 5px; border-top-left-radius: 50% 15px; border-top-right-radius: 50% 15px; }

        /* MIDTPARTIET SOM FYLLER ALT */
        .main-content { 
            position: relative; z-index: 5; flex: 1; 
            display: flex; flex-direction: column; 
            padding: 10px 15px; overflow-y: auto;
        }

        /* HJEM SKJERM */
        .home-view { display: flex; flex-direction: column; gap: 15px; align-items: center; justify-content: center; height: 100%; }
        .action-card { 
            width: 280px; padding: 20px; background: rgba(0,0,0,0.8); 
            border: 2px solid var(--gold); border-radius: 20px; 
            display: flex; align-items: center; cursor: pointer;
        }
        .action-card i { font-size: 24px; margin-right: 20px; color: var(--gold); width: 30px; text-align: center; }
        .action-card span { font-size: 14px; font-weight: 900; text-transform: uppercase; }

        /* RANGE VIEW - FYLLER SIDEN */
        .range-view { display: none; flex-direction: column; height: 100%; width: 100%; max-width: 420px; margin: 0 auto; gap: 10px; }
        .slim-mode .range-view { display: flex; }
        .slim-mode .home-view { display: none; }

        /* SPILLERKORT (Bilde-stil) */
        .scoreboard { display: flex; flex-direction: column; gap: 8px; }
        .player-card { 
            background: #000; border-radius: 20px; padding: 12px 20px; 
            border: 1px solid rgba(255,255,255,0.1); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .player-card.active { border: 2px solid var(--gold); box-shadow: 0 0 15px rgba(241,196,15,0.1); }
        .player-info h2 { margin: 0; font-size: 1.1em; color: #fff; text-transform: uppercase; }
        .score-num { font-size: 2.8em; font-weight: 900; color: #1a1a1a; }
        .active .score-num { color: var(--gold); }
        
        .card-stats { display: flex; gap: 10px; font-size: 8px; color: #444; margin-top: 5px; text-transform: uppercase; }
        .active .card-stats { color: #888; }
        .stat-v { color: #fff; font-weight: bold; }

        /* KONTROLL-PANEL (Bilde-stil) */
        .controls-container { 
            background: rgba(0,0,0,0.4); border-radius: 25px; padding: 15px; 
            display: flex; flex-direction: column; gap: 15px; flex: 1; justify-content: center;
        }
        .status-info { text-align: center; }
        .status-info .mode { font-size: 8px; color: var(--gold); opacity: 0.5; text-transform: uppercase; }
        .status-info .msg { font-size: 14px; color: #2ecc71; font-weight: 900; display: block; margin: 2px 0; }
        .status-info .timer { font-family: monospace; font-size: 1.4em; color: var(--gold); }

        .ball-row { display: flex; justify-content: space-around; }
        .ball-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .ball { width: 65px; height: 65px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 12px rgba(0,0,0,0.5); }
        .ball-in { width: 22px; height: 22px; background: white; border-radius: 50%; color: #000; font-weight: 900; font-size: 10px; display: flex; align-items: center; justify-content: center; border: 2px solid #000; }
        .btn-pc { background: none; border: 1px solid #3498db; color: #3498db; font-size: 8px; padding: 3px 8px; border-radius: 5px; font-weight: bold; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 14px; border-radius: 12px; border: none; font-weight: 800; text-transform: uppercase; font-size: 10px; color: white; cursor: pointer; }
        .btn-blue { background: #3498db; }
        .btn-red { background: #e74c3c; }
        .btn-green { background: #2ecc71; grid-column: span 2; font-size: 14px; padding: 16px; }

        /* NAVBAR */
        .nav { background: #000; height: 80px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; z-index: 20; padding-bottom: 15px; }
        .nav-item { color: #333; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 22px; margin-bottom: 3px; }
    </style>
</head>
<body class="slim-mode"> <div class="felt-base"></div>
<div class="felt-texture"></div>

<div class="app-container" id="app">
    <header class="header">
        <div class="hide-on-slim">
            <h1 style="margin:0; font-size:24px;">Hei, Marius!</h1>
            <div style="color:var(--gold); font-size:11px; margin-top:5px; text-transform:uppercase;">Cowboy Rank: Level 12</div>
        </div>
        <div class="status-info" id="rangeHeader" style="display:none;">
            <div class="mode">Modus: Standard</div>
            <div class="msg">ANY POINT</div>
            <div class="timer">00:10:06</div>
            <div style="font-size:9px; color:#555;">INNING: 1</div>
        </div>
    </header>

    <main class="main-content">
        <div class="home-view">
            <div class="action-card" onclick="startRange()"><i class="fa-solid fa-circle-plus"></i><span>Ny Kamp</span></div>
            <div class="action-card"><i class="fa-solid fa-trophy"></i><span>Toppliste</span></div>
            <div class="action-card"><i class="fa-solid fa-book-open"></i><span>Regler</span></div>
        </div>

        <div class="range-view">
            <div class="scoreboard" id="sb">
                </div>

            <div class="controls-container">
                <div class="ball-row">
                    <div class="ball-item">
                        <button class="ball" style="background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00);"><div class="ball-in">1</div></button>
                        <button class="btn-pc">+ CAROM</button>
                    </div>
                    <div class="ball-item">
                        <button class="ball" style="background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082);"><div class="ball-in">5</div></button>
                        <button class="btn-pc">+ CAROM</button>
                    </div>
                    <div class="ball-item">
                        <button class="ball" style="background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22);"><div class="ball-in">3</div></button>
                        <button class="btn-pc">+ CAROM</button>
                    </div>
                </div>

                <div class="btn-grid">
                    <button class="btn btn-blue">CAROM 1P</button>
                    <button class="btn btn-blue">CAROM 2P</button>
                    <button class="btn btn-red">FOUL</button>
                    <button class="btn btn-blue">UNDO</button>
                    <button class="btn btn-green">END TURN</button>
                </div>
                <button style="background:none; border:1px solid var(--gold); color:var(--gold); padding:8px; border-radius:10px; font-size:10px; font-weight:bold; text-transform:uppercase;">Bytt Startspiller</button>
            </div>
        </div>
    </main>

    <footer class="bottom-panel">
        <div class="hide-on-slim" style="text-align:center;">
            <div style="font-size:9px; color:#444; text-transform:uppercase;">Siste Resultat</div>
            <div style="font-size:18px; font-weight:900;">101 - 82</div>
        </div>
    </footer>

    <nav class="nav">
        <a href="#" class="nav-item" onclick="goHome()"><i class="material-icons">home</i>HJEM</a>
        <a href="#" class="nav-item active"><i class="material-icons">all_inclusive</i>RANGE</a>
        <a href="#" class="nav-item"><i class="material-icons">person</i>PROFIL</a>
        <a href="#" class="nav-item"><i class="material-icons">leaderboard</i>STATS</a>
    </nav>
</div>

<script>
    // Enkel simulator for å vise spillerkortene
    function renderSB() {
        const names = ["Player 1", "Player 2", "Player 3"];
        const scores = [3, 0, 0];
        let html = '';
        names.forEach((n, i) => {
            const active = i === 2; // Simuler Player 3 aktiv
            html += `
                <div class="player-card ${active?'active':''}">
                    <div class="player-info">
                        <h2>${n}</h2>
                        <div class="card-stats">
                            <div>Nå <span class="stat-v">0</span></div>
                            <div>Pers <span class="stat-v">${i==0?3:0}</span></div>
                            <div>Siste <span class="stat-v">${i==0?3:0}</span></div>
                        </div>
                    </div>
                    <div class="score-num">${scores[i]}</div>
                </div>`;
        });
        document.getElementById('sb').innerHTML = html;
    }

    function startRange() {
        document.body.classList.add('slim-mode');
        document.getElementById('rangeHeader').style.display = 'block';
    }
    
    function goHome() {
        document.body.classList.remove('slim-mode');
        document.getElementById('rangeHeader').style.display = 'none';
    }

    renderSB();
</script>
</body>
</html>
