<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biljard App - Final Fix</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --felt: radial-gradient(circle at center, #247339 0%, #103a1d 100%);
            --leather: #121212;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .phone {
            width: 360px;
            height: 760px;
            background: #0d2b15; /* Base farge for duk */
            border-radius: 45px;
            border: 8px solid #282828;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* DUKEN (Bakgrunnslaget) */
        .felt-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--felt);
            background-image: url("https://www.transparenttextures.com/patterns/felt.png");
            z-index: 1;
        }

        /* LÆR TOPP - Buer NEDOVER ut i duken */
        .header {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: 45px 25px 80px;
            z-index: 10;
            /* Denne lager den konvekse buen (utover) */
            border-bottom-left-radius: 50% 40px;
            border-bottom-right-radius: 50% 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
            position: relative;
        }

        /* Søm-detalj */
        .header::after {
            content: "";
            position: absolute;
            bottom: 10px; left: 5%; width: 90%; height: 40px;
            border-bottom: 1.5px dashed rgba(212, 175, 55, 0.3);
            border-radius: 50%;
        }

        .header h1 { color: #fff; margin: 0; font-size: 26px; }
        .rank { color: var(--gold); font-size: 14px; margin: 5px 0; }
        
        .progress-bar {
            width: 100%; height: 8px; background: #222;
            border-radius: 4px; margin-top: 15px;
        }
        .progress-fill {
            width: 65%; height: 100%;
            background: linear-gradient(90deg, #b38f36, var(--gold));
        }

        /* MIDTPARTI (Her ligger kortene på duken) */
        .main-content {
            position: relative;
            z-index: 5;
            flex-grow: 1;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }

        .card {
            width: 95px; height: 110px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--gold);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        .card i { font-size: 30px; margin-bottom: 10px; color: var(--gold); }
        .card.plus i { color: #2ecc71; }
        .card span { font-size: 10px; font-weight: bold; }

        /* LÆR BUNN - Buer OPPOVER ut i duken */
        .bottom-panel {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: 80px 20px 20px;
            z-index: 10;
            /* Denne lager buen som peker oppover i midten */
            border-top-left-radius: 50% 40px;
            border-top-right-radius: 50% 40px;
            box-shadow: 0 -15px 30px rgba(0,0,0,0.7);
            position: relative;
        }

        .bottom-panel::before {
            content: "";
            position: absolute;
            top: 10px; left: 5%; width: 90%; height: 40px;
            border-top: 1.5px dashed rgba(212, 175, 55, 0.3);
            border-radius: 50%;
        }

        .match-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 18px;
            padding: 15px;
        }

        /* NAVIGASJON */
        .nav {
            background: #0d0d0d;
            height: 75px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
            z-index: 20;
        }

        .nav-item { color: #555; text-align: center; font-size: 11px; text-decoration: none; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { display: block; font-size: 22px; margin-bottom: 5px; }

    </style>
</head>
<body>

<div class="phone">
    <div class="felt-bg"></div>

    <div class="header">
        <h1>Hei, Marius!</h1>
        <div class="rank">Cowboy Rank: Level 12 - Gunslinger</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>

    <div class="main-content">
        <div class="card plus">
            <i class="fa-solid fa-plus"></i>
            <span>NY KAMP</span>
        </div>
        <div class="card">
            <i class="fa-solid fa-trophy"></i>
            <span>TOPPLISTE</span>
        </div>
        <div class="card">
            <i class="fa-solid fa-book-open"></i>
            <span>REGLER</span>
        </div>
    </div>

    <div class="bottom-panel">
        <div class="match-card">
            <div style="color:#aaa; font-size:13px; margin-bottom:10px;">Min Siste Kamp</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="width:50px; height:50px; border-radius:50%; background:#333; border:2px solid var(--gold);"></div>
                <div style="text-align:center;">
                    <div style="font-size:26px; font-weight:bold; color:#fff;">
                        <span style="color:#2ecc71">100</span> - <span style="color:var(--gold)">82</span>
                    </div>
                    <div style="color:#2ecc71; font-size:10px; font-weight:bold;">WIN</div>
                </div>
                <div style="width:50px; height:50px; border-radius:50%; background:#333; border:2px solid #444;"></div>
            </div>
        </div>
    </div>

    <div class="nav">
        <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i>Hjem</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-trophy"></i>Toppliste</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-book"></i>Regler</a>
    </div>
</div>

</body>
</html>
