<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - All Buttons</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #2fa34b 0%, #155e2d 60%, #082411 100%);
            --gold: #f1c40f;
            --leather: #121212;
            --card-bg: rgba(0, 0, 0, 0.75);
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased; color: white;
        }

        .app-container { height: 100%; display: flex; flex-direction: column; position: relative; }
        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.12; z-index: 2; pointer-events: none; }

        /* LÆR-RAMME */
        .leather-edge {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            z-index: 100;
            position: absolute;
            left: 0; right: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .edge-top { top: 0; height: 280px; border-bottom-left-radius: 50% 40px; border-bottom-right-radius: 50% 40px; box-shadow: 0 15px 30px rgba(0,0,0,0.8); }
        .edge-bottom { bottom: 0; height: 220px; border-top-left-radius: 50% 40px; border-top-right-radius: 50% 40px; box-shadow: 0 -15px 30px rgba(0,0,0,0.8); }

        /* RANGE MODUS (10px rammene du ba om) */
        .slim-mode .edge-top { height: 10px; border-radius: 0; box-shadow: none; }
        .slim-mode .edge-bottom { height: 10px; border-radius: 0; box-shadow: none; }
        .slim-mode .hide-on-slim { display: none; }

        .main-content { position: relative; z-index: 50; flex-grow: 1; height: 100%; overflow-y: auto; display: flex; flex-direction: column; padding-bottom: 100px; }

        /* HJEM-SKJERM: 3 MASSIVE KNAPPER */
        .home-cards { 
            display: flex; justify-content: center; align-items: center; 
            gap: 12px; padding: 0 15px; min-height: 100%; width: 100%; box-sizing: border-box;
        }
        .action-card { 
            flex: 1; max-width: 130px; height: 160px; /* Justert for å få plass til 3 i bredden */
            background: var(--card-bg); border: 2.5px solid var(--gold); border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9), 0 15px 25px rgba(0,0,0,0.6);
            cursor: pointer;
        }
        .action-card i { font-size: 45px; margin-bottom: 15px; color: var(--gold); }
        .action-card.new-game-btn i { color: #2ecc71; }
        .action-card span { font-size: 11px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; text-align: center; }

        /* RANGE / INDEX KONTROLLER */
        .range-content { display: none; width: 100%; max-width: 430px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        .slim-mode .home-cards { display: none; }
        .slim-mode .range-content { display: block; }

        .player-card { background: linear-gradient(180deg, #0a0a0a 0%, #000000 100%); border-radius: 20px; padding: 18px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; }
        .player-card.active { border: 2.5px solid var(--gold); transform: scale(1.02); }
        .score-display { font-size: 3em; font-weight: 950; color: #333; }
        .active .score-display { color: var(--gold); }
        .foul-dot { width: 12px; height: 12px; border-radius: 50%; background: #1a1a1a; border: 1px solid #222; display: inline-block; margin-right: 3px; }
        .foul-dot.active { background: #e74c3c; box-shadow: 0 0 8px #ff4757; }
        
        .game-status-zone { background: rgba(0,0,0,0.6); padding: 12px; border-radius: 20px 20px 0 0; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .ball-control-zone { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 15px 5px; border-radius: 0 0 25px 25px; margin-bottom: 10px; }
        
        .ball { width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: inset -5px -5px 12px rgba(0,0,0,0.7), 4px 8px 15px rgba(0,0,0,0.6); }
        #ball1 { background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00); }
        #ball5 { background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082); }
        #ball3 { background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22); }
        .ball-inner { width: 26px; height: 26px; background: white; border-radius: 50%; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 2px solid #000; font-size: 14px; }
        .btn-sub-carom { background: rgba(52, 152, 219, 0.15); color: #3498db; border: 1.5px solid #3498db; border-radius: 8px; padding: 4px 10px; font-size: 0.6em; font-weight: 800; margin-top: 5px; }
        
        .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: 800; text-transform: uppercase; color: white; cursor: pointer; }
        .btn-blue { background: #2980b9; border-bottom: 3px solid #1c5982; }
        .btn-foul { background: #c0392b; border-bottom: 3px solid #7b241c; }
        .btn-turn { background: #27ae60; border-bottom: 3px solid #1e8449; grid-column: span 2; padding: 18px; font-size: 1.1em; }

        .navbar { background: #000; height: 90px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; z-index: 200; padding-bottom: 15px; position: fixed; bottom: 0; width: 100%; }
        .nav-item { color: #444; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.6em; font-weight: 800; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 2.2em; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>

    <div class="leather-edge edge-top">
        <div class="hide-on-slim" style="padding-top: 60px; text-align: center;">
            <h1 style="color:#fff; margin:0; font-size:36px; font-weight:800;">Hei, Marius!</h1>
            <div style="color:var(--gold); font-size:18px; margin-top:5px;">Cowboy Rank: Level 12</div>
        </div>
    </div>

    <div class="leather-edge edge-bottom">
        <div class="hide-on-slim" style="padding-top: 80px; text-align: center;">
            <div style="color:#666; font-size:14px; font-weight:800; text-transform:uppercase;">Siste Kamp: 100 - 82</div>
        </div>
    </div>

    <main class="main-content">
        <div class="home-cards">
            <div class="action-card new-game-btn" onclick="navTo('range', document.getElementById('rBtn'))">
                <i class="fa-solid fa-circle-plus"></i>
                <span>NY KAMP</span>
            </div>
            <div class="action-card">
                <i class="fa-solid fa-trophy"></i>
                <span>TOPPLISTE</span>
            </div>
            <div class="action-card">
                <i class="fa-solid fa-book-open"></i>
                <span>REGLER</span>
            </div>
        </div>

        <div class="range-content">
            <div id="scoreboard-container"></div>
            
            <div class="game-status-zone">
                <div style="font-size:0.6em; color:var(--gold); opacity:0.6; margin-bottom:5px;">MODUS: STANDARD</div>
                <span id="moveText" style="color:#2ecc71; font-weight:800; letter-spacing:1.5px;">BREKK-STØT</span>
                <div id="matchTimer" style="color:white; font-family:monospace; font-size:1.4em; margin-top:5px;">00:00:00</div>
            </div>

            <div class="ball-control-zone">
                <div style="text-align:center;"><button class="ball" id="ball1" onclick="action('pocket', 1)"><div class="ball-inner">1</div></button><button class="btn-sub-carom" onclick="action('pocket_carom', 2)">+ CAROM</button></div>
                <div style="text-align:center;"><button class="ball" id="ball5" onclick="action('pocket', 5)"><div class="ball-inner">5</div></button><button class="btn-sub-carom" onclick="action('pocket_carom', 6)">+ CAROM</button></div>
                <div style="text-align:center;"><button class="ball" id="ball3" onclick="action('pocket', 3)"><div class="ball-inner">3</div></button><button class="btn-sub-carom" onclick="action('pocket_carom', 4)">+ CAROM</button></div>
            </div>

            <div class="action-area">
                <button class="btn btn-blue" onclick="action('carom', 1)">Carom 1P</button>
                <button class="btn btn-blue" onclick="action('carom', 2)">Carom 2P</button>
                <button class="btn btn-foul" onclick="handleFoul()">FOUL</button>
                <button class="btn btn-blue" onclick="undo()">ANGRE</button>
                <button class="btn btn-turn" onclick="nextTurn()">AVSLUTT TUR</button>
            </div>
        </div>
    </main>

    <nav class="navbar">
        <a href="javascript:void(0)" class="nav-item active" onclick="navTo('home', this)"><i class="material-icons">home</i>HJEM</a>
        <a href="javascript:void(0)" class="nav-item" id="rBtn" onclick="navTo('range', this)"><i class="material-icons">all_inclusive</i>RANGE</a>
        <a href="javascript:void(0)" class="nav-item"><i class="material-icons">person</i>PROFIL</a>
    </nav>
</div>

<script>
    // --- FIREBASE OG LOGIKK ---
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    let state = { playerCount: 2, scores: [0,0], foulCounts: [0,0], scoreAtStart: [0,0], currentPlayer: 0, breakDone: false, seconds: 0, names: ["Marius","Per"] };
    let history = [];

    db.on('value', (s) => { if(s.val()) { state = s.val(); updateUI(); } });

    function navTo(page, el) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(page === 'range') document.getElementById('app').classList.add('slim-mode');
        else document.getElementById('app').classList.remove('slim-mode');
    }

    function action(type, val) {
        saveHistory(); state.scores[state.currentPlayer] += val; state.breakDone = true; db.set(state);
    }

    function updateUI() {
        const cont = document.getElementById('scoreboard-container'); cont.innerHTML = '';
        for(let i=0; i<state.playerCount; i++) {
            const active = state.currentPlayer === i;
            cont.innerHTML += `<div class="player-card ${active?'active':''}">
                <div class="player-info">
                    <h2 style="margin:0; color:${active?'var(--gold)':'#555'}">${state.names[i]}</h2>
                    <div style="margin-top:5px;">
                        <div class="foul-dot ${state.foulCounts[i]>=1?'active':''}"></div>
                        <div class="foul-dot ${state.foulCounts[i]>=2?'active':''}"></div>
                    </div>
                </div>
                <div class="score-display">${state.scores[i]}</div>
            </div>`;
        }
        document.getElementById('matchTimer').innerText = new Date(state.seconds * 1000).toISOString().substr(11, 8);
        document.getElementById('moveText').innerText = state.breakDone ? "SPILL" : "BREKK-STØT";
    }

    function handleFoul() { saveHistory(); state.scores[state.currentPlayer] = state.scoreAtStart[state.currentPlayer]; state.foulCounts[state.currentPlayer]++; nextTurn(); }
    function nextTurn() { state.currentPlayer = (state.currentPlayer + 1) % state.playerCount; state.scoreAtStart[state.currentPlayer] = state.scores[state.currentPlayer]; db.set(state); }
    function undo() { if(history.length) { state = JSON.parse(history.pop()); db.set(state); } }
    function saveHistory() { history.push(JSON.stringify(state)); if(history.length > 10) history.shift(); }
    setInterval(() => { if(state.breakDone) { state.seconds++; db.child('seconds').set(state.seconds); } }, 1000);
</script>
</body>
</html>
