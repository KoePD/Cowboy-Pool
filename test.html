<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Full Width</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #1e4d2b 0%, #0a1a0f 100%);
            --gold: #f1c40f;
            --leather: #121212;
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .app-container { height: 100%; display: flex; flex-direction: column; position: relative; z-index: 5; }

        /* BAKGRUNN */
        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.1; z-index: 2; pointer-events: none; }

        /* LÆR PANELER */
        .header { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 40px 20px 50px; z-index: 10; 
            border-bottom-left-radius: 50% 25px; border-bottom-right-radius: 50% 25px; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.8); transition: 0.4s;
        }
        .bottom-panel { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 50px 20px 15px; z-index: 10; 
            border-top-left-radius: 50% 25px; border-top-right-radius: 50% 25px; 
            box-shadow: 0 -15px 30px rgba(0,0,0,0.8); transition: 0.4s;
        }

        /* SLIM MODE - Krymper lær-kantene for å gi plass til spillet */
        .slim-mode .header { padding: 10px 20px 15px; border-bottom-left-radius: 50% 15px; border-bottom-right-radius: 50% 15px; }
        .slim-mode .bottom-panel { padding: 15px 20px 5px; border-top-left-radius: 50% 15px; border-top-right-radius: 50% 15px; }

        /* HOVEDINNHOLD - Bruker hele bredden */
        .main-content { 
            position: relative; z-index: 5; flex: 1; 
            display: flex; flex-direction: column; 
            padding: 10px 15px; overflow-y: auto;
        }

        /* HJEM VIEW */
        .home-view { display: flex; flex-direction: column; gap: 15px; align-items: center; justify-content: center; height: 100%; }
        .action-card { 
            width: 100%; max-width: 300px; padding: 20px; background: rgba(0,0,0,0.8); 
            border: 2px solid var(--gold); border-radius: 20px; 
            display: flex; align-items: center; cursor: pointer;
        }
        .action-card i { font-size: 24px; margin-right: 20px; color: var(--gold); width: 30px; text-align: center; }
        .action-card span { font-size: 14px; font-weight: 900; text-transform: uppercase; }

        /* RANGE VIEW - Ingen max-width her lenger */
        .range-view { display: none; flex-direction: column; height: 100%; width: 100%; gap: 10px; }
        .slim-mode .range-view { display: flex; }
        .slim-mode .home-view { display: none; }

        /* SCOREBOARD (Som i Bilde 2) */
        .scoreboard { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .player-card { 
            background: #000; border-radius: 24px; padding: 15px 25px; 
            border: 1px solid rgba(255,255,255,0.1); 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .player-card.active { border: 2.5px solid var(--gold); box-shadow: 0 0 20px rgba(241,196,15,0.15); }
        .player-info h2 { margin: 0; font-size: 1.3em; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .score-num { font-size: 3.2em; font-weight: 900; color: #1a1a1a; line-height: 1; }
        .active .score-num { color: var(--gold); }
        
        .card-stats { display: flex; gap: 12px; font-size: 9px; color: #444; margin-top: 6px; text-transform: uppercase; font-weight: bold; }
        .active .card-stats { color: #888; }
        .stat-v { color: #fff; }

        /* KONTROLLER (Som i Bilde 2) */
        .controls-container { 
            background: rgba(0,0,0,0.5); border-radius: 28px; padding: 20px 15px; 
            display: flex; flex-direction: column; gap: 15px; flex: 1; justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .status-info { text-align: center; }
        .status-info .mode { font-size: 9px; color: var(--gold); opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
        .status-info .msg { font-size: 16px; color: #2ecc71; font-weight: 950; display: block; margin: 4px 0; letter-spacing: 1px; }
        .status-info .timer { font-family: monospace; font-size: 1.6em; color: var(--gold); font-weight: bold; }

        .ball-row { display: flex; justify-content: space-around; width: 100%; margin-bottom: 5px; }
        .ball-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .ball { width: 75px; height: 75px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.6); cursor: pointer; transition: 0.1s; }
        .ball:active { transform: scale(0.95); }
        .ball-in { width: 28px; height: 28px; background: white; border-radius: 50%; color: #000; font-weight: 900; font-size: 12px; display: flex; align-items: center; justify-content: center; border: 2px solid #000; }
        .btn-pc { background: rgba(52, 152, 219, 0.1); border: 1px solid #3498db; color: #3498db; font-size: 9px; padding: 4px 12px; border-radius: 8px; font-weight: 900; cursor: pointer; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .btn { padding: 16px; border-radius: 16px; border: none; font-weight: 900; text-transform: uppercase; font-size: 11px; color: white; cursor: pointer; border-bottom: 4px solid rgba(0,0,0,0.2); }
        .btn-blue { background: #3498db; }
        .btn-red { background: #e74c3c; }
        .btn-green { background: #2ecc71; grid-column: span 2; font-size: 16px; padding: 20px; border-bottom-width: 5px; }

        /* NAVBAR */
        .nav { background: #000; height: 90px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; z-index: 20; padding-bottom: 25px; }
        .nav-item { color: #333; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 800; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 26px; margin-bottom: 4px; }

        .foul-dot { width: 12px; height: 12px; border-radius: 50%; background: #1a1a1a; display: inline-block; margin-right: 5px; border: 1px solid #222; }
        .foul-dot.active { background: #e74c3c; box-shadow: 0 0 10px #e74c3c; }
        .waiting-ball { opacity: 0.15; filter: grayscale(1); pointer-events: none; }
    </style>
</head>
<body class="slim-mode">

<div class="felt-base"></div>
<div class="felt-texture"></div>

<div class="app-container" id="app">
    <header class="header">
        <div class="hide-on-slim">
            <h1 style="margin:0; font-size:28px; font-weight:900;">Hei, Marius!</h1>
            <div style="color:var(--gold); font-size:13px; margin-top:5px; text-transform:uppercase; letter-spacing:1px;">Cowboy Rank: Level 12</div>
        </div>
        <div class="status-info" id="rangeHeader" style="display:none;">
            <div class="mode">Modus: Standard</div>
            <div class="msg" id="moveText">BREKK-STØT</div>
            <div class="timer" id="matchTimer">00:00:00</div>
            <div style="font-size:10px; color:#555; font-weight:bold; margin-top:3px;">INNING: 1</div>
        </div>
    </header>

    <main class="main-content">
        <div class="home-view">
            <div class="action-card" onclick="startRange()"><i class="fa-solid fa-circle-plus"></i><span>Ny Kamp</span></div>
            <div class="action-card"><i class="fa-solid fa-trophy"></i><span>Toppliste</span></div>
            <div class="action-card"><i class="fa-solid fa-book-open"></i><span>Regler</span></div>
        </div>

        <div class="range-view">
            <div class="scoreboard" id="scoreboard-container">
                </div>

            <div class="controls-container">
                <div class="ball-row">
                    <div class="ball-item">
                        <button class="ball" id="ball1" style="background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00);"><div class="ball-in">1</div></button>
                        <button class="btn-pc">+ CAROM</button>
                    </div>
                    <div class="ball-item">
                        <button class="ball" id="ball5" style="background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082);"><div class="ball-in">5</div></button>
                        <button class="btn-pc">+ CAROM</button>
                    </div>
                    <div class="ball-item">
                        <button class="ball" id="ball3" style="background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22);"><div class="ball-in">3</div></button>
                        <button class="btn-pc">+ CAROM</button>
                    </div>
                </div>

                <div class="btn-grid">
                    <button class="btn btn-blue">CAROM 1P</button>
                    <button class="btn btn-blue">CAROM 2P</button>
                    <button class="btn btn-red">FOUL</button>
                    <button class="btn btn-blue">UNDO</button>
                    <button class="btn btn-green">END TURN</button>
                </div>
                <button id="rotBtn" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:10px; border-radius:12px; font-size:11px; font-weight:900; text-transform:uppercase; cursor:pointer;">Bytt Startspiller</button>
            </div>
        </div>
    </main>

    <footer class="bottom-panel">
        <div class="hide-on-slim" style="text-align:center;">
            <div style="font-size:10px; color:#444; text-transform:uppercase; font-weight:900;">Siste Resultat</div>
            <div style="font-size:20px; font-weight:950; color:#fff;">101 - 82</div>
        </div>
    </footer>

    <nav class="nav">
        <a href="javascript:void(0)" class="nav-item" onclick="goHome()"><i class="material-icons">home</i>HJEM</a>
        <a href="javascript:void(0)" class="nav-item active" onclick="startRange()"><i class="material-icons">all_inclusive</i>RANGE</a>
        <a href="javascript:void(0)" class="nav-item"><i class="material-icons">person</i>PROFIL</a>
        <a href="javascript:void(0)" class="nav-item"><i class="material-icons">leaderboard</i>STATS</a>
    </nav>
</div>

<script>
    // --- Simulator for visning ---
    function renderPlayers() {
        const players = [
            { name: "PLAYER 1", score: 3, active: false, fouls: 0, best: 3, last: 3 },
            { name: "PLAYER 2", score: 0, active: false, fouls: 1, best: 0, last: 0 },
            { name: "PLAYER 3", score: 0, active: true, fouls: 0, best: 0, last: 0 }
        ];
        
        const container = document.getElementById('scoreboard-container');
        container.innerHTML = players.map(p => `
            <div class="player-card ${p.active ? 'active' : ''}">
                <div class="player-info">
                    <h2 style="color: ${p.active ? 'var(--gold)' : '#fff'}">${p.name}</h2>
                    <div class="card-stats">
                        <div>NÅ <span class="stat-v">0</span></div>
                        <div>BEST <span class="stat-v">${p.best}</span></div>
                        <div>LAST <span class="stat-v">${p.last}</span></div>
                    </div>
                    <div style="margin-top:10px;">
                        <div class="foul-dot ${p.fouls >= 1 ? 'active' : ''}"></div>
                        <div class="foul-dot ${p.fouls >= 2 ? 'active' : ''}"></div>
                        <div class="foul-dot ${p.fouls >= 3 ? 'active' : ''}"></div>
                    </div>
                </div>
                <div class="score-num">${p.score}</div>
            </div>
        `).join('');
    }

    function startRange() {
        document.body.classList.add('slim-mode');
        document.getElementById('rangeHeader').style.display = 'block';
        renderPlayers();
    }
    
    function goHome() {
        document.body.classList.remove('slim-mode');
        document.getElementById('rangeHeader').style.display = 'none';
    }

    // Start i Range modus for demo
    window.onload = startRange;
</script>
</body>
</html>
