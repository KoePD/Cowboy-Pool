<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biljard App - Dynamic Range</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #2fa34b 0%, #155e2d 60%, #082411 100%);
            --gold: #d4af37;
            --leather: #121212;
            --card-bg: rgba(0, 0, 0, 0.75);
            
            /* Standard Hjem-verdier */
            --header-p: 80px 30px 140px;
            --bottom-p: 130px 30px 40px;
            --stitch-opacity: 0.3;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* SLIM MODE - For Range/Kontroller */
        .app-container.slim-mode {
            --header-p: 20px 30px 40px; /* Minimalistisk topp */
            --bottom-p: 40px 30px 10px; /* Minimalistisk bunn */
            --stitch-opacity: 0;        /* Skjuler sømmen for en renere look */
        }

        /* Skjuler alt innhold i panelene når vi er i slim-mode */
        .app-container.slim-mode .hide-on-slim {
            opacity: 0;
            display: none;
        }

        .felt-base {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--felt-green);
            z-index: 1;
        }

        .felt-texture {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("https://www.transparenttextures.com/patterns/felt.png");
            opacity: 0.12;
            z-index: 2;
            pointer-events: none;
        }

        /* TOPP-PANEL */
        .header {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: var(--header-p);
            z-index: 10;
            border-bottom-left-radius: 50% 50px;
            border-bottom-right-radius: 50% 50px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.9);
            position: relative;
            transition: inherit;
        }

        .header::after {
            content: "";
            position: absolute;
            bottom: 18px; left: 5%; width: 90%; height: 50px;
            border-bottom: 2px dashed rgba(212, 175, 55, var(--stitch-opacity));
            border-radius: 50%;
            transition: inherit;
        }

        /* MIDTPARTI - Knappene fyller her i Hjem-modus */
        .main-content {
            position: relative;
            z-index: 5;
            flex-grow: 1;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 10px;
        }

        .action-card {
            width: 250px;
            height: 280px;
            background: var(--card-bg);
            border: 3.5px solid var(--gold);
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9), 0 25px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .action-card i { font-size: 90px; margin-bottom: 25px; color: var(--gold); }
        .action-card span { font-size: 22px; font-weight: 950; color: #fff; letter-spacing: 2px; }

        /* BUNN-PANEL */
        .bottom-panel {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: var(--bottom-p);
            z-index: 10;
            border-top-left-radius: 50% 50px;
            border-top-right-radius: 50% 50px;
            box-shadow: 0 -25px 45px rgba(0,0,0,0.9);
            position: relative;
            transition: inherit;
        }

        .bottom-panel::before {
            content: "";
            position: absolute;
            top: 18px; left: 5%; width: 90%; height: 50px;
            border-top: 2px dashed rgba(212, 175, 55, var(--stitch-opacity));
            border-radius: 50%;
            transition: inherit;
        }

        /* NAVBAR */
        .navbar {
            background: #080808;
            height: 95px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #1a1a1a;
            z-index: 20;
            padding-bottom: 20px;
        }

        .nav-item { color: #444; text-align: center; font-size: 14px; text-decoration: none; font-weight: 800; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { display: block; font-size: 32px; margin-bottom: 8px; }

    </style>
</head>
<body>

<div class="app-container" id="app">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>

    <header class="header">
        <div class="hide-on-slim">
            <h1 style="color:#fff; margin:0; font-size:36px; font-weight:800;">Hei, Lasse!</h1>
            <div style="color:var(--gold); font-size:18px; margin:8px 0;">Cowboy Rank: Level 12</div>
            <div style="width:100%; height:12px; background:#222; border-radius:6px; margin-top:30px;">
                <div style="width:65%; height:100%; background:var(--gold); border-radius:6px;"></div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="action-card hide-on-slim">
            <i class="fa-solid fa-circle-plus" style="color:#2ecc71;"></i>
            <span>NY KAMP</span>
        </div>
        <div class="action-card hide-on-slim">
            <i class="fa-solid fa-trophy"></i>
            <span>TOPPLISTE</span>
        </div>
        <div class="action-card hide-on-slim">
            <i class="fa-solid fa-book-open"></i>
            <span>REGLER</span>
        </div>
        
        </main>

    <section class="bottom-panel">
        <div class="hide-on-slim">
            <div style="background:rgba(255,255,255,0.04); border:1px solid #333; border-radius:24px; padding:30px;">
                <div style="color:#666; font-size:16px; margin-bottom:20px; font-weight:800; text-transform:uppercase;">Min Siste Kamp</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="width:80px; height:80px; border-radius:50%; background:#1a1a1a; border:4px solid var(--gold);"></div>
                    <div style="font-size:54px; font-weight:950; color:#fff;">0 - 0</div>
                    <div style="width:80px; height:80px; border-radius:50%; background:#1a1a1a; border:4px solid #333;"></div>
                </div>
            </div>
        </div>
    </section>

    <nav class="navbar">
        <a href="javascript:void(0)" class="nav-item active" id="homeBtn"><i class="fa-solid fa-house-chimney"></i>HJEM</a>
        <a href="javascript:void(0)" class="nav-item" id="rangeBtn"><i class="fa-solid fa-infinity"></i>RANGE</a>
        <a href="javascript:void(0)" class="nav-item"><i class="fa-solid fa-user"></i>PROFIL</a>
    </nav>
</div>

<script>
    const app = document.getElementById('app');
    const homeBtn = document.getElementById('homeBtn');
    const rangeBtn = document.getElementById('rangeBtn');

    rangeBtn.addEventListener('click', () => {
        app.classList.add('slim-mode');
        rangeBtn.classList.add('active');
        homeBtn.classList.remove('active');
    });

    homeBtn.addEventListener('click', () => {
        app.classList.remove('slim-mode');
        homeBtn.classList.add('active');
        rangeBtn.classList.remove('active');
    });
</script>

</body>
</html>
