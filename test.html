<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biljard App - Pixel Perfect</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* Den nøyaktige, mettede grønnfargen fra bilde 1 */
            --felt-green: radial-gradient(circle at center, #2fa34b 0%, #155e2d 60%, #0a2b15 100%);
            --gold: #d4af37;
            --leather: #121212;
            --card-bg: rgba(0, 0, 0, 0.6);
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .phone {
            width: 360px;
            height: 760px;
            background: #0a1f0f;
            border-radius: 45px;
            border: 8px solid #282828;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* DUKEN (Bakgrunnen i midten) */
        .felt-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--felt-green);
            background-image: url("https://www.transparenttextures.com/patterns/felt.png");
            z-index: 1;
        }

        /* TOPP-PANEL (Lær) */
        .header {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: 45px 25px 70px;
            z-index: 10;
            border-bottom-left-radius: 50% 35px;
            border-bottom-right-radius: 50% 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            position: relative;
        }

        /* Den stiplede sømmen langs buen */
        .header::after {
            content: "";
            position: absolute;
            bottom: 12px; left: 5%; width: 90%; height: 35px;
            border-bottom: 1.5px dashed rgba(212, 175, 55, 0.35);
            border-radius: 50%;
        }

        .header h1 { color: #fff; margin: 0; font-size: 26px; letter-spacing: 0.5px; }
        .rank { color: var(--gold); font-size: 14px; margin: 6px 0; font-weight: 500; }
        
        .progress-bar {
            width: 100%; height: 8px; background: #222;
            border-radius: 4px; margin-top: 15px; position: relative;
        }
        .progress-fill {
            width: 65%; height: 100%;
            background: linear-gradient(90deg, #b38f36, var(--gold));
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
            border-radius: 4px;
        }

        /* MIDTPARTI (Kortene på grønn duk) */
        .main-felt {
            position: relative;
            z-index: 5;
            flex-grow: 1;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 20px 10px;
        }

        .action-card {
            width: 100px;
            height: 115px;
            background: var(--card-bg);
            border: 1.5px solid var(--gold);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.7), 0 8px 20px rgba(0,0,0,0.4);
            backdrop-filter: blur(2px);
        }

        .action-card i { font-size: 34px; margin-bottom: 12px; color: var(--gold); }
        .action-card.green-icon i { color: #2ecc71; }
        .action-card span { font-size: 11px; font-weight: 800; letter-spacing: 0.8px; }

        /* BUNN-PANEL (Lær) */
        .bottom-panel {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: 70px 20px 20px;
            z-index: 10;
            border-top-left-radius: 50% 35px;
            border-top-right-radius: 50% 35px;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.9);
            position: relative;
        }

        .bottom-panel::before {
            content: "";
            position: absolute;
            top: 12px; left: 5%; width: 90%; height: 35px;
            border-top: 1.5px dashed rgba(212, 175, 55, 0.35);
            border-radius: 50%;
        }

        .last-match {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 18px;
            padding: 18px;
        }

        /* NAVBAR */
        .navbar {
            background: #0a0a0a;
            height: 75px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
            z-index: 20;
        }

        .nav-item { color: #666; text-align: center; font-size: 11px; text-decoration: none; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { display: block; font-size: 24px; margin-bottom: 5px; }

    </style>
</head>
<body>

<div class="phone">
    <div class="felt-layer"></div>

    <header class="header">
        <h1>Hei, Marius!</h1>
        <div class="rank">Cowboy Rank: <span>Level 12 - Gunslinger</span></div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </header>

    <main class="main-felt">
        <div class="action-card green-icon">
            <i class="fa-solid fa-plus"></i>
            <span>NY KAMP</span>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-trophy"></i>
            <span>TOPPLISTE</span>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-book-open"></i>
            <span>REGLER</span>
        </div>
    </main>

    <section class="bottom-panel">
        <div class="last-match">
            <div style="color:#888; font-size:12px; margin-bottom:12px; font-weight:bold;">Min Siste Kamp</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="text-align:center;">
                    <div style="width:52px; height:52px; border-radius:50%; background:#333; border:2px solid var(--gold); margin-bottom:5px;"></div>
                    <div style="color:#fff; font-size:12px;">Mav</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:28px; font-weight:900; color:#fff;">
                        <span style="color:#2ecc71">100</span> - <span style="color:var(--gold)">82</span>
                    </div>
                    <div style="color:#2ecc71; font-size:10px; font-weight:bold; margin-top:2px;">WIN</div>
                </div>
                <div style="text-align:center;">
                    <div style="width:52px; height:52px; border-radius:50%; background:#333; border:2px solid #444; margin-bottom:5px;"></div>
                    <div style="color:#fff; font-size:12px;">Per</div>
                </div>
            </div>
        </div>
    </section>

    <nav class="navbar">
        <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i>Hjem</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-trophy"></i>Toppliste</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-book"></i>Regler</a>
    </nav>
</div>

</body>
</html>
