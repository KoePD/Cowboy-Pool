<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Lobby</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #2fa34b 10%, #1a6331 50%, #082411 100%);
            --gold: #d4af37;
            --leather: #121212;
            --card-bg: rgba(0, 0, 0, 0.65);
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }

        .phone {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            background: #082411;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* DUKEN */
        .felt-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--felt-green);
            z-index: 1;
        }

        .felt-layer::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("https://www.transparenttextures.com/patterns/felt.png");
            opacity: 0.15;
            pointer-events: none;
        }

        /* TOPP-PANEL */
        .header {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: 45px 25px 65px;
            z-index: 10;
            border-bottom-left-radius: 50% 30px;
            border-bottom-right-radius: 50% 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            position: relative;
        }

        .header::after {
            content: "";
            position: absolute;
            bottom: 12px; left: 5%; width: 90%; height: 35px;
            border-bottom: 1.5px dashed rgba(212, 175, 55, 0.35);
            border-radius: 50%;
        }

        .header h1 { color: #fff; margin: 0; font-size: 26px; letter-spacing: 0.5px; }
        .rank { color: var(--gold); font-size: 14px; margin: 6px 0; font-weight: 500; }
        
        .progress-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-top: 15px; }
        .progress-fill { width: 65%; height: 100%; background: linear-gradient(90deg, #b38f36, var(--gold)); border-radius: 4px; }

        /* MIDTPARTI */
        .main-felt {
            position: relative;
            z-index: 5;
            flex-grow: 1;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 20px 10px;
        }

        .action-card {
            width: 105px;
            height: 120px;
            background: var(--card-bg);
            border: 1.5px solid var(--gold);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.7), 0 8px 20px rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            text-decoration: none;
        }

        .action-card i { font-size: 34px; margin-bottom: 12px; color: var(--gold); }
        .action-card.green-icon i { color: #2ecc71; }
        .action-card span { font-size: 10px; font-weight: 800; letter-spacing: 0.8px; text-align: center; }

        /* BUNN-PANEL */
        .bottom-panel {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: 65px 20px 30px;
            z-index: 10;
            border-top-left-radius: 50% 30px;
            border-top-right-radius: 50% 30px;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.9);
            position: relative;
        }

        .bottom-panel::before {
            content: "";
            position: absolute;
            top: 12px; left: 5%; width: 90%; height: 35px;
            border-top: 1.5px dashed rgba(212, 175, 55, 0.35);
            border-radius: 50%;
        }

        .last-match {
            background: rgba(255,255,255,0.03);
            border: 1px solid #222;
            border-radius: 20px;
            padding: 18px;
        }

        .match-avatar { 
            width: 52px; height: 52px; border-radius: 50%; 
            background: #222; border: 2px solid #444; 
            margin: 0 auto 5px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: var(--gold);
        }

        /* NAVBAR */
        .navbar {
            background: #000;
            height: 85px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #111;
            z-index: 20;
            padding-bottom: 15px;
        }

        .nav-item { color: #555; text-align: center; font-size: 10px; text-decoration: none; font-weight: bold; text-transform: uppercase; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { display: block; font-size: 22px; margin-bottom: 5px; }
        .lasso i { transform: rotate(-15deg); } /* Lasso-vinkelen */

    </style>
</head>
<body>

<div class="phone">
    <div class="felt-layer"></div>

    <header class="header">
        <h1 id="greetName">Hei, Cowboy!</h1>
        <div class="rank">Cowboy Rank: <span>Level 12 - Gunslinger</span></div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </header>

    <main class="main-felt">
        <a href="index.html?setup=true" class="action-card green-icon">
            <i class="fa-solid fa-circle-plus"></i>
            <span>NY KAMP</span>
        </a>
        <a href="CBstats.html" class="action-card">
            <i class="fa-solid fa-trophy"></i>
            <span>TOPPLISTE</span>
        </a>
        <a href="#" class="action-card">
            <i class="fa-solid fa-book-open"></i>
            <span>REGLER</span>
        </a>
    </main>

    <section class="bottom-panel">
        <div class="last-match">
            <div style="color:#666; font-size:11px; margin-bottom:15px; font-weight:900; text-transform: uppercase; letter-spacing: 1px;">Min Siste Kamp</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="text-align:center; flex: 1;">
                    <div class="match-avatar" id="p1Avatar" style="border-color: var(--gold);">?</div>
                    <div style="color:#fff; font-size:12px; font-weight: bold;" id="p1Name">Laster...</div>
                </div>
                
                <div style="text-align:center; flex: 1;">
                    <div style="font-size:26px; font-weight:900; color:#fff; letter-spacing: -1px;">
                        <span id="p1Score" style="color:#2ecc71">0</span> - <span id="p2Score" style="color:var(--gold)">0</span>
                    </div>
                    <div id="winTag" style="color:#2ecc71; font-size:10px; font-weight:900; margin-top:4px; display: none;">WIN</div>
                </div>
                
                <div style="text-align:center; flex: 1;">
                    <div class="match-avatar" id="p2Avatar">?</div>
                    <div style="color:#fff; font-size:12px; font-weight: bold;" id="p2Name">Laster...</div>
                </div>
            </div>
        </div>
    </section>

    <nav class="navbar">
        <a href="home.html" class="nav-item active"><i class="fa-solid fa-house"></i>Hjem</a>
        <a href="index.html" class="nav-item lasso"><i class="fa-solid fa-infinity"></i>Range</a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i>Profil</a>
        <a href="CBstats.html" class="nav-item"><i class="material-icons">leaderboard</i>Stats</a>
    </nav>
</div>

<script>
    // Din Firebase Config
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Hent brukernavn for hilsen
    db.ref('gameData/names').once('value', (s) => {
        if(s.val()) document.getElementById('greetName').innerText = "Hei, " + s.val()[0] + "!";
    });

    // 2. Hent faktisk informasjon om siste kamp
    db.ref('matchHistory').limitToLast(1).on('value', (s) => {
        if(s.val()) {
            const lastMatch = Object.values(s.val())[0];
            
            // Oppdater navn
            const name1 = lastMatch.names[0];
            const name2 = lastMatch.names[1] || "P2";
            document.getElementById('p1Name').innerText = name1;
            document.getElementById('p2Name').innerText = name2;
            
            // Oppdater bokstaver i sirkler
            document.getElementById('p1Avatar').innerText = name1.charAt(0).toUpperCase();
            document.getElementById('p2Avatar').innerText = name2.charAt(0).toUpperCase();
            
            // Oppdater poeng
            const s1 = lastMatch.scores[0];
            const s2 = lastMatch.scores[1];
            document.getElementById('p1Score').innerText = s1;
            document.getElementById('p2Score').innerText = s2;
            
            // Vis WIN-tag hvis P1 vant (101 poeng)
            if(s1 === 101) document.getElementById('winTag').style.display = 'block';
        }
    });
</script>

</body>
</html>
