<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biljard App UI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --felt-green: radial-gradient(circle, #1a5e20 0%, #0d3b14 100%);
            --leather-black: #1a1a1a;
            --gold: #d4af37;
            --text-gray: #b0b0b0;
        }

        body {
            background-color: #222;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        /* Mobil-container */
        .phone-container {
            width: 375px;
            height: 750px;
            background: var(--bg-dark);
            border: 12px solid #333;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Toppseksjon med profil */
        .header {
            padding: 30px 20px 10px;
            background: linear-gradient(to bottom, #111, #1a1a1a);
        }

        .profile-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .greeting h1 {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
        }

        .rank-text {
            color: var(--text-gray);
            font-size: 14px;
            margin-top: 4px;
        }

        .rank-text span {
            color: var(--gold);
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: #333;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin-top: 10px;
        }

        .progress-fill {
            width: 65%;
            height: 100%;
            background: var(--gold);
            border-radius: 3px;
        }

        /* Hovedområde med grønn duk */
        .main-felt {
            background: var(--felt-green);
            height: 300px;
            margin: 10px 0;
            border-top: 4px solid #000;
            border-bottom: 4px solid #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 15px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        .action-card {
            width: 100px;
            height: 120px;
            background: rgba(0,0,0,0.4);
            border: 1.5px solid var(--gold);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .action-card i {
            font-size: 35px;
            margin-bottom: 10px;
            color: var(--gold);
        }

        .action-card.green-plus i {
            color: #4caf50;
        }

        .action-label {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Kamp-info kort */
        .last-match-container {
            padding: 0 20px;
        }

        .match-card {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #333;
        }

        .match-card h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .player {
            text-align: center;
        }

        .player-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #444;
            margin-bottom: 5px;
        }

        .score-display {
            font-size: 28px;
            font-weight: bold;
        }

        .win-tag {
            color: #4caf50;
            font-size: 10px;
            display: block;
            text-align: center;
        }

        /* Statistikk-tabell */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            text-align: center;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-gray);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 14px;
            font-weight: bold;
        }

        /* Bunnmeny */
        .nav-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: #111;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
        }

        .nav-item {
            text-align: center;
            color: var(--text-gray);
            font-size: 11px;
        }

        .nav-item.active {
            color: var(--gold);
        }

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header">
        <div class="profile-row">
            <div class="greeting">
                <h1>Hei, Marius!</h1>
                <div class="rank-text">Cowboy Rank: <span>Level 12 - Gunslinger</span></div>
            </div>
            <div class="avatar"></div>
        </div>
        <div class="progress-bar-container">
            <div class="progress-fill"></div>
        </div>
    </div>

    <div class="main-felt">
        <div class="action-card green-plus">
            <i class="fa-solid fa-plus"></i>
            <div class="action-label">Ny Kamp</div>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-trophy"></i>
            <div class="action-label">Toppliste</div>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-book-open"></i>
            <div class="action-label">Regler</div>
        </div>
    </div>

    <div class="last-match-container">
        <div class="match-card">
            <h3>Min Siste Kamp</h3>
            <div class="score-row">
                <div class="player">
                    <div class="player-img"></div>
                    <div>Mav</div>
                </div>
                <div class="score-display">
                    <span style="color: #4caf50;">100</span> - <span style="color: var(--gold);">82</span>
                    <span class="win-tag">WIN</span>
                </div>
                <div class="player">
                    <div class="player-img"></div>
                    <div>Per</div>
                </div>
            </div>
            <div class="stats-grid">
                <div><div class="stat-label">Score</div><div class="stat-value">82</div></div>
                <div><div class="stat-label">Turn</div><div class="stat-value">8</div></div>
                <div><div class="stat-label">Serie</div><div class="stat-value">16</div></div>
                <div><div class="stat-label">Foul</div><div class="stat-value">2</div></div>
                <div><div class="stat-label">Kats.</div><div class="stat-value">27</div></div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active">
            <i class="fa-solid fa-house"></i>
            Hjem
        </div>
        <div class="nav-item">
            <i class="fa-solid fa-trophy"></i>
            Toppliste
        </div>
        <div class="nav-item">
            <i class="fa-solid fa-book"></i>
            Regler
        </div>
    </div>
</div>

</body>
</html>
