<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Large Controls</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #1e4d2b 0%, #0a1a0f 100%);
            --gold: #f1c40f;
            --leather: #121212;
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            color: white; -webkit-font-smoothing: antialiased;
        }

        .app-container { height: 100%; display: flex; flex-direction: column; position: relative; }

        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.12; z-index: 2; pointer-events: none; }

        /* RAMMEN */
        .header { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 50px 30px 70px; z-index: 10; 
            border-bottom-left-radius: 50% 30px; border-bottom-right-radius: 50% 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); transition: all 0.5s ease;
        }
        .bottom-panel { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 70px 30px 15px; z-index: 10; 
            border-top-left-radius: 50% 30px; border-top-right-radius: 50% 30px; 
            box-shadow: 0 -20px 40px rgba(0,0,0,0.8); transition: all 0.5s ease;
        }

        .slim-mode .header { padding: 10px 30px 15px; border-bottom-left-radius: 50% 15px; border-bottom-right-radius: 50% 15px; }
        .slim-mode .bottom-panel { padding: 25px 30px 5px; border-top-left-radius: 50% 15px; border-top-right-radius: 50% 15px; }

        .main-content { 
            position: relative; z-index: 5; flex-grow: 1; 
            display: flex; flex-direction: column; 
            padding: 10px; width: 100%; box-sizing: border-box;
        }

        .slim-mode .main-content { justify-content: center; }

        /* HJEM */
        .home-cards { display: flex; flex-direction: column; gap: 15px; align-items: center; justify-content: center; height: 100%; }
        .action-card { width: 280px; padding: 22px; background: rgba(0,0,0,0.7); border: 2px solid var(--gold); border-radius: 20px; display: flex; align-items: center; cursor: pointer; }
        .action-card i { font-size: 28px; margin-right: 20px; color: var(--gold); width: 35px; text-align: center; }
        .action-card span { font-size: 16px; font-weight: 900; text-transform: uppercase; }
        .slim-mode .home-cards { display: none; }

        /* RANGE CONTENT */
        .range-content { display: none; width: 100%; }
        .slim-mode .range-content { display: flex; flex-direction: column; gap: 12px; }

        /* STØRRE SPILLERKORT */
        .player-card { 
            background: linear-gradient(180deg, #0a0a0a 0%, #000 100%); border-radius: 28px; 
            padding: 20px 25px; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.08); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .player-card.active { border: 3px solid var(--gold); transform: scale(1.02); }
        .score-display { font-size: 4.2em; font-weight: 950; line-height: 1; color: #222; }
        .active .score-display { color: var(--gold); }
        .player-info h2 { margin: 0; font-size: 1.4em; text-transform: uppercase; color: #555; }
        .active .player-info h2 { color: #fff; }
        
        .sub-stats { font-size: 0.65em; color: #444; margin-top: 12px; display: flex; gap: 18px; }
        .active .sub-stats { color: #aaa; }
        .stat-val { color: #fff; font-weight: 900; font-size: 1.2em; }

        /* STØRRE BALLER */
        .ball-control-zone { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 25px 10px; border-radius: 35px; margin: 5px 0; border: 1px solid rgba(255,255,255,0.05); }
        .ball-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .ball { width: 85px; height: 85px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 25px rgba(0,0,0,0.6); transition: 0.1s; }
        .ball:active { transform: scale(0.95); }
        .ball-inner { width: 32px; height: 32px; background: white; border-radius: 50%; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 2px solid #000; font-size: 15px; }
        .btn-sub-carom { background: rgba(52, 152, 219, 0.15); color: #3498db; border: 1px solid #3498db; border-radius: 10px; padding: 8px 15px; font-size: 0.7em; font-weight: 900; cursor: pointer; }

        /* STØRRE KNAPPER */
        .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 20px; border-radius: 18px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 0.85em; color: white; }
        .btn-blue { background: #2980b9; border-bottom: 5px solid #1c5982; }
        .btn-foul { background: #c0392b; border-bottom: 5px solid #7b241c; }
        .btn-turn { background: #27ae60; border-bottom: 6px solid #1e8449; grid-column: span 2; padding: 25px; font-size: 1.3em; margin-top: 10px; }

        /* NAVBAR */
        .navbar { background: #000; height: 90px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; z-index: 20; padding-bottom: 25px; }
        .nav-item { color: #333; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: bold; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 28px; margin-bottom: 5px; }

        .foul-dot { width: 14px; height: 14px; border-radius: 50%; background: #1a1a1a; display: inline-block; margin-right: 6px; border: 1px solid #222; }
        .foul-dot.active { background: #e74c3c; box-shadow: 0 0 12px #ff4757; }
    </style>
</head>
<body class="slim-mode"> <div class="felt-base"></div>
<div class="felt-texture"></div>

<div class="app-container" id="app">
    <header class="header">
        <div id="gameStatus" style="text-align:center;">
             <span id="moveText" style="color:#2ecc71; font-weight:900; font-size:16px; letter-spacing:2px; text-transform:uppercase;">Velg: Carom / Pocket</span>
             <div id="matchTimer" style="color:var(--gold); font-family:monospace; font-size:1.8em; margin: 5px 0;">00:00:00</div>
             <div style="font-size:11px; color:#555; font-weight:bold;">INNING: 1</div>
        </div>
    </header>

    <main class="main-content">
        <div class="range-content">
            <div id="scoreboard-container">
                <div class="player-card active">
                    <div class="player-info">
                        <h2>Marius</h2>
                        <div class="sub-stats">
                            <div>NÅ <span class="stat-val">12</span></div>
                            <div>PERS <span class="stat-val">24</span></div>
                            <div>SISTE <span class="stat-val">8</span></div>
                        </div>
                        <div style="margin-top:15px;">
                            <div class="foul-dot active"></div><div class="foul-dot"></div><div class="foul-dot"></div>
                        </div>
                    </div>
                    <div class="score-display">82</div>
                </div>
            </div>

            <div class="ball-control-zone">
                <div class="ball-group">
                    <button class="ball" style="background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00);"><div class="ball-inner">1</div></button>
                    <button class="btn-sub-carom">+ CAROM</button>
                </div>
                <div class="ball-group">
                    <button class="ball" style="background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082);"><div class="ball-inner">5</div></button>
                    <button class="btn-sub-carom">+ CAROM</button>
                </div>
                <div class="ball-group">
                    <button class="ball" style="background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22);"><div class="ball-inner">3</div></button>
                    <button class="btn-sub-carom">+ CAROM</button>
                </div>
            </div>

            <div class="action-area">
                <button class="btn btn-blue">Carom 1P</button>
                <button class="btn btn-blue">Carom 2P</button>
                <button class="btn btn-foul">Foul</button>
                <button class="btn btn-blue">Angre</button>
                <button class="btn btn-turn">Avslutt Tur</button>
            </div>
        </div>
    </main>

    <footer class="bottom-panel"></footer>

    <nav class="navbar">
        <a href="#" class="nav-item"><i class="material-icons">home</i>HJEM</a>
        <a href="#" class="nav-item active"><i class="material-icons">all_inclusive</i>RANGE</a>
        <a href="#" class="nav-item"><i class="material-icons">person</i>PROFIL</a>
        <a href="#" class="nav-item"><i class="material-icons">leaderboard</i>STATS</a>
    </nav>
</div>

</body>
</html>
