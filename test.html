<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root { --felt-green: radial-gradient(circle at center, #1e4d2b 0%, #0a1a0f 100%); --gold: #f1c40f; --leather: #121212; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; color: white; -webkit-font-smoothing: antialiased; touch-action: manipulation; }
        
        .app-container { height: 100%; display: flex; flex-direction: column; position: relative; }
        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.12; z-index: 2; pointer-events: none; }
        
        .header { background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); padding: 25px; z-index: 10; border-bottom-left-radius: 50% 20px; border-bottom-right-radius: 50% 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.8); min-height: 20px; }
        .main-content { position: relative; z-index: 5; flex-grow: 1; display: flex; flex-direction: column; padding: 5px 15px; width: 100%; box-sizing: border-box; overflow-y: auto; }

        /* Scoreboard */
        .player-card { background: linear-gradient(180deg, #0a0a0a 0%, #000 100%); border-radius: 30px; min-height: 130px; padding: 25px 30px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; width: 100%; box-sizing: border-box; gap: 20px; }
        .player-card.active { border: 5px solid var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.9); transform: scale(1.02); }
        .foul-sidebar { display: flex; flex-direction: column; gap: 10px; }
        .foul-dot { width: 18px; height: 18px; border-radius: 50%; background: #000; border: 1px solid #222; }
        .foul-dot.active { background: #e74c3c; box-shadow: 0 0 15px #ff4757; }
        .player-info { flex-grow: 1; }
        .player-info h2 { margin: 0; font-size: 1.8em; text-transform: uppercase; color: #333; font-weight: 900; }
        .active .player-info h2 { color: var(--gold); }
        .sub-stats { margin-top: 10px; display: flex; gap: 25px; }
        .stat-label { font-size: 0.9em; color: #222; font-weight: 900; }
        .active .stat-label { color: #888; }
        .stat-val { color: #fff; font-size: 1.3em; font-weight: 900; }
        .score-display { font-size: 6.5em; font-weight: 950; line-height: 1; color: #111; text-align: right; min-width: 1.2em; }
        .active .score-display { color: var(--gold); }

        /* Baller og sentrering */
        .controls-group { width: 100%; margin-top: auto; padding-bottom: 5px; }
        .game-status-zone { background: rgba(0, 0, 0, 0.85); padding: 15px; border-radius: 25px 25px 0 0; text-align: center; }
        .req-text { font-size: 1.6em; color: #2ecc71; font-weight: 900; text-transform: uppercase; }
        .timer-text { font-family: monospace; font-size: 2.5em; color: var(--gold); margin-top: 5px; display: block; }

        .ball-control-zone { display: flex; justify-content: space-around; background: rgba(0,0,0,0.75); padding: 35px 2px; border-radius: 0 0 50px 50px; margin-bottom: 20px; }
        .ball-group { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 33%; }
        .ball { width: 135px; height: 135px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: inset -10px -10px 30px rgba(0,0,0,0.9), 10px 20px 35px rgba(0,0,0,0.8); transition: 0.1s; }
        .ball:active { transform: scale(0.92); }
        .ball-inner { width: 45px; height: 45px; background: white; border-radius: 50%; color: black; font-weight: 950; display: flex; align-items: center; justify-content: center; border: 3px solid #000; font-size: 24px; }
        .btn-sub-carom { background: rgba(52, 152, 219, 0.2); color: #3498db; border: 2px solid #3498db; border-radius: 15px; padding: 12px 15px; font-size: 0.9em; font-weight: 900; text-transform: uppercase; width: fit-content; }

        .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 30px 10px; border-radius: 25px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 1.7em; color: white; transition: 0.1s; }
        .btn-blue { background: #2980b9; border-bottom: 8px solid #1c5982; }
        .btn-foul { background: #c0392b; border-bottom: 8px solid #7b241c; }
        .btn-turn { background: #27ae60; border-bottom: 10px solid #1e8449; grid-column: span 2; padding: 40px; font-size: 2em; margin-top: 10px; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; backdrop-filter: blur(5px); }
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; right: 0; background: var(--leather); border-top: 4px solid var(--gold); border-top-left-radius: 40px; border-top-right-radius: 40px; padding: 30px 20px 60px; z-index: 2001; transition: bottom 0.4s ease; display: flex; flex-direction: column; align-items: center; }
        .bottom-sheet.show { bottom: 0; }
        .navbar { background: var(--leather); height: 115px; display: flex; justify-content: space-around; align-items: center; border-top: 3px solid var(--gold); z-index: 20; padding-bottom: 25px; }
        .nav-item { color: #555; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 25%; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .waiting-ball { opacity: 0.15 !important; filter: grayscale(1) !important; pointer-events: none; }
        .name-field { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; margin-bottom: 10px; text-align: center; font-size: 1.2em; }
    </style>
</head>
<body>

<div id="rangeOverlay" class="overlay" onclick="closeMenu()"></div>
<div id="rangeSheet" class="bottom-sheet">
    <h2 style="color:var(--gold); margin-bottom: 25px;">KAMP KONTROLL</h2>
    <button class="btn btn-blue" style="width:100%; margin-bottom:15px;" onclick="startSetupFlow()">NY MATCH</button>
    <button class="btn btn-blue" style="width:100%; margin-bottom:15px; background:#2980b9;" onclick="handleRematch()">REMATCH</button>
    <button class="btn btn-blue" style="width:100%; margin-bottom:15px; background:#333;" onclick="closeMenu()">FORTSETT</button>
</div>

<div id="setupOverlay" class="overlay">
    <div style="background:#000; border:2px solid var(--gold); padding:25px; border-radius:30px; width:90%; max-width:350px; text-align:center;">
        <h2 id="setupTitle" style="color:var(--gold); margin-bottom:15px;">VELG MODUS</h2>
        <div id="stepMode">
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button id="btnStd" class="btn btn-blue" style="flex:1; font-size:1em;" onclick="setTempMode('standard')">STANDARD</button>
                <button id="btnAlt" class="btn btn-blue" style="flex:1; font-size:1em; opacity:0.5;" onclick="setTempMode('alternate')">ALT</button>
            </div>
            <button class="btn btn-turn" style="width:100%; padding:20px;" onclick="goToPlayers()">NESTE</button>
        </div>
        <div id="stepPlayers" style="display:none;">
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn btn-blue" style="flex:1;" onclick="goToNames(1)">1</button>
                <button class="btn btn-blue" style="flex:1;" onclick="goToNames(2)">2</button>
                <button class="btn btn-blue" style="flex:1;" onclick="goToNames(3)">3</button>
            </div>
        </div>
        <div id="stepNames" style="display:none;">
            <div id="nameInputs"></div>
            <button class="btn btn-turn" style="width:100%; padding:20px;" onclick="finalizeSetup()">START</button>
        </div>
        <button class="btn" style="background:none; color:#444; font-size:1em;" onclick="closeSetup()">AVBRYT</button>
    </div>
</div>

<div class="app-container">
    <div class="felt-base"></div><div class="felt-texture"></div>
    <header class="header"></header>
    <main class="main-content">
        <div id="scoreboard-container"></div>
        <div class="controls-group">
            <div class="game-status-zone">
                <span id="modeDisplay" style="font-size:0.7em; color:var(--gold); display:block; margin-bottom:5px;">MODUS: STANDARD</span>
                <span class="req-text" id="moveText">BREKK-STØT</span>
                <span class="timer-text" id="matchTimer">00:00:00</span>
                <div id="inningDisplay" style="color:#888; font-weight:bold; font-size:0.8em;">INNING: 1</div>
            </div>
            <div class="ball-control-zone">
                <div class="ball-group"><button class="ball" id="ball1" style="background:radial-gradient(circle at 35% 35%, #f1c40f, #b38f00);" onclick="action('pocket', 1)"><div class="ball-inner">1</div></button><button class="btn-sub-carom" id="pc1" onclick="action('pocket_carom', 2)">+ CAROM</button></div>
                <div class="ball-group"><button class="ball" id="ball5" style="background:radial-gradient(circle at 35% 35%, #8e44ad, #4b0082);" onclick="action('pocket', 5)"><div class="ball-inner">5</div></button><button class="btn-sub-carom" id="pc5" onclick="action('pocket_carom', 6)">+ CAROM</button></div>
                <div class="ball-group"><button class="ball" id="ball3" style="background:radial-gradient(circle at 35% 35%, #e74c3c, #962d22);" onclick="action('pocket', 3)"><div class="ball-inner">3</div></button><button class="btn-sub-carom" id="pc3" onclick="action('pocket_carom', 4)">+ CAROM</button></div>
            </div>
            <div class="action-area">
                <button class="btn btn-blue" id="carom1PBtn" onclick="action('carom', 1)">Carom 1P</button>
                <button class="btn btn-blue" id="carom2PBtn" onclick="action('carom', 2)">Carom 2P</button>
                <button class="btn btn-foul" onclick="handleFoul()">FOUL</button>
                <button class="btn btn-blue" onclick="undo()">ANGRE</button>
                <button class="btn btn-turn" onclick="nextTurn()">AVSLUTT TUR</button>
            </div>
        </div>
    </main>
    <nav class="navbar">
        <div class="nav-item"><i class="material-icons">home</i><span>HJEM</span></div>
        <div class="nav-item active" onclick="openMenu()"><i class="material-icons">all_inclusive</i><span>RANGE</span></div>
        <div class="nav-item"><i class="material-icons">person</i><span>PROFIL</span></div>
        <div class="nav-item"><i class="material-icons">leaderboard</i><span>STATS</span></div>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    let state = { playerCount: 1, gameMode: 'standard', scores: [0,0,0], foulCounts: [0,0,0], scoreAtStart: [0,0,0], currentPlayer: 0, breakDone: false, seconds: 0, names: ["P1","P2","P3"], bestSeries: [0,0,0], innings: 1, tableStatus: 'open', lastType: null };
    let history = []; let tempPlayers = 1; let tempMode = 'standard';

    db.on('value', (s) => { if(s.val()) { state = s.val(); updateUI(); } });

    function openMenu() { document.getElementById('rangeOverlay').style.display='block'; setTimeout(()=>document.getElementById('rangeSheet').classList.add('show'),10); }
    function closeMenu() { document.getElementById('rangeSheet').classList.remove('show'); setTimeout(()=>document.getElementById('rangeOverlay').style.display='none',400); }
    function startSetupFlow() { closeMenu(); document.getElementById('setupOverlay').style.display='flex'; showStep('stepMode', 'VELG MODUS'); }
    function closeSetup() { document.getElementById('setupOverlay').style.display='none'; }
    function setTempMode(m) { tempMode = m; document.getElementById('btnStd').style.opacity = m==='standard'?'1':'0.5'; document.getElementById('btnAlt').style.opacity = m==='alternate'?'1':'0.5'; }
    function goToPlayers() { showStep('stepPlayers', 'ANTALL SPILLERE'); }
    function goToNames(n) { tempPlayers = n; showStep('stepNames', 'NAVN'); const c = document.getElementById('nameInputs'); c.innerHTML=''; for(let i=0;i<n;i++) c.innerHTML+=`<input type='text' id='n${i}' class='name-field' placeholder='Navn ${i+1}'>`; }
    function showStep(s,t) { ['stepMode','stepPlayers','stepNames'].forEach(x=>document.getElementById(x).style.display='none'); document.getElementById(s).style.display='block'; document.getElementById('setupTitle').innerText=t; }
    
    function finalizeSetup() {
        const ns = []; for(let i=0; i<tempPlayers; i++) ns.push(document.getElementById(`n${i}`).value || `P${i+1}`);
        db.set({...state, playerCount: tempPlayers, gameMode: tempMode, names: ns, scores: [0,0,0], foulCounts:[0,0,0], scoreAtStart:[0,0,0], seconds:0, currentPlayer:0, innings:1, breakDone:false});
        closeSetup();
    }

    function action(type, val) {
    saveHistory();
    let p = state.currentPlayer;
    let nextScore = state.scores[p] + val;

    // 1. Regel: Nøyaktig 90 eller 101. Overstigning = Foul.
    if ((state.scores[p] < 90 && nextScore > 90) || (state.scores[p] >= 90 && nextScore > 101)) { 
        handleFoul(); 
        return; 
    }

    // 2. Alternate Mode: Tillat flere trykk av samme kategori (for kombinasjoner)
    if (state.gameMode === 'alternate' && state.tableStatus === 'locked') {
        const isCurrentlyPocket = type.includes('pocket');
        const wasLastPocket = state.lastType === 'pocket';
        // Hvis man prøver å bytte kategori (f.eks fra pocket til carom) før neste støt, 
        // blokkerer vi det her, men tillater samme kategori.
        if (isCurrentlyPocket !== wasLastPocket) return;
    }

    state.breakDone = true; 
    state.foulCounts[p] = 0; 
    state.scores[p] = nextScore;

    if (state.gameMode === 'alternate') {
        state.tableStatus = 'locked';
        state.lastType = type.includes('pocket') ? 'pocket' : 'carom';
    }

    db.set(state);
}

    function updateUI() {
    const cont = document.getElementById('scoreboard-container');
    if(!cont) return;
    
    // TEGN BOKSENE
    cont.innerHTML = '';
    for(let i=0; i<state.playerCount; i++) {
        const active = state.currentPlayer === i;
        cont.innerHTML += `<div class="player-card ${active?'active':''}">
            <div class="foul-sidebar">
                <div class="foul-dot ${state.foulCounts[i]>=1?'active':''}"></div>
                <div class="foul-dot ${state.foulCounts[i]>=2?'active':''}"></div>
                <div class="foul-dot ${state.foulCounts[i]>=3?'active':''}"></div>
            </div>
            <div class="player-info">
                <h2>${state.names[i]}</h2>
                <div class="sub-stats">
                    <div class="stat-group"><span class="stat-label">NÅ</span><span class="stat-val">${active?state.scores[i]-state.scoreAtStart[i]:0}</span></div>
                    <div class="stat-group"><span class="stat-label">BEST</span><span class="stat-val">${state.bestSeries[i]}</span></div>
                </div>
            </div>
            <div class="score-display">${state.scores[i]}</div>
        </div>`;
    }
    
    const cur = state.scores[state.currentPlayer];
    const caromPhase = cur >= 90 && cur < 100;
    
    // STATUS-TEKST
    let moveTxt = !state.breakDone ? "BREKK-STØT" : (caromPhase ? "KUN CAROMS" : "ANY POINT");
    if (state.gameMode === 'alternate' && state.tableStatus === 'locked' && !caromPhase) {
        moveTxt = state.lastType === 'pocket' ? "KRAV: CAROM" : "KRAV: POCKET";
    }

    document.getElementById('modeDisplay').innerText = "MODUS: " + state.gameMode.toUpperCase();
    document.getElementById('moveText').innerText = moveTxt;
    document.getElementById('matchTimer').innerText = new Date(state.seconds * 1000).toISOString().substr(11, 8);

    // GRÅING AV BALLER
    const lockPocket = state.gameMode === 'alternate' && state.tableStatus === 'locked' && state.lastType === 'pocket';
    const lockCarom = state.gameMode === 'alternate' && state.tableStatus === 'locked' && state.lastType === 'carom';

    document.getElementById('ball1').classList.toggle('waiting-ball', caromPhase || !state.breakDone || lockPocket);
    document.getElementById('ball5').classList.toggle('waiting-ball', caromPhase || !state.breakDone || lockPocket);
    document.getElementById('ball3').classList.toggle('waiting-ball', caromPhase || lockPocket);

    // +CAROM skal lyse frem til 90 poeng
    const disSub = caromPhase || cur >= 100 || lockCarom;
    document.getElementById('pc1').classList.toggle('waiting-ball', disSub);
    document.getElementById('pc5').classList.toggle('waiting-ball', disSub);
    document.getElementById('pc3').classList.toggle('waiting-ball', disSub);
    
    document.getElementById('carom1PBtn').classList.toggle('waiting-ball', lockCarom);
    document.getElementById('carom2PBtn').classList.toggle('waiting-ball', lockCarom);
}

    function handleFoul() { saveHistory(); state.breakDone=true; state.scores[state.currentPlayer]=state.scoreAtStart[state.currentPlayer]; state.foulCounts[state.currentPlayer]++; if(state.foulCounts[state.currentPlayer]>=3){state.scores[state.currentPlayer]=0;state.foulCounts[state.currentPlayer]=0;} nextTurn(); }
    function nextTurn() { saveHistory(); state.breakDone=true; let p = state.currentPlayer; let s = state.scores[p]-state.scoreAtStart[p]; if(s>state.bestSeries[p]) state.bestSeries[p]=s; if(p===state.playerCount-1) state.innings++; state.currentPlayer=(p+1)%state.playerCount; state.scoreAtStart[state.currentPlayer]=state.scores[state.currentPlayer]; db.set(state); }
    function handleRematch() { db.set({...state, scores:[0,0,0], foulCounts:[0,0,0], scoreAtStart:[0,0,0], seconds:0, currentPlayer:0, innings:1, breakDone:false}); closeMenu(); }
    function handleFinishAndSave() { firebase.database().ref('matchHistory').push({ date: new Date().toISOString(), names: state.names, scores: state.scores }).then(()=>handleRematch()); }
    function undo() { if(history.length){state=JSON.parse(history.pop()); db.set(state);} }
    function saveHistory() { history.push(JSON.stringify(state)); if(history.length>10) history.shift(); }
    setInterval(() => { if(state.breakDone) { state.seconds++; db.child('seconds').set(state.seconds); } }, 1000);
</script>
</body>
</html>
