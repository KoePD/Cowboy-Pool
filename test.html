<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biljard App - Fasit UI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* Fargepalett fra bildet */
            --bg-dark: #111111;
            --leather-dark: #1a1a1a;
            --felt-green: radial-gradient(circle at center, #2e7d32 0%, #1a5e20 50%, #0d3b14 100%);
            --gold: #d4af37;
            --text-gold: #e6c66a;
            --text-gray: #aaaaaa;
            --white: #ffffff;
            --border: #333333;
            --win-green: #4caf50;
        }

        body {
            background-color: #222;
            color: var(--white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Ytre mobil-ramme */
        .phone-frame {
            width: 375px;
            height: 750px;
            background: var(--bg-dark);
            border: 12px solid #333;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* ----- HEADER SEKSJON ----- */
        .header-panel {
            padding: 30px 20px 40px; /* Mer padding i bunn for buen */
            background: var(--leather-dark);
            position: relative;
            z-index: 10;
            /* Lær-tekstur filter */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiIHZpZXdCb3g9IjAgMCA0IDQiPjxnIGZpbGwtcnVsZT0iZXZlbm9kZCI+PGcgZmlsbD0iIzIyMjIyMiIgZmlsbC1vcGFjaXR5PSIwLjA1Ij48cGF0aCBkPSJNMCAwaDF2MUgwVjB6TTEgMWgxdjFIMVYxeiBNMiAyNWgxdjFIMlYyegoiLz48L2c+PC9nPjwvc3ZnPg==');
            /* CSS Bue-maske for overgangen */
            -webkit-mask-image: radial-gradient(circle 500px at 50% -390px, transparent 100%, black 100%);
            mask-image: radial-gradient(circle 500px at 50% -390px, transparent 100%, black 100%);
        }

        .profile-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .greeting h1 {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
        }

        .rank-text {
            color: var(--text-gray);
            font-size: 13px;
            margin-top: 2px;
        }

        .rank-text span {
            color: var(--text-gold);
        }

        .avatar-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: #333;
            overflow: hidden;
        }
        
        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin-top: 10px;
            position: relative;
        }

        .progress-bar {
            width: 65%;
            height: 100%;
            background: var(--gold);
            border-radius: 3px;
        }

        /* ----- MIDTRE SEKSJON: BILJARDDUK ----- */
        .main-felt {
            background: var(--felt-green);
            flex-grow: 1;
            padding: 30px 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: -30px; /* Overlapp med topp-buen */
            margin-bottom: -30px; /* Overlapp med bunn-buen */
            position: relative;
            z-index: 1;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.6);
            /* Søm-tekstur filter */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiIHZpZXdCb3g9IjAgMCA0IDQiPjxnIGZpbGwtcnVsZT0iZXZlbm9kZCI+PGcgZmlsbD0iIzAwMDAwMCIgZmlsbC1vcGFjaXR5PSIwLjA1Ij48cGF0aCBkPSJNMCAwaDF2MUgwVjB6TTEgMWgxdjFIMVYxeiBNMiAyNWgxdjFIMlYyegoiLz48L2c+PC9nPjwvc3ZnPg==');
        }

        .action-card {
            background: rgba(0,0,0,0.5);
            border: 1.5px solid var(--gold);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .action-card:hover {
            transform: translateY(-3px);
            background: rgba(0,0,0,0.6);
        }

        .action-card i {
            font-size: 35px;
            margin-bottom: 8px;
            color: var(--text-gold);
        }

        .action-card.green-plus i {
            color: var(--win-green);
        }

        .action-label {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* ----- KAMP-INFO SEKSJON ----- */
        .match-panel {
            background: var(--leather-dark);
            padding: 40px 20px 20px; /* Mer padding i topp for buen */
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 10;
            /* Lær-tekstur filter */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiIHZpZXdCb3g9IjAgMCA0IDQiPjxnIGZpbGwtcnVsZT0iZXZlbm9kZCI+PGcgZmlsbD0iIzIyMjIyMiIgZmlsbC1vcGFjaXR5PSIwLjA1Ij48cGF0aCBkPSJNMCAwaDF2MUgwVjB6TTEgMWgxdjFIMVYxeiBNMiAyNWgxdjFIMlYyegoiLz48L2c+PC9nPjwvc3ZnPg==');
            /* CSS Bue-maske for overgangen */
            -webkit-mask-image: radial-gradient(circle 500px at 50% 540px, transparent 100%, black 100%);
            mask-image: radial-gradient(circle 500px at 50% 540px, transparent 100%, black 100%);
        }

        .match-card {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .match-card h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .player {
            text-align: center;
            width: 80px;
        }

        .player-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #444;
            margin: 0 auto 5px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        
        .player-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .player-name {
            font-size: 14px;
        }

        .score-display {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            line-height: 1;
        }

        .win-tag {
            color: var(--win-green);
            font-size: 11px;
            font-weight: bold;
            display: block;
            margin-top: 2px;
        }

        .score-display .win {
            color: var(--win-green);
        }

        .score-display .gold {
            color: var(--text-gold);
        }

        /* Statistikk-tabell */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            text-align: center;
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-gray);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 15px;
            font-weight: bold;
        }

        /* ----- BOTTOM NAV ----- */
        .nav-bar {
            width: 100%;
            height: 70px;
            background: #111;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: auto;
        }

        .nav-item {
            text-align: center;
            color: var(--text-gray);
            font-size: 11px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 80px;
        }

        .nav-item.active {
            color: var(--text-gold);
        }

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <header class="header-panel">
        <div class="profile-row">
            <div class="greeting">
                <h1>Hei, Marius!</h1>
                <div class="rank-text">Cowboy Rank: <span>Level 12 - Gunslinger</span></div>
            </div>
            <div class="avatar-circle">
                <img src="https://via.placeholder.com/50" alt="Avatar">
            </div>
        </div>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </header>

    <div class="main-felt">
        <div class="action-card green-plus">
            <i class="fa-solid fa-plus"></i>
            <div class="action-label">Ny Kamp</div>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-trophy"></i>
            <div class="action-label">Toppliste</div>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-book-open"></i>
            <div class="action-label">Regler</div>
        </div>
    </div>

    <div class="match-panel">
        <div class="match-card">
            <h3>Min Siste Kamp</h3>
            <div class="score-row">
                <div class="player">
                    <div class="player-img">
                        <img src="https://via.placeholder.com/60" alt="Mav">
                    </div>
                    <div class="player-name">Mav</div>
                </div>
                <div class="score-display">
                    <span class="win">100</span> - <span class="gold">82</span>
                    <span class="win-tag">WIN</span>
                </div>
                <div class="player">
                    <div class="player-img">
                        <img src="https://via.placeholder.com/60" alt="Per">
                    </div>
                    <div class="player-name">Per</div>
                </div>
            </div>
            <div class="stats-grid">
                <div><div class="stat-label">Score</div><div class="stat-value">82</div></div>
                <div><div class="stat-label">Turn</div><div class="stat-value">8</div></div>
                <div><div class="stat-label">Serie</div><div class="stat-value">16</div></div>
                <div><div class="stat-label">Foul</div><div class="stat-value">2</div></div>
                <div><div class="stat-label">Kats.</div><div class="stat-value">27</div></div>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active">
            <i class="fa-solid fa-house"></i>
            Hjem
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-trophy"></i>
            Toppliste
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-book"></i>
            Regler
        </a>
    </nav>
</div>

</body>
</html>
