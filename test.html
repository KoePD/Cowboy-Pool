<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Unified</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #2fa34b 0%, #155e2d 60%, #082411 100%);
            --gold: #f1c40f;
            --leather: #121212;
            --card-bg: rgba(0, 0, 0, 0.75);
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased; color: white;
        }

        .app-container { height: 100%; display: flex; flex-direction: column; position: relative; }

        /* BAKGRUNN */
        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.12; z-index: 2; pointer-events: none; }

        /* LÆR-PANELER */
        .header { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 80px 30px 140px; z-index: 10; 
            border-bottom-left-radius: 50% 50px; border-bottom-right-radius: 50% 50px; 
            box-shadow: 0 25px 45px rgba(0,0,0,0.9); position: relative; transition: all 0.4s ease;
        }
        .bottom-panel { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 130px 30px 40px; z-index: 10; 
            border-top-left-radius: 50% 50px; border-top-right-radius: 50% 50px; 
            box-shadow: 0 -25px 45px rgba(0,0,0,0.9); position: relative; transition: all 0.4s ease;
        }

        /* SLIM MODE (Range) - Beholder 10px kanter */
        .slim-mode .header { padding: 0; height: 10px; border-radius: 0; box-shadow: none; }
        .slim-mode .bottom-panel { padding: 0; height: 10px; border-radius: 0; box-shadow: none; }
        .slim-mode .hide-on-slim { display: none; }

        .main-content { position: relative; z-index: 5; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        
        /* HJEM-SKJERM: MASSIVE KNAPPER */
        .home-cards { display: flex; justify-content: space-evenly; align-items: center; height: 100%; width: 100%; }
        .action-card { 
            width: 250px; height: 280px; 
            background: var(--card-bg); border: 3px solid var(--gold); border-radius: 35px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9), 0 25px 50px rgba(0,0,0,0.8);
            cursor: pointer;
        }
        .action-card i { font-size: 90px; margin-bottom: 25px; color: var(--gold); }
        .action-card span { font-size: 22px; font-weight: 950; color: #fff; letter-spacing: 2px; text-transform: uppercase; }

        /* RANGE MODUS (100% LIK DIN KONTROLLER) */
        .range-content { display: none; width: 100%; max-width: 430px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        .slim-mode .home-cards { display: none; }
        .slim-mode .range-content { display: block; }

        .player-card { background: linear-gradient(180deg, #0a0a0a 0%, #000000 100%); border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; }
        .player-card.active { border: 2px solid var(--gold); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9); transform: scale(1.03); }
        .score-display { font-size: 3.5em; font-weight: 900; color: #333; }
        .active .score-display { color: var(--gold); }
        .foul-dot { width: 12px; height: 12px; border-radius: 50%; background: #1a1a1a; border: 1px solid #222; display: inline-block; margin-right: 2px; }
        .foul-dot.active { background: #e74c3c; box-shadow: 0 0 10px #ff4757; }
        
        .game-status-zone { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); padding: 15px; border-radius: 20px 20px 0 0; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .ball-control-zone { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 20px 10px; border-radius: 0 0 35px 35px; border: 1px solid rgba(255,255,255,0.03); margin-bottom: 15px; }
        
        .ball { width: 75px; height: 75px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: inset -6px -6px 15px rgba(0,0,0,0.7), 6px 12px 20px rgba(0,0,0,0.6); }
        #ball1 { background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00); }
        #ball5 { background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082); }
        #ball3 { background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22); }
        .ball-inner { width: 28px; height: 28px; background: white; border-radius: 50%; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 2px solid #000; }
        
        .btn-sub-carom { background: rgba(52, 152, 219, 0.12); color: #3498db; border: 1px solid #3498db; border-radius: 8px; padding: 6px 12px; font-size: 0.6em; font-weight: 800; margin-top: 8px; }
        
        .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 16px; border-radius: 16px; border: none; font-weight: 800; text-transform: uppercase; color: white; cursor: pointer; }
        .btn-blue { background: #2980b9; border-bottom: 4px solid #1c5982; }
        .btn-foul { background: #c0392b; border-bottom: 4px solid #7b241c; }
        .btn-turn { background: #27ae60; border-bottom: 4px solid #1e8449; grid-column: span 2; padding: 20px; font-size: 1.1em; }
        .waiting-ball { opacity: 0.15; filter: grayscale(1); pointer-events: none; }

        .navbar { background: #000; height: 95px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; z-index: 20; padding-bottom: 20px; }
        .nav-item { color: #444; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.6em; font-weight: 800; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 2.2em; margin-bottom: 4px; }

        .setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,20,5,0.98); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .setup-card { background: #000; border: 1px solid var(--gold); padding: 30px; border-radius: 30px; width: 100%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>

    <header class="header">
        <div class="hide-on-slim">
            <h1 style="color:#fff; margin:0; font-size:36px; font-weight:800;">Hei, Lasse!</h1>
            <div style="color:var(--gold); font-size:18px; margin:8px 0;">Cowboy Rank: Level 12</div>
            <div style="width:100%; height:12px; background:#222; border-radius:6px; margin-top:30px;"><div style="width:65%; height:100%; background:var(--gold); border-radius:6px;"></div></div>
        </div>
    </header>

    <main class="main-content">
        <div class="home-cards">
            <div class="action-card" onclick="navTo('range', document.getElementById('rBtn'))"><i class="fa-solid fa-circle-plus" style="color:#2ecc71;"></i><span>NY KAMP</span></div>
            <div class="action-card"><i class="fa-solid fa-trophy"></i><span>TOPPLISTE</span></div>
            <div class="action-card"><i class="fa-solid fa-book-open"></i><span>REGLER</span></div>
        </div>

        <div class="range-content">
            <div id="scoreboard-container"></div>
            
            <div class="game-status-zone">
                <div id="modeLabel" style="font-size:0.6em; color:var(--gold); opacity:0.6; margin-bottom:5px; text-transform:uppercase;">MODUS: STANDARD</div>
                <span class="req-text" id="moveText" style="font-size: 0.8em; letter-spacing: 2px; color: #2ecc71; font-weight: 800; text-transform: uppercase;">BREKK-STØT</span>
                <span class="timer-text" id="matchTimer" style="font-family: monospace; font-size: 1.2em; color: var(--gold); display: block;">00:00:00</span>
                <div id="inningDisplay" style="font-size:0.7em; color:#888; font-weight:bold; margin-top:5px; text-transform:uppercase;">INNING: 1</div>
            </div>

            <div class="ball-control-zone">
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <button class="ball" id="ball1" onclick="action('pocket', 1)"><div class="ball-inner">1</div></button>
                    <button class="btn-sub-carom" id="pc1" onclick="action('pocket_carom', 2)">+ CAROM</button>
                </div>
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <button class="ball" id="ball5" onclick="action('pocket', 5)"><div class="ball-inner">5</div></button>
                    <button class="btn-sub-carom" id="pc5" onclick="action('pocket_carom', 6)">+ CAROM</button>
                </div>
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <button class="ball" id="ball3" onclick="action('pocket', 3)"><div class="ball-inner">3</div></button>
                    <button class="btn-sub-carom" id="pc3" onclick="action('pocket_carom', 4)">+ CAROM</button>
                </div>
            </div>

            <div class="action-area">
                <button class="btn btn-blue" id="carom1PBtn" onclick="action('carom', 1)">Carom 1P</button>
                <button class="btn btn-blue" id="carom2PBtn" onclick="action('carom', 2)">Carom 2P</button>
                <button class="btn btn-foul" id="foulActionBtn" onclick="handleFoul()">FOUL</button>
                <button class="btn btn-blue" id="undoActionBtn" onclick="undo()">ANGRE</button>
                <button class="btn btn-turn" id="endTurnBtn" onclick="nextTurn()">AVSLUTT TUR</button>
            </div>
        </div>
    </main>

    <section class="bottom-panel">
        <div class="hide-on-slim">
            <div style="background:rgba(255,255,255,0.04); border:1px solid #333; border-radius:24px; padding:30px;">
                <div style="color:#666; font-size:16px; margin-bottom:15px; font-weight:800; text-transform:uppercase;">Siste Kamp: 100 - 82</div>
            </div>
        </div>
    </section>

    <nav class="navbar">
        <a href="javascript:void(0)" class="nav-item active" onclick="navTo('home', this)"><i class="material-icons">home</i>HJEM</a>
        <a href="javascript:void(0)" class="nav-item" id="rBtn" onclick="navTo('range', this)"><i class="material-icons">all_inclusive</i>RANGE</a>
        <a href="javascript:void(0)" class="nav-item"><i class="material-icons">person</i>PROFIL</a>
    </nav>
</div>

<script>
    // --- FIREBASE OG DIN ORIGINALE LOGIKK ---
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    let state = { gameMode: 'standard', playerCount: 2, scores: [0,0,0], foulCounts: [0,0,0], scoreAtStart: [0,0,0], currentPlayer: 0, breakDone: false, tableStatus: 'open', lastType: null, seconds: 0, names: ["P1","P2","P3"], bestSeries: [0,0,0], lastSeries: [0,0,0], lang: 'no', innings: 1 };
    let history = [];

    db.on('value', (s) => { if(s.val()) { state = s.val(); updateUI(); } });

    function navTo(page, el) {
        const app = document.getElementById('app');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(page === 'range') app.classList.add('slim-mode'); else app.classList.remove('slim-mode');
    }

    function action(type, val) {
        saveHistory(); let p = state.currentPlayer;
        state.scores[p] += val; state.breakDone = true;
        db.set(state);
    }

    function updateUI() {
        const cont = document.getElementById('scoreboard-container'); cont.innerHTML = '';
        for(let i=0; i<state.playerCount; i++) {
            const active = state.currentPlayer === i;
            cont.innerHTML += `<div class="player-card ${active?'active':''}">
                <div class="player-info">
                    <h2>${state.names[i]}</h2>
                    <div style="margin-top:10px;">
                        <div class="foul-dot ${state.foulCounts[i]>=1?'active':''}"></div>
                        <div class="foul-dot ${state.foulCounts[i]>=2?'active':''}"></div>
                        <div class="foul-dot ${state.foulCounts[i]>=3?'active':''}"></div>
                    </div>
                </div>
                <div class="score-display">${state.scores[i]}</div>
            </div>`;
        }
        document.getElementById('matchTimer').innerText = new Date(state.seconds * 1000).toISOString().substr(11, 8);
    }

    function handleFoul() { saveHistory(); state.scores[state.currentPlayer] = state.scoreAtStart[state.currentPlayer]; nextTurn(); }
    function nextTurn() { state.currentPlayer = (state.currentPlayer + 1) % state.playerCount; state.scoreAtStart[state.currentPlayer] = state.scores[state.currentPlayer]; db.set(state); }
    function undo() { if(history.length) { state = JSON.parse(history.pop()); db.set(state); } }
    function saveHistory() { history.push(JSON.stringify(state)); if(history.length > 10) history.shift(); }
    setInterval(() => { if(state.breakDone) { state.seconds++; db.child('seconds').set(state.seconds); } }, 1000);
</script>
</body>
</html>
