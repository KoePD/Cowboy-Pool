<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biljard App - 1000% Fasit</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #2fa34b 0%, #155e2d 60%, #082411 100%);
            --gold: #d4af37;
            --leather: #121212;
            --card-bg: rgba(0, 0, 0, 0.75);
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .felt-base {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--felt-green);
            z-index: 1;
        }

        .felt-texture {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("https://www.transparenttextures.com/patterns/felt.png");
            opacity: 0.12;
            z-index: 2;
            pointer-events: none;
        }

        /* TOPP-PANEL */
        .header {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: 70px 30px 140px; 
            z-index: 10;
            border-bottom-left-radius: 50% 50px;
            border-bottom-right-radius: 50% 50px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.9);
            position: relative;
        }

        .header::after {
            content: "";
            position: absolute;
            bottom: 18px; left: 5%; width: 90%; height: 50px;
            border-bottom: 2px dashed rgba(212, 175, 55, 0.3);
            border-radius: 50%;
        }

        .header h1 { color: #fff; margin: 0; font-size: 34px; font-weight: 800; }
        .rank { color: var(--gold); font-size: 16px; margin: 8px 0; font-weight: 500; }
        
        .progress-bar {
            width: 100%; height: 10px; background: #222;
            border-radius: 5px; margin-top: 30px;
        }
        .progress-fill {
            width: 65%; height: 100%;
            background: linear-gradient(90deg, #b38f36, var(--gold));
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            border-radius: 5px;
        }

        /* MIDTPARTI - MASSIVE KNAPPER */
        .main-felt {
            position: relative;
            z-index: 5;
            flex-grow: 1;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 10px;
        }

        .action-card {
            width: 180px; /* 100% større (fra ca 90-100px) */
            height: 200px; /* 100% større */
            background: var(--card-bg);
            border: 2.5px solid var(--gold);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9), 0 20px 40px rgba(0,0,0,0.7), 0 0 15px rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(8px);
            margin: 0 5px;
        }

        .action-card i { font-size: 70px; margin-bottom: 20px; color: var(--gold); }
        .action-card.green-icon i { color: #2ecc71; }
        .action-card span { font-size: 18px; font-weight: 950; letter-spacing: 1.5px; text-transform: uppercase; }

        /* BUNN-PANEL */
        .bottom-panel {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: 130px 30px 40px; 
            z-index: 10;
            border-top-left-radius: 50% 50px;
            border-top-right-radius: 50% 50px;
            box-shadow: 0 -25px 45px rgba(0,0,0,0.9);
            position: relative;
        }

        .bottom-panel::before {
            content: "";
            position: absolute;
            top: 18px; left: 5%; width: 90%; height: 50px;
            border-top: 2px dashed rgba(212, 175, 55, 0.3);
            border-radius: 50%;
        }

        .match-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid #333;
            border-radius: 24px;
            padding: 25px;
        }

        /* NAVBAR */
        .navbar {
            background: #080808;
            height: 95px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #1a1a1a;
            z-index: 20;
            padding-bottom: 20px;
        }

        .nav-item { color: #444; text-align: center; font-size: 14px; text-decoration: none; font-weight: 800; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { display: block; font-size: 32px; margin-bottom: 8px; }

    </style>
</head>
<body>

<div class="app-container">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>

    <header class="header">
        <h1>Hei, Lasse!</h1>
        <div class="rank">Cowboy Rank: Level 12 - Gunslinger</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </header>

    <main class="main-felt">
        <div class="action-card green-icon">
            <i class="fa-solid fa-circle-plus"></i>
            <span>NY KAMP</span>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-trophy"></i>
            <span>TOPPLISTE</span>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-book-open"></i>
            <span>REGLER</span>
        </div>
    </main>

    <section class="bottom-panel">
        <div class="match-card">
            <div style="color:#666; font-size:14px; margin-bottom:20px; font-weight:800; text-transform: uppercase; letter-spacing: 1.5px;">Min Siste Kamp</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="text-align:center;">
                    <div style="width:70px; height:70px; border-radius:50%; background:#1a1a1a; border:3.5px solid var(--gold); margin-bottom:10px;"></div>
                    <div style="color:#fff; font-size:15px; font-weight: 700;">Lasse</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:46px; font-weight:950; color:#fff; letter-spacing:2px;">
                        <span style="color:#2ecc71">0</span> - <span style="color:#444">0</span>
                    </div>
                    <div style="color:#666; font-size:13px; font-weight:900; margin-top:5px;">LASTER...</div>
                </div>
                <div style="text-align:center;">
                    <div style="width:70px; height:70px; border-radius:50%; background:#1a1a1a; border:3.5px solid #333; margin-bottom:10px;"></div>
                    <div style="color:#fff; font-size:15px; font-weight: 700;">?</div>
                </div>
            </div>
        </div>
    </section>

    <nav class="navbar">
        <a href="#" class="nav-item active"><i class="fa-solid fa-house-chimney"></i>HJEM</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-infinity"></i>RANGE</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-user"></i>PROFIL</a>
    </nav>
</div>

</body>
</html>
