<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool - Unified App</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root {
            /* Design-farger */
            --felt-green: radial-gradient(circle at center, #2fa34b 0%, #155e2d 60%, #082411 100%);
            --gold: #d4af37;
            --leather: #121212;
            --card-bg: rgba(0, 0, 0, 0.75);
            
            /* Dynamisk padding for topp/bunn */
            --header-p: 80px 30px 140px;
            --bottom-p: 130px 30px 40px;
            --stitch-opacity: 0.3;
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased; color: white;
        }

        .app-container {
            height: 100%; display: flex; flex-direction: column; position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* SLIM MODE FOR RANGE */
        .app-container.slim-mode {
            --header-p: 20px 30px 40px; 
            --bottom-p: 40px 30px 10px; 
            --stitch-opacity: 0;
        }

        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.12; z-index: 2; pointer-events: none; }

        /* LÆR PANELER */
        .header { background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); padding: var(--header-p); z-index: 10; border-bottom-left-radius: 50% 50px; border-bottom-right-radius: 50% 50px; box-shadow: 0 25px 45px rgba(0,0,0,0.9); position: relative; transition: inherit; }
        .bottom-panel { background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); padding: var(--bottom-p); z-index: 10; border-top-left-radius: 50% 50px; border-top-right-radius: 50% 50px; box-shadow: 0 -25px 45px rgba(0,0,0,0.9); position: relative; transition: inherit; }

        .hide-on-slim { transition: opacity 0.3s ease; }
        .slim-mode .hide-on-slim { opacity: 0; display: none; }

        /* MIDTPARTIET (Innholdet fra index.html) */
        .main-content { position: relative; z-index: 5; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 10px; }
        
        .home-cards { display: flex; justify-content: space-evenly; align-items: center; height: 100%; width: 100%; }
        .action-card { width: 130px; height: 150px; background: var(--card-bg); border: 2.5px solid var(--gold); border-radius: 28px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: inset 0 0 40px rgba(0,0,0,0.9), 0 20px 40px rgba(0,0,0,0.7); }
        .action-card i { font-size: 50px; margin-bottom: 15px; color: var(--gold); }
        .action-card span { font-size: 14px; font-weight: 900; color: #fff; letter-spacing: 1px; }

        /* STILER FRA DIN INDEX.HTML */
        .range-content { display: none; width: 100%; max-width: 430px; margin: 0 auto; }
        .slim-mode .home-cards { display: none; }
        .slim-mode .range-content { display: block; }

        .player-card { background: rgba(0,0,0,0.8); border-radius: 20px; padding: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .player-card.active { border: 2px solid var(--gold); background: #000; transform: scale(1.02); }
        .score-display { font-size: 2.5em; font-weight: 900; color: #fff; }
        .active .score-display { color: var(--gold); }
        
        .ball-control-zone { display: flex; justify-content: space-around; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 25px; margin: 15px 0; }
        .ball { width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: inset -4px -4px 10px rgba(0,0,0,0.5); }
        #ball1 { background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00); }
        #ball5 { background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082); }
        #ball3 { background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22); }
        .ball-inner { width: 22px; height: 22px; background: white; border-radius: 50%; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; font-size: 0.8em; }
        
        .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 12px; border-radius: 12px; border: none; font-weight: 800; color: white; cursor: pointer; font-size: 0.8em; }
        .btn-blue { background: #2980b9; }
        .btn-foul { background: #c0392b; }
        .btn-turn { background: #27ae60; grid-column: span 2; }
        .waiting-ball { opacity: 0.2; filter: grayscale(1); pointer-events: none; }

        /* SETUP OVERLAY */
        .setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .setup-card { background: #111; border: 1px solid var(--gold); padding: 25px; border-radius: 25px; width: 100%; max-width: 320px; text-align: center; }
        .name-field { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; text-align: center; }

        /* NAVBAR */
        .navbar { background: #080808; height: 90px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 20; padding-bottom: 15px; }
        .nav-item { color: #444; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.6em; font-weight: 800; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 2.2em; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>

    <header class="header">
        <div class="hide-on-slim">
            <h1 style="color:#fff; margin:0; font-size:32px; font-weight:800;">Hei, Lasse!</h1>
            <div style="color:var(--gold); font-size:16px; margin:5px 0;">Cowboy Rank: Level 12</div>
            <div style="width:100%; height:8px; background:#222; border-radius:4px; margin-top:15px;">
                <div style="width:65%; height:100%; background:var(--gold); border-radius:4px;"></div>
            </div>
        </div>
        <div id="gameStatus" style="display:none; text-align:center;">
             <span id="moveText" style="color:var(--gold); font-weight:bold; font-size:0.8em; letter-spacing:1px;">BREKK-STØT</span>
             <div id="matchTimer" style="color:#fff; font-family:monospace; font-size:1.2em;">00:00:00</div>
        </div>
    </header>

    <main class="main-content">
        <div class="home-cards">
            <div class="action-card" onclick="openSetup()"><i class="fa-solid fa-circle-plus" style="color:#2ecc71;"></i><span>NY KAMP</span></div>
            <div class="action-card"><i class="fa-solid fa-trophy"></i><span>TOPPLISTE</span></div>
            <div class="action-card"><i class="fa-solid fa-book-open"></i><span>REGLER</span></div>
        </div>

        <div class="range-content">
            <div id="scoreboard-container"></div>
            
            <div class="ball-control-zone">
                <button class="ball" id="ball1" onclick="action('pocket', 1)"><div class="ball-inner">1</div></button>
                <button class="ball" id="ball5" onclick="action('pocket', 5)"><div class="ball-inner">5</div></button>
                <button class="ball" id="ball3" onclick="action('pocket', 3)"><div class="ball-inner">3</div></button>
            </div>

            <div class="action-area">
                <button class="btn btn-blue" onclick="action('carom', 1)">Carom 1P</button>
                <button class="btn btn-blue" onclick="action('carom', 2)">Carom 2P</button>
                <button class="btn btn-blue" onclick="undo()">ANGRE</button>
                <button class="btn btn-foul" onclick="handleFoul()">FOUL</button>
                <button class="btn btn-turn" onclick="nextTurn()">AVSLUTT TUR</button>
            </div>
        </div>
    </main>

    <section class="bottom-panel">
        <div class="hide-on-slim">
            <div style="background:rgba(255,255,255,0.04); border:1px solid #333; border-radius:20px; padding:20px;">
                <div style="color:#666; font-size:12px; margin-bottom:10px; font-weight:800; text-transform:uppercase;">Siste Kamp</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="width:50px; height:50px; border-radius:50%; background:#1a1a1a; border:2px solid var(--gold);"></div>
                    <div style="font-size:32px; font-weight:950; color:#fff;">100 - 82</div>
                    <div style="width:50px; height:50px; border-radius:50%; background:#1a1a1a; border:2px solid #333;"></div>
                </div>
            </div>
        </div>
    </section>

    <nav class="navbar">
        <a href="javascript:void(0)" class="nav-item active" onclick="navTo('home', this)"><i class="material-icons">home</i>HJEM</a>
        <a href="javascript:void(0)" class="nav-item" onclick="navTo('range', this)"><i class="material-icons">all_inclusive</i>RANGE</a>
        <a href="javascript:void(0)" class="nav-item"><i class="material-icons">person</i>PROFIL</a>
        <a href="javascript:void(0)" class="nav-item"><i class="material-icons">leaderboard</i>STATS</a>
    </nav>
</div>

<div id="setupOverlay" class="setup-overlay">
    <div class="setup-card">
        <h2 style="color:var(--gold)">NY MATCH</h2>
        <div id="nameInputs">
            <input type="text" id="n0" class="name-field" placeholder="Spiller 1">
            <input type="text" id="n1" class="name-field" placeholder="Spiller 2">
        </div>
        <button style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="finalizeSetup()">START KAMP</button>
        <button style="background:none; border:none; color:#888; margin-top:15px; cursor:pointer;" onclick="closeSetup()">Avbryt</button>
    </div>
</div>

<script>
    // FIREBASE INITIALISERING (Behold din config her)
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    let state = { gameMode: 'standard', playerCount: 2, scores: [0,0], names: ["P1","P2"], currentPlayer: 0, seconds: 0, breakDone: false };
    let history = [];

    // NAVIGASJON LOGIKK
    function navTo(page, el) {
        const app = document.getElementById('app');
        const status = document.getElementById('gameStatus');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');

        if(page === 'range') {
            app.classList.add('slim-mode');
            status.style.display = 'block';
        } else {
            app.classList.remove('slim-mode');
            status.style.display = 'none';
        }
    }

    // DIN FIREBASE LOGIKK (Integrert)
    db.on('value', (s) => {
        if(s.val()) {
            state = s.val();
            updateUI();
        }
    });

    function updateUI() {
        const container = document.getElementById('scoreboard-container');
        container.innerHTML = '';
        for(let i=0; i<state.playerCount; i++) {
            const active = state.currentPlayer === i;
            container.innerHTML += `
                <div class="player-card ${active?'active':''}">
                    <div class="player-info">
                        <h2 style="margin:0; font-size:1em; color:${active?'var(--gold)':'#888'}">${state.names[i]}</h2>
                    </div>
                    <div class="score-display">${state.scores[i]}</div>
                </div>
            `;
        }
        document.getElementById('matchTimer').innerText = new Date(state.seconds * 1000).toISOString().substr(11, 8);
    }

    // SETUP FUNKSJONER
    function openSetup() { document.getElementById('setupOverlay').style.display = 'flex'; }
    function closeSetup() { document.getElementById('setupOverlay').style.display = 'none'; }
    function finalizeSetup() {
        state.names = [document.getElementById('n0').value || "P1", document.getElementById('n1').value || "P2"];
        state.scores = [0, 0];
        state.seconds = 0;
        db.set(state);
        closeSetup();
        navTo('range', document.querySelectorAll('.nav-item')[1]);
    }

    // DIN SPILL-LOGIKK (Kortversjon for demo)
    function action(type, val) {
        state.scores[state.currentPlayer] += val;
        state.breakDone = true;
        db.set(state);
    }
    function nextTurn() {
        state.currentPlayer = (state.currentPlayer + 1) % state.playerCount;
        db.set(state);
    }
    function undo() { /* Legg til din angre-logikk her */ }
    function handleFoul() { /* Legg til din foul-logikk her */ }

    setInterval(() => { if(state.breakDone) { state.seconds++; db.child('seconds').set(state.seconds); } }, 1000);
</script>
</body>
</html>
