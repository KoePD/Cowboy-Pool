<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Unified</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #2fa34b 0%, #155e2d 60%, #082411 100%);
            --gold: #f1c40f;
            --leather: #121212;
            --card-bg: rgba(0, 0, 0, 0.75);
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .app-container {
            height: 100%; display: flex; flex-direction: column; position: relative;
        }

        /* BAKGRUNN */
        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.12; z-index: 2; pointer-events: none; }

        /* LÆR PANELER (HEADER & BOTTOM) */
        .header { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 40px 30px 60px; z-index: 10; 
            border-bottom-left-radius: 50% 30px; border-bottom-right-radius: 50% 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); transition: all 0.5s ease;
        }
        .bottom-panel { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 60px 30px 20px; z-index: 10; 
            border-top-left-radius: 50% 30px; border-top-right-radius: 50% 30px; 
            box-shadow: 0 -20px 40px rgba(0,0,0,0.8); transition: all 0.5s ease;
        }

        /* Når vi er i Range-modus, krymper vi læret litt for å gi plass */
        .slim-mode .header { padding: 15px 30px 25px; }
        .slim-mode .bottom-panel { padding: 25px 30px 10px; }

        /* MIDTPARTIET (Her bor spillerkortene og kontrollene) */
        .main-content { 
            position: relative; z-index: 5; flex-grow: 1; 
            overflow-y: auto; display: flex; flex-direction: column; 
            padding: 10px; scrollbar-width: none; 
        }
        .main-content::-webkit-scrollbar { display: none; }

        /* HJEM-SKJERM (STALLEN) */
        .home-cards { display: flex; justify-content: space-evenly; align-items: center; height: 100%; width: 100%; }
        .action-card { 
            width: 200px; height: 240px; background: var(--card-bg); border: 2px solid var(--gold); border-radius: 30px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
        }
        .slim-mode .home-cards { display: none; }

        /* RANGE-INNHOLD (Designet fra Bilde 2 inni Stallen) */
        .range-content { display: none; width: 100%; max-width: 420px; margin: 0 auto; }
        .slim-mode .range-content { display: block; }

        /* SPILLERKORT STIL */
        .player-card { 
            background: linear-gradient(180deg, #111 0%, #000 100%); border-radius: 20px; 
            padding: 15px 20px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.08); 
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .player-card.active { border: 2px solid var(--gold); transform: scale(1.02); box-shadow: 0 10px 20px rgba(0,0,0,0.6); }
        .score-display { font-size: 3em; font-weight: 900; color: #333; }
        .active .score-display { color: var(--gold); }
        .sub-stats { display: flex; gap: 10px; font-size: 10px; color: #555; margin-top: 5px; }
        .active .sub-stats { color: #aaa; }
        .stat-val { color: #fff; font-weight: bold; }

        /* KONTROLL-SONE */
        .status-zone { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 20px 20px 0 0; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); }
        .control-panel { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 0 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        
        .ball-row { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .ball { width: 65px; height: 65px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: inset -4px -4px 10px rgba(0,0,0,0.6), 4px 6px 12px rgba(0,0,0,0.5); }
        #ball1 { background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00); }
        #ball5 { background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082); }
        #ball3 { background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22); }
        .ball-inner { width: 24px; height: 24px; background: white; border-radius: 50%; color: #000; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 12px; border-radius: 12px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 11px; color: white; }
        .btn-blue { background: #2980b9; border-bottom: 3px solid #1c5982; }
        .btn-foul { background: #c0392b; border-bottom: 3px solid #7b241c; }
        .btn-turn { background: #27ae60; border-bottom: 4px solid #1e8449; grid-column: span 2; font-size: 15px; margin-top: 5px; }
        
        .waiting-ball { opacity: 0.2; filter: grayscale(1); pointer-events: none; }

        /* NAVBAR */
        .navbar { background: #000; height: 80px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 20; padding-bottom: 15px; }
        .nav-item { color: #444; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }

        .setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>

    <header class="header">
        <div class="hide-on-slim">
            <h1 style="color:#fff; margin:0; font-size:28px;">Hei, Marius!</h1>
            <div style="color:var(--gold); font-size:14px; margin-top:5px;">Cowboy Level 12</div>
        </div>
        <div id="gameStatus" style="display:none; text-align:center;">
             <span id="moveText" style="color:#2ecc71; font-weight:900; font-size:14px; letter-spacing:1px;">BREKK-STØT</span>
             <div id="matchTimer" style="color:var(--gold); font-family:monospace; font-size:1.4em;">00:00:00</div>
        </div>
    </header>

    <main class="main-content">
        <div class="home-cards">
            <div class="action-card" onclick="checkActiveGame()"><i class="fa-solid fa-circle-plus" style="font-size:50px; color:#2ecc71; margin-bottom:15px;"></i><span>NY KAMP</span></div>
            <div class="action-card"><i class="fa-solid fa-trophy" style="font-size:50px; color:var(--gold); margin-bottom:15px;"></i><span>TOPPLISTE</span></div>
        </div>

        <div class="range-content">
            <div id="scoreboard-container"></div>
            
            <div class="status-zone">
                <div id="modeLabel" style="font-size:9px; color:var(--gold); opacity:0.6;">MODUS: STANDARD</div>
                <div id="inningDisplay" style="font-size:10px; color:#666; font-weight:bold;">INNING: 1</div>
                <button onclick="rotateBreaker()" id="rotBtn" style="background:none; border:1px solid var(--gold); color:var(--gold); font-size:9px; padding:3px 10px; border-radius:5px; margin-top:5px; cursor:pointer;">BYTT STARTSPILLER</button>
            </div>

            <div class="control-panel">
                <div class="ball-row">
                    <div class="ball-group">
                        <button class="ball" id="ball1" onclick="action('pocket', 1)"><div class="ball-inner">1</div></button>
                        <button class="btn-sub-carom" onclick="action('pocket_carom', 2)">+ CAROM</button>
                    </div>
                    <div class="ball-group">
                        <button class="ball" id="ball5" onclick="action('pocket', 5)"><div class="ball-inner">5</div></button>
                        <button class="btn-sub-carom" onclick="action('pocket_carom', 6)">+ CAROM</button>
                    </div>
                    <div class="ball-group">
                        <button class="ball" id="ball3" onclick="action('pocket', 3)"><div class="ball-inner">3</div></button>
                        <button class="btn-sub-carom" onclick="action('pocket_carom', 4)">+ CAROM</button>
                    </div>
                </div>

                <div class="action-grid">
                    <button class="btn btn-blue" id="carom1PBtn" onclick="action('carom', 1)">Carom 1P</button>
                    <button class="btn btn-blue" id="carom2PBtn" onclick="action('carom', 2)">Carom 2P</button>
                    <button class="btn btn-foul" onclick="handleFoul()">FOUL</button>
                    <button class="btn btn-blue" onclick="undo()">ANGRE</button>
                    <button class="btn btn-turn" onclick="nextTurn()">AVSLUTT TUR</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="bottom-panel">
        <div class="hide-on-slim" style="text-align:center; color:#555; font-size:12px;">SISTE KAMP: 101 - 85</div>
    </footer>

    <nav class="navbar">
        <a href="javascript:void(0)" class="nav-item active" onclick="navTo('home', this)"><i class="material-icons">home</i>HJEM</a>
        <a href="javascript:void(0)" class="nav-item" onclick="navTo('range', this)"><i class="material-icons">all_inclusive</i>RANGE</a>
        <a href="javascript:void(0)" class="nav-item"><i class="material-icons">person</i>PROFIL</a>
        <a href="javascript:void(0)" class="nav-item"><i class="material-icons">leaderboard</i>STATS</a>
    </nav>
</div>

<div id="setupOverlay" class="setup-overlay">
    <div style="background:#111; border:1px solid var(--gold); padding:30px; border-radius:20px; text-align:center; width:80%;">
        <h2 style="color:var(--gold);">NY KAMP</h2>
        <button class="btn btn-turn" onclick="startSimpleGame()">START (2 SPILLERE)</button>
        <button onclick="closeSetup()" style="background:none; border:none; color:#555; margin-top:15px;">Avbryt</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    let state = { gameMode: 'standard', playerCount: 2, scores: [0,0,0], foulCounts: [0,0,0], scoreAtStart: [0,0,0], currentPlayer: 0, breakDone: false, seconds: 0, names: ["Spiller 1","Spiller 2","Spiller 3"], bestSeries: [0,0,0], lastSeries: [0,0,0], innings: 1 };
    let history = [];

    db.on('value', (s) => { if(s.val()) { state = s.val(); updateUI(); } });

    function navTo(page, el) {
        const app = document.getElementById('app');
        const status = document.getElementById('gameStatus');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(page === 'range') { app.classList.add('slim-mode'); status.style.display = 'block'; } 
        else { app.classList.remove('slim-mode'); status.style.display = 'none'; }
    }

    function updateUI() {
        const cont = document.getElementById('scoreboard-container');
        cont.innerHTML = '';
        for(let i=0; i<state.playerCount; i++) {
            const active = state.currentPlayer === i;
            cont.innerHTML += `
                <div class="player-card ${active?'active':''}">
                    <div class="player-info">
                        <h2>${state.names[i]}</h2>
                        <div class="sub-stats">
                            <div>NÅ <span class="stat-val">${active ? state.scores[i]-state.scoreAtStart[i] : 0}</span></div>
                            <div>PERS <span class="stat-val">${state.bestSeries[i]}</span></div>
                        </div>
                    </div>
                    <div class="score-display">${state.scores[i]}</div>
                </div>`;
        }
        document.getElementById('matchTimer').innerText = new Date(state.seconds * 1000).toISOString().substr(11, 8);
        document.getElementById('inningDisplay').innerText = "INNING: " + state.innings;
        document.getElementById('rotBtn').style.display = state.breakDone ? 'none' : 'block';
    }

    function action(type, val) {
        saveHistory();
        state.breakDone = true;
        state.scores[state.currentPlayer] += val;
        db.set(state);
    }

    function nextTurn() {
        saveHistory();
        state.lastSeries[state.currentPlayer] = state.scores[state.currentPlayer] - state.scoreAtStart[state.currentPlayer];
        if(state.currentPlayer === state.playerCount - 1) state.innings++;
        state.currentPlayer = (state.currentPlayer + 1) % state.playerCount;
        state.scoreAtStart[state.currentPlayer] = state.scores[state.currentPlayer];
        db.set(state);
    }

    function handleFoul() {
        state.scores[state.currentPlayer] = state.scoreAtStart[state.currentPlayer];
        nextTurn();
    }

    function undo() { if(history.length) { state = JSON.parse(history.pop()); db.set(state); } }
    function saveHistory() { history.push(JSON.stringify(state)); if(history.length > 10) history.shift(); }
    
    function checkActiveGame() { document.getElementById('setupOverlay').style.display = 'flex'; }
    function closeSetup() { document.getElementById('setupOverlay').style.display = 'none'; }
    function startSimpleGame() {
        db.set({...state, scores:[0,0,0], seconds:0, innings:1, breakDone:false});
        closeSetup();
        navTo('range', document.querySelectorAll('.nav-item')[1]);
    }

    setInterval(() => { if(state.breakDone) { state.seconds++; db.child('seconds').set(state.seconds); } }, 1000);
</script>
</body>
</html>
