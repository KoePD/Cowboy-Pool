<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biljard App - Med ekte buer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --felt-green: radial-gradient(circle, #1e5a2d 0%, #0a2b12 100%);
            --leather: #151515;
        }

        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
        }

        .phone {
            width: 360px;
            height: 740px;
            background: #000;
            border-radius: 40px;
            border: 10px solid #333;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* TOP SEKSJON */
        .header {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: 40px 20px 50px;
            z-index: 3;
            /* Denne lager buen nederst på det svarte feltet */
            clip-path: ellipse(110% 100% at 50% 0%);
            border-bottom: 2px dashed rgba(212, 175, 55, 0.3); /* Simulert søm */
        }

        .header h1 { color: #fff; margin: 0; font-size: 26px; }
        .rank { color: var(--gold); font-size: 14px; margin: 5px 0; }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #222;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }
        .progress-fill {
            width: 65%;
            height: 100%;
            background: linear-gradient(90deg, #8a6d3b, var(--gold));
        }

        /* MIDTRE SEKSJON (GRØNN DUK) */
        .felt {
            background: var(--felt-green);
            background-image: url("https://www.transparenttextures.com/patterns/felt.png");
            flex-grow: 1;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            margin-top: -30px; /* Drar duken opp under buen */
            margin-bottom: -30px; /* Drar duken ned under buen */
            z-index: 1;
        }

        .card {
            width: 100px;
            height: 115px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--gold);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        .card i { font-size: 30px; margin-bottom: 10px; color: var(--gold); }
        .card.plus i { color: #2ecc71; }
        .card span { font-size: 10px; font-weight: bold; }

        /* BUNN SEKSJON (LÆR) */
        .bottom-area {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: 50px 20px 20px;
            z-index: 3;
            /* Denne lager buen øverst på det svarte feltet */
            clip-path: ellipse(110% 100% at 50% 100%);
            border-top: 2px dashed rgba(212, 175, 55, 0.3);
        }

        .match-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 15px;
        }

        /* NAVIGASJON */
        .nav {
            background: #0a0a0a;
            height: 70px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
        }

        .nav-item { color: #666; text-align: center; font-size: 10px; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 4px; }

    </style>
</head>
<body>

<div class="phone">
    <div class="header">
        <h1>Hei, Marius!</h1>
        <div class="rank">Cowboy Rank: Level 12 - Gunslinger</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>

    <div class="felt">
        <div class="card plus">
            <i class="fa-solid fa-plus"></i>
            <span>NY KAMP</span>
        </div>
        <div class="card">
            <i class="fa-solid fa-trophy"></i>
            <span>TOPPLISTE</span>
        </div>
        <div class="card">
            <i class="fa-solid fa-book-open"></i>
            <span>REGLER</span>
        </div>
    </div>

    <div class="bottom-area">
        <div class="match-box">
            <div style="color:#888; font-size:12px; margin-bottom:10px;">Min Siste Kamp</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="width:50px; height:50px; border-radius:50%; background:#444; border:2px solid var(--gold);"></div>
                <div style="font-size:24px; font-weight:bold; color:#fff;">
                    <span style="color:#2ecc71">100</span> - <span style="color:var(--gold)">82</span>
                </div>
                <div style="width:50px; height:50px; border-radius:50%; background:#444; border:2px solid #555;"></div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active"><i class="fa-solid fa-house"></i>Hjem</div>
        <div class="nav-item"><i class="fa-solid fa-trophy"></i>Toppliste</div>
        <div class="nav-item"><i class="fa-solid fa-book"></i>Regler</div>
    </div>
</div>

</body>
</html>
