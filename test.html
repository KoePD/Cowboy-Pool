<div id="setupOverlay" class="setup-overlay">
    <div class="menu-card">
        <h2 id="setupTitle" style="color:var(--gold); margin-bottom: 15px;">VELG MODUS</h2>
        
        <div id="stepMode">
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button id="btnStd" class="mode-select-btn selected" onclick="setTempMode('standard')">STANDARD</button>
                <button id="btnAlt" class="mode-select-btn" onclick="setTempMode('alternate')">ALTERNATE</button>
            </div>
            <button class="menu-btn" style="background:#27ae60;" onclick="goToPlayers()">NESTE</button>
        </div>

        <div id="stepPlayers" style="display:none;">
            <p>Hvor mange skal spille?</p>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="menu-btn" style="background:#333; margin:0;" onclick="goToNames(1)">1</button>
                <button class="menu-btn" style="background:#333; margin:0;" onclick="goToNames(2)">2</button>
                <button class="menu-btn" style="background:#333; margin:0;" onclick="goToNames(3)">3</button>
            </div>
        </div>

        <div id="stepNames" style="display:none;">
            <div id="nameInputs"></div>
            <button class="menu-btn" style="background:#27ae60;" onclick="finalizeSetup()">START KAMP</button>
        </div>

        <button class="menu-btn" style="background:none; border:1px solid #444; font-size: 0.9em; margin-top:10px;" onclick="closeSetup()">AVBRYT</button>
    </div>
</div>

<script>
    // OPPDATERTE FUNKSJONER FOR REKKEFØLGE
    function startSetupFlow() { 
        closeMenu(); 
        document.getElementById('setupOverlay').style.display = 'flex';
        showStep('stepMode', 'VELG MODUS');
    }

    function setTempMode(m) { 
        tempMode = m; 
        document.getElementById('btnStd').classList.toggle('selected', m === 'standard');
        document.getElementById('btnAlt').classList.toggle('selected', m === 'alternate');
    }

    function goToPlayers() { 
        showStep('stepPlayers', 'ANTALL SPILLERE');
    }

    function goToNames(n) {
        tempPlayers = n;
        showStep('stepNames', 'SPILLERNAVN');
        const cont = document.getElementById('nameInputs');
        cont.innerHTML = '';
        for(let i=0; i<tempPlayers; i++) {
            cont.innerHTML += `<input type="text" id="n${i}" class="name-field" placeholder="Navn spiller ${i+1}">`;
        }
    }

    function showStep(stepId, title) {
        ['stepPlayers', 'stepMode', 'stepNames'].forEach(s => document.getElementById(s).style.display = 'none');
        document.getElementById(stepId).style.display = 'block';
        document.getElementById('setupTitle').innerText = title;
    }

    // Resten av finalizeSetup og logikk forblir uendret
</script>
