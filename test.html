<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biljard App - Final 1000%</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* Den nøyaktige, dype grønnfargen fra originalbildet */
            --felt-green: radial-gradient(circle at center, #2fa34b 0%, #155e2d 60%, #082411 100%);
            --gold: #d4af37;
            --leather: #121212;
            --card-bg: rgba(0, 0, 0, 0.65);
        }

        /* Fullskjerm reset */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* GRØNN DUK - Ren farge i bunn */
        .felt-base {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--felt-green);
            z-index: 1;
        }

        /* Tekstur-lag - Ligger over fargen med lav synlighet for å hindre gråskjær */
        .felt-texture {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("https://www.transparenttextures.com/patterns/felt.png");
            opacity: 0.15;
            z-index: 2;
            pointer-events: none;
        }

        /* TOPP-PANEL - 50% Større */
        .header {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: 70px 30px 110px; /* Massiv padding for å matche originalen */
            z-index: 10;
            border-bottom-left-radius: 50% 45px;
            border-bottom-right-radius: 50% 45px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
            position: relative;
        }

        .header::after {
            content: "";
            position: absolute;
            bottom: 15px; left: 5%; width: 90%; height: 45px;
            border-bottom: 1.5px dashed rgba(212, 175, 55, 0.4);
            border-radius: 50%;
        }

        .header h1 { color: #fff; margin: 0; font-size: 32px; font-weight: 700; }
        .rank { color: var(--gold); font-size: 16px; margin: 8px 0; font-weight: 500; }
        
        .progress-bar {
            width: 100%; height: 10px; background: #222;
            border-radius: 5px; margin-top: 25px;
        }
        .progress-fill {
            width: 65%; height: 100%;
            background: linear-gradient(90deg, #b38f36, var(--gold));
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            border-radius: 5px;
        }

        /* MIDTPARTI - Større knapper */
        .main-felt {
            position: relative;
            z-index: 5;
            flex-grow: 1;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 20px 10px;
        }

        .action-card {
            width: 130px; /* Blåst opp størrelse */
            height: 140px; 
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 10px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        .action-card i { font-size: 45px; margin-bottom: 15px; color: var(--gold); }
        .action-card.green-icon i { color: #2ecc71; }
        .action-card span { font-size: 13px; font-weight: 900; letter-spacing: 1px; }

        /* BUNN-PANEL - 50% Større */
        .bottom-panel {
            background: var(--leather);
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png");
            padding: 100px 30px 30px; /* Massiv padding i topp for buen */
            z-index: 10;
            border-top-left-radius: 50% 45px;
            border-top-right-radius: 50% 45px;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.9);
            position: relative;
        }

        .bottom-panel::before {
            content: "";
            position: absolute;
            top: 15px; left: 5%; width: 90%; height: 45px;
            border-top: 1.5px dashed rgba(212, 175, 55, 0.4);
            border-radius: 50%;
        }

        .match-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid #333;
            border-radius: 22px;
            padding: 25px;
        }

        /* NAVBAR */
        .navbar {
            background: #0d0d0d;
            height: 85px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
            z-index: 20;
            padding-bottom: 10px; /* Plass for hjem-bar på iPhone */
        }

        .nav-item { color: #555; text-align: center; font-size: 13px; text-decoration: none; font-weight: 600; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { display: block; font-size: 28px; margin-bottom: 6px; }

    </style>
</head>
<body>

<div class="app-container">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>

    <header class="header">
        <h1>Hei, Marius!</h1>
        <div class="rank">Cowboy Rank: Level 12 - Gunslinger</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </header>

    <main class="main-felt">
        <div class="action-card green-icon">
            <i class="fa-solid fa-plus"></i>
            <span>NY KAMP</span>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-trophy"></i>
            <span>TOPPLISTE</span>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-book-open"></i>
            <span>REGLER</span>
        </div>
    </main>

    <section class="bottom-panel">
        <div class="match-card">
            <div style="color:#aaa; font-size:14px; margin-bottom:18px; font-weight:700; text-transform: uppercase; letter-spacing: 1px;">Min Siste Kamp</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="text-align:center;">
                    <div style="width:60px; height:60px; border-radius:50%; background:#222; border:3px solid var(--gold); margin-bottom:8px;"></div>
                    <div style="color:#fff; font-size:14px; font-weight: 600;">Mav</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:36px; font-weight:900; color:#fff; letter-spacing:2px;">
                        <span style="color:#2ecc71">100</span> - <span style="color:var(--gold)">82</span>
                    </div>
                    <div style="color:#2ecc71; font-size:12px; font-weight:900; margin-top:5px; letter-spacing: 1px;">WIN</div>
                </div>
                <div style="text-align:center;">
                    <div style="width:60px; height:60px; border-radius:50%; background:#222; border:3px solid #333; margin-bottom:8px;"></div>
                    <div style="color:#fff; font-size:14px; font-weight: 600;">Per</div>
                </div>
            </div>
        </div>
    </section>

    <nav class="navbar">
        <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i>Hjem</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-trophy"></i>Toppliste</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-book"></i>Regler</a>
    </nav>
</div>

</body>
</html>
