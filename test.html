<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #2fa34b 0%, #155e2d 60%, #082411 100%);
            --gold: #f1c40f;
            --leather: #121212;
            --card-bg: rgba(0, 0, 0, 0.75);
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .app-container {
            height: 100%; display: flex; flex-direction: column; position: relative;
        }

        /* BAKGRUNN (DUKEN) */
        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.12; z-index: 2; pointer-events: none; }

        /* LÆR PANELER */
        .header { 
            background: var(--leather); 
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 40px 25px 60px; 
            z-index: 10; 
            border-bottom-left-radius: 50% 30px; 
            border-bottom-right-radius: 50% 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.9); 
            position: relative;
            text-align: center;
        }
        .header::after {
            content: ""; position: absolute; bottom: 12px; left: 10%; width: 80%;
            border-bottom: 1px dashed rgba(241, 196, 15, 0.3); border-radius: 50%; height: 20px;
        }

        .bottom-panel { 
            background: var(--leather); 
            background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 60px 20px 20px; 
            z-index: 10; 
            border-top-left-radius: 50% 30px; 
            border-top-right-radius: 50% 30px; 
            box-shadow: 0 -20px 40px rgba(0,0,0,0.9); 
            position: relative;
        }

        /* INNHOLD I MIDTEN */
        .main-content { position: relative; z-index: 5; flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        
        /* HJEM-MODUS (FIRKANTEDE KORT) */
        .home-view { display: flex; justify-content: space-evenly; align-items: center; height: 100%; gap: 10px; }
        .action-card { 
            width: 110px; height: 130px; 
            background: var(--card-bg); border: 2px solid var(--gold); border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5);
            cursor: pointer; text-decoration: none;
        }
        .action-card i { font-size: 35px; margin-bottom: 12px; color: var(--gold); }
        .action-card span { font-size: 10px; font-weight: 900; color: #fff; letter-spacing: 1px; text-transform: uppercase; }

        /* KONTROLLER-MODUS (DIN ORIGINALE STIL) */
        .range-view { display: none; width: 100%; max-width: 430px; margin: 0 auto; }
        
        /* SPILLERKORT (DIN KODE) */
        .player-card { background: linear-gradient(180deg, #0a0a0a 0%, #000000 100%); border-radius: 24px; padding: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; }
        .player-card.active { border: 2px solid var(--gold); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.9); }
        .score-display { font-size: 3em; font-weight: 900; color: #333; }
        .active .score-display { color: var(--gold); }
        .player-info h2 { margin: 0; font-size: 1.1em; text-transform: uppercase; color: #666; }
        .active .player-info h2 { color: var(--gold); }
        .stat-item { font-size: 0.6em; color: #444; text-transform: uppercase; }
        .active .stat-val { color: var(--gold); font-weight: bold; }

        /* BALLER OG KONTROLLER (DIN KODE) */
        .ball-control-zone { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 15px 5px; border-radius: 30px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .ball { width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; box-shadow: inset -5px -5px 12px rgba(0,0,0,0.7), 5px 10px 15px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; }
        #ball1 { background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00); }
        #ball5 { background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082); }
        #ball3 { background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22); }
        .ball-inner { width: 24px; height: 24px; background: white; border-radius: 50%; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 2px solid #000; font-size: 12px; }
        .btn-sub-carom { background: rgba(52, 152, 219, 0.12); color: #3498db; border: 1px solid #3498db; border-radius: 8px; padding: 4px 8px; font-size: 0.55em; font-weight: 800; margin-top: 5px; cursor: pointer; }

        /* ACTION AREA */
        .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 14px; border-radius: 12px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 0.7em; color: white; }
        .btn-blue { background: #2980b9; border-bottom: 3px solid #1c5982; }
        .btn-foul { background: #c0392b; border-bottom: 3px solid #7b241c; }
        .btn-turn { background: #27ae60; border-bottom: 4px solid #1e8449; grid-column: span 2; padding: 18px; font-size: 1.1em; }
        .btn-win { background: linear-gradient(45deg, #f1c40f, #d4ac0d); color: black; grid-column: span 2; padding: 18px; font-weight: 900; border-radius: 12px; border: none; margin-bottom: 8px; display: none; }

        /* NAVBAR */
        .navbar { background: #080808; height: 85px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 20; padding-bottom: 15px; }
        .nav-item { color: #444; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.6em; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 2em; margin-bottom: 4px; }
        .waiting-ball { opacity: 0.15; filter: grayscale(1); pointer-events: none; }

        /* SETUP OVERLAY */
        .setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .setup-card { background: #000; border: 1px solid var(--gold); padding: 30px; border-radius: 30px; width: 100%; max-width: 350px; text-align: center; }
        .btn-choice { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; font-weight: bold; cursor: pointer; }
        .btn-choice.selected { background: var(--gold); color: black; }
        .name-field { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; margin-bottom: 10px; box-sizing: border-box; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>

    <header class="header">
        <div id="lobbyHeader">
            <h1 id="greetName" style="color:#fff; margin:0; font-size:28px; font-weight:800;">Hei, Cowboy!</h1>
            <div style="color:var(--gold); font-size:14px; margin:5px 0;">Level 12 - Gunslinger</div>
            <div style="width:100%; height:8px; background:#222; border-radius:4px; margin-top:15px;"><div style="width:65%; height:100%; background:var(--gold); border-radius:4px;"></div></div>
        </div>
        <div id="gameHeader" style="display:none;">
            <div id="modeLabel" style="font-size:0.6em; color:var(--gold); opacity:0.6; text-transform:uppercase;">MODUS: STANDARD</div>
            <span id="moveText" style="color:#2ecc71; font-weight:800; font-size:0.9em; letter-spacing:2px;">BREKK-STØT</span>
            <div id="matchTimer" style="color:var(--gold); font-family:monospace; font-size:1.3em; margin: 3px 0;">00:00:00</div>
            <div id="inningDisplay" style="font-size:0.7em; color:#888; font-weight:bold; text-transform:uppercase;">INNING: 1</div>
        </div>
    </header>

    <main class="main-content">
        <div class="home-view" id="homeView">
            <div class="action-card" onclick="checkActiveGame()"><i class="fa-solid fa-circle-plus" style="color:#2ecc71;"></i><span>NY KAMP</span></div>
            <div class="action-card"><i class="fa-solid fa-trophy"></i><span>TOPPLISTE</span></div>
            <div class="action-card"><i class="fa-solid fa-book-open"></i><span>REGLER</span></div>
        </div>

        <div class="range-view" id="rangeView">
            <div id="scoreboard-container"></div>
            <div class="ball-control-zone">
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <button class="ball" id="ball1" onclick="action('pocket', 1)"><div class="ball-inner">1</div></button>
                    <button class="btn-sub-carom" id="pc1" onclick="action('pocket_carom', 2)">+ CAROM</button>
                </div>
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <button class="ball" id="ball5" onclick="action('pocket', 5)"><div class="ball-inner">5</div></button>
                    <button class="btn-sub-carom" id="pc5" onclick="action('pocket_carom', 6)">+ CAROM</button>
                </div>
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <button class="ball" id="ball3" onclick="action('pocket', 3)"><div class="ball-inner">3</div></button>
                    <button class="btn-sub-carom" id="pc3" onclick="action('pocket_carom', 4)">+ CAROM</button>
                </div>
            </div>
            <div class="action-area">
                <button id="winButton" class="btn-win" onclick="action('winning_shot', 1)">WINNING SHOT</button>
                <button class="btn btn-blue" id="carom1PBtn" onclick="action('carom', 1)">Carom 1P</button>
                <button class="btn btn-blue" id="carom2PBtn" onclick="action('carom', 2)">Carom 2P</button>
                <button class="btn btn-blue" id="undoActionBtn" onclick="undo()">ANGRE</button>
                <button class="btn btn-foul" id="foulActionBtn" onclick="handleFoul()">FEIL</button>
                <button class="btn btn-turn" id="endTurnBtn" onclick="nextTurn()">AVSLUTT TUR</button>
                <button class="btn btn-blue" style="grid-column: span 2; margin-top: 5px; background: rgba(241,196,15,0.05); border: 1px solid var(--gold); color: var(--gold);" onclick="rotateBreaker()" id="rotBtn">BYTT STARTSPILLER</button>
            </div>
        </div>
    </main>

    <section class="bottom-panel">
        <div id="lobbyBottom">
            <div style="background:rgba(255,255,255,0.04); border:1px solid #333; border-radius:24px; padding:20px;">
                <div style="color:#666; font-size:12px; margin-bottom:10px; font-weight:800; text-transform:uppercase;">Siste Kamp</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div id="lastP1" style="font-size:14px; font-weight:bold;">Mav</div>
                    <div id="lastScore" style="font-size:28px; font-weight:950; color:#fff;">100 - 82</div>
                    <div id="lastP2" style="font-size:14px; font-weight:bold;">Per</div>
                </div>
            </div>
        </div>
    </section>

    <nav class="navbar">
        <a href="javascript:void(0)" class="nav-item active" onclick="showPage('home', this)"><i class="material-icons">home</i><span>HJEM</span></a>
        <a href="javascript:void(0)" class="nav-item" onclick="showPage('range', this)"><i class="material-icons">all_inclusive</i><span>RANGE</span></a>
        <a href="javascript:void(0)" class="nav-item"><i class="material-icons">person</i><span>PROFIL</span></a>
        <a href="javascript:void(0)" class="nav-item"><i class="material-icons">leaderboard</i><span>STATS</span></a>
    </nav>
</div>

<div id="setupOverlay" class="setup-overlay">
    <div class="setup-card">
        <h2 style="color:var(--gold); margin-bottom: 20px;">NY MATCH</h2>
        <div id="step-confirm" style="display: none;">
            <p style="color:#888; margin-bottom: 20px;">Kamp pågår. Hva vil du gjøre?</p>
            <button class="btn-blue btn" style="width:100%; margin-bottom:10px;" onclick="handleFinishAndSave()">LAGRE & NY</button>
            <button class="btn-foul btn" style="width:100%;" onclick="handleDiscard()">SLETT & NY</button>
            <button style="background:none; border:none; color:#888; margin-top:20px; text-decoration:underline; cursor:pointer;" onclick="closeSetup()">Fortsett kampen</button>
        </div>
        <div id="step1" style="display: none;">
            <p style="color:#888;">Modus:</p>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn-choice" id="modeStd" onclick="setMode('standard')">Standard</button>
                <button class="btn-choice" id="modeAlt" onclick="setMode('alternate')">Alternate</button>
            </div>
            <button class="btn-start btn" style="width:100%; background:#27ae60;" onclick="selectPlayers(2)">Start 2 Spillere</button>
            <button style="background:none; border:none; color:#888; margin-top:15px; text-decoration:underline; cursor:pointer;" onclick="closeSetup()">Avbryt</button>
        </div>
        <div id="step2" style="display: none;">
            <div id="nameInputs"></div>
            <button class="btn btn-turn" style="width:100%;" onclick="finalizeSetup()">START KAMP</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    let state = { gameMode: 'standard', playerCount: 2, scores: [0,0,0], foulCounts: [0,0,0], scoreAtStart: [0,0,0], currentPlayer: 0, breakDone: false, tableStatus: 'open', lastType: null, seconds: 0, names: ["P1","P2","P3"], bestSeries: [0,0,0], lastSeries: [0,0,0], lang: 'no', innings: 1 };
    let history = [];
    let tempMode = 'standard';

    // NAVIGASJON
    function showPage(page, el) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        
        if(page === 'range') {
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('rangeView').style.display = 'block';
            document.getElementById('lobbyHeader').style.display = 'none';
            document.getElementById('gameHeader').style.display = 'block';
            document.getElementById('lobbyBottom').style.visibility = 'hidden';
        } else {
            document.getElementById('homeView').style.display = 'flex';
            document.getElementById('rangeView').style.display = 'none';
            document.getElementById('lobbyHeader').style.display = 'block';
            document.getElementById('gameHeader').style.display = 'none';
            document.getElementById('lobbyBottom').style.visibility = 'visible';
        }
    }

    // SPILL LOGIKK (DIN KODE)
    db.on('value', (s) => { if(s.val()) { state = s.val(); updateUI(); } });

    function action(type, val) {
        saveHistory(); let p = state.currentPlayer; let cur = state.scores[p];
        if ((cur < 90 && (cur + val) > 90) || (cur >= 90 && (cur + val) > 101)) { handleFoul(); return; }
        if (cur >= 90 && cur < 100 && type.includes('pocket') && type !== 'pocket_carom') return;
        state.breakDone = true; state.foulCounts[p] = 0;
        if (state.gameMode === 'alternate') {
            if (state.tableStatus === 'open') { state.tableStatus = (type === 'pocket_carom') ? 'open' : 'locked'; state.lastType = type; }
            else { if (type === 'pocket_carom') state.lastType = (state.lastType === 'pocket') ? 'carom' : 'pocket'; else state.lastType = type; }
        }
        state.scores[p] += val;
        db.set(state);
    }

    function updateUI() {
        const cont = document.getElementById('scoreboard-container'); cont.innerHTML = '';
        for(let i=0; i<state.playerCount; i++) {
            const active = state.currentPlayer === i;
            cont.innerHTML += `<div class="player-card ${active?'active':''}">
                <div class="player-info">
                    <h2 style="color:${active? 'var(--gold)' : '#666'}">${state.names[i]}</h2>
                    <div class="sub-stats">
                        <div class="stat-item">NÅ <span class="stat-val">${active ? state.scores[i]-state.scoreAtStart[i] : 0}</span></div>
                        <div class="stat-item">PERS <span class="stat-val">${state.bestSeries[i]}</span></div>
                    </div>
                    <div style="display:flex; gap:5px; margin-top:8px;">
                        <div class="foul-dot ${state.foulCounts[i]>=1?'active':''}"></div><div class="foul-dot ${state.foulCounts[i]>=2?'active':''}"></div><div class="foul-dot ${state.foulCounts[i]>=3?'active':''}"></div>
                    </div>
                </div>
                <div class="score-display" style="color:${active? 'var(--gold)' : '#333'}">${state.scores[i]}</div>
            </div>`;
        }
        document.getElementById('winButton').style.display = state.scores[state.currentPlayer] === 100 ? 'block' : 'none';
        document.getElementById('rotBtn').style.display = state.breakDone ? 'none' : 'block';
        document.getElementById('matchTimer').innerText = new Date(state.seconds * 1000).toISOString().substr(11, 8);
        document.getElementById('inningDisplay').innerText = "INNING: " + state.innings;
        document.getElementById('greetName').innerText = "Hei, " + state.names[0] + "!";
    }

    // SETUP FUNKSJONER
    function checkActiveGame() { document.getElementById('setupOverlay').style.display = 'flex'; if (state.scores.some(s => s > 0)) document.getElementById('step-confirm').style.display = 'block'; else goToStep1(); }
    function goToStep1() { document.getElementById('step-confirm').style.display = 'none'; document.getElementById('step1').style.display = 'block'; document.getElementById('step2').style.display = 'none'; }
    function setMode(m) { tempMode = m; document.getElementById('modeStd').classList.toggle('selected', m === 'standard'); document.getElementById('modeAlt').classList.toggle('selected', m === 'alternate'); }
    function selectPlayers(n) { 
        setupCount = n; document.getElementById('step1').style.display = 'none'; document.getElementById('step2').style.display = 'block'; 
        const c = document.getElementById('nameInputs'); c.innerHTML = ''; 
        for(let i=0; i<n; i++) c.innerHTML += `<input type="text" id="n${i}" class="name-field" placeholder="Navn ${i+1}">`; 
    }
    function finalizeSetup() { 
        const ns = []; for(let i=0; i<setupCount; i++) ns.push(document.getElementById(`n${i}`).value || `P${i+1}`); 
        db.set({...state, gameMode: tempMode, playerCount: setupCount, names: ns, scores: [0,0,0], foulCounts:[0,0,0], scoreAtStart:[0,0,0], breakDone:false, seconds:0, currentPlayer:0, tableStatus:'open', innings: 1}); 
        closeSetup(); showPage('range', document.querySelectorAll('.nav-item')[1]);
    }
    function handleFoul() { saveHistory(); state.scores[state.currentPlayer] = state.scoreAtStart[state.currentPlayer]; state.foulCounts[state.currentPlayer]++; if(state.foulCounts[state.currentPlayer] >= 3) state.scores[state.currentPlayer] = 0; nextTurn(); }
    function nextTurn() { saveHistory(); let p = state.currentPlayer; let s = state.scores[p] - state.scoreAtStart[p]; if(s > state.bestSeries[p]) state.bestSeries[p] = s; if(p === state.playerCount - 1) state.innings++; state.currentPlayer = (p + 1) % state.playerCount; state.scoreAtStart[state.currentPlayer] = state.scores[state.currentPlayer]; db.set(state); }
    function undo() { if(history.length) { state = JSON.parse(history.pop()); db.set(state); } }
    function saveHistory() { history.push(JSON.stringify(state)); if(history.length > 10) history.shift(); }
    function closeSetup() { document.getElementById('setupOverlay').style.display = 'none'; }
    function rotateBreaker() { if(!state.breakDone) { state.currentPlayer = (state.currentPlayer+1)%state.playerCount; db.set(state); } }
    function handleDiscard() { db.set({...state, scores:[0,0,0], seconds:0, innings:1, breakDone:false}).then(goToStep1); }
    function handleFinishAndSave() { firebase.database().ref('matchHistory').push({ date: new Date().toISOString(), names: state.names.slice(0, state.playerCount), scores: state.scores.slice(0, state.playerCount), innings: state.innings }); handleDiscard(); }
    
    setInterval(() => { if(state.breakDone) { state.seconds++; db.child('seconds').set(state.seconds); } }, 1000);
</script>
</body>
</html>
