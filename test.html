<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cowboy Pool Pro - Unified</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --felt-green: radial-gradient(circle at center, #1e4d2b 0%, #0a1a0f 100%);
            --gold: #f1c40f;
            --leather: #121212;
            --card-bg: rgba(0, 0, 0, 0.8);
        }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            color: white; -webkit-font-smoothing: antialiased;
        }

        .app-container { height: 100%; display: flex; flex-direction: column; position: relative; }

        /* BAKGRUNN */
        .felt-base { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--felt-green); z-index: 1; }
        .felt-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url("https://www.transparenttextures.com/patterns/felt.png"); opacity: 0.12; z-index: 2; pointer-events: none; }

        /* LÆR PANELER */
        .header { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 50px 30px 70px; z-index: 10; 
            border-bottom-left-radius: 50% 30px; border-bottom-right-radius: 50% 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); transition: all 0.4s ease;
        }
        .bottom-panel { 
            background: var(--leather); background-image: url("https://www.transparenttextures.com/patterns/dark-leather.png"); 
            padding: 70px 30px 15px; z-index: 10; 
            border-top-left-radius: 50% 30px; border-top-right-radius: 50% 30px; 
            box-shadow: 0 -20px 40px rgba(0,0,0,0.8); transition: all 0.4s ease;
        }

        .slim-mode .header { padding: 15px 30px 20px; }
        .slim-mode .bottom-panel { padding: 25px 30px 10px; }

        .hide-on-slim { transition: opacity 0.3s ease; }
        .slim-mode .hide-on-slim { opacity: 0; display: none; }

        .main-content { position: relative; z-index: 5; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 10px; scrollbar-width: none; }
        .main-content::-webkit-scrollbar { display: none; }

        /* HJEM-SKJERM (Bilde 1 stil) */
        .home-cards { display: flex; flex-direction: column; gap: 12px; align-items: center; justify-content: center; height: 100%; }
        .action-card { 
            width: 260px; padding: 18px 25px; background: rgba(0,0,0,0.7); 
            border: 2px solid var(--gold); border-radius: 20px; 
            display: flex; align-items: center; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .action-card i { font-size: 24px; margin-right: 20px; width: 30px; text-align: center; }
        .action-card span { font-size: 14px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
        .slim-mode .home-cards { display: none; }

        /* RANGE-INNHOLD (Bilde 2 stil) */
        .range-content { display: none; width: 100%; max-width: 400px; margin: 0 auto; padding-top: 10px; }
        .slim-mode .range-content { display: block; }

        .player-card { 
            background: #000; border-radius: 20px; padding: 15px 20px; 
            margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.1); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .player-card.active { border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(241,196,15,0.2); }
        .score-display { font-size: 2.8em; font-weight: 900; color: #222; }
        .active .score-display { color: var(--gold); }
        .player-info h2 { margin: 0; font-size: 1.2em; color: #fff; }
        
        .sub-stats { display: flex; gap: 10px; font-size: 9px; color: #555; margin-top: 8px; text-transform: uppercase; }
        .active .sub-stats { color: #888; }
        .stat-val { color: #fff; font-weight: 900; }

        /* BALL-SONE OG KNAPPER */
        .status-header { text-align: center; margin-bottom: 15px; }
        .ball-zone { 
            background: rgba(0,0,0,0.5); padding: 15px 10px; border-radius: 25px; 
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05);
        }
        .ball-row { display: flex; justify-content: space-around; margin-bottom: 10px; }
        .ball { width: 68px; height: 68px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .ball-inner { width: 24px; height: 24px; background: white; border-radius: 50%; color: #000; font-weight: 900; display: flex; align-items: center; justify-content: center; font-size: 11px; border: 2px solid #000; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 14px; border-radius: 12px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 11px; color: white; }
        .btn-blue { background: #3498db; }
        .btn-red { background: #e74c3c; }
        .btn-green { background: #2ecc71; grid-column: span 2; font-size: 14px; padding: 18px; margin-top: 5px; }
        
        /* NAVBAR */
        .navbar { background: #000; height: 85px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; z-index: 20; padding-bottom: 20px; }
        .nav-item { color: #333; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }

        .foul-dot { width: 10px; height: 10px; border-radius: 50%; background: #222; display: inline-block; margin-right: 4px; }
        .foul-dot.active { background: #e74c3c; box-shadow: 0 0 8px #e74c3c; }
        .waiting-ball { opacity: 0.2; filter: grayscale(1); pointer-events: none; }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div class="felt-base"></div>
    <div class="felt-texture"></div>

    <header class="header">
        <div class="hide-on-slim">
            <h1 style="color:#fff; margin:0; font-size:26px; font-weight:800;">Hei, Marius!</h1>
            <div style="color:var(--gold); font-size:12px; margin-top:5px; text-transform:uppercase; letter-spacing:1px;">Cowboy Rank: Level 12</div>
            <div style="width:100%; height:6px; background:#222; border-radius:3px; margin-top:20px;">
                <div style="width:65%; height:100%; background:var(--gold); border-radius:3px;"></div>
            </div>
        </div>
        <div id="gameStatus" style="display:none; text-align:center;">
             <div id="modeLabel" style="font-size:9px; color:var(--gold); opacity:0.6; text-transform:uppercase;">MODUS: STANDARD</div>
             <span id="moveText" style="color:#2ecc71; font-weight:900; font-size:13px; letter-spacing:1px;">BREKK-STØT</span>
             <div id="matchTimer" style="color:var(--gold); font-family:monospace; font-size:1.4em; margin: 2px 0;">00:00:00</div>
             <div id="inningDisplay" style="font-size:10px; color:#666; font-weight:bold;">INNING: 1</div>
        </div>
    </header>

    <main class="main-content">
        <div class="home-cards">
            <div class="action-card" onclick="checkActiveGame()">
                <i class="fa-solid fa-circle-plus" style="color:#2ecc71;"></i>
                <span>Ny Kamp</span>
            </div>
            <div class="action-card">
                <i class="fa-solid fa-trophy" style="color:var(--gold);"></i>
                <span>Toppliste</span>
            </div>
            <div class="action-card">
                <i class="fa-solid fa-book-open" style="color:var(--gold);"></i>
                <span>Regler</span>
            </div>
        </div>

        <div class="range-content">
            <div id="scoreboard-container"></div>
            
            <div class="ball-zone">
                <div class="ball-row">
                    <div class="ball-group">
                        <button class="ball" id="ball1" onclick="action('pocket', 1)" style="background: radial-gradient(circle at 35% 35%, #f1c40f, #b38f00);"><div class="ball-inner">1</div></button>
                        <button class="btn-sub-carom" onclick="action('pocket_carom', 2)" style="background:none; border:1px solid #3498db; color:#3498db; font-size:8px; padding:3px 8px; border-radius:5px; margin-top:5px;">+ CAROM</button>
                    </div>
                    <div class="ball-group">
                        <button class="ball" id="ball5" onclick="action('pocket', 5)" style="background: radial-gradient(circle at 35% 35%, #8e44ad, #4b0082);"><div class="ball-inner">5</div></button>
                        <button class="btn-sub-carom" onclick="action('pocket_carom', 6)" style="background:none; border:1px solid #3498db; color:#3498db; font-size:8px; padding:3px 8px; border-radius:5px; margin-top:5px;">+ CAROM</button>
                    </div>
                    <div class="ball-group">
                        <button class="ball" id="ball3" onclick="action('pocket', 3)" style="background: radial-gradient(circle at 35% 35%, #e74c3c, #962d22);"><div class="ball-inner">3</div></button>
                        <button class="btn-sub-carom" onclick="action('pocket_carom', 4)" style="background:none; border:1px solid #3498db; color:#3498db; font-size:8px; padding:3px 8px; border-radius:5px; margin-top:5px;">+ CAROM</button>
                    </div>
                </div>
            </div>

            <div class="action-grid">
                <button id="winButton" class="btn" style="grid-column: span 2; display:none; background:var(--gold); color:black;" onclick="action('winning_shot', 1)">Winning Shot (Cue via 1)</button>
                <button class="btn btn-blue" onclick="action('carom', 1)">Carom 1P</button>
                <button class="btn btn-blue" onclick="action('carom', 2)">Carom 2P</button>
                <button class="btn btn-red" onclick="handleFoul()">Foul</button>
                <button class="btn btn-blue" onclick="undo()">Angre</button>
                <button class="btn btn-green" onclick="nextTurn()">Avslutt Tur</button>
                <button onclick="rotateBreaker()" id="rotBtn" style="grid-column: span 2; background:none; border:1px solid var(--gold); color:var(--gold); font-size:10px; padding:8px; border-radius:10px; margin-top:5px; cursor:pointer; text-transform:uppercase; font-weight:bold;">Bytt Startspiller</button>
            </div>
        </div>
    </main>

    <footer class="bottom-panel">
        <div class="hide-on-slim" style="background:rgba(255,255,255,0.05); border-radius:15px; padding:15px; text-align:center;">
            <div style="font-size:10px; color:#666; text-transform:uppercase;">Siste Resultat</div>
            <div style="font-size:20px; font-weight:900;">101 - 82</div>
        </div>
    </footer>

    <nav class="navbar">
        <a href="javascript:void(0)" class="nav-item active" onclick="navTo('home', this)"><i class="material-icons">home</i>HJEM</a>
        <a href="javascript:void(0)" class="nav-item" onclick="navTo('range', this)"><i class="material-icons">all_inclusive</i>RANGE</a>
        <a href="javascript:void(0)" class="nav-item"><i class="material-icons">person</i>PROFIL</a>
        <a href="javascript:void(0)" class="nav-item"><i class="material-icons">leaderboard</i>STATS</a>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    let state = { gameMode: 'standard', playerCount: 2, scores: [0,0,0], foulCounts: [0,0,0], scoreAtStart: [0,0,0], currentPlayer: 0, breakDone: false, seconds: 0, names: ["Player 1","Player 2","Player 3"], bestSeries: [0,0,0], lastSeries: [0,0,0], innings: 1 };
    let history = [];

    db.on('value', (s) => { if(s.val()) { state = s.val(); updateUI(); } });

    function navTo(page, el) {
        const app = document.getElementById('app');
        const status = document.getElementById('gameStatus');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(page === 'range') { app.classList.add('slim-mode'); status.style.display = 'block'; } 
        else { app.classList.remove('slim-mode'); status.style.display = 'none'; }
    }

    function updateUI() {
        const cont = document.getElementById('scoreboard-container');
        if(!cont) return;
        cont.innerHTML = '';
        for(let i=0; i<state.playerCount; i++) {
            const active = state.currentPlayer === i;
            cont.innerHTML += `
                <div class="player-card ${active?'active':''}">
                    <div class="player-info">
                        <h2>${state.names[i]}</h2>
                        <div class="sub-stats">
                            <div>NÅ <span class="stat-val">${active ? state.scores[i]-state.scoreAtStart[i] : 0}</span></div>
                            <div>PERS <span class="stat-val">${state.bestSeries[i]}</span></div>
                            <div>SISTE <span class="stat-val">${state.lastSeries[i]||0}</span></div>
                        </div>
                        <div style="margin-top:10px;">
                            <div class="foul-dot ${state.foulCounts[i]>=1?'active':''}"></div>
                            <div class="foul-dot ${state.foulCounts[i]>=2?'active':''}"></div>
                            <div class="foul-dot ${state.foulCounts[i]>=3?'active':''}"></div>
                        </div>
                    </div>
                    <div class="score-display">${state.scores[i]}</div>
                </div>`;
        }
        document.getElementById('matchTimer').innerText = new Date(state.seconds * 1000).toISOString().substr(11, 8);
        document.getElementById('inningDisplay').innerText = "INNING: " + (state.innings || 1);
        document.getElementById('rotBtn').style.display = state.breakDone ? 'none' : 'block';
    }

    function action(type, val) {
        saveHistory();
        state.breakDone = true;
        state.scores[state.currentPlayer] += val;
        db.set(state);
    }

    function nextTurn() {
        saveHistory();
        let p = state.currentPlayer;
        state.lastSeries[p] = state.scores[p] - state.scoreAtStart[p];
        if(state.lastSeries[p] > state.bestSeries[p]) state.bestSeries[p] = state.lastSeries[p];
        if(p === state.playerCount - 1) state.innings = (state.innings || 1) + 1;
        state.currentPlayer = (state.currentPlayer + 1) % state.playerCount;
        state.scoreAtStart[state.currentPlayer] = state.scores[state.currentPlayer];
        db.set(state);
    }

    function handleFoul() {
        saveHistory();
        state.scores[state.currentPlayer] = state.scoreAtStart[state.currentPlayer];
        state.foulCounts[state.currentPlayer]++;
        nextTurn();
    }

    function undo() { if(history.length) { state = JSON.parse(history.pop()); db.set(state); } }
    function saveHistory() { history.push(JSON.stringify(state)); if(history.length > 10) history.shift(); }
    function rotateBreaker() { if(!state.breakDone) { state.currentPlayer = (state.currentPlayer+1)%state.playerCount; db.set(state); } }
    function checkActiveGame() { navTo('range', document.querySelectorAll('.nav-item')[1]); }

    setInterval(() => { if(state.breakDone) { state.seconds++; db.child('seconds').set(state.seconds); } }, 1000);
</script>
</body>
</html>
