<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Cinzel Decorative', serif; 
            height: 1080px; width: 1920px; 
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; 
        }

        .scoreline-wrapper { 
            width: 1000px; margin-bottom: 50px; 
            background: #0a0502;
            border: 5px solid #bd9b5b;
            border-radius: 15px; 
            box-shadow: 0 25px 60px rgba(0,0,0,1);
            overflow: hidden; 
            position: relative;
        }

        .scoreline-header { 
            display: flex; align-items: center; 
            background: linear-gradient(180deg, #1d0f06 0%, #000 100%);
            border-bottom: 3px solid #6e5932;
            height: 70px; width: 100%; position: relative; z-index: 10;
        }

        .inning-text { color: #fdfaf0; font-size: 22px; padding-left: 30px; }
        .status-msg { color: #bd9b5b; font-size: 16px; font-family: 'Anton', sans-serif; text-transform: uppercase; margin-left: 20px; }

        /* KULER */
        .header-balls { margin-left: auto; margin-right: 30px; display: flex; gap: 15px; }
        .ball { width: 35px; height: 35px; border-radius: 50%; position: relative; box-shadow: 4px 4px 8px rgba(0,0,0,0.8); border: 2px solid #000; }
        .ball-overlay-3d { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; z-index: 10; box-shadow: inset -3px -3px 5px rgba(0,0,0,0.6), inset 2px 2px 4px rgba(255,255,255,0.3); }
        .ball-num { font-size: 14px; font-weight: 900; font-family: 'Anton', sans-serif; color: black; background: white; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
        
        .f-1 { background: radial-gradient(circle at 30% 30%, #f1c40f 0%, #a67c00 100%); }
        .f-5 { background: radial-gradient(circle at 30% 30%, #e67e22 0%, #834c16 100%); }
        .f-3 { background: radial-gradient(circle at 30% 30%, #e74c3c 0%, #962d22 100%); }

        .scoreline-body { position: relative; width: 100%; background: rgba(10,5,2,0.9); transition: height 0.6s ease; }

        .player-row {
            display: none; align-items: center; 
            width: 100%; height: 110px; 
            background: #1a0f06;
            border-bottom: 1px solid #3d2b1f;
            position: absolute; 
            box-sizing: border-box;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
        }

        .name { font-size: 38px; color: #fdfaf0; text-transform: uppercase; padding-left: 20px; font-family: 'Cinzel Decorative', serif; }

        .score-block { 
            min-width: 220px; height: 100%; margin-left: auto;
            background: rgba(0,0,0,0.5); border-left: 3px solid #6e5932;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Standard sølv-hvit look */
        .score-val { 
            font-size: 65px; font-family: 'Anton', sans-serif; line-height: 1;
            background: linear-gradient(to bottom, #fdfaf0 0%, #bd9b5b 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-top: 5px;
        }

        /* Gull, Sølv, Bronse Spesialstiler */
        .rank-0 .score-val { background: linear-gradient(to bottom, #fff7ad 0%, #f1c40f 50%, #b8860b 100%); -webkit-background-clip: text; }
        .rank-1 .score-val { background: linear-gradient(to bottom, #ffffff 0%, #bdc3c7 50%, #7f8c8d 100%); -webkit-background-clip: text; }
        .rank-2 .score-val { background: linear-gradient(to bottom, #ffcc99 0%, #cd7f32 50%, #8b4513 100%); -webkit-background-clip: text; }

        .pers-val { font-size: 14px; color: #bd9b5b; font-family: 'Anton', sans-serif; text-transform: uppercase; margin-top: 5px; }
        .pers-val b { color: #fdfaf0; }

        .dot { width: 16px; height: 16px; border-radius: 50%; background: #000; border: 2px solid #6e5932; }
        .dot.active { background: radial-gradient(circle at 35% 35%, #fdfaf0 0%, #bd9b5b 100%); border: 2px solid #fdfaf0; box-shadow: 0 0 8px rgba(189, 155, 91, 0.5); }

        .player-eliminated { filter: sepia(0.8) brightness(0.3); }
    </style>
</head>
<body>

<div class="scoreline-wrapper">
    <div class="scoreline-header">
        <div class="inning-text" id="inning-text">ROUND 1</div>
        <div style="color: #6e5932; font-size: 24px; margin-left: 20px;">|</div>
        <div class="status-msg" id="status-msg">READY TO DUEL</div>
        <div class="header-balls">
            <div id="hdr-b1" class="ball f-1"><div class="ball-num">1</div><div class="ball-overlay-3d"></div></div>
            <div id="hdr-b5" class="ball f-5"><div class="ball-num">5</div><div class="ball-overlay-3d"></div></div>
            <div id="hdr-b3" class="ball f-3"><div class="ball-num">3</div><div class="ball-overlay-3d"></div></div>
        </div>
    </div>

    <div class="scoreline-body" id="main-body">
        <div class="player-row" id="p0-row">
            <div style="display:flex; align-items:center; padding:0 25px;">
                <div class="fouls" id="p0-fouls" style="display:flex; flex-direction:column; gap:6px;"></div>
                <div class="name" id="p0-name">PLAYER 1</div>
            </div>
            <div class="score-block">
                <div class="score-val" id="p0-score">0</div>
                <div class="pers-val">NÅ <b id="p0-now">0</b> | PERS <b id="best-0">0</b></div>
            </div>
        </div>
        <div class="player-row" id="p1-row">
            <div style="display:flex; align-items:center; padding:0 25px;">
                <div class="fouls" id="p1-fouls" style="display:flex; flex-direction:column; gap:6px;"></div>
                <div class="name" id="p1-name">PLAYER 2</div>
            </div>
            <div class="score-block">
                <div class="score-val" id="p1-score">0</div>
                <div class="pers-val">NÅ <b id="p1-now">0</b> | PERS <b id="best-1">0</b></div>
            </div>
        </div>
        <div class="player-row" id="p2-row">
            <div style="display:flex; align-items:center; padding:0 25px;">
                <div class="fouls" id="p2-fouls" style="display:flex; flex-direction:column; gap:6px;"></div>
                <div class="name" id="p2-name">PLAYER 3</div>
            </div>
            <div class="score-block">
                <div class="score-val" id="p2-score">0</div>
                <div class="pers-val">NÅ <b id="p2-now">0</b> | PERS <b id="best-2">0</b></div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    db.on('value', snap => {
        const data = snap.val();
        if (!data) return;

        const curP = data.currentPlayer;
        const rowH = 110;
        document.getElementById('main-body').style.height = (data.playerCount * rowH) + "px";

        let pList = [];
        for (let i = 0; i < data.playerCount; i++) {
            pList.push({ idx: i, score: data.scores[i], elim: data.foulCounts[i] >= 3 });
        }
        pList.sort((a, b) => b.score - a.score);

        pList.forEach((pData, rank) => {
            const p = pData.idx;
            const row = document.getElementById(`p${p}-row`);
            if (!row) return;

            row.className = `player-row rank-${rank}`; // Setter rank-klasse for farge
            row.style.display = "flex";
            row.style.transform = `translateY(${rank * rowH}px)`;

            document.getElementById(`p${p}-name`).innerText = data.names[p] || `PLAYER ${p+1}`;
            document.getElementById(`p${p}-score`).innerText = data.scores[p];

            let fHtml = '';
            for (let d = 0; d < 3; d++) {
                fHtml += `<div class="dot ${d < data.foulCounts[p] ? 'active' : ''}"></div>`;
            }
            document.getElementById(`p${p}-fouls`).innerHTML = fHtml;

            const nowVal = (curP === p && !pData.elim) ? (data.scores[p] - (data.scoreAtStart ? data.scoreAtStart[p] : 0)) : 0;
            document.getElementById(`p${p}-now`).innerText = nowVal;
            document.getElementById(`best-${p}`).innerText = data.bestSeries ? (data.bestSeries[p] || 0) : 0;

            row.classList.toggle('player-eliminated', pData.elim);
            row.style.opacity = (curP === p || pData.elim) ? "1" : "0.5";
        });

        document.getElementById('inning-text').innerText = `ROUND ${Math.floor(data.innings / data.playerCount) + 1}`;
        document.getElementById('status-msg').innerText = data.breakDone ? "DUEL IN PROGRESS" : "OPENING BREAK";
    });
</script>
</body>
</html>
