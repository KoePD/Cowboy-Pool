<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel+Decorative:wght@700&family=Rye&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; padding: 0; overflow: hidden; 
            height: 1080px; width: 1920px; 
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; 
        }

        .scoreline-wrapper { 
            width: 1000px; margin-bottom: 50px; 
            background: #0a0502;
            border: 4px solid #bd9b5b;
            border-radius: 12px; 
            box-shadow: 0 25px 60px rgba(0,0,0,1);
            overflow: hidden; position: relative;
        }

        /* HEADER */
        .scoreline-header { 
            display: flex; align-items: center; 
            background: linear-gradient(180deg, #1d0f06 0%, #000 100%);
            border-bottom: 2px solid #6e5932;
            height: 70px; width: 100%; position: relative; z-index: 10;
        }

        .inning-text { color: #fdfaf0; font-family: 'Rye', serif; font-size: 22px; padding-left: 25px; text-transform: uppercase; }
        .status-msg { color: #bd9b5b; font-size: 16px; font-family: 'Rye', serif; text-transform: uppercase; margin-left: 15px; letter-spacing: 1px; }

        /* HEADER BALLS */
        .header-balls { 
            position: absolute; right: 0; width: 220px; 
            display: flex; justify-content: center; align-items: center; gap: 12px; height: 100%;
        }
        .ball { width: 32px; height: 32px; border-radius: 50%; position: relative; box-shadow: 2px 2px 5px rgba(0,0,0,0.8); border: 2px solid #000; }
        .ball-num { font-size: 13px; font-weight: 900; font-family: 'Anton', sans-serif; color: black; background: white; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
        .f-1 { background: radial-gradient(circle at 30% 30%, #f1c40f 0%, #a67c00 100%); }
        .f-5 { background: radial-gradient(circle at 30% 30%, #e67e22 0%, #834c16 100%); }
        .f-3 { background: radial-gradient(circle at 30% 30%, #e74c3c 0%, #962d22 100%); }

        .scoreline-body { position: relative; width: 100%; background: #0a0502; min-height: 110px; transition: height 0.3s ease; }

        .player-row {
            display: none; align-items: center; width: 100%; height: 110px; 
            background: #150d08; border-bottom: 2px solid #2a1a0f;
            position: absolute; box-sizing: border-box;
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease, filter 0.4s ease;
        }

        .player-row.eliminated { filter: grayscale(1) brightness(0.3); opacity: 0.5; }

        /* REVOLVER */
        .revolver-cylinder {
            width: 85px; height: 85px;
            background: url('https://koepd.github.io/Cowboy-Pool/image_b55599.png') no-repeat center center;
            background-size: contain;
            position: relative; margin-right: 25px; margin-left: 20px; flex-shrink: 0;
        }

        .spinning { animation: cylinder-spin 0.6s cubic-bezier(0.15, 0.88, 0.3, 1.05) forwards; }
        @keyframes cylinder-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .chamber { width: 18px; height: 18px; background: transparent; border-radius: 50%; position: absolute; z-index: 3; }
        .c1 { top: 11px; left: 34px; }
        .c2 { bottom: 20px; left: 14px; }
        .c3 { bottom: 20px; right: 14px; }
        
        .chamber.active { 
            background: radial-gradient(circle at 35% 35%, #fff7ad 0%, #f1c40f 45%, #b8860b 60%, #4a3600 100%); 
            border: 1.5px solid #fdfaf0; 
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.9), inset -2px -2px 3px rgba(0,0,0,0.5); 
            z-index: 5;
            animation: bullet-load 0.4s ease-out forwards;
        }

        @keyframes bullet-load { 0% { transform: scale(2); opacity: 0; filter: brightness(3); } 100% { transform: scale(1); opacity: 1; filter: brightness(1); } }

        /* STEMPEL */
        .stamp {
            position: absolute; font-family: 'Rye', serif; font-size: 40px;
            padding: 8px 25px; border: 6px solid; border-radius: 8px;
            text-transform: uppercase; z-index: 200; transform: rotate(-12deg);
            display: none; pointer-events: none; left: 200px; top: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .stamp.eliminated-stamp { color: #d63031; border-color: #d63031; background-color: rgba(0,0,0,0.7); text-shadow: 0 0 15px rgba(214, 48, 49, 0.8); animation: stamp-slam 0.3s ease-out forwards; }
        @keyframes stamp-slam { 0% { transform: rotate(-12deg) scale(3); opacity: 0; } 100% { transform: rotate(-12deg) scale(1); opacity: 1; } }
        .survivor { color: #f1c40f; border-color: #f1c40f; text-shadow: 0 0 15px #f1c40f; top: 15px; left: 200px; font-size: 40px;}

        /* INFO */
        .name { font-size: 42px; color: #fdfaf0; text-transform: uppercase; padding-left: 10px; font-family: 'Rye', serif; flex-grow: 1; }
        
        .score-block { 
            min-width: 220px; height: 100%; margin-left: auto; 
            background: rgba(0,0,0,0.7); border-left: 3px solid #6e5932; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        .score-val { 
            font-size: 64px; font-family: 'Rye', serif; line-height: 0.7; 
            display: block; filter: drop-shadow(3px 3px 2px rgba(0,0,0,1)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .pers-val { font-size: 13px; color: #bd9b5b; font-family: 'Anton', sans-serif; text-transform: uppercase; letter-spacing: 1.5px; }
        .pers-val b { font-family: Arial, sans-serif !important; color: #fdfaf0; font-size: 14px; margin-left: 2px; }

        /* METALL GRADIENTER */
        .rank-0 .score-val { background-image: linear-gradient(180deg, #fffceb 0%, #f1c40f 45%, #b8860b 55%, #4a3600 100%); }
        .rank-1 .score-val { background-image: linear-gradient(180deg, #ffffff 0%, #bdc3c7 45%, #7f8c8d 55%, #1a1c1d 100%); }
        .rank-2 .score-val { background-image: linear-gradient(180deg, #fff2e6 0%, #cd7f32 45%, #8b4513 55%, #301800 100%); }
        .score-val { background-image: linear-gradient(180deg, #eee 0%, #999 100%); }
    </style>
</head>
<body>

<div class="scoreline-wrapper">
    <div class="scoreline-header">
        <div class="inning-text" id="inning-text">ROUND 1</div>
        <div style="color: #6e5932; font-size: 24px; margin-left: 15px;">|</div>
        <div class="status-msg" id="status-msg">OPPDATERER...</div>
        <div class="header-balls">
            <div class="ball f-1"><div class="ball-num">1</div></div>
            <div class="ball f-5"><div class="ball-num">5</div></div>
            <div class="ball f-3"><div class="ball-num">3</div></div>
        </div>
    </div>

    <div class="scoreline-body" id="main-body">
        <div class="player-row" id="p0-row" data-last-fouls="0">
            <div class="stamp survivor">SURVIVOR</div><div class="stamp eliminated-stamp">ELIMINATED</div>
            <div class="revolver-cylinder">
                <div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div>
            </div>
            <div class="name" id="p0-name">P1</div>
            <div class="score-block">
                <div class="score-val" id="p0-score">0</div>
                <div class="pers-val">NÅ <b id="p0-now">0</b> | PERS <b id="best-0">0</b></div>
            </div>
        </div>
        <div class="player-row" id="p1-row" data-last-fouls="0">
            <div class="stamp survivor">SURVIVOR</div><div class="stamp eliminated-stamp">ELIMINATED</div>
            <div class="revolver-cylinder">
                <div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div>
            </div>
            <div class="name" id="p1-name">P2</div>
            <div class="score-block">
                <div class="score-val" id="p1-score">0</div>
                <div class="pers-val">NÅ <b id="p1-now">0</b> | PERS <b id="best-1">0</b></div>
            </div>
        </div>
        <div class="player-row" id="p2-row" data-last-fouls="0">
            <div class="stamp survivor">SURVIVOR</div><div class="stamp eliminated-stamp">ELIMINATED</div>
            <div class="revolver-cylinder">
                <div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div>
            </div>
            <div class="name" id="p2-name">P3</div>
            <div class="score-block">
                <div class="score-val" id="p2-score">0</div>
                <div class="pers-val">NÅ <b id="p2-now">0</b> | PERS <b id="best-2">0</b></div>
            </div>
        </div>
    </div>
</div>
    
<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    const spinSound = new Audio('https://koepd.github.io/Cowboy-Pool/cylinder_spin.mp3'); 
    const shotSound = new Audio('https://koepd.github.io/Cowboy-Pool/revolver_shot.mp3');

    db.on('value', snap => {
        const data = snap.val();
        if (!data) return;

        const rowH = 110;
        const playerCount = data.playerCount || 3;
        document.getElementById('main-body').style.height = (playerCount * rowH) + "px";

        let pList = [];
        for (let i = 0; i < playerCount; i++) {
            pList.push({
                id: i,
                score: (data.scores && data.scores[i] !== undefined) ? data.scores[i] : 0,
                fouls: (data.foulCounts && data.foulCounts[i] !== undefined) ? data.foulCounts[i] : 0,
                name: (data.names && data.names[i]) ? data.names[i] : `PLAYER ${i+1}`
            });
        }

        pList.sort((a, b) => b.score - a.score);
        document.querySelectorAll('.player-row').forEach(r => r.style.display = 'none');

        pList.forEach((pData, rank) => {
            const pId = pData.id;
            const row = document.getElementById(`p${pId}-row`);
            if (!row) return;

            row.className = `player-row rank-${rank}`;
            row.style.display = "flex";
            row.style.transform = `translateY(${rank * rowH}px)`;
            
            document.getElementById(`p${pId}-name`).innerText = pData.name;
            document.getElementById(`p${pId}-score`).innerText = pData.score;

            // NÅ & PERS Logikk
            const scoreStart = (data.scoreAtStart && data.scoreAtStart[pId] !== undefined) ? data.scoreAtStart[pId] : 0;
            document.getElementById(`p${pId}-now`).innerText = (data.currentPlayer === pId) ? (pData.score - scoreStart) : 0;
            document.getElementById(`best-${pId}`).innerText = data.bestSeries ? (data.bestSeries[pId] || 0) : 0;

            const cylinder = row.querySelector('.revolver-cylinder');
            const currentFouls = pData.fouls;
            const previousFouls = parseInt(row.getAttribute('data-last-fouls') || 0);

            if (currentFouls > previousFouls) {
                cylinder.classList.remove('spinning');
                void cylinder.offsetWidth; 
                cylinder.classList.add('spinning');
                if (currentFouls < 3) { spinSound.currentTime = 0; spinSound.play().catch(e => {}); } 
                else { shotSound.currentTime = 0; shotSound.play().catch(e => {}); }
            }
            row.setAttribute('data-last-fouls', currentFouls);

            const chambers = cylinder.querySelectorAll('.chamber');
            chambers.forEach((c, i) => c.classList.toggle('active', i < currentFouls));

            const stamps = row.querySelectorAll('.stamp');
            stamps.forEach(s => s.style.display = 'none');
            row.classList.remove('eliminated');

            if (currentFouls >= 3) {
                row.querySelector('.eliminated-stamp').style.display = 'block';
                row.classList.add('eliminated');
            } else if (data.matchEnded && rank === 0) {
                row.querySelector('.survivor').style.display = 'block';
            } else {
                row.style.opacity = (data.currentPlayer === pId) ? "1" : "0.6";
            }
        });

        const roundNum = Math.floor((data.innings || 0) / playerCount) + 1;
        document.getElementById('inning-text').innerText = `ROUND ${roundNum}`;
    });
</script>
</body>
</html>
