<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel+Decorative:wght@700&family=Rye&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --brass: linear-gradient(180deg, #fffceb 0%, #f1c40f 45%, #b8860b 55%, #4a3600 100%);
            --steel-bg: radial-gradient(circle, #2c2c2c 0%, #000 100%);
            --paper: #d2b48c;
        }

        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; padding: 0; overflow: hidden; 
            height: 1080px; width: 1920px; 
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; 
        }

        /* 1. Visuelt Tema: Oljet stål / Saloon treverk */
        .scoreline-wrapper { 
            width: 1000px; margin-bottom: 50px; 
            background: #0a0502;
            border: 4px solid #bd9b5b;
            border-radius: 12px; 
            box-shadow: 0 25px 60px rgba(0,0,0,1);
            overflow: hidden; position: relative;
        }

        .scoreline-header { 
            display: flex; align-items: center; 
            background: linear-gradient(180deg, #1d0f06 0%, #000 100%);
            border-bottom: 2px solid #6e5932;
            height: 70px; width: 100%; position: relative; z-index: 10;
        }

        /* 2. Revolver-systemet (Trekant) */
        .revolver-triangle {
            width: 70px; height: 70px; position: relative; margin-right: 20px;
            background: var(--steel-bg); border-radius: 50%; border: 2px solid #444;
            flex-shrink: 0;
        }
        .chamber {
            width: 16px; height: 16px; background: #000; border-radius: 50%;
            position: absolute; border: 1px solid #222;
        }
        /* Trekantformasjon */
        .ch-1 { top: 10px; left: 27px; }
        .ch-2 { bottom: 15px; left: 12px; }
        .ch-3 { bottom: 15px; right: 12px; }

        .chamber.filled {
            background: var(--brass);
            box-shadow: 0 0 10px #f1c40f; border: 1px solid #fff;
        }

        .shake { animation: cylinder-shake 0.2s infinite; }
        @keyframes cylinder-shake { 0% {transform: rotate(0deg);} 50% {transform: rotate(3deg);} 100% {transform: rotate(0deg);} }

        /* 3. Status-stempler */
        .stamp {
            position: absolute; font-family: 'Rye', serif; font-size: 40px;
            padding: 5px 20px; border: 4px solid; border-radius: 5px;
            text-transform: uppercase; z-index: 100; transform: rotate(-15deg);
            display: none; pointer-events: none;
        }
        .dead { color: #ff0000; border-color: #ff0000; left: 30%; top: 20%; opacity: 0.8; }
        .caught { color: #000; border-color: #000; left: 30%; top: 20%; opacity: 0.9; background: rgba(0,0,0,0.1); }
        .survivor { color: #f1c40f; border-color: #f1c40f; left: 30%; top: 20%; text-shadow: 0 0 15px #f1c40f; }

        /* 4. Pro vs Gratis (Gyllen glød på Wanted-plakat for Pro) */
        .wanted-glow { 
            box-shadow: inset 0 0 20px rgba(241, 196, 15, 0.4); 
            background: linear-gradient(90deg, rgba(21,13,8,1) 0%, rgba(45,35,20,1) 100%) !important;
        }

        .player-row {
            display: none; align-items: center; width: 100%; height: 110px; 
            background: #150d08; border-bottom: 2px solid #2a1a0f;
            position: absolute; transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
        }

        .name { font-size: 42px; color: #fdfaf0; text-transform: uppercase; padding-left: 15px; font-family: 'Rye', serif; }
        
        .score-block { 
            min-width: 220px; height: 100%; margin-left: auto;
            background: rgba(0,0,0,0.7); border-left: 3px solid #6e5932;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Metallfarger for Pro */
        .pro-val { background: var(--brass); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .free-val { color: #fdfaf0; }

        .score-val { 
            font-size: 72px; font-family: 'Rye', serif; line-height: 0.7;
            filter: drop-shadow(3px 3px 2px rgba(0,0,0,1)); margin-bottom: 12px; 
        }

        .pers-val { font-size: 13px; color: #bd9b5b; font-family: 'Anton', sans-serif; text-transform: uppercase; }
        .pers-val b { font-family: Arial, sans-serif !important; color: #fdfaf0; }

        .header-balls { position: absolute; right: 0; width: 220px; display: flex; justify-content: center; align-items: center; gap: 12px; }
    </style>
</head>
<body>

<div class="scoreline-wrapper">
    <div class="scoreline-header">
        <div class="inning-text" id="inning-text">ROUND 1</div>
        <div class="status-msg" id="status-msg" style="margin-left:20px; font-family:'Rye'; color:#bd9b5b;">OPPDATERER...</div>
        <div class="header-balls">
            </div>
    </div>

    <div class="scoreline-body" id="main-body">
        <div class="player-row" id="p0-row">
            <div class="stamp dead">DEAD</div>
            <div class="stamp caught">CAUGHT</div>
            <div class="stamp survivor">SURVIVOR</div>
            <div style="display:flex; align-items:center; padding:0 25px;">
                <div class="revolver-triangle">
                    <div class="chamber ch-1"></div>
                    <div class="chamber ch-2"></div>
                    <div class="chamber ch-3"></div>
                </div>
                <div class="name" id="p0-name">PLAYER 1</div>
            </div>
            <div class="score-block">
                <div class="score-val pro-val" id="p0-score">0</div>
                <div class="pers-val">NÅ <b id="p0-now">0</b> | PERS <b id="best-0">0</b></div>
            </div>
        </div>
        </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    db.on('value', snap => {
        const data = snap.val();
        if (!data) return;

        const isPro = data.userTier === 'pro'; // Logikk for Pro/Free
        const curP = data.currentPlayer;
        const rowH = 110;

        // Sortering og rangering
        let pList = [];
        for (let i = 0; i < data.playerCount; i++) {
            pList.push({ idx: i, score: data.scores[i], fouls: data.foulCounts[i], name: data.names[i] });
        }
        pList.sort((a, b) => b.score - a.score);

        pList.forEach((pData, rank) => {
            const p = pData.idx;
            const row = document.getElementById(`p${p}-row`);
            if (!row) return;

            row.style.display = "flex";
            row.style.transform = `translateY(${rank * rowH}px)`;
            
            // 1. Leder-markering (Wanted glød for Pro)
            if (rank === 0) {
                row.classList.add('wanted-glow');
            } else {
                row.classList.remove('wanted-glow');
            }

            // 2. Revolver-systemet
            const chambers = row.querySelectorAll('.chamber');
            const cylinder = row.querySelector('.revolver-triangle');
            chambers.forEach((ch, i) => {
                ch.classList.toggle('filled', i < pData.fouls);
            });
            cylinder.classList.toggle('shake', pData.fouls === 2);

            // 3. Stempler og Status
            const deadStamp = row.querySelector('.dead');
            const caughtStamp = row.querySelector('.caught');
            const survivorStamp = row.querySelector('.survivor');

            // Nullstill stempler
            deadStamp.style.display = 'none';
            caughtStamp.style.display = 'none';
            survivorStamp.style.display = 'none';

            if (pData.fouls >= 3) {
                deadStamp.style.display = 'block';
                row.style.opacity = "0.3";
            } else if (data.matchEnded) {
                if (rank === 0) survivorStamp.style.display = 'block';
                else caughtStamp.style.display = 'block';
            }

            // 4. Pro vs Free farger
            const scoreEl = document.getElementById(`p${p}-score`);
            scoreEl.className = isPro ? 'score-val pro-val' : 'score-val free-val';
            scoreEl.innerText = pData.score;
            
            document.getElementById(`p${p}-name`).innerText = pData.name || `P${p+1}`;
        });
    });
</script>
</body>
</html>
