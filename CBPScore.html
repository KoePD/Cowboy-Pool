<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel+Decorative:wght@700&family=Rye&family=Sancreek&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; padding: 0; overflow: hidden; 
            height: 1080px; width: 1920px; 
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; 
        }

        .scoreline-wrapper { 
            width: 1000px; margin-bottom: 50px; 
            background: #0a0502;
            border: 4px solid #bd9b5b;
            border-radius: 12px; 
            box-shadow: 0 20px 50px rgba(0,0,0,1);
            overflow: hidden; 
        }

        .scoreline-header { 
            display: flex; align-items: center; 
            background: linear-gradient(180deg, #1d0f06 0%, #000 100%);
            border-bottom: 2px solid #6e5932;
            height: 60px; width: 100%; position: relative; z-index: 10;
        }

        .inning-text { color: #fdfaf0; font-family: 'Rye', serif; font-size: 20px; padding-left: 25px; }
        .status-msg { color: #bd9b5b; font-size: 15px; font-family: 'Anton', sans-serif; text-transform: uppercase; margin-left: 15px; letter-spacing: 1px; }

        .header-balls { margin-left: auto; margin-right: 25px; display: flex; gap: 12px; }
        .ball { width: 32px; height: 32px; border-radius: 50%; position: relative; box-shadow: 2px 2px 5px rgba(0,0,0,0.8); border: 2px solid #000; transition: 0.3s; }
        .ball-overlay-3d { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; z-index: 10; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.6), inset 1.5px 1.5px 3px rgba(255,255,255,0.3); }
        .ball-num { font-size: 13px; font-weight: 900; font-family: 'Anton', sans-serif; color: black; background: white; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
        
        .f-1 { background: radial-gradient(circle at 30% 30%, #f1c40f 0%, #a67c00 100%); }
        .f-5 { background: radial-gradient(circle at 30% 30%, #e67e22 0%, #834c16 100%); }
        .f-3 { background: radial-gradient(circle at 30% 30%, #e74c3c 0%, #962d22 100%); }
        .ball-dimmed { opacity: 0.15; filter: grayscale(1); transform: scale(0.8); }

        .scoreline-body { position: relative; width: 100%; background: #0a0502; transition: height 0.6s ease; }

        .player-row {
            display: none; align-items: center; 
            width: 100%; height: 100px; 
            background: #150d08;
            border-bottom: 1px solid #2a1a0f;
            position: absolute; 
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
        }

        .name { font-size: 36px; color: #fdfaf0; text-transform: uppercase; padding-left: 20px; font-family: 'Cinzel Decorative', serif !important; }

        .score-block { 
            min-width: 200px; height: 100%; margin-left: auto;
            background: rgba(0,0,0,0.6); border-left: 2px solid #6e5932;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .score-val { 
            font-size: 70px; font-family: 'Anton', sans-serif !important; line-height: 0.8;
            background: linear-gradient(to bottom, #fdfaf0 0%, #bd9b5b 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.8));
        }

        .rank-0 .score-val { background: linear-gradient(to bottom, #fff7ad 0%, #f1c40f 50%, #b8860b 100%); -webkit-background-clip: text; filter: drop-shadow(0 0 10px rgba(218,165,32,0.4)); }
        .rank-1 .score-val { background: linear-gradient(to bottom, #ffffff 0%, #bdc3c7 50%, #7f8c8d 100%); -webkit-background-clip: text; }
        .rank-2 .score-val { background: linear-gradient(to bottom, #ffcc99 0%, #cd7f32 50%, #8b4513 100%); -webkit-background-clip: text; }

        .pers-val { font-size: 12px; color: #bd9b5b; font-family: 'Anton', sans-serif; text-transform: uppercase; margin-top: 2px; }
        .pers-val b { color: #fdfaf0; }

        .dot { width: 14px; height: 14px; border-radius: 50%; background: #111; border: 1px solid #333; margin-bottom: 4px; }
        .dot.active { background: #ff0000; border: 1px solid #ff6666; box-shadow: 0 0 12px #ff0000, inset 0 0 4px rgba(255,255,255,0.6); }

        .player-eliminated { filter: grayscale(1) brightness(0.25); }
    </style>
</head>
<body>

<div class="scoreline-wrapper">
    <div class="scoreline-header">
        <div class="inning-text" id="inning-text">ROUND 1</div>
        <div style="color: #6e5932; font-size: 20px; margin-left: 15px;">|</div>
        <div class="status-msg" id="status-msg">HENTER KRAV...</div>
        <div class="header-balls">
            <div id="hdr-b1" class="ball f-1"><div class="ball-num">1</div><div class="ball-overlay-3d"></div></div>
            <div id="hdr-b5" class="ball f-5"><div class="ball-num">5</div><div class="ball-overlay-3d"></div></div>
            <div id="hdr-b3" class="ball f-3"><div class="ball-num">3</div><div class="ball-overlay-3d"></div></div>
        </div>
    </div>

    <div class="scoreline-body" id="main-body">
        <div class="player-row" id="p0-row">
            <div style="display:flex; align-items:center; padding:0 25px;">
                <div class="fouls" id="p0-fouls" style="display:flex; flex-direction:column; margin-right:20px;"></div>
                <div class="name" id="p0-name">PLAYER 1</div>
            </div>
            <div class="score-block">
                <div class="score-val" id="p0-score">0</div>
                <div class="pers-val">NÅ <b id="p0-now">0</b> | PERS <b id="best-0">0</b></div>
            </div>
        </div>
        <div class="player-row" id="p1-row">
            <div style="display:flex; align-items:center; padding:0 25px;">
                <div class="fouls" id="p1-fouls" style="display:flex; flex-direction:column; margin-right:20px;"></div>
                <div class="name" id="p1-name">PLAYER 2</div>
            </div>
            <div class="score-block">
                <div class="score-val" id="p1-score">0</div>
                <div class="pers-val">NÅ <b id="p1-now">0</b> | PERS <b id="best-1">0</b></div>
            </div>
        </div>
        <div class="player-row" id="p2-row">
            <div style="display:flex; align-items:center; padding:0 25px;">
                <div class="fouls" id="p2-fouls" style="display:flex; flex-direction:column; margin-right:20px;"></div>
                <div class="name" id="p2-name">PLAYER 3</div>
            </div>
            <div class="score-block">
                <div class="score-val" id="p2-score">0</div>
                <div class="pers-val">NÅ <b id="p2-now">0</b> | PERS <b id="best-2">0</b></div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    const i18n = {
        no: { inn: "ROUND", break: "STARTSTØT (3-BALL)", open: "VALG: CAROM / POCKET", rc: "KRAV: CAROM", rp: "KRAV: POCKET" },
        en: { inn: "ROUND", break: "BREAKSHOT (3-BALL)", open: "CHOICE: CAROM / POCKET", rc: "REQ: CAROM", rp: "REQ: POCKET" }
    };

    db.on('value', snap => {
        const data = snap.val();
        if (!data) return;

        const lang = data.lang || 'no';
        const t = i18n[lang];
        const curP = data.currentPlayer;
        const rowH = 100;
        document.getElementById('main-body').style.height = (data.playerCount * rowH) + "px";

        let pList = [];
        for (let i = 0; i < data.playerCount; i++) {
            pList.push({ idx: i, score: data.scores[i], elim: data.foulCounts[i] >= 3 });
        }
        pList.sort((a, b) => b.score - a.score);

        pList.forEach((pData, rank) => {
            const p = pData.idx;
            const row = document.getElementById(`p${p}-row`);
            if (!row) return;

            row.className = `player-row rank-${rank}`;
            row.style.display = "flex";
            row.style.transform = `translateY(${rank * rowH}px)`;

            document.getElementById(`p${p}-name`).innerText = data.names[p] || `PLAYER ${p+1}`;
            document.getElementById(`p${p}-score`).innerText = data.scores[p];

            let fHtml = '';
            for (let d = 0; d < 3; d++) {
                fHtml += `<div class="dot ${d < data.foulCounts[p] ? 'active' : ''}"></div>`;
            }
            document.getElementById(`p${p}-fouls`).innerHTML = fHtml;

            const scoreStart = (data.scoreAtStart && data.scoreAtStart[p] !== undefined) ? data.scoreAtStart[p] : 0;
            const nowVal = (curP === p && !pData.elim) ? (data.scores[p] - scoreStart) : 0;
            document.getElementById(`p${p}-now`).innerText = nowVal;
            document.getElementById(`best-${p}`).innerText = data.bestSeries ? (data.bestSeries[p] || 0) : 0;

            row.classList.toggle('player-eliminated', pData.elim);
            row.style.opacity = (curP === p || pData.elim) ? "1" : "0.5";
        });

        // OPPDATERER DYNAMISK STATUSMELDING
        const roundNum = Math.floor(data.innings / data.playerCount) + 1;
        document.getElementById('inning-text').innerText = `${t.inn} ${roundNum}`;

        let statusText = t.break;
        if (data.breakDone) {
            statusText = (data.tableStatus === 'locked') ? (data.lastType === 'pocket' ? t.rc : t.rp) : t.open;
        }
        document.getElementById('status-msg').innerText = statusText;

        // KULER
        const b1 = document.getElementById('hdr-b1'), b3 = document.getElementById('hdr-b3'), b5 = document.getElementById('hdr-b5');
        [b1, b3, b5].forEach(b => b.classList.remove('ball-dimmed'));
        if (!data.breakDone) { b1.classList.add('ball-dimmed'); b5.classList.add('ball-dimmed'); }
    });
</script>
</body>
</html>
