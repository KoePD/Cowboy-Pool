<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel+Decorative:wght@700&family=Rye&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; padding: 0; overflow: hidden; 
            height: 1080px; width: 1920px; 
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; 
        }

        .scoreline-wrapper { 
            width: 1000px; margin-bottom: 50px; 
            background: #0a0502;
            border: 4px solid #bd9b5b;
            border-radius: 12px; 
            box-shadow: 0 25px 60px rgba(0,0,0,1);
            overflow: hidden; position: relative;
        }

        .scoreline-header { 
            display: flex; align-items: center; 
            background: linear-gradient(180deg, #1d0f06 0%, #000 100%);
            border-bottom: 2px solid #6e5932;
            height: 70px; width: 100%; position: relative; z-index: 10;
        }

        .inning-text { color: #fdfaf0; font-family: 'Rye', serif; font-size: 22px; padding-left: 25px; text-transform: uppercase; }
        .status-msg { color: #bd9b5b; font-size: 16px; font-family: 'Rye', serif; text-transform: uppercase; margin-left: 15px; letter-spacing: 1px; }

        .scoreline-body { position: relative; width: 100%; background: #0a0502; min-height: 110px; transition: height 0.3s ease; }

        .player-row {
            display: none; align-items: center; width: 100%; height: 110px; 
            background: #150d08; border-bottom: 2px solid #2a1a0f;
            position: absolute; box-sizing: border-box;
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease, filter 0.4s ease;
        }

        /* INAKTIV/ELIMINERT RAD */
        .player-row.eliminated {
            filter: grayscale(1) brightness(0.3); /* Gjør raden mørk og grå */
            opacity: 0.5;
        }

        .revolver-cylinder {
            width: 85px; height: 85px;
            background: url('https://koepd.github.io/Cowboy-Pool/image_b55599.png') no-repeat center center;
            background-size: contain;
            position: relative; margin-right: 25px; margin-left: 20px;
            flex-shrink: 0;
            transform-origin: center center;
        }

        .spinning { animation: cylinder-spin 0.6s cubic-bezier(0.15, 0.88, 0.3, 1.05) forwards; }
        @keyframes cylinder-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .chamber { width: 18px; height: 18px; background: transparent; border-radius: 50%; position: absolute; z-index: 3; }
        .c1 { top: 11px; left: 34px; }
        .c2 { bottom: 20px; left: 14px; }
        .c3 { bottom: 20px; right: 14px; }
        
        .chamber.active { 
            background: radial-gradient(circle at 35% 35%, #fff7ad 0%, #f1c40f 45%, #b8860b 60%, #4a3600 100%); 
            border: 1.5px solid #fdfaf0; 
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.9), inset -2px -2px 3px rgba(0,0,0,0.5); 
            z-index: 5;
            animation: bullet-load 0.4s ease-out forwards;
        }

        @keyframes bullet-load {
            0% { transform: scale(2); opacity: 0; filter: brightness(3); }
            100% { transform: scale(1); opacity: 1; filter: brightness(1); }
        }

        /* --- NY STEMPEL ANIMASJON FOR ELIMINATED --- */
        .stamp {
            position: absolute; font-family: 'Rye', serif; font-size: 40px;
            padding: 8px 25px; border: 6px solid; border-radius: 8px;
            text-transform: uppercase; z-index: 200; transform: rotate(-12deg);
            display: none; pointer-events: none; left: 200px;
            top: 15px; /* Posisjoner over navne-området */
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* Rødt ELIMINATED stempel */
        .stamp.eliminated-stamp {
            color: #d63031;
            border-color: #d63031;
            background-color: rgba(0,0,0,0.5); /* Litt gjennomsiktig bakgrunn */
            text-shadow: 0 0 15px rgba(214, 48, 49, 0.8);
            filter: drop-shadow(0 0 10px rgba(214, 48, 49, 0.5));
            /* Smelle-animasjon */
            animation: stamp-slam 0.3s ease-out forwards, stamp-pulse 2s infinite 0.3s;
        }

        @keyframes stamp-slam {
            0% { transform: rotate(-12deg) scale(3); opacity: 0; }
            80% { transform: rotate(-12deg) scale(0.9); opacity: 1; }
            100% { transform: rotate(-12deg) scale(1); }
        }

        @keyframes stamp-pulse {
            0% { filter: drop-shadow(0 0 10px rgba(214, 48, 49, 0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(214, 48, 49, 0.9)); }
            100% { filter: drop-shadow(0 0 10px rgba(214, 48, 49, 0.5)); }
        }
        /* --- SLUTT STEMPEL-CSS --- */

        .dead { color: #8b0000; border-color: #8b0000; display: none !important; } /* Skjul det gamle stempler */
        .survivor { color: #f1c40f; border-color: #f1c40f; text-shadow: 0 0 15px #f1c40f; top: 15px; left: 200px; font-size: 40px;}

        .name { font-size: 42px; color: #fdfaf0; text-transform: uppercase; padding-left: 10px; font-family: 'Rye', serif; flex-grow: 1; }
        .score-block { min-width: 220px; height: 100%; margin-left: auto; background: rgba(0,0,0,0.7); border-left: 3px solid #6e5932; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
        .score-val { font-size: 64px; font-family: 'Rye', serif; line-height: 0.7; background: linear-gradient(180deg, #fff 0%, #f1c40f 45%, #b8860b 55%, #4a3600 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(3px 3px 2px rgba(0,0,0,1)); }
    </style>
</head>
<body>

<div class="scoreline-wrapper">
    <div class="scoreline-header">
        <div class="inning-text" id="inning-text">ROUND 1</div>
        <div style="color: #6e5932; font-size: 24px; margin-left: 15px;">|</div>
        <div class="status-msg" id="status-msg">OPPDATERER...</div>
    </div>

    <div class="scoreline-body" id="main-body">
        <div class="player-row" id="p0-row" data-last-fouls="0">
            <div class="stamp dead">DEAD</div><div class="stamp survivor">SURVIVOR</div>
            <div class="stamp eliminated-stamp">ELIMINATED</div> <div class="revolver-cylinder">
                <div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div>
            </div>
            <div class="name" id="p0-name">PLAYER 1</div>
            <div class="score-block"><div class="score-val" id="p0-score">0</div></div>
        </div>
        <div class="player-row" id="p1-row" data-last-fouls="0">
            <div class="stamp dead">DEAD</div><div class="stamp survivor">SURVIVOR</div>
            <div class="stamp eliminated-stamp">ELIMINATED</div> <div class="revolver-cylinder">
                <div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div>
            </div>
            <div class="name" id="p1-name">PLAYER 2</div>
            <div class="score-block"><div class="score-val" id="p1-score">0</div></div>
        </div>
        <div class="player-row" id="p2-row" data-last-fouls="0">
            <div class="stamp dead">DEAD</div><div class="stamp survivor">SURVIVOR</div>
            <div class="stamp eliminated-stamp">ELIMINATED</div> <div class="revolver-cylinder">
                <div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div>
            </div>
            <div class="name" id="p2-name">PLAYER 3</div>
            <div class="score-block"><div class="score-val" id="p2-score">0</div></div>
        </div>
    </div>
</div>
    
<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    db.on('value', snap => {
        const data = snap.val();
        if (!data) return;

        const rowH = 110;
        const playerCount = data.playerCount || 3;
        document.getElementById('main-body').style.height = (playerCount * rowH) + "px";

        let pList = [];
        for (let i = 0; i < playerCount; i++) {
            pList.push({
                id: i,
                score: (data.scores && data.scores[i] !== undefined) ? data.scores[i] : 0,
                fouls: (data.foulCounts && data.foulCounts[i] !== undefined) ? data.foulCounts[i] : 0,
                name: (data.names && data.names[i]) ? data.names[i] : `PLAYER ${i+1}`
            });
        }

        pList.sort((a, b) => b.score - a.score);

        pList.forEach((pData, rank) => {
            const pId = pData.id;
            const row = document.getElementById(`p${pId}-row`);
            if (!row) return;

            row.style.display = "flex";
            row.style.transform = `translateY(${rank * rowH}px)`;
            
            document.getElementById(`p${pId}-name`).innerText = pData.name;
            document.getElementById(`p${pId}-score`).innerText = pData.score;

            const cylinder = row.querySelector('.revolver-cylinder');
            const currentFouls = pData.fouls;
            const previousFouls = parseInt(row.getAttribute('data-last-fouls'));

            if (currentFouls > previousFouls) {
                cylinder.classList.remove('spinning');
                void cylinder.offsetWidth; 
                cylinder.classList.add('spinning');
            }
            
            row.setAttribute('data-last-fouls', currentFouls);

            const chambers = cylinder.querySelectorAll('.chamber');
            chambers.forEach((c, i) => {
                c.classList.toggle('active', i < currentFouls);
            });

            // --- OPPDATERT STATUS-LOGIKK FOR ELIMINERING ---
            const stamps = row.querySelectorAll('.stamp');
            stamps.forEach(s => s.style.display = 'none');
            
            // Fjerner den inaktive klassen som standard
            row.classList.remove('eliminated');

            if (currentFouls >= 3) {
                // Trigger ELIMINATED stempel
                row.querySelector('.eliminated-stamp').style.display = 'block';
                // Gjør raden inaktiv
                row.classList.add('eliminated');
                row.style.opacity = "1"; /* Beholder 1, CSS-filteret tar over */
            } else if (data.matchEnded) {
                if (rank === 0) row.querySelector('.survivor').style.display = 'block';
                row.style.opacity = "1";
            } else {
                row.style.opacity = (data.currentPlayer === pId) ? "1" : "0.6";
            }
        });

        const roundNum = Math.floor((data.innings || 0) / playerCount) + 1;
        document.getElementById('inning-text').innerText = `ROUND ${roundNum}`;
    });
</script>
</body>
</html>
