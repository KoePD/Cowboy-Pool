<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel+Decorative:wght@700&family=Rye&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; padding: 0; overflow: hidden; 
            height: 1080px; width: 1920px; 
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; 
        }

        .scoreline-wrapper { 
            width: 1000px; margin-bottom: 50px; 
            background: #0a0502;
            border: 4px solid #bd9b5b;
            border-radius: 12px; 
            box-shadow: 0 25px 60px rgba(0,0,0,1);
            overflow: hidden; position: relative;
        }

        .scoreline-header { 
            display: flex; align-items: center; 
            background: linear-gradient(180deg, #1d0f06 0%, #000 100%);
            border-bottom: 2px solid #6e5932;
            height: 70px; width: 100%; position: relative; z-index: 10;
        }

        .inning-text { color: #fdfaf0; font-family: 'Rye', serif; font-size: 22px; padding-left: 25px; text-transform: uppercase; }
        .status-msg { color: #bd9b5b; font-size: 16px; font-family: 'Rye', serif; text-transform: uppercase; margin-left: 15px; letter-spacing: 1px; }

        .scoreline-body { position: relative; width: 100%; background: #0a0502; min-height: 110px; }

        .player-row {
            display: none; align-items: center; width: 100%; height: 110px; 
            background: #150d08; border-bottom: 2px solid #2a1a0f;
            position: absolute; box-sizing: border-box;
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
        }

        /* REVOLVER-TØNNE BASERT PÅ BILDET DITT */
        .revolver-cylinder {
            width: 85px; height: 85px;
            background: url('image_b54acf.png') no-repeat center center;
            background-size: contain;
            position: relative; margin-right: 25px;
            flex-shrink: 0;
            margin-left: 20px;
        }

        .chamber { 
            width: 18px; height: 18px; 
            background: transparent; 
            border-radius: 50%; 
            position: absolute; 
            z-index: 3;
        }

        /* Posisjonering av 3 kamre i en trekant over hullene på bildet */
        .c1 { top: 10px; left: 33px; } 
        .c2 { bottom: 18px; left: 13px; } 
        .c3 { bottom: 18px; right: 13px; }
        
        .chamber.active { 
            background: radial-gradient(circle at 35% 35%, #fff7ad 0%, #f1c40f 45%, #b8860b 60%, #4a3600 100%); 
            border: 1.5px solid #fdfaf0; 
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.9), inset -2px -2px 3px rgba(0,0,0,0.5); 
            z-index: 5;
        }

        .name { font-size: 42px; color: #fdfaf0; text-transform: uppercase; padding-left: 10px; font-family: 'Rye', serif; }

        .score-block { 
            min-width: 220px; height: 100%; margin-left: auto;
            background: rgba(0,0,0,0.7); border-left: 3px solid #6e5932;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .score-val { 
            font-size: 64px; font-family: 'Rye', serif; line-height: 0.7;
            background: linear-gradient(180deg, #fff 0%, #f1c40f 45%, #b8860b 55%, #4a3600 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(3px 3px 2px rgba(0,0,0,1));
        }

        .warning { animation: cylinder-shake 0.2s infinite; }
        @keyframes cylinder-shake { 0% {transform: rotate(0deg);} 50% {transform: rotate(2deg);} 100% {transform: rotate(0deg);} }
    </style>
</head>
<body>

<div class="scoreline-wrapper">
    <div class="scoreline-header">
        <div class="inning-text" id="inning-text">ROUND 1</div>
        <div style="color: #6e5932; font-size: 24px; margin-left: 15px;">|</div>
        <div class="status-msg" id="status-msg">OPPDATERER...</div>
    </div>

    <div class="scoreline-body" id="main-body">
        <div class="player-row" id="p0-row">
            <div class="revolver-cylinder">
                <div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div>
            </div>
            <div class="name" id="p0-name">PLAYER 1</div>
            <div class="score-block">
                <div class="score-val" id="p0-score">0</div>
            </div>
        </div>
        <div class="player-row" id="p1-row">
            <div class="revolver-cylinder">
                <div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div>
            </div>
            <div class="name" id="p1-name">PLAYER 2</div>
            <div class="score-block">
                <div class="score-val" id="p1-score">0</div>
            </div>
        </div>
        <div class="player-row" id="p2-row">
            <div class="revolver-cylinder">
                <div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div>
            </div>
            <div class="name" id="p2-name">PLAYER 3</div>
            <div class="score-block">
                <div class="score-val" id="p2-score">0</div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cowboy-pool-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('gameData');

    db.on('value', snap => {
        const data = snap.val();
        if (!data) return;

        const rowH = 110;
        let pList = [];
        for (let i = 0; i < data.playerCount; i++) {
            pList.push({ idx: i, score: data.scores[i], fouls: data.foulCounts[i] });
        }
        pList.sort((a, b) => b.score - a.score);

        pList.forEach((pData, rank) => {
            const p = pData.idx;
            const row = document.getElementById(`p${p}-row`);
            if (!row) return;

            row.style.display = "flex";
            row.style.transform = `translateY(${rank * rowH}px)`;
            
            document.getElementById(`p${p}-name`).innerText = data.names[p] || `P${p+1}`;
            document.getElementById(`p${p}-score`).innerText = data.scores[p];

            // Revolver-hylser logikk
            const cylinder = row.querySelector('.revolver-cylinder');
            const chambers = cylinder.querySelectorAll('.chamber');
            chambers.forEach((c, i) => {
                c.classList.toggle('active', i < pData.fouls);
            });
            
            // Risting ved 2 fouls
            cylinder.classList.toggle('warning', pData.fouls === 2);
            
            // Gjør spillere som ikke er aktive litt gjennomsiktige
            row.style.opacity = (data.currentPlayer === p) ? "1" : "0.6";
        });

        // Oppdater rundenummer
        const roundNum = Math.floor(data.innings / data.playerCount) + 1;
        document.getElementById('inning-text').innerText = `ROUND ${roundNum}`;
    });
</script>
</body>
</html>
