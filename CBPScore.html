<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel+Decorative:wght@700&family=Rye&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; padding: 0; overflow: hidden; 
            height: 1080px; width: 1920px; 
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; 
        }

        .scoreline-wrapper { 
            width: 1000px; margin-bottom: 50px; 
            background: #0a0502;
            border: 4px solid #bd9b5b;
            border-radius: 12px; 
            box-shadow: 0 25px 60px rgba(0,0,0,1);
            overflow: hidden; position: relative;
        }

        .scoreline-header { 
            display: flex; align-items: center; 
            background: linear-gradient(180deg, #1d0f06 0%, #000 100%);
            border-bottom: 2px solid #6e5932;
            height: 70px; width: 100%; position: relative; z-index: 10;
        }

        /* --- REVOLVER-TØNNE BASERT PÅ DITT BILDE --- */
        .revolver-cylinder {
            width: 85px; height: 85px;
            background: url('Tønne.png') no-repeat center center;
            background-size: contain;
            position: relative; 
            margin-right: 25px;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        
        .chamber { 
            width: 18px; height: 18px; 
            background: transparent; /* Hullene er allerede på bildet */
            border-radius: 50%; 
            position: absolute; 
            display: flex; align-items: center; justify-content: center;
            z-index: 3;
        }

        /* Posisjonering av fouls over hullene i bildet ditt (Trekant) */
        /* Topp hull */
        .c1 { top: 11px; left: 34px; } 
        /* Høyre bunn hull */
        .c2 { bottom: 20px; right: 14px; } 
        /* Venstre bunn hull */
        .c3 { bottom: 20px; left: 14px; }
        
        /* Messing-hylse (Når du får foul) */
        .chamber.active { 
            background: radial-gradient(circle at 35% 35%, #fff7ad 0%, #f1c40f 45%, #b8860b 60%, #4a3600 100%); 
            border: 1.5px solid #fdfaf0; 
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.8), inset -2px -2px 3px rgba(0,0,0,0.5); 
            z-index: 5;
            animation: bullet-in 0.2s ease-out;
        }

        @keyframes bullet-in {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .warning { animation: cylinder-shake 0.2s infinite; }
        @keyframes cylinder-shake { 0% {transform: rotate(0deg);} 50% {transform: rotate(2deg);} 100% {transform: rotate(0deg);} }

        /* Resten av stilen din */
        .name { font-size: 42px; color: #fdfaf0; text-transform: uppercase; padding-left: 10px; font-family: 'Rye', serif; }
        .score-block { min-width: 220px; height: 100%; margin-left: auto; background: rgba(0,0,0,0.7); border-left: 3px solid #6e5932; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 15px; }
        .score-val { font-size: 72px; font-family: 'Rye', serif; line-height: 0.7; background: linear-gradient(180deg, #fff 0%, #f1c40f 45%, #b8860b 55%, #4a3600 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(3px 3px 2px rgba(0,0,0,1)); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="scoreline-wrapper">
    <div class="scoreline-header">
        <div class="inning-text" id="inning-text">ROUND 1</div>
        <div style="color: #6e5932; font-size: 24px; margin-left: 15px;">|</div>
        <div class="status-msg" id="status-msg">HENTER KRAV...</div>
    </div>

    <div class="scoreline-body" id="main-body">
        <div class="player-row" id="p0-row" style="display:none;">
            <div style="display:flex; align-items:center; padding:0 25px;">
                <div class="revolver-cylinder">
                    <div class="chamber c1"></div><div class="chamber c2"></div><div class="chamber c3"></div>
                </div>
                <div class="name" id="p0-name">P1</div>
            </div>
            <div class="score-block">
                <div class="score-val" id="p0-score">0</div>
            </div>
        </div>
        </div>
</div>

<script>
    // Din Firebase-logikk her som før...
    // Når du looper gjennom spillere:
    const chambers = row.querySelectorAll('.chamber');
    chambers.forEach((c, i) => c.classList.toggle('active', i < pData.fouls));
</script>
</body>
</html>
